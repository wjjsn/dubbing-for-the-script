title: "Re:Zero 第七章"
author: "Reactionist"
script:
  - character: "旁白"
    text: "第七章：导演剪辑版 第六集。众人在屏幕前等待着下一个场景加载完毕，神情各异，有的焦虑，有的好奇。"
  - character: "菲鲁特"
    text: "你不是说他不会死吗？"
  - character: "旁白"
    text: "菲鲁特的目光没有离开屏幕，但她的问题是冲着某位半精灵去的。爱蜜莉雅——刚才看到菜月昴被袭击时还惊慌失措的女孩——此刻已经冷静了下来，因为她想起了事情的经过。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我当时并不在他身边，所以看到他遭遇那些事的时候很震惊。我知道他会受伤，但是……"
  - character: "弗雷德莉卡"
    text: "你没想到会这么残忍？"
  - character: "旁白"
    text: "爱蜜莉雅点点头，一边揉着菜月昴的手，一边看向屏幕。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "他什么都不告诉我，总是自己一个人去，每次都受伤。他甚至因为我的缘故死了很多次。"
  - character: "旁白"
    text: "爱蜜莉雅的声音充满了悲伤，低头看向紧握着他的手的双眸中，映照着愧疚与沮丧。"
  - character: "蜜蜜"
    text: "他试过要告诉你们，但那个手上的诅咒阻止了他呀。"
  - character: "缇碧"
    text: "但他总可以告诉他们，有某种危险需要处理吧。"
  - character: "旁白"
    text: "缇碧说出了自己的看法，引得在场不少人纷纷点头。"
  - character: "安娜塔西亚"
    text: "如果菜月君告诉了别人来帮忙，他的任务本可以轻松得多呢。"
  - character: "旁白"
    text: "一个轻柔而破碎的声音从房间角落传来。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "他没办法向任何人求助的……"
  - character: "旁白"
    text: "所有人都看向了雷姆。"
  - character: "拉姆"
    text: "你说什么，姐姐？"
  - character: "旁白"
    text: "拉姆问道，眼中满是担忧和悲伤——看着面无表情的妹妹雷姆，她心如刀割。她想拥抱妹妹，但罗兹瓦尔大人说过，现在最好让她一个人待着。所以拉姆只能眼睁睁地看着妹妹远离众人坐着，头低垂着，曾经明亮的水蓝色眼眸如今黯淡无光。她的表情疲惫而彻底崩溃了。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "菜月昴没有告诉任何人有关魔兽的事，是因为他没有任何人可以依靠。碧翠丝大人表现得好像他的存在令她厌烦。据我们所知，她是唯一一个愿意在某种程度上帮他的。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "那我呢？没错，他不能告诉我死亡回归的事，但他还是可以向我求助啊！我还是会帮他的！"
  - character: "旁白"
    text: "爱蜜莉雅立刻反驳了女仆的话，目光中满是坚定。雷姆用死寂无神的目光迎上了半精灵的注视。那目光中彻骨的冰冷让爱蜜莉雅只想移开视线。"
  - character: "雷姆"
    text: "如果菜月昴向你或我们中的任何人求助……我就会杀了他。"
  - character: "旁白"
    text: "爱蜜莉雅和碧翠丝都用惊恐的表情盯着雷姆，两个女孩分别从两边紧紧抓住那个少年。她们并非孤例。"
  - character: "佩特拉"
    emotion: "悲伤"
    text: "可、可是为什么……他、他只是在拼命努力啊。"
  - character: "旁白"
    text: "佩特拉抓着弗雷德莉卡，拼命忍住泪水。她心目中那个昴口中温柔善良的雷姆的形象，在此刻彻底碎裂了。她只想知道，昴为什么那么拼命去救一个如此残忍可怕的人。"
  - character: "由里乌斯"
    emotion: "愤怒"
    text: "那你为什么要救她？"
  - character: "旁白"
    text: "由里乌斯以一种与平时截然不同的语气质问着女仆。苦涩、激动、愤怒。骑士站在原地浑身颤抖，死死瞪着雷姆。雷姆没有理会他，低下头去。双眸毫无感情。由里乌斯无法阻止双拳的颤抖，无力感和愧疚感再次将他淹没。他为什么要在意？他已经不再是菜月昴的朋友了。于是骑士只是紧闭双唇，将沸腾的怒火压在石雕般的表情之下。"
  - character: "旁白"
    text: "爱蜜莉雅瘫回椅子上，想象着自己处于菜月昴的位置。在那种情况下她会害怕吗？她能像他一样带着微笑面对一切吗？"
  - character: "安娜塔西亚"
    text: "如果是我，早就从宅邸逃走了。"
  - character: "旁白"
    text: "安娜塔西亚一边看着加载中的屏幕，一边说出了自己的看法。"
  - character: "里卡多"
    text: "我恐怕再也没脸见他们任何人了。"
  - character: "旁白"
    text: "里卡多坐在座位上感叹道，等待屏幕继续向他展示那个少年的冒险。说实话，他已经完全被这个孩子的精神吸引了，怎么看都看不够。库珥修以同情的目光注视着雷姆。"
  - character: "库珥修"
    text: "在那一切之后，你为什么还要救她呢，菜月昴？"
  - character: "旁白"
    text: "菲莉丝注视着他的主人，发现她正用若有所思、近乎温柔的目光看着那个少年。他注意到她嘴角微微上扬。菲莉丝低下头，咬紧了牙关。"
  - character: "罗兹瓦尔"
    text: "嗯……这加载得是不是有点太久了？"
  - character: "旁白"
    text: "罗兹瓦尔对着屏幕挑了挑眉，和其他人一样等待着。"
  - character: "普莉希拉"
    text: "哼！接下来要展示的内容，和那个少年拼命充当所谓'英雄'的徒劳努力一样可悲。"
  - character: "旁白"
    text: "一位红发公主扇着扇子，用绯红双眸中翻涌的恶意瞪着屏幕。"
  - character: "安娜塔西亚"
    text: "看把你给急的——就因为上一幕他救了那个女仆。"
  - character: "旁白"
    text: "安娜塔西亚带着促狭的微笑说道。她一直等着找机会逗弄普莉希拉。公主没有上钩，这令商人和身旁的骑士都感到意外。这位绯红的美人只是用扇子掩住皱眉，静静看着屏幕。"
  - character: "普莉希拉"
    text: "你引领我走向的是怎样的命运？这样一头猪又怎会与本宫的神性产生关联？"
  - character: "旁白"
    text: "普莉希拉保持沉默，只因她正忙着思考狱长在她要求释放时对她说的最后一番话。碧翠丝将手与契约者交握着，回想着他刚来时自己对他说过的所有刻薄的话、做过的所有过分的事。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "我本来也可以帮你的，其实……贝蒂很抱歉呢。"
  - character: "旁白"
    text: "小女孩只是把头靠在他的肩上，悲伤空洞的双眼盯着屏幕。"
  - character: "加菲尔"
    emotion: "兴奋"
    text: "大将救了她！他真的救了雷姆，即使她对大将做了那些事！"
  - character: "旁白"
    text: "奥托看着他的朋友，嘴角微微扬起。加菲尔震惊而敬畏地看着屏幕——从菜月昴把雷姆从魔兽嘴下推开的那一刻起，他就一直是这副表情。他被震撼了。"
  - character: "奥托"
    text: "你也太幼稚了，加菲尔。"
  - character: "加菲尔"
    text: "你说谁幼稚呢！？"
  - character: "奥托"
    text: "就是你！你看上去就像想找他要签名似的！"
  - character: "加菲尔"
    text: "随你怎么说！反正你也不可能像他那么帅。"
  - character: "奥托"
    text: "没有人能像他那么帅。"
  - character: "旁白"
    text: "奥托对着这个傲娇的兄弟微笑。加菲尔得意地笑了。莱茵哈鲁特看着两人的互动，深深皱起了眉头。"
  - character: "旁白"
    text: "他们知道的关于菜月昴的事，有哪些是他不知道的？他们拥有怎样的共同回忆，才能产生如此强烈的羁绊？如果他能多花时间和爱蜜莉雅的骑士相处，他也能像那样和他们谈笑风生吗？"
  - character: "旁白"
    text: "通常情况下，他不会一直沉浸在这样的思绪和疑问中。偶尔闪过一念便会去做些有意义的事——比如拯救一个村庄，或者读几本来自外部州郡和王国的新书。但现在，他身处这个房间，看着一个他希望能称之为朋友的人因为一次过错而一遍又一遍地死去……莱茵哈鲁特意识到了自己有多么空虚……"
  - character: "旁白"
    text: "他没有资格称菜月昴为朋友。他无法像奥托和加菲尔那样微笑。他不了解菜月昴，没有和他开过玩笑，没有留下任何属于两人的像样回忆。他在这里是空洞的。他的反应是虚伪的。莱茵哈鲁特无法成为像那两个人对菜月昴那样的朋友。"
  - character: "旁白"
    text: "这位红发骑士只是盯着屏幕，天蓝色眼眸中的光芒终于黯淡了下去。他的心紧紧揪在一起。一直以来珍视的友谊不过是一场虚假的幻影——这份痛苦让他久违地感受到了真正的孤独。"
  - character: "莱茵哈鲁特"
    text: "……呃啊！"
  - character: "菲鲁特"
    text: "你哼什么呢？"
  - character: "莱茵哈鲁特"
    text: "没什么，大小姐……没什么。"
  - character: "菲鲁特"
    text: "明明就有！我命令你说出来！"
  - character: "旁白"
    text: "莱茵哈鲁特确实很想告诉她那一声嗤笑的原因。他在自己那黑暗扭曲的内心深处发现的讽刺。他想告诉她这对他来说有多么可笑。他自己那悲伤满溢、心灵受创的祖父，和菜月昴的关系竟然比他还要亲近。他嫉妒威尔海姆谈起菜月昴时的语气。他嫉妒祖父能说出那些关于菜月昴的话。而他只能沉默，无言以对。反正他和这些人中的任何一个都没有真正的关系。但他不能说出来。"
  - character: "莱茵哈鲁特"
    text: "我在想你戴上小皇冠会有多可爱呢，菲鲁特大人。"
  - character: "旁白"
    text: "他露出了迷人的年轻骑士的微笑。然后被他的主人一脚踹在脸上。他想着能不能偷偷流几滴泪……不行，他是英雄。英雄不会哭——除了菜月昴……他会哭，会大声呼喊出自己的软弱。"
  - character: "莱茵哈鲁特"
    emotion: "悲伤"
    text: "我怎样才能像你一样呢，菜月昴？"
  - character: "旁白"
    text: "莱茵哈鲁特转回屏幕，用冰冷死寂的目光注视着。他低声呢喃，带着恳求。"
  - character: "碧翠丝"
    text: "然后嘛……关于昨晚，我真心感谢你。干得不错。"
  - character: "拉姆"
    text: "干得不错？永远都是居高临下的语气……这值得你道谢吗？"
  - character: "旁白"
    text: "拉姆朝着村子中心的方向看去，菜月昴也跟着看了过去。他注意到村里的大人们聚在一起，表情严肃而愤怒地交谈着。"
  - character: "拉姆"
    text: "当领地的居民遭受任何损失时，领主都要承担责任。如果那群乌尔加姆进一步伤害了那些孩子……你的做法是正确的。"
  - character: "视频内容"
    text: "菜月昴困惑地回头看拉姆，询问那些黑色魔兽的名字。拉姆回答叫乌尔加姆，并告诉他已经重新连接了被破坏的结界，村子是安全的。"
  - character: "库珥修"
    text: "你们有没有去找破坏结界的人？我猜你应该起了疑心，结界不会自己坏掉的。"
  - character: "拉姆"
    text: "当然找了，但等我赶到的时候，痕迹早就消失了。我调查现场时唯一不对劲的，就是在巴鲁斯和我妹妹的救援结束后，一个孩子失踪了。"
  - character: "安娜塔西亚"
    text: "嗯哼，那个孩子就是……"
  - character: "碧翠丝"
    text: "梅莉……"
  - character: "旁白"
    text: "碧翠丝咬牙切齿地瞪着屏幕。佩特拉想起了在宅邸里和那个女孩一起玩耍的时光，皱起了眉头。小女仆再次被背叛所伤。"
  - character: "佩特拉"
    text: "我再也不跟她玩了。"
  - character: "旁白"
    text: "佩特拉盯着虚空，下定了决心。拉姆开始和村子里的其他人分享食物。"
  - character: "视频内容"
    text: "拉姆告诉村民们她整夜都盯着结界，确保没有乌尔加姆能穿过结界进入村子。菜月昴挨家挨户地探望每一个孩子，查看他们的情况。他被佩特拉的父母道谢，拒绝了他们的礼物。"
  - character: "视频内容"
    text: "菜月昴注意到一个穿着华丽的金发小女孩站在村口——碧翠丝。他带着灿烂的笑容朝精灵跑去，感谢她帮忙解除了孩子们的诅咒。碧翠丝说有更重要的事要谈。"
  - character: "视频内容"
    text: "场景切换。菜月昴靠在墙上，碧翠丝站在他面前。碧翠丝告诉他：不到半天，他就会死。"
  - character: "阿尔"
    text: "搞什么！"
  - character: "旁白"
    text: "阿尔沮丧而恼怒地大喊。爱蜜莉雅目瞪口呆地盯着屏幕。"
  - character: "安娜塔西亚"
    text: "你不知道这件事吗，爱蜜莉雅？"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "不……没有人告诉我这些！"
  - character: "库珥修"
    text: "什么？"
  - character: "威尔海姆"
    text: "先继续看下去吧。"
  - character: "旁白"
    text: "威尔海姆建议道，目光始终没有离开屏幕——他好奇菜月昴会如何应对这个处境。"
  - character: "视频内容"
    text: "碧翠丝解释说，魔兽在森林里袭击菜月昴时在他体内又植入了另一个诅咒。他身上被施加了太多诅咒，纠缠在一起太复杂了，解不开。半天之后，魔兽会激活术式来补充魔力，把他当成了食物。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "你为什么不告诉我？为什么不通知我，碧翠丝！？"
  - character: "旁白"
    text: "金发精灵只是把脸埋进了契约者的胸口，整个人从座位上挪开，坐到了他的腿上。"
  - character: "碧翠丝"
    text: "我没有理由和你说话呢，我觉得。"
  - character: "弗雷德莉卡"
    text: "爱蜜莉雅大人……我觉得您现在最好继续看接下来的内容。"
  - character: "视频内容"
    text: "碧翠丝解释诅咒的原理：如果只有一个，解除它就像解开一个结一样简单。但菜月昴身上的诅咒是许多线缠成的复杂蛛网，根本解不开。半天之后魔兽会激活术式来吞噬他的魔力。"
  - character: "视频内容"
    text: "菜月昴不安地笑着说它们袭击人是因为饿了，思维真简单。他疲惫地呻吟着，双手捂住了脸。"
  - character: "旁白"
    text: "所有人都沉默地看着屏幕。那些话足以吓到在场的大多数人。"
  - character: "莱茵哈鲁特"
    text: "听到这种话还能笑得出来……"
  - character: "由里乌斯"
    text: "看得人心里难受。"
  - character: "旁白"
    text: "由里乌斯替同事补完了这句话，面无表情地盯着屏幕。爱蜜莉雅带着悲伤的神情看向身旁的菜月昴。碧翠丝只是带着愤怒的目光盯着屏幕上的自己。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "没用，实际上。"
  - character: "旁白"
    text: "碧翠丝朝自己啐了一口。她本可以帮更多忙的。安娜塔西亚、库珥修和菲鲁特只是用审视和愤怒的眼神看着那个少年。"
  - character: "安娜塔西亚"
    text: "你觉得我们能帮到他吗？"
  - character: "菲鲁特"
    text: "你是什么意思？"
  - character: "安娜塔西亚"
    text: "也许心理治疗能帮上忙？"
  - character: "库珥修"
    text: "他什么都说不了的。"
  - character: "旁白"
    text: "库珥修严肃地提醒她们诅咒的惩罚。佩特拉只是低头看着菜月昴，若有所思。"
  - character: "视频内容"
    text: "菜月昴睁开眼睛，发现碧翠丝正一脸惊恐而困惑地盯着他。碧翠丝说在告诉他剩多少时间可以活。菜月昴说他很害怕，但觉得碧翠丝不只是来告诉他他会死的。碧翠丝解释说，如果吞噬者死了，进食就会被取消——他必须杀光那些诅咒他的东西。"
  - character: "奥托"
    text: "所以他必须杀光那些东西？"
  - character: "里卡多"
    text: "到底有多少只？"
  - character: "由里乌斯"
    text: "那是繁殖地。有成百上千只的可能性很大。"
  - character: "视频内容"
    text: "菜月昴撩起破烂的衬衫，看着自己伤痕累累的皮肤，意识到它们数量太多了。碧翠丝说大哥哥才没有告诉那个傻丫头关于诅咒的事。"
  - character: "普莉希拉"
    text: "哼！连你的大精灵都不信任一个半魔女呢。"
  - character: "旁白"
    text: "普莉希拉大声嘲笑起来，爱蜜莉雅震惊地盯着屏幕。她缓缓转向碧翠丝，冰冷的表情下隐藏着被背叛的伤痛。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "帕克真的知道菜月昴会死吗？"
  - character: "旁白"
    text: "碧翠丝被爱蜜莉雅受伤和被背叛的语气刺痛了。小精灵只是紧张地点了点头。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "他知道有办法帮菜月昴吗？"
  - character: "旁白"
    text: "碧翠丝再次缓缓点头。爱蜜莉雅冰冷而愤怒地瞪着墙壁。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "所以，帕克愿意让菜月昴去死。"
  - character: "碧翠丝"
    text: "大、大哥哥只是想保护他的契约者——"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "够了，碧翠丝。连雷姆都比我们两个更有胆量去帮菜月昴！比我们两个加起来都多！"
  - character: "旁白"
    text: "碧翠丝闭上了嘴——愤怒的爱蜜莉雅靠回椅背，对着屏幕咬紧了牙关。碧翠丝快要哭出来了。"
  - character: "奥托"
    text: "你也看到火花了吧？"
  - character: "旁白"
    text: "奥托问加菲尔，同时往后退了退。金发少年点了点头，尽可能远离那头咆哮着、怒目圆睁的半精灵女士。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "菜月——昴——"
  - character: "旁白"
    text: "爱蜜莉雅紧握着少年的手，同时盯着屏幕。"
  - character: "佩特拉"
    text: "她好可怕。"
  - character: "弗雷德莉卡"
    text: "嘘！别再惹她更生气了。"
  - character: "视频内容"
    text: "菜月昴无奈地双手抱头，说这个难度简直不是人能打的，根本不可能。他脑海里闪过一道光，想起了雷姆的声音——雷姆说要救他，碧翠丝说可以随便处置他了。菜月昴缓缓抬起头，浑身颤抖，问碧翠丝雷姆在哪里。"
  - character: "佩特拉"
    text: "噢！所以你才独自一个人进了森林！"
  - character: "安娜塔西亚"
    text: "所以你确实帮了他。"
  - character: "奥托"
    text: "她一个人把它们全干掉了？"
  - character: "旁白"
    text: "奥托震惊地问道。雷姆对这一切保持沉默，冷眼看着屏幕继续播放。"
  - character: "库珥修"
    text: "以菜月的性格……"
  - character: "威尔海姆"
    text: "他会跳进繁殖地去帮雷姆。"
  - character: "旁白"
    text: "威尔海姆带着深情的目光向主人做出了判断。菲莉丝疲惫地叹了口气，仇恨和嫉妒充斥了他的内心，然而愧疚让他保持了沉默。爱蜜莉雅只是面无表情地看着，要惩罚帕克。"
  - character: "爱蜜莉雅"
    text: "这就是你的惩罚。"
  - character: "旁白"
    text: "爱蜜莉雅自我肯定地点了点头，露出了满意的微笑。碧翠丝用近乎忧虑的目光看着精灵。"
  - character: "视频内容"
    text: "菜月昴站起身来，握住碧翠丝的肩膀，追问雷姆在哪里。碧翠丝面无表情地反问他如果是雷姆会怎么做。一个声音从上方岩架上传来——是拉姆。拉姆惊恐地问碧翠丝，雷姆不是一个人进了那片森林吧。"
  - character: "旁白"
    text: "当屏幕上播出菜月昴和姐姐赶来救她的那一幕时，雷姆猛地颤抖了一下。菜月昴脸上的担忧，姐姐展现出的震惊情感——这些都让她心中充满了撕心裂肺的愧疚。"
  - character: "视频内容"
    text: "场景切换。雷姆正走在森林中，红色的气场环绕着她长出角的身姿。她怒目圆睁，穿过灌木丛，浑身鲜血淋漓。她痛苦地低吼着，说必须一个人去做这件事，不能再让任何人受伤了。"
  - character: "安娜塔西亚"
    text: "嗯。看来你改变主意了呢。"
  - character: "菲鲁特"
    text: "你真的那么想帮他？"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我只会把事情搞得更糟。"
  - character: "旁白"
    text: "库珥修看向支离破碎的雷姆，眉头皱得更深了。拉姆震惊地看着妹妹。"
  - character: "拉姆"
    text: "雷姆……你怎么了？你看不到巴鲁斯在拼命帮你吗？"
  - character: "旁白"
    text: "妹妹没有回应。她心里想着：他只是不得不这么做而已。"
  - character: "爱蜜莉雅"
    text: "看到了吧？"
  - character: "旁白"
    text: "爱蜜莉雅低声嘶嘶地说道，带着愤慨的表情看向碧翠丝。精灵的眉头紧锁。"
  - character: "碧翠丝"
    text: "你到底怎么了，我觉得？这不只是大哥哥想保护你这么简单吧？你在生我的气，有什么就直说。"
  - character: "爱蜜莉雅"
    text: "我觉得菜月昴是对的……也许雷姆应该得到第二次机会。"
  - character: "碧翠丝"
    text: "你疯了吗，我觉得？"
  - character: "旁白"
    text: "碧翠丝压低了声音表达她疯狂的不可置信，但仍然危险地瞪着公主。"
  - character: "爱蜜莉雅"
    text: "我不认为我会原谅她做的事……但无视她为了他所承受的痛苦，这不公平。"
  - character: "碧翠丝"
    text: "你是不是因为那个女仆为菜月昴做的事比我们两个加起来都多，就觉得愧疚了？"
  - character: "爱蜜莉雅"
    text: "而你其实也已经想这件事很久了吧，嗯？"
  - character: "旁白"
    text: "看到精灵陷入沉默，爱蜜莉雅决定结束这场争论。"
  - character: "爱蜜莉雅"
    text: "我和你一样矛盾。确实如此。但我理解雷姆对菜月昴所做的一切有很多原因。有些原因让我愤怒，让我对曾经当作好朋友的人产生了恨意。我不会完全原谅她。我会尽我最大的努力去监视这个女孩。只要她和他在一起，我就会看着她。"
  - character: "碧翠丝"
    text: "你什么时候变得这么果断了，我觉得？"
  - character: "爱蜜莉雅"
    text: "就像你和我看着他每次谈起她、或者在她床边一坐就是好几天一样。"
  - character: "碧翠丝"
    text: "别把我和你还有她混为一谈。我的契约者只是太善良了，对他自己没好处！"
  - character: "爱蜜莉雅"
    text: "碧翠丝，我知道你想站在菜月昴身边……但在不了解菜月昴对这一切的看法的情况下就去恨雷姆，这太令人作呕了。他为她流过血，帮过她，信任过她。不只是在这些放映中，而是在这一切发生之后也一样。为什么？他为什么要费那么大的劲去帮一个曾经那么残忍地折磨并杀害过他的人？"
  - character: "旁白"
    text: "碧翠丝无法长时间与爱蜜莉雅的目光对视。即使半精灵严厉地俯视着她，她的面容也映照出纯粹的悲伤。"
  - character: "爱蜜莉雅"
    text: "请你仔细想想，碧翠丝。我不会忘记雷姆对菜月昴做的事，远远不会。但我会继续遵从菜月昴想帮她的愿望，因为在我们需要她的时候，她仍然是一个非常好的朋友。而他的原谅同样也在折磨着她——她在这里和我们一样痛苦。"
  - character: "旁白"
    text: "精灵的目光转向雷姆脸上那刺目的、纯粹绝望的表情。女仆坐得那么远，却又似乎和她以及爱蜜莉雅紧紧相连。这让碧翠丝感到恶心。"
  - character: "碧翠丝"
    text: "我排挤那个女孩没有错！"
  - character: "爱蜜莉雅"
    text: "你没有错。没有人有错。但我们需要雷姆来给菜月昴幸福。他爱她，真的很爱。我必须尊重这一点，并尽力向雷姆展示她所需要的友谊，同时让她按照菜月昴认为合适的方式为她的罪行赎罪。"
  - character: "碧翠丝"
    text: "你、你想要两全其美——既能恨她对她做过的事，又能为了菜月昴的缘故把她当朋友！"
  - character: "爱蜜莉雅"
    text: "我不想恨她。我想停止恨她。因为雷姆对自己的严苛程度远超你我所能想象。现在对她态度恶劣，只会抹杀她为菜月昴所做的一切。如果我们对她表现出恨意，她反而会觉得原谅自己是理所当然的。但如果我们对她表现出善意……不断提醒她菜月昴的原谅……雷姆将永远对她所做的事感到无比沉重的愧疚。"
  - character: "旁白"
    text: "碧翠丝张着嘴，呆呆地看着半精灵。"
  - character: "爱蜜莉雅"
    text: "雷姆是个好女孩。"
  - character: "旁白"
    text: "爱蜜莉雅露出了狼一般的笑容。碧翠丝面对这一幕，彻底动摇了。"
  - character: "视频内容"
    text: "场景切回菜月昴。他问雷姆为什么要为他做到这种地步。还没等任何人回答，拉姆就开始朝森林跑去。菜月昴一把抓住了她的手，问她是否知道雷姆在哪里。拉姆说用千里眼就能找到——这是一种能看到和她波长相同的虫子和动物所看到的东西的能力。"
  - character: "里卡多"
    text: "在侦察任务中简直是天赐之物。"
  - character: "旁白"
    text: "里卡多和由里乌斯一起点头。佩特拉微微皱眉，意识到自己作为女仆是多么无用。弗雷德莉卡看到小女仆撅起嘴的样子，轻轻拍了拍她的头。"
  - character: "菲鲁特"
    text: "看来……两位女仆都真的很想帮大哥哥……而且她们配合得很好。"
  - character: "视频内容"
    text: "菜月昴松开了拉姆的手，目光坚定，问她是不是那种能战斗的女仆。他说要和她一起进森林。拉姆说如果期望她能像雷姆鬼化时那样战斗，她做不到。菜月昴问她们不是双胞胎吗，拉姆露出痛苦的表情说和雷姆不同，她没有角。"
  - character: "菲莉丝"
    text: "为什么呢喵？"
  - character: "拉姆"
    text: "我觉得你应该闭嘴好好看。"
  - character: "旁白"
    text: "菲莉丝咬牙切齿，愤怒于女仆可恶的态度。"
  - character: "视频内容"
    text: "拉姆对少年微笑，说她只会用一种相当极端的风系魔法。她挥了挥手，菜月昴周围的整个地面都震动了起来——风刃劈砍着大地。碧翠丝走在两人旁边，说去救妹妹意味着放弃自己的生命。菜月昴得意地笑了笑，说因为习惯了死亡就养成放弃的习惯是愚蠢的，生命是宝贵的，他要拼死挣扎，要去打一场翻身仗。"
  - character: "碧翠丝"
    text: "他挺会说话的呢，我觉得。"
  - character: "旁白"
    text: "碧翠丝对着屏幕微笑。爱蜜莉雅点了点头，轻轻推了推菜月昴的手臂。"
  - character: "里卡多"
    text: "这孩子在给自己打气呢。"
  - character: "旁白"
    text: "里卡多好笑地叹了口气。奥托和加菲尔只是兴奋地瞪大眼睛看着屏幕。"
  - character: "安娜塔西亚"
    text: "他下定了决心……"
  - character: "菲鲁特"
    text: "让我们看看他是怎么赢的。"
  - character: "旁白"
    text: "菲鲁特靠回去，准备好迎接大哥哥的精彩冒险。连骑士们似乎也对这段旅程的结局感到兴奋。威尔海姆也不例外。"
  - character: "视频内容"
    text: "场景切换。拉姆说刚才还在挑衅命运的少年，正喘着粗气靠在一把闪亮的剑上，从未见过如此丢人的一幕。"
  - character: "由里乌斯"
    text: "啊，我就知道。"
  - character: "旁白"
    text: "由里乌斯不得不摇摇头，忍住笑意——周围的人都在咯咯偷笑。"
  - character: "拉姆"
    text: "他就是这么没用。"
  - character: "普莉希拉"
    text: "他不觉得丢人吗？"
  - character: "旁白"
    text: "普莉希拉疲惫而不耐烦地瞪着他问道。害她白激动了一场！菲鲁特笑得前仰后合，而她的骑士只是对着屏幕微笑。佩特拉和弗雷德莉卡被这位冒牌管家的滑稽样子逗得咯咯笑。"
  - character: "视频内容"
    text: "菜月昴在沉重的喘息之间试图找借口，说自己还在恢复中，体力耗尽了，又失血过多，还说没听到爱蜜莉雅酱说'路上小心'。"
  - character: "爱蜜莉雅"
    text: "哼！你干了这种事之后就再也听不到了！"
  - character: "安娜塔西亚"
    text: "哎呀拜托！他还在想着你呢，饶了他吧。"
  - character: "旁白"
    text: "安娜塔西亚觉得逗弄天真的爱蜜莉雅很有趣，放声大笑。"
  - character: "爱蜜莉雅"
    text: "在你说'我回来了'之前，昨晚的'路上小心'仍然有效。"
  - character: "视频内容"
    text: "菜月昴拔出了剑，得意地看着它。佩特拉咯咯笑着，想起了年轻人们的首领在菜月昴同意收下村子里最锋利的剑时有多兴奋。后来那把剑怎么了？小女仆轻声自问道。"
  - character: "莱茵哈鲁特"
    text: "你是……不好意思，小姐。但我忍不住觉得，你刚才是在试图让菜月昴对自己更有信心。"
  - character: "旁白"
    text: "莱茵哈鲁特对这一幕挑了挑眉，转头看向拉姆。粉发女仆忍不住困惑地看着骑士。爱蜜莉雅饶有兴趣地盯着红发少年，碧翠丝则将目光从屏幕移到了地上片刻，似乎在思考关于粉发女仆的什么事。"
  - character: "莱茵哈鲁特"
    text: "不必回答我，小姐。抱歉打扰了。"
  - character: "旁白"
    text: "莱茵哈鲁特露出了微笑，再次转向屏幕。罗兹瓦尔伸手拍了拍拉姆紧握的拳头。"
  - character: "罗兹瓦尔"
    text: "你要对自己的感情诚实啊。"
  - character: "旁白"
    text: "小丑领主对脸红的女仆窃笑道。佩特拉对拉姆灿烂地笑着，似乎为宅邸女仆中的导师感到自豪。"
  - character: "视频内容"
    text: "闪回到一个村民递给菜月昴剑的场景——这是村子里最锋利的剑。孩子们朝他跑来，围住了他，佩特拉带头问他要去哪里。菜月昴说他会没事的。村子里年轻人们的首领说这是所有人送给他的感谢礼物。孩子们纷纷抓着他，把东西塞进他的口袋。"
  - character: "弗雷德莉卡"
    text: "哎呀！村民们真的很喜欢他呢。"
  - character: "由里乌斯"
    text: "现在我明白他为什么那么在乎他们了。"
  - character: "蜜蜜"
    text: "嗯嗯，他那时候也很努力呢！"
  - character: "旁白"
    text: "缇碧在一旁点头。看到菜月昴得到了那么多支持，安娜塔西亚好奇地瞥了库珥修一眼。"
  - character: "安娜塔西亚"
    text: "你觉得我们能亲眼看到那个时刻吗？"
  - character: "库珥修"
    text: "嗯，我觉得我们不会在没看到那场与怠惰的惊人战斗的情况下就离开这里。我没什么不愿意看的。"
  - character: "安娜塔西亚"
    text: "你没什么不愿意的？还是你自己想看自己踢白鲸的屁股？"
  - character: "库珥修"
    text: "我不太明白你在说什么，星金小姐。"
  - character: "视频内容"
    text: "菜月昴收剑入鞘，掏出了孩子们塞在口袋里的礼物。一颗糖果，一块漂亮的石头……还有一只巨大的黏糊蜈蚣！少年发出了不像男生的尖叫，把虫子甩了出去。"
  - character: "奥托"
    text: "哈哈哈哈哈！"
  - character: "旁白"
    text: "奥托和加菲尔连同阿尔和里卡多一起放声大笑。"
  - character: "菲鲁特"
    text: "嘻嘻嘻，是谁干的呀？"
  - character: "旁白"
    text: "佩特拉笑得没法回答。爱蜜莉雅和碧翠丝都得意地笑了。"
  - character: "视频内容"
    text: "菜月昴把黏液擦在外套上。拉姆用居高临下的语气说这只不过是他们崇拜他的证明。菜月昴得意地说在孩子纯真的眼中，他真正的男子气概闪闪发光。屏幕中展示了一幅菜月昴如果是个真正男子汉的形象。"
  - character: "旁白"
    text: "由里乌斯忍不住嗤笑出声。菲莉丝和普莉希拉直接对着那幅图大笑起来。"
  - character: "安娜塔西亚"
    text: "你更喜欢他那个样子吗？"
  - character: "爱蜜莉雅"
    text: "我的菜月昴就是现在这样就很好了。除了他不守承诺这一点。"
  - character: "库珥修"
    text: "这听起来可不是什么好品质。"
  - character: "旁白"
    text: "库珥修忍不住嫉妒地刺了半精灵一句。爱蜜莉雅只是耸耸肩，靠在身旁的骑士身上。"
  - character: "爱蜜莉雅"
    text: "而且，不只是我喜欢他们。你能看出来吧？"
  - character: "拉姆"
    text: "是的……"
  - character: "视频内容"
    text: "闪回。拉姆看着孩子们围在菜月昴身边，往他口袋里塞满礼物。佩特拉和其他人对拉姆微笑，说也想感谢雷姆琳，晚点带她过来。拉姆目瞪口呆。"
  - character: "旁白"
    text: "拉姆微笑着看向妹妹，希望她看到了这一幕。雷姆面无表情地看着屏幕，但她的双眼瞪得很大。奥托注意到了这一点，微微笑了笑。"
  - character: "拉姆"
    text: "巴鲁斯，我要用千里眼了。等一下。"
  - character: "旁白"
    text: "拉姆转过身去，猩红色的气场环绕着她，她闭上眼睛，开始在森林中众多动物和昆虫的视角之间切换。"
  - character: "缇碧"
    text: "这有点恶心呢。"
  - character: "蜜蜜"
    text: "好酷！"
  - character: "拉姆"
    text: "巴鲁斯，有什么东西正在看着我们。"
  - character: "视频内容"
    text: "拉姆立刻睁开眼睛指向上面。菜月昴转过头，发现一只乌尔加姆犬正朝他疾速扑来。少年举剑自卫，但那只犬突然被劈成两半——拉姆转身射出一道风刃。还有更多魔兽要来。"
  - character: "佩特拉"
    text: "菜月昴！"
  - character: "旁白"
    text: "爱蜜莉雅和碧翠丝握紧了他的手，盯着屏幕看他如何应对。雷姆注视着屏幕，分析着自己给他造成的每一道创伤。"
  - character: "普莉希拉"
    text: "可悲。"
  - character: "旁白"
    text: "普莉希拉好笑地嗤了一声，奥托和加菲尔则羞愧地低下了头——为他们兄弟的懦弱。"
  - character: "视频内容"
    text: "拉姆一边战斗一边嘲讽菜月昴看起来很弱。菜月昴哀嚎着说这改变不了她说的话的本质。两人继续走进森林。"
  - character: "视频内容"
    text: "菜月昴问拉姆提到的'无角'是什么意思。拉姆面带忧愁地说没什么特别的，是失去角的愚蠢鬼族的别称。她遇到了一点麻烦，失去了唯一的角，从那以后一直依赖雷姆。"
  - character: "旁白"
    text: "雷姆震惊于姐姐竟然会说出这样的话。蓝发女仆双手紧握着自己的衣服，又找到了一件可以折磨自己的事。"
  - character: "视频内容"
    text: "拉姆解释说失去角她也得到了一些东西，也拯救了一些生命。不过雷姆大概不这么想。屏幕中雷姆龇牙咆哮，角上闪烁着危险的光芒。"
  - character: "缇碧"
    text: "好可怕。"
  - character: "旁白"
    text: "缇碧躲到了姐姐身后，姐姐对他嗤之以鼻。"
  - character: "蜜蜜"
    text: "弱小！"
  - character: "普莉希拉"
    text: "这就是那些恶心的鬼族后代的真面目。难怪他们被灭族了。"
  - character: "旁白"
    text: "普莉希拉扇着扇子，厌恶地瞪着屏幕。拉姆听到这个卑劣女人的话，纯然愤怒地握紧了裙摆。雷姆低下了头，为给姐姐和家族带来的耻辱而自责。"
  - character: "视频内容"
    text: "拉姆解释鬼族的规矩：原本鬼族成员有两只角，但双胞胎天生只有一只角，所以双胞胎被厌恶，惯例是在出生后立刻处理掉。但雷姆和她被允许活了下来。鬼族的角能唤醒鬼族本能，使其吞噬魔力，提升战斗能力。但如果行事鲁莽，反噬会让她们遍体鳞伤。"
  - character: "库珥修"
    text: "多么恶心的规矩。"
  - character: "安娜塔西亚"
    text: "你确定你的政策不会产生同样的效果吗？"
  - character: "旁白"
    text: "安娜塔西亚若有所思地向厌恶中的库珥修问道。军事化的公爵夫人沉默了，思考着自己一些脱离现实的政策。"
  - character: "视频内容"
    text: "屏幕中蓝发鬼族女仆被魔兽团团围住。镜头拉近到粉色发光的角上——它从空气中和雷姆周围汲取着魔力。雷姆狂笑着疯狂挥舞双臂，砸碎踩死了多只魔兽，同时用狼牙棒劈开了更多乌尔加姆。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我不想看到雷姆那个样子。"
  - character: "旁白"
    text: "雷姆颤抖着闭上了眼睛——她所厌恶的那个可耻的自我，正在她和所有人面前的窗口中展现。"
  - character: "加菲尔"
    emotion: "兴奋"
    text: "天哪，太猛了！"
  - character: "旁白"
    text: "加菲尔纯粹出于兴奋地喊道，双腿颤抖着渴望和发狂的雷姆那样的对手战斗。金发少年没有意识到只有他一个人在兴奋。爱蜜莉雅和碧翠丝带着恐惧的目光注视着。"
  - character: "奥托"
    text: "如果发狂的雷姆嗅到了菜月昴身上的魔女气息，会发生什么？"
  - character: "由里乌斯"
    text: "毫无疑问她会试图杀了他。"
  - character: "菲鲁特"
    text: "你知道菜月昴是怎么度过这一关的吗？你说过这是正确的那个循环，而他没有……"
  - character: "旁白"
    text: "菲鲁特向佩特拉恳求道，双眼颤抖，心紧紧揪着——想到这个少年可能再次死去。在经历了那么多才重新站起来之后，她不能再看他死去了。"
  - character: "旁白"
    text: "佩特拉耸了耸肩——骑士所描述的恐惧开始在她脑中扎根。佩特拉和爱蜜莉雅、碧翠丝一样担忧地看着。"
  - character: "视频内容"
    text: "拉姆对菜月昴说她当然在乎雷姆。她确实比她强，但这不是不担心她的理由。不管她们被吩咐做什么，雷姆都做得比她好得多。但她是她的姐姐，永远不会动摇这个位置。"
  - character: "旁白"
    text: "雷姆瞪大了眼睛——听到出色的姐姐贬低自己来夸赞她。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "雷姆真恶心。"
  - character: "旁白"
    text: "奥托听到女仆自言自语，瞥了一眼。他能帮什么忙？"
  - character: "奥托"
    text: "加油啊，笨蛋。"
  - character: "旁白"
    text: "奥托咬紧牙关对菜月昴说道，疲惫而担心朋友的愚蠢。"
  - character: "拉姆"
    text: "那不是真的，姐姐……"
  - character: "旁白"
    text: "拉姆轻声在妹妹耳边说道，但雷姆移开了目光。"
  - character: "阿尔"
    text: "可怜的小家伙。"
  - character: "由里乌斯"
    text: "她自作自受。"
  - character: "视频内容"
    text: "菜月昴盯着拉姆看了一会儿，然后笑了，说他会把雷姆安全带回来。场景切换到菜月昴和拉姆站在一片空地上。菜月昴正在担忧着什么。"
  - character: "阿尔"
    text: "他又在干什么？"
  - character: "莱茵哈鲁特"
    text: "大概是什么危险的事。"
  - character: "旁白"
    text: "莱茵哈鲁特带着强烈的兴趣看着屏幕。"
  - character: "由里乌斯"
    text: "当然危险了。"
  - character: "旁白"
    text: "由里乌斯用手指捋了捋头发，以缓解对菜月昴令人疲倦的习惯的不满。"
  - character: "视频内容"
    text: "菜月昴的计划是：如果他的想法没错，魔兽肯定会来，会被他试图告诉她死亡回归的举动吸引过来。拉姆终于明白了那天发生了什么，瞪大了眼睛，喊道愚蠢的巴鲁斯。"
  - character: "佩特拉"
    text: "不好了！"
  - character: "碧翠丝"
    text: "什么！太疯狂了吧，我觉得！"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "不……"
  - character: "旁白"
    text: "爱蜜莉雅低声呢喃，沮丧地看着屏幕——她的无力让她的骑士想到把自己送到魔女的怀抱中。她不禁有一部分在责怪雷姆。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我真的很抱歉。"
  - character: "旁白"
    text: "雷姆终于大声说出了这句话——她终于明白了她的愚蠢造成了什么后果。"
  - character: "视频内容"
    text: "菜月昴闭上眼睛，深呼吸做准备。他对拉姆说他可以死——话还没说完，一只黑色的手袭击了菜月昴。魔女惩罚他说出死亡回归的事。"
  - character: "菲莉丝"
    text: "他回来了！"
  - character: "安娜塔西亚"
    text: "看来她不打算伤害他，只是惩罚他说出那个能力的事。"
  - character: "奥托"
    text: "那算什么惩罚？捏碎心脏！？"
  - character: "缇碧"
    text: "菜月昴怎么扛过去的？"
  - character: "加菲尔"
    text: "因为他不得不这么做。如果需要救任何人，他就会做他该做的事。"
  - character: "旁白"
    text: "加菲尔难得严肃地说道——他想起了在墓地和大将战斗的那个命运之日。"
  - character: "爱蜜莉雅"
    text: "不过这个代价对一条规则来说也太沉重了……"
  - character: "旁白"
    text: "爱蜜莉雅不禁将他的手握得更紧了些。身旁的金发精灵咬着嘴唇闭上了眼睛。"
  - character: "视频内容"
    text: "碧翠丝问菜月昴怎么了——他抓住了自己的领口，开始喘息。魔女又一次抓住了他的心脏。菜月昴说他做了一个赌注，带来了一点痛苦。拉姆担忧地看着少年，说风向不对，有魔兽在接近，很多！而且还没找到雷姆！"
  - character: "弗雷德莉卡"
    text: "为什么魔兽会被他吸引？"
  - character: "库珥修"
    text: "魔兽追随魔女的瘴气。"
  - character: "旁白"
    text: "库珥修难以置信地说道——她终于明白了少年是怎样把白鲸和自己一起拉下水的。"
  - character: "视频内容"
    text: "拉姆环顾四周，听着灌木丛和树叶的沙沙声。菜月昴迅速拔出鞘中的剑，得意地说因为魔女的气味！他的计划是：雷姆的目标是猎杀所有魔兽，魔兽会被魔女的气味吸引直接朝他来，然后雷姆别无选择只能跟着它们来找他。他管这叫菜月昴诱饵大作战。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "笨蛋！"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "白痴，我觉得！"
  - character: "旁白"
    text: "碧翠丝和爱蜜莉雅愤怒而担忧地拍了菜月昴的后脑勺。多种不同的魔兽包围了两人。"
  - character: "视频内容"
    text: "菜月昴举起剑，对拉姆笑了笑说战斗就靠她了。拉姆迅速朝一只扑来的乌尔加姆射出一道风刃。战斗开始了。"
  - character: "里卡多"
    text: "这可不爷们儿啊，兄弟！"
  - character: "加菲尔"
    text: "拉姆能搞定它们全部！"
  - character: "视频内容"
    text: "场景切换。断裂的树木、倒下和被碾碎的犬兽尸体、沾满鲜血的狼牙棒。雷姆低头站着，眼神涣散，浑身是血和泥土。她突然转身——她闻到了什么气味。"
  - character: "阿尔"
    text: "天哪，她好可怕。"
  - character: "旁白"
    text: "许多人跟着点头。拉姆看到妹妹的样子，深深皱起了眉头。"
  - character: "视频内容"
    text: "场景切换到菜月昴把一袋名叫拉姆的土豆夹在腋下在森林中奔跑，身后追着成群的犬兽。拉姆的声音微弱得几乎听不见，说她是在打，只是体力没有想象的那么持久。"
  - character: "视频内容"
    text: "菜月昴跑啊跑，直到面前出现了一道悬崖。少年咒骂着从崖边跳下，整个山坡上一路滑下去。他把剑插进山体来阻止下坠，剑卡在山壁上长出的一根藤蔓上，让他和拉姆在坠入深渊之前停了下来。"
  - character: "里卡多"
    text: "好快的反应！"
  - character: "旁白"
    text: "里卡多兴奋地鼓掌，爱蜜莉雅阵营的人则满眼忧虑。"
  - character: "莱茵哈鲁特"
    text: "那把剑！"
  - character: "旁白"
    text: "莱茵哈鲁特瞪大了眼睛。阿拉姆村最锋利的剑……是便宜货。"
  - character: "视频内容"
    text: "剑突然断裂！菜月昴只能尖叫着坠向深渊——紧握着拉姆那土豆袋般的身体和断掉的剑。少年在坠向地面时尖叫着'最锋利的剑'！"
  - character: "佩特拉"
    text: "菜月昴！"
  - character: "旁白"
    text: "爱蜜莉雅和碧翠丝恐惧地握紧了他的手，屏住呼吸看着。"
  - character: "奥托"
    text: "这下不妙了。"
  - character: "威尔海姆"
    text: "确实不妙。"
  - character: "由里乌斯"
    text: "永远别买山寨货。"
  - character: "视频内容"
    text: "拉姆朝下方的地面射出一道风刃'风之满'，引发了风之爆炸，将她和菜月昴一起吹向了空中。菜月昴迅速双脚着地，公主抱接住了拉姆。拉姆已经失去了意识，鼻子在流血——她把最后一点力气都用来帮他了。"
  - character: "库珥修"
    text: "你把最后一点力气都用来帮他了。"
  - character: "拉姆"
    text: "哼！我只是帮了我自己，因为他太没用了。"
  - character: "旁白"
    text: "库珥修得意地笑了，看向屏幕——不实之风像暴风一样在她周围呼啸。"
  - character: "莱茵哈鲁特"
    text: "是是是。"
  - character: "旁白"
    text: "莱茵哈鲁特放心地调侃道，从座位上笑出了声。爱蜜莉雅和碧翠丝对拉姆的行为感到矛盾。"
  - character: "视频内容"
    text: "菜月昴回头看去——一群咆哮怒视的犬兽将他逼到了他跳下来的那面岩壁前。他咒骂着这时机糟透了。"
  - character: "阿尔"
    text: "确实。"
  - character: "普莉希拉"
    text: "他要怎么脱身？"
  - character: "视频内容"
    text: "砰！管家少年抬头看去——是什么东西让岩石掉在了他身旁。"
  - character: "视频内容"
    text: "突然，一个长着角的蓝发女仆落在了菜月昴和魔兽群之间——雷姆来救他了。"
  - character: "视频内容"
    text: "菜月昴如释重负地喊道——雷姆！"
  - character: "佩特拉"
    text: "她来救他了！"
  - character: "普莉希拉"
    text: "老样子，每次都得有人来救他。"
  - character: "旁白"
    text: "然而雷姆不记得这些事——她完全处于恍惚之中，对长角形态下所做的一切毫无记忆。她绝望地看着屏幕哀求。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "请不要伤害他……"
  - character: "视频内容"
    text: "女仆回头看了菜月昴一眼，露出了虐待狂般的笑容。菜月昴松了口气说太好了还活着。然而一柄狼牙棒朝他飞来！他立刻仰面倒下，将拉姆紧紧搂在怀中，勉强避开了攻击。"
  - character: "菲鲁特"
    text: "糟了。"
  - character: "奥托"
    text: "太险了！"
  - character: "加菲尔"
    text: "还、还没完！"
  - character: "旁白"
    text: "爱蜜莉雅和碧翠丝同时咬紧了牙关——看着菜月昴身处绝境。"
  - character: "视频内容"
    text: "菜月昴抬头看着疯狂的雷姆，试图自我介绍让她冷静——说自己叫菜月昴，一个完全没用的杂工实习生，罗兹瓦尔宅邸最有前途的仆人。他迅速闪开，用身体裹住拉姆，又一次勉强避开了飞来的狼牙棒。肩膀被擦伤，鲜血直流。"
  - character: "旁白"
    text: "雷姆开始绝望地哭泣——看到自己对爱人和姐姐所做的一切。她是怪物。"
  - character: "弗雷德莉卡"
    text: "又太险了。"
  - character: "视频内容"
    text: "菜月昴含泪喊道人家还在说话你就想把人打死，太没礼貌了。雷姆正要攻击少年，但乌尔加姆群决定不再看戏，发起了进攻。雷姆开始屠杀来袭的犬兽，菜月昴迅速将土豆拉姆扛到肩上，捡起断剑。之前那只小狗崽正在那里咆哮着指挥犬群。"
  - character: "菲鲁特"
    text: "它是那些东西的首领！？"
  - character: "由里乌斯"
    text: "那个女孩也在吗？"
  - character: "拉姆"
    text: "我在寻找魔兽操控者的时候非常仔细，那个女孩在这一切发生之前早就离开了。"
  - character: "视频内容"
    text: "一只乌尔加姆从地下钻出袭击了雷姆。女仆用手臂挡住了它，然后开始打它的脸，直到头骨碎裂。另一只犬兽一头撞上了她的头，把她撞飞了出去。菜月昴停下脚步回头看，深吸一口气大喊——别再摆出那副可怕的表情了，试着笑一笑啊雷姆！"
  - character: "旁白"
    text: "世界静止了，他的心脏被轻轻捏住了。一瞬间所有的乌尔加姆和雷姆都转头盯着菜月昴，一起嚎叫嘶吼。"
  - character: "安娜塔西亚"
    text: "这个笨蛋！"
  - character: "旁白"
    text: "安娜塔西亚捂脸叹道。威尔海姆温柔而骄傲地笑了——多年前他也曾对挚爱的妻子说过同样的话。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我不会再伤害他了？"
  - character: "旁白"
    text: "雷姆瞪大了眼睛，看着屏幕上展开的事件，停止了呼吸。她无法承受再伤害他更多了。"
  - character: "菲莉丝"
    text: "他还觉得自己是什么英雄？"
  - character: "阿尔"
    text: "不，他只是在用这些话给自己打气。他没法看着自己珍视的人那样受伤。"
  - character: "菲莉丝"
    text: "可她杀了他……她对他做了那些之后，他为什么还要救她？"
  - character: "库珥修"
    text: "菜月大人就是这样的人。"
  - character: "旁白"
    text: "菲莉丝无法理解。他永远不会像菜月昴那样做到那种地步。这个事实让他崩溃了。"
  - character: "莱茵哈鲁特"
    text: "我不认为我能这么善良。"
  - character: "由里乌斯"
    text: "没有人能这么善良。"
  - character: "奥托"
    text: "没有人像大将一样，因为大将就是个笨蛋！"
  - character: "旁白"
    text: "所有人都看向骄傲而无奈的奥托。加菲尔从奥托身旁得意地给出了自己那远不那么恭维的评价。"
  - character: "爱蜜莉雅"
    text: "是啊，菜月昴是个笨蛋。"
  - character: "旁白"
    text: "爱蜜莉雅对她的骑士温柔地笑了笑，决定安静地看着。她的骑士马上就要变得超帅了！"
  - character: "碧翠丝"
    text: "我活了四百年的精灵都不会再说那种话了，实际上。"
  - character: "爱蜜莉雅"
    text: "哦，安静啦碧翠子！那是菜月昴的风格。"
  - character: "视频内容"
    text: "菜月昴深呼吸着，试图让心脏重新跳动。雷姆更快地挥舞狼牙棒，开始以疯狂的速度屠杀犬兽。菜月昴立刻逃离了现场。拉姆虚弱地说那是角在让雷姆变成鬼族，只要狠狠打一下她就能恢复正常。"
  - character: "视频内容"
    text: "雷姆不停地翻滚跳跃，屠杀碾碎一只又一只乌尔加姆。菜月昴远远看着那个疯狂的鬼族，面对这项任务一脸为难。"
  - character: "阿尔"
    text: "那根本不可能做到。"
  - character: "罗兹瓦尔"
    text: "你真觉得那能阻止菜月昴？"
  - character: "库珥修"
    text: "你不应该亲自做这件事，而不是派你最弱的管家去？"
  - character: "罗兹瓦尔"
    text: "如你所见，库珥修大人，那时候我确实不在场，没办法帮菜月昴。我绝不会让我的仆人们独自面对如此卑鄙的事情，尤其是那些我非常珍视的人。"
  - character: "旁白"
    text: "听到这话拉姆脸红了。"
  - character: "莱茵哈鲁特"
    text: "所以如果你在场的话，你会帮菜月昴？"
  - character: "罗兹瓦尔"
    text: "当——然——了！"
  - character: "旁白"
    text: "莱茵哈鲁特做出了结论——他没有说谎。其余人安下心来，但看向小丑的目光仍然不安。"
  - character: "视频内容"
    text: "菜月昴抱着拉姆站起来，开始朝精神崩溃的雷姆走近。他助跑加速，然后——把拉姆扔向了雷姆。粉发女仆在空中飞行，掠过犬兽，加速冲向雷姆。发狂的鬼族终于似乎恢复了一点理智——她松开锁链，迅速接住了拉姆。菜月昴立刻举剑朝姐妹俩跑去。"
  - character: "罗兹瓦尔"
    text: "他在干什么？"
  - character: "旁白"
    text: "罗兹瓦尔口音消失了，露出了严肃的表情。奇怪的是，这让所有人都紧张了起来。"
  - character: "视频内容"
    text: "菜月昴问拉姆是否向罗兹瓦尔发誓。拉姆说绝对的。菜月昴朝雷姆跑去，准备朝她的角砍去，但当他看到她冰冷的蓝色眼睛时立刻失去了集中力。他的挥砍落空了。"
  - character: "加菲尔"
    text: "拜托啊，大将！"
  - character: "旁白"
    text: "加菲尔绝望地捂脸。爱蜜莉雅和碧翠丝屏住了呼吸，靠在座位边缘。"
  - character: "视频内容"
    text: "就在菜月昴落地的瞬间，一股气流从他着地点的地面破出，让他被吹到了所有魔兽和雷姆上方的空中。菜月昴扭转身体，低头看着雷姆——他正笔直地朝她坠落。雷姆伸手要把狼牙棒朝飞来的少年投去，但更多的气流和冲击波劈开了地面，让她把注意力集中在紧紧抱住姐姐上。她用力跺脚——整个区域在她脚下形成了一个巨大的凹坑。"
  - character: "阿尔"
    text: "卧槽！"
  - character: "里卡多"
    text: "我的天！"
  - character: "加菲尔"
    text: "太酷了！"
  - character: "莱茵哈鲁特"
    text: "了不起。"
  - character: "视频内容"
    text: "菜月昴怒目圆睁，双手紧握断剑。如果错过这次机会就不会再有下一次了！他开始朝疯狂的女仆自由落体，大喊着——你为什么要救我？笑一笑啊雷姆！可我伤害了你！今天的我比真正的鬼族还要鬼气冲天！新管家的挥砍与女仆长闪亮的角碰撞在一起。"
  - character: "旁白"
    text: "标题卡：鬼气冲天之策。"
  - character: "佩特拉"
    text: "太好了！太好了！太好了！"
  - character: "旁白"
    text: "弗雷德莉卡被兴奋的佩特拉逗笑了。"
  - character: "里卡多"
    text: "看你英雄做英雄事很开心吧？"
  - character: "旁白"
    text: "里卡多逗弄着小女仆，当她害羞地把红透的脸埋进弗雷德莉卡的肚子时大笑起来。"
  - character: "视频内容"
    text: "拉姆对妹妹说巴鲁斯用那一击让她冷静下来了，后面的事她应该都知道了。雷姆瞪大了眼睛，疲惫的红眼中泪水滑落。拉姆微笑着坐到了妹妹身旁。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我不会再伤害他了？"
  - character: "旁白"
    text: "罗兹瓦尔看着这一幕，骄傲地点了点头。他告诉拉姆在正确的时刻出手。他为两个小女仆感到骄傲。库珥修从座位上忧虑地看着小丑——为什么有不实之风从他那里吹来？"
  - character: "视频内容"
    text: "屏幕切换到一轮血红的月亮悬挂在黑暗的夜空中。屏幕上呈现的是一群人围成一圈站在被群山环绕的村庄中央。"
  - character: "奥托"
    text: "为什么现在是晚上了？"
  - character: "加菲尔"
    text: "那个月亮怎么回事？"
  - character: "佩特拉"
    text: "雷姆和菜月昴怎么了？"
  - character: "旁白"
    text: "雷姆和拉姆同时震惊地倒吸一口气，双手颤抖着紧紧相握。"
  - character: "爱蜜莉雅"
    text: "怎么回事？"
  - character: "旁白"
    text: "爱蜜莉雅轻声问道——她看到了两位女仆脸上此生见过的最恐惧的表情。鬼族少女只是像鱼一样张合着嘴，瞪大的双眼中满含泪水。"
  - character: "罗兹瓦尔"
    text: "继续看下去，爱蜜莉雅大人。"
  - character: "旁白"
    text: "罗兹瓦尔严肃的语气让爱蜜莉雅脊背发凉。小丑看上去几乎是悲伤的。"
  - character: "菲莉丝"
    text: "我觉得这不会是什么好事。"
  - character: "旁白"
    text: "菲莉丝对主人说道，同时远离了明显不高兴的小丑。库珥修只能沉默地点头。"
  - character: "视频内容"
    text: "一个面容严厉的老人走到村民前面，宣布对我们鬼族来说双胞胎是禁忌。一个粉发女人在他身后被拦住了，恳求着等一下。族长说为了维护种族的骄傲，必须处理掉她们，这是鬼族的规矩。在村民围成的人群中央有一张桌子，上面放着一个篮子，篮子里躺着两个可爱的婴儿——蓝发和粉发，额头上各长着一只角。"
  - character: "由里乌斯"
    text: "这就是鬼族？"
  - character: "旁白"
    text: "由里乌斯迅速掏出笔记本记录——这个族群已经在历史中消失了。"
  - character: "菲鲁特"
    text: "他在说什么？"
  - character: "佩特拉"
    text: "那是……！？"
  - character: "爱蜜莉雅"
    text: "天哪！是婴儿拉姆和雷姆！等等……他要杀了她们！？"
  - character: "奥托"
    text: "他要杀了她们！？"
  - character: "普莉希拉"
    text: "愚蠢的杂种。"
  - character: "旁白"
    text: "连那个恶毒的公主本人也从绯红双眸中射出沸腾的厌恶——对着族长。村民们看着族长举起手臂对准两个新生儿。两只尖锐而有力的白色角突然从族长头上显现。"
  - character: "加菲尔"
    text: "太恶心了。"
  - character: "旁白"
    text: "加菲尔愤怒地握紧了拳头。蓝发婴儿被老人凶恶的样子吓到了，开始害怕地哭泣。"
  - character: "蜜蜜"
    text: "他把小女仆酱弄哭了！"
  - character: "缇碧"
    text: "坏蛋！"
  - character: "旁白"
    text: "蜜蜜和缇碧愤怒地瞪着无情的族长。粉发女孩看着哭泣的双胞胎姐妹，愤怒地瞪着老人。突然一道明亮的红光开始在粉发婴儿周围流动，篮子周围出现了一个风之护盾。"
  - character: "视频内容"
    text: "整个村子震惊而敬畏地看着——红光不再笼罩两人，一阵旋风朝老人射去，将他从两姐妹身边击退。族长张大了嘴，纯粹震惊地看着粉发女孩。他说这个孩子是……难以置信。"
  - character: "旁白"
    text: "拉姆闭上眼睛，对屏幕皱起了眉头。她能感觉到妹妹的情绪在看到这一刻的瞬间跌落了。拉姆成为村子里的天才的那一刻。"
  - character: "视频内容"
    text: "场景切换。两个婴儿已经长成了两个可爱的小女孩，站在瀑布前。粉发鬼族举起手臂开始念咒——瀑布变成了旋风冲向天空，水流洒满了整个村庄和农田。"
  - character: "安娜塔西亚"
    text: "所以她们让你们活下来了？"
  - character: "雷姆"
    text: "她们、她们让我们活下来，是因为每次她们想动手的时候，姐姐大人就会释放她的力量。"
  - character: "旁白"
    text: "雷姆终于用嘶哑破碎的声音开口了。其他人太关注面前的村子了——得知不会看到婴儿因为愚蠢的法律被杀，大家松了口气。"
  - character: "蜜蜜"
    text: "好厉害的风系魔法！我从来没掌握过这么难的法术！"
  - character: "旁白"
    text: "其他人也带着各种惊叹和好奇的目光看着屏幕。莱茵哈鲁特和由里乌斯都在尽可能记录已失落的鬼族文化的一切细节。"
  - character: "加菲尔"
    text: "书呆子。"
  - character: "菲鲁特"
    text: "废物。"
  - character: "旁白"
    text: "加菲尔和菲鲁特击拳嗤笑。整个鬼族村子的人都惊叹地注视着拉姆——她是个真正的天才，只有一只角就有这样的力量。"
  - character: "视频内容"
    text: "蓝发小女孩悲伤地回头看了看。爱蜜莉雅的心为小女孩碎了。拉姆只是紧紧抱住妹妹。"
  - character: "爱蜜莉雅"
    text: "哎呀，小小的雷姆琳感觉被冷落了。"
  - character: "视频内容"
    text: "场景切换。双胞胎姐妹和父母坐在一起吃午饭。父亲说闭上眼睛。母亲说拜托闭上。雷姆说不想让姐姐一个人承受这些。拉姆抱着妹妹一起哭了。"
  - character: "旁白"
    text: "再次看到——而且还如此鲜活……对两个鬼族双胞胎来说太过了。于是拉姆和雷姆默默哭泣。罗兹瓦尔用无情的目光看着她们。只有一瞬间，有一丝痛苦的光芒。"
  - character: "视频内容"
    text: "父亲骄傲地鼓掌说非常好拉姆。母亲对雷姆说要向姐姐学习努力加油。父亲说总有一天雷姆会向他们展示她拥有不可思议的力量。"
  - character: "普莉希拉"
    text: "嗯哼，在她自己父母眼中，蓝色的那个也是废物呢。"
  - character: "菲鲁特"
    text: "这样说可不好。"
  - character: "普莉希拉"
    text: "我为什么要听一只老鼠的意见？"
  - character: "旁白"
    text: "菲鲁特对着恶毒的红发少女低吼，拉姆则瞪着候选人。普莉希拉得意地笑着。"
  - character: "普莉希拉"
    text: "你说得对。她毕竟是拉姆的妹妹嘛。我们期待大成就。"
  - character: "旁白"
    text: "雷姆悲伤地低下了头。拉姆担忧地注视着妹妹。"
  - character: "爱蜜莉雅"
    text: "他们表现得好像雷姆不够好似的。"
  - character: "视频内容"
    text: "场景切换。雷姆独自一人站在深夜中——就在她姐姐早上站的地方，就在瀑布前面。小女孩召唤出了她的角，开始施展和拉姆使用过的同一个法术。同样的水之旋风从瀑布的坑中涌出，但突然间它崩溃消散了——雷姆的魔力太弱，无法像姐姐那样维持它的稳定。雷姆被水花溅了一身，失望地盯着瀑布。"
  - character: "视频内容"
    text: "雷姆回头看去，发现姐姐站在那里。拉姆对妹妹微笑，说做你自己就好了，你不必在意别人怎么说。"
  - character: "佩特拉"
    text: "拉姆姐姐真是个好姐姐！"
  - character: "碧翠丝"
    text: "姐姐站在妹妹身边是对的呢，我觉得。"
  - character: "旁白"
    text: "爱蜜莉雅对碧翠丝微笑。连小精灵也被姐妹间的羁绊打动了。"
  - character: "视频内容"
    text: "场景切换。一系列闪回：雷姆像其他学生一样挣扎着写字，而拉姆写得又快又好；拉姆用魔法在空中托起一个巨大的水球；拉姆和母亲一起走着，雷姆跟在身后看着两人的背影；拉姆完美地劈开了一堆木柴，而雷姆却连一根原木都砍不动。"
  - character: "里卡多"
    text: "那日子可真难过。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "噢，雷姆。"
  - character: "旁白"
    text: "爱蜜莉雅看着女仆悲剧般的人生，悲伤得眼含泪水。尽管她对雷姆所做的事还有一些不好的感觉，但她仍然对任何因为自身特质而被排斥的人抱有同情。"
  - character: "视频内容"
    text: "场景切换到雷姆在同一个瀑布前再次无法维持水之旋风。她流下了自我厌恶的泪水，说自己在鬼族的力量上永远比不上姐姐。拉姆抱着妹妹一起哭，说在对她做了那些事之后怎么能不哭。雷姆只能默默抱着姐姐，愧疚正在将她活活吞噬。"
  - character: "视频内容"
    text: "场景切换到雷姆坚定地对母亲说明天她来做晚饭。她计划用巴巴罗兔肉和森林里树上的坚果做个炒菜，再蒸点土豆。拉姆说要帮忙，雷姆摇头说不用，一个人就行了，看着她就好。"
  - character: "弗雷德莉卡"
    text: "所以你做家务比拉姆好就是因为这个？"
  - character: "旁白"
    text: "弗雷德莉卡的表情转为皱眉——因为她注意到两人靠得多么近、多么隐蔽。然后她突然明白了——那个族群被灭族了。她立刻对她同为女仆的姐妹感同身受。"
  - character: "视频内容"
    text: "雷姆微笑着开始朝村子走去收集坚果，然后开始下雨了。她拼命逃离来袭的暴风雨，勉强躲过了一道闪电击中了她刚经过的一棵树。树着了火朝她倒来。一道急速的风刃将燃烧的树劈成了碎片——拉姆救了雷姆。"
  - character: "视频内容"
    text: "雷姆和拉姆与父母坐在一起。母亲说她们俩都没事真是太好了。父亲温柔地命令雷姆别再一个人进森林了，不用让姐姐担心。"
  - character: "菲鲁特"
    text: "她们担心的就是这个！？"
  - character: "旁白"
    text: "菲鲁特厌恶地啐了一口——对姐妹之间的待遇。"
  - character: "视频内容"
    text: "拉姆迅速拿起一个土豆开始啃，夸雷姆蒸的土豆真的很好吃，盐放得刚刚好。父亲也开始吃，欣喜地看着食物。母亲轻声笑了，说都不知道雷姆能做出这么好吃的东西。雷姆的头一直低着，陷入了绝望。"
  - character: "安娜塔西亚"
    text: "她真贴心。"
  - character: "旁白"
    text: "安娜塔西亚享受着透过屏幕传递的姐妹羁绊，轻声赞叹。库珥修点了点头，皱起了眉头——她看到自己尊重和珍视的甜美女孩，从出生起就被所有人温柔地排斥和忽视。"
  - character: "库珥修"
    text: "难怪你有那么甜美的微笑。"
  - character: "视频内容"
    text: "场景切换。雷姆在木炭般黑暗的森林中试图从地上捡起坚果。母亲出现在森林里，说她们俩都平安无事就开心了。父亲也出现了。雷姆的眼中涌出了幸福的泪水。"
  - character: "碧翠丝"
    text: "这看起来很奇怪呢，实际上。"
  - character: "旁白"
    text: "碧翠丝看着说道。爱蜜莉雅点了点头——她也感觉到了一种奇怪的感觉。"
  - character: "视频内容"
    text: "突然一个新的声音响起——'不，如果只有拉姆平安无事就好了。'雷姆环顾四周，黑暗灰色的森林里到处都是村民的轮廓站在她周围，灰色的衣服和皮肤，声音冰冷而残忍。这是一个噩梦。"
  - character: "由里乌斯"
    text: "啊，是噩梦。"
  - character: "旁白"
    text: "由里乌斯同情地说道。拉姆只是紧紧抱住妹妹。噩梦中的母亲说如果那个没用的雷姆死了就好了，父亲继续说只有拉姆活下来那才是最好的。小雷姆哭着逃离了那些灰色的人。"
  - character: "威尔海姆"
    text: "多么可怕的想法。"
  - character: "旁白"
    text: "威尔海姆同情地摇了摇头。许多人带着不安的同情和怜悯的目光看着屏幕。"
  - character: "视频内容"
    text: "雷姆跑啊跑，穿过倾盆大雨，停在一口井下抱着膝盖哭泣。突然一只发光的手抓住了她的小手——姐姐对她微笑着。雨水消失了，阳光在拉姆身后闪耀。雷姆从梦中醒来，发现姐姐握着她的手。拉姆说没事的，我在你身边，你什么都不用担心。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "好温馨啊。"
  - character: "旁白"
    text: "爱蜜莉雅看着美丽的景象，彻底哭了出来。安娜塔西亚悄悄转过头擦去几滴泪。里卡多立刻转过头去，无视了头儿投来的怒视。"
  - character: "视频内容"
    text: "雷姆的内心独白：姐姐真的好厉害。我什么都比不上她。那样的话我就什么都不用做了，只需要跟在她身后就好了。反正我什么都没有了。拉姆哭了——她终于明白了妹妹的内心有多么破碎。"
  - character: "蜜蜜"
    text: "才不是这样！你打白鲸的时候超厉害的！"
  - character: "弗雷德莉卡"
    text: "雷姆，你在森林里救了那些孩子，也救了菜月昴。"
  - character: "奥托"
    text: "你不用那样想的，雷姆。"
  - character: "旁白"
    text: "雷姆只是抱着姐姐，目光空洞。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我杀了我生命中唯一美好的东西。他不会爱我。他从来没有爱过我。他不可能爱我。"
  - character: "旁白"
    text: "一遍又一遍，雷姆只是用冰冷死寂的语气重复着。爱蜜莉雅再一次惊恐地瞪大了眼睛。"
  - character: "菲莉丝"
    text: "她是不是疯了——"
  - character: "拉姆"
    emotion: "愤怒"
    text: "闭嘴！别看我妹妹！"
  - character: "旁白"
    text: "菲莉丝立刻服从，把惊呼咽了回去——为了避开拉姆灼人的怒视。所有人都尊重她的意愿移开了目光——拉姆拥抱着她破碎的妹妹。拉姆意识到挽回妹妹的唯一机会，掌握在那个她曾经认为不过是运气好的少年手中。"
  - character: "视频内容"
    text: "场景切换。雷姆心满意足地躺在床上，面带微笑。一些声响传来，她醒来发现床上空了。没有拉姆。小雷姆起身环顾房间，悄悄走出房间走向父母的前门。她打开了门——她的整个村庄正在化为灰烬。建筑、树木、道路，一切都在燃烧。"
  - character: "由里乌斯"
    text: "什么？"
  - character: "莱茵哈鲁特"
    text: "这就是那天晚上发生的事？"
  - character: "旁白"
    text: "莱茵哈鲁特眯起眼睛瞪着屏幕——他注意到了一个恐怖的景象，迅速遮住了女主人的眼睛。弗雷德莉卡也立刻紧紧抱住佩特拉，遮住她的眼睛挡住视线。"
  - character: "视频内容"
    text: "雷姆靠近火焰，恐惧越来越深——村长正在融化中的尸体、父母沸腾变形的面孔。雷姆的泪水滑落，她跪倒在地。一个穿着兜帽斗篷的男人正准备用刀砍向悲痛欲绝的雷姆。但一道风刃将他和所有同伙撕成了碎片——拉姆跳到妹妹面前，在她们周围展开了一个切割之风的穹顶。"
  - character: "爱蜜莉雅"
    text: "不……他们怎么能……"
  - character: "旁白"
    text: "爱蜜莉雅震惊得甚至无法呼吸，表情凝固地看着屏幕。"
  - character: "菲莉丝"
    text: "混蛋！"
  - character: "安娜塔西亚"
    text: "所以你才那么恨邪教？"
  - character: "库珥修"
    text: "人渣。"
  - character: "视频内容"
    text: "拉姆转向妹妹微笑，说雷姆你平安无事就好。两姐妹对视着——火焰重新燃起将她们包围。拉姆朝妹妹伸出了手。然后一个兜帽男人成功溜到她们身后，对准了要害——拉姆闪亮的魔力之角被斩断了，从额头上飞出，鲜血淋漓。鬼族的天才永远失去了角。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "那些混蛋死定了！"
  - character: "旁白"
    text: "加菲尔用力握紧椅子扶手，对着兜帽身影露出了恶魔般的怒容。"
  - character: "视频内容"
    text: "随着姐姐之角的鲜血飞溅，一直折磨着她的那只角坠落了，雷姆只能震惊地看着。然后她如释重负地笑了——终于断掉了。"
  - character: "拉姆"
    emotion: "悲伤"
    text: "雷姆……"
  - character: "旁白"
    text: "拉姆把妹妹抱得更紧——那一幕的冲击瞬间消散了。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我不在乎你那天晚上的感受。你完全有权利高兴，姐姐。我也很高兴。请你回来吧。"
  - character: "旁白"
    text: "但雷姆永远不会回应她了。她有罪。她罪孽深重。她活该受苦。"
  - character: "奥托"
    text: "这也太过分了！"
  - character: "加菲尔"
    text: "太过分了！"
  - character: "莱茵哈鲁特"
    text: "整个种族如此惨烈的结局。"
  - character: "威尔海姆"
    text: "所以灭族的幕后黑手是魔女教。"
  - character: "菲莉丝"
    text: "恶心的怪胎。"
  - character: "由里乌斯"
    text: "但两位女仆是怎么活下来的呢。"
  - character: "视频内容"
    text: "闪回开始播放——罗兹瓦尔抱着流血的拉姆，火焰在他周围舞动。雷姆的内心独白：因为她的缘故姐姐的角断了，她失去了力量。从现在起她必须学会做所有姐姐能做的事。她在模仿姐姐，如果连这些都做不到令人满意，她就毫无价值。"
  - character: "视频内容"
    text: "闪回继续——雷姆和拉姆开始在宅邸做女仆的日子。她削蔬菜时割伤了手，练习端茶，打扫做饭。罗兹瓦尔在双胞胎为他端上午餐时对她微笑说做得很好。拉姆站在宅邸入口说别太勉强了，雷姆无视了她独自打扫花园。年幼的弗雷德莉卡问她为什么这么努力。"
  - character: "视频内容"
    text: "雷姆的内心独白：她在所有方面都不如姐姐，不过是一个替代品。两个孤零零的花瓶插着花，其中一个裂开了——那就是雷姆。"
  - character: "爱蜜莉雅"
    text: "等、等一下，雷姆！"
  - character: "旁白"
    text: "出乎所有人意料……是爱蜜莉雅开口了——她眼中闪烁着决心。"
  - character: "弗雷德莉卡"
    text: "你不是一个人，雷姆。你有不在乎你那天晚上感受的朋友们。我们理解你为什么那么做。"
  - character: "佩特拉"
    text: "菜月昴不会想看到你这个样子的，雷姆琳。"
  - character: "库珥修"
    text: "还记得菜月大人在白鲸死后为你流了多少泪吗。"
  - character: "奥托"
    text: "菜月一直在拼命救你。"
  - character: "加菲尔"
    text: "他做了很多事就为了看你能不能醒过来。"
  - character: "碧翠丝"
    text: "他过去一年的每个夜晚都在告诉你他的生活呢，我觉得。"
  - character: "旁白"
    text: "爱蜜莉雅、弗雷德莉卡、库珥修、佩特拉和拉姆。奥托、加菲尔和碧翠丝。她们都想让女仆对自己的人生定位感到好受一些。她们想把她从虚空中拯救出来，去融化她的冰之牢笼。但她们中没有一个足够重要……没有一个被她杀过……"
  - character: "旁白"
    text: "只有一个人……而她听不到他的声音。所有人都在等待面无表情的雷姆说些什么。"
  - character: "拉姆"
    emotion: "悲伤"
    text: "雷姆……"
  - character: "旁白"
    text: "拉姆心碎地低声唤道。雷姆不会回应她们。她们拯救女孩理智的努力失败了。"
  - character: "普莉希拉"
    text: "有意思。"
  - character: "菲鲁特"
    text: "闭上你的臭嘴，胸大无脑！"
  - character: "旁白"
    text: "菲鲁特对着嗤笑的普莉希拉大喊。红发公主正要对小贱人降下地狱。莱茵哈鲁特准备为女主人而战。"
  - character: "旁白"
    text: "就在绝望引发的混乱爆发之际，某个身影出现在双胞胎身旁——罗兹瓦尔。他跪下来拥抱了他的两位女仆。"
  - character: "拉姆"
    text: "罗兹瓦尔大人……"
  - character: "安娜塔西亚"
    text: "哎呀，这可不常见。"
  - character: "罗兹瓦尔"
    text: "看到你们俩这样，我很难受呢。"
  - character: "加菲尔"
    text: "什么……！？"
  - character: "旁白"
    text: "加菲尔正要跳起来揍那个男人，但被兄弟拦住了。"
  - character: "奥托"
    text: "让他来。"
  - character: "罗兹瓦尔"
    text: "贝蒂酱，这个座位可以给我吗？"
  - character: "旁白"
    text: "碧翠丝点了点头——她理解魔法师行动背后的用意。罗兹瓦尔感激地对精灵女孩微笑，将雷姆放在了空座位上——就在菜月昴旁边。"
  - character: "由里乌斯"
    text: "你在做什么？"
  - character: "罗兹瓦尔"
    text: "我只是在给她渴望的安慰。"
  - character: "旁白"
    text: "罗兹瓦尔温柔地微笑着低头，回到了自己的座位上。"
  - character: "拉姆"
    emotion: "悲伤"
    text: "叫醒他就好！让他救我妹妹，拜托了！"
  - character: "旁白"
    text: "拉姆对着屏幕哭泣着喊道。但她得到的只是沉默——屏幕再次亮了起来。"
  - character: "威尔海姆"
    text: "我们先继续看下去吧。"
  - character: "旁白"
    text: "很快，一个接一个，所有人都坐回了座位——拉姆仍在啜泣。雷姆像娃娃一样坐在菜月昴身旁。碧翠丝再次坐到了菜月昴的腿上。"
  - character: "碧翠丝"
    text: "这本来就是给贝蒂的位置呢，我觉得。"
  - character: "旁白"
    text: "优雅的精灵高昂着头，蹭了蹭契约者的脖子。"
  - character: "视频内容"
    text: "闪回场景结束。画面回到森林中，菜月昴抱着雷姆奔跑，身后还拖着拉姆。雷姆缓缓睁开眼睛，问我们又回到这里了？菜月昴问她醒了。拉姆对妹妹如释重负地微笑，说太好了雷姆，你真是个麻烦精。"
  - character: "视频内容"
    text: "两人停下来躲进灌木丛，雷姆靠在菜月昴的胸口上。雷姆呜咽着问为什么不来管她就好了，应该由她来做这件事，不能再让任何人受伤了。菜月昴不安地笑着说拉姆和他已经浑身是伤了，说不定比她还惨，他右肩脱臼了。"
  - character: "视频内容"
    text: "雷姆带着阴郁的表情低下了头，说都是她的错，她必须承担责任。她犯了和那时一样的罪，因为犹豫着没有向他伸出手。菜月昴闭上眼睛，然后用头槌撞了女孩一下——超级耳光！"
  - character: "爱蜜莉雅"
    text: "什么！？"
  - character: "碧翠丝"
    text: "什么！？"
  - character: "旁白"
    text: "爱蜜莉雅和碧翠丝瞪大了眼睛——她们从没想过菜月昴会对雷姆做和对她们一样的事。就像他在墓中拯救爱蜜莉雅一样，就像他从图书馆拯救碧翠丝一样——通过骂她们笨。"
  - character: "视频内容"
    text: "菜月昴对雷姆说她笨，然后承认自己也笨，但姐姐更笨。他告诉雷姆在我老家有句话，三个臭皮匠顶个诸葛亮，意思是应该依靠身边的人，而不是一个人瞎想。"
  - character: "由里乌斯"
    text: "如此对待淑女，真是恶劣。"
  - character: "旁白"
    text: "由里乌斯带着失望的父亲般的语气感叹，但他眼中确实有兴奋的光芒——他在为菜月昴加油。"
  - character: "威尔海姆"
    text: "说得好，菜月昴殿。"
  - character: "旁白"
    text: "威尔海姆对少年帮助朋友的精神点了点头。老人希望能从黑暗中唤醒他们的雷姆。"
  - character: "视频内容"
    text: "雷姆困惑地看着他。周围的沙沙声越来越密。菜月昴问拉姆该往哪个方向跑才能出结界。拉姆说必须全速向左跑。菜月昴说可以把雷姆推向拉姆，然后悲壮地向右跑——吸引乌尔加姆的注意力。雷姆闭上眼睛满是愧疚地说请不要那样做。"
  - character: "爱蜜莉雅"
    text: "菜月昴……"
  - character: "奥托"
    text: "他为什么总是选择当诱饵？"
  - character: "视频内容"
    text: "菜月昴说他有一个绝妙计划能把所有魔兽一网打尽。他在两人面前摆好姿势，对雷姆微笑，拍了拍她的头说她是他第一次约会的搭档，不会那么没良心把她丢下的。雷姆瞪大了眼睛——听到了曾经困惑但如今羞愧的回忆。"
  - character: "视频内容"
    text: "菜月昴跑向犬群。拉姆背着雷姆朝另一个方向跑去。菜月昴怒视着小狗崽。小狗崽咆哮着变得越来越大，很快菜月昴面对的是一只比他大十倍的巨型乌尔加姆兽王。音乐响起：Redo。"
  - character: "视频内容"
    text: "菜月昴慢慢往嘴里放了什么东西。雷姆绝望地看着，泪水滑落。雷姆痛苦地喊着姐姐。拉姆震惊得摔倒了。雷姆迅速回头看向少年——巨大的怪物高耸在他面前。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "菜月昴！"
  - character: "视频内容"
    text: "菜月昴得意地笑了，举起村民的剑朝天空呐喊'暗幕'！一片黑色烟幕夺走了魔兽们的感官。菜月昴在黑暗中奔跑，跳起来一剑刺入兽王的脖子。他吐出一颗吸过的波可果，说是小鬼们帮他的。"
  - character: "佩特拉"
    text: "是我！是我放进去的！是我帮他的！"
  - character: "加菲尔"
    text: "不够的！"
  - character: "视频内容"
    text: "兽王一掌将菜月昴压在了地上。挣扎的少年迅速从兽王的脖子上拔出断剑，刺入它的嘴中。愤怒的兽王迅速挥爪——只差一秒菜月昴就会被碾碎。"
  - character: "视频内容"
    text: "罗兹瓦尔大喊\"暗炎\"！火球如雨点般迅速落下，击中每一只魔兽，将它们烧成灰烬。连兽王也抵挡不住。罗兹瓦尔降落在少年面前，脸上挂着灿烂的笑容。"
  - character: "安娜塔西亚"
    text: "我不敢相信……但你这次出现我真的很高兴。"
  - character: "罗兹瓦尔"
    text: "来嘛！给我应得的所有感谢！"
  - character: "旁白"
    text: "罗兹瓦尔张开双臂，得意地朝众人微笑。没人理他。"
  - character: "视频内容"
    text: "菜月昴如释重负地笑了，说罗兹酱来得太晚了。罗兹瓦尔说是爱蜜莉雅大人在村子里给他灌输得很彻底——即使他鲁莽或冲动，如果被逼到绝境他就会用魔法，所以不要让他从视线中消失。"
  - character: "爱蜜莉雅"
    text: "我本来想谢谢你救了这个笨蛋的。但看来你非得开口。哼！"
  - character: "旁白"
    text: "爱蜜莉雅气鼓鼓地抱紧了沉睡的少年。罗兹瓦尔只是笑了笑，其他人也被这一幕逗笑了。"
  - character: "视频内容"
    text: "拉姆一瘸一拐地背着妹妹朝主人走来。罗兹瓦尔感激地说不在的时候她们俩都做得很好，一定会对她们为他所做的一切表示感谢。雷姆紧紧抱住了菜月昴，呜咽着说他还活着，反复喊着他的名字。"
  - character: "视频内容"
    text: "菜月昴疲惫的双眼再次翻了过去……黑暗……场景切换。屏幕中菜月昴穿着同样的衣服醒来，在同一张床上——他的重生点。他死了。"
  - character: "爱蜜莉雅"
    text: "什么！？"
  - character: "加菲尔"
    text: "不！"
  - character: "拉姆"
    text: "我、我不明白！巴鲁斯死了！？"
  - character: "阿尔"
    text: "开什么玩笑！"
  - character: "里卡多"
    text: "在那一切之后！搞什么！"
  - character: "视频内容"
    text: "菜月昴通过死亡回归醒来，发现一个蓝发女仆坐在他床边的椅子上，紧紧握着他的手。菜月昴尴尬地笑了笑，雷姆说是她握着他的手，因为他睡觉的时候看起来很痛苦。"
  - character: "奥托"
    text: "呼！"
  - character: "旁白"
    text: "奥托微笑着擦了擦额头。"
  - character: "安娜塔西亚"
    text: "他没死，太好了。"
  - character: "库珥修"
    text: "哦，你对那个少年产生好感了？"
  - character: "旁白"
    text: "库珥修立刻抓住了贪婪商人的话。安娜塔西亚哼了一声移开了目光。"
  - character: "视频内容"
    text: "菜月昴坐起身来，问雷姆结局怎么样了，诅咒解除了吗。雷姆说是的，罗兹瓦尔大人把所有魔兽都处理掉了，诅咒不会有机会激活。雷姆缓缓向他低头道歉。"
  - character: "视频内容"
    text: "雷姆开始流泪，说自己是一个无力且无能的鬼族弃子，永远比不上姐姐，只是她的替代品。她问为什么保留角的是她，为什么不是姐姐。菜月昴用充满怜悯的黑色眼眸注视着她。"
  - character: "视频内容"
    text: "菜月昴开始夸雷姆——善良、勤劳、全力以赴，而且胸比拉姆大！雷姆撅起了嘴。人们在纯粹的不可置信中咯咯笑出了声。雷姆深蓝色的眼眸中露出了笑意。"
  - character: "拉姆"
    text: "要不是我现在需要你，我早杀了你了！愚蠢的巴鲁斯。"
  - character: "碧翠丝"
    text: "恶心，实际上！"
  - character: "视频内容"
    text: "菜月昴告诉雷姆，陪在他身边的人是她，不是拉姆。他双手握住她的手，低头看着她，说很高兴她在那里，谢谢她。雷姆的心灵正在被修复。菜月昴用手指点了点额头，说她只需要成为拉姆没有的那只角，她们两个就能合为一体了。"
  - character: "视频内容"
    text: "菜月昴还说没有人能替代她。在我老家有句话，'鬼族听到别人说明年的事就会笑。'所以……笑一笑吧，雷姆。"
  - character: "爱蜜莉雅"
    text: "好温馨啊。"
  - character: "旁白"
    text: "爱蜜莉雅虽然不想承认，但她忍不住了。这一幕太珍贵了，让她的怨恨无法显现。也许是菜月昴原谅了她，但爱蜜莉雅再也无法用那么糟糕的眼光看待女仆了。"
  - character: "碧翠丝"
    text: "可能是呢，我觉得。"
  - character: "视频内容"
    text: "菜月昴继续安慰雷姆——擦掉悲伤的表情，笑一笑。一边聊着未来一边笑吧！让我们一边聊着，一边期待弥补你浪费在回望过去的所有时光。我们可以从明天开始聊。"
  - character: "视频内容"
    text: "雷姆发出了死寂般的低语，问明天？菜月昴说对，明天。她什么都可以聊，比如明天做日式早餐还是西式早餐，或者先穿右脚还是左脚的鞋子。不管多无聊，她都可以聊明天，因为她有明天。"
  - character: "视频内容"
    text: "雷姆的泪水从脸上滑落——愧疚紧紧抓住她。她说自己很弱，肯定会依赖他的。菜月昴问那有什么不好的。枷锁松开了——诚实和清晰填满了她。"
  - character: "视频内容"
    text: "菜月昴不好意思地笑着挠了挠后脑勺，说自己软弱、愚蠢、长相可怕、反应迟钝，但仍然活着，期望别人替他处理事情。他说他们可以互相扶持着前进，搂着彼此的肩膀，笑着聊明天。他一直梦想着和一个鬼族一边笑一边说明年的事！"
  - character: "加菲尔"
    emotion: "兴奋"
    text: "加油啊！大将！你这混蛋太棒了！"
  - character: "里卡多"
    text: "他是怎么做到的？"
  - character: "旁白"
    text: "里卡多瘫回座位，惊叹地看着少年又一次迷住了一位女士。风吹过他们——雷姆美丽的笑容绽放，幸福的泪水从她眼中涌出。"
  - character: "视频内容"
    text: "雷姆含着幸福的泪水笑了，说他真是鬼气冲天。菜月昴拍了拍她的头——她一边哭一边咯咯笑。标题卡：雷姆。"
  - character: "视频内容"
    text: "大坝决堤了。雷姆痛苦地尖叫——愧疚的枷锁随着那句话蒸发了。每当他对她说那句话的时候，当他表白说爱她之后说的那句话。于是困惑而疲惫的女仆只是紧紧抱住少年，在他胸口哭泣。雷姆喊着菜月昴的名字，反复道歉，说我爱你。"
  - character: "菲莉丝"
    text: "菜月昴人生中的这一段，对雷姆的伤害比对任何人都大。"
  - character: "旁白"
    text: "菲莉丝轻声说道，看着悲伤却令人释怀的一幕。许多人疲惫地点着头。拉姆如释重负地叹了口气，含泪微笑。"
  - character: "库珥修"
    text: "所以你才把他放在心里这么近的地方。"
  - character: "旁白"
    text: "库珥修看着之前的那一幕，低声自语。她能和他也有那样的一刻吗？被人拥有了这世界上所需一切的感觉会是怎样的？库珥修只是对前排的少年露出了兴奋的微笑。"
  - character: "视频内容"
    text: "场景切换。拉姆站在罗兹瓦尔面前汇报——她找到了操控魔兽的人，但痕迹早就消失了。巴鲁斯和雷姆从森林里带回来的孩子中，有一个第二天就消失了。"
  - character: "里卡多"
    text: "所以不是你干的？"
  - character: "旁白"
    text: "里卡多用审视的目光盯着小丑。所有人都看向小丑——他摇头回答。"
  - character: "罗兹瓦尔"
    text: "那不是我做的。"
  - character: "旁白"
    text: "爱蜜莉雅和大多数观众看向了库珥修和莱茵哈鲁特。"
  - character: "库珥修"
    text: "真话。"
  - character: "莱茵哈鲁特"
    text: "说的是真话。"
  - character: "安娜塔西亚"
    text: "有了两人的确认……那是谁派的刺客？"
  - character: "旁白"
    text: "没有人回答安娜塔西亚的骑士。由里乌斯靠回椅背，接受了无声的挑战。"
  - character: "视频内容"
    text: "罗兹瓦尔温柔地微笑着低语让拉姆过来。拉姆坐到他的腿上，他抚摸着她的头，说毕竟一整晚都没能照顾她。罗兹瓦尔开始从指尖输送魔力——注入她曾经长角的位置。拉姆心满意足地叹了口气。"
  - character: "阿尔"
    text: "这他妈也太恶心了。"
  - character: "旁白"
    text: "罗兹瓦尔只是若无其事地竖了中指。"
  - character: "视频内容"
    text: "罗兹瓦尔对拉姆说她用了不少魔力，愿星辰守护她。他会依赖她和雷姆的。拉姆说遵命，从那个火光之夜起她的身体就属于罗兹瓦尔大人了。罗兹瓦尔低声说为了杀死龙的那一天……"
  - character: "爱蜜莉雅"
    text: "什么……！？"
  - character: "旁白"
    text: "爱蜜莉雅的低语与许多人的震惊共鸣——这个揭露令人瞠目。"
  - character: "奥托"
    text: "你怎么会有这样的目的？"
  - character: "旁白"
    text: "奥托冷静地转向他服务的主人问道。商人头目对他的赞助人被揭露似乎并不怎么惊慌。"
  - character: "罗兹瓦尔"
    text: "是的，爱蜜莉雅大人。我需要你的帮助来实现我的目标，这就是我赞助你参选的原因。"
  - character: "爱蜜莉雅"
    text: "罗兹瓦尔，这是怎么回事？杀死圣龙？你做得到吗？"
  - character: "菲鲁特"
    text: "果然你一直在利用大姐头。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "你真的骗了我？帮我村子的事？帮我的事？"
  - character: "罗兹瓦尔"
    text: "爱蜜莉雅大人，我向你保证，我承诺的每一句话在我心中都有分量。说帮你实现梦想不是谎言。毕竟是你在帮我实现梦想。"
  - character: "旁白"
    text: "即使男人给了她最真诚的微笑，用领主不该有的谦卑语气说话，爱蜜莉雅仍然忧虑地瞥向库珥修。公爵夫人给了她坚定的点头。"
  - character: "爱蜜莉雅"
    text: "你说的是真的？但你为什么要杀圣龙？我在其中扮演什么角色？"
  - character: "罗兹瓦尔"
    text: "很遗憾我不能说。"
  - character: "安娜塔西亚"
    text: "更重要的是你打算怎么杀那样的存在呢？我建议你回答我，否则我可能会把这条信息透露给教会的一些敏感成员。"
  - character: "罗兹瓦尔"
    text: "你想怎么处理那些信息都可以呢，星金大人~你没有办法在王宫法庭上以任何罪名控告我！"
  - character: "莱茵哈鲁特"
    text: "罗兹瓦尔·L·马瑟斯，你被认定犯有对卢克尼卡圣龙的叛国罪。从各方面证据以及我亲眼所见，我们目睹了你对我们深爱的王国的越轨行为和恶意企图。在宣布判决之前，你有什么辩护？"
  - character: "罗兹瓦尔"
    text: "我无怨无悔。"
  - character: "旁白"
    text: "莱茵哈鲁特的目光更加锐利——他跨过座位，准备扑向那个男人。由里乌斯正准备从自己的座位排跳过去，从右侧包围罗兹瓦尔。骑士还没来得及跨过最后一排，一股巨大的力量将他击飞，让他摔坐在自己的座位上。"
  - character: "由里乌斯"
    text: "暂时就这样吧，好吗？"
  - character: "安娜塔西亚"
    text: "暂时就这样吧，好吗？"
  - character: "菲鲁特"
    text: "我不在乎那条龙什么的，但我本来很想让你把小丑揍一顿的。"
  - character: "旁白"
    text: "莱茵哈鲁特对女主人微笑。她总是知道怎么让他好受一些。库珥修的目光停留在小丑身上——最后一个问题。"
  - character: "库珥修"
    text: "你为什么想要这样的愿望？"
  - character: "罗兹瓦尔"
    text: "不关你们的事。"
  - character: "旁白"
    text: "所有人都决定就此打住——不想从小丑那里索取更多了。他太令人毛骨悚然，他的前景太令人不快。"
  - character: "菲莉丝"
    text: "爱蜜莉雅绝不能赢。"
  - character: "旁白"
    text: "菲莉丝低声说出了由里乌斯和莱茵哈鲁特心中的想法。为了阻止罗兹瓦尔的叛国，他们需要拿下他所在的阵营。"
  - character: "莱茵哈鲁特"
    text: "我们必须和菜月昴战斗。"
  - character: "旁白"
    text: "莱茵哈鲁特陷入了绝望的痛苦——他拒绝看向朋友所在的方向。由里乌斯只是以失败的目光盯着屏幕。"
  - character: "视频内容"
    text: "场景切换。爱蜜莉雅站在月光下的花园里，训斥着菜月昴——他一直在受伤，来宅邸才四天。菜月昴说我不是因为想受伤才受伤的，这个世界对我就是有点严苛。爱蜜莉雅训斥他别开玩笑。"
  - character: "视频内容"
    text: "爱蜜莉雅对他灿烂地笑着，说太谢谢你了又救了我。菜月昴双颊通红。爱蜜莉雅说需要做点什么来感谢他。菜月昴温柔地笑了，说那好他就不客气了——突然凑近她的脸，笑容灿烂地说：跟我约会吧，爱蜜莉雅酱！"
  - character: "视频内容"
    text: "爱蜜莉雅觉得有趣地笑了，说好吧，我跟你约会。菜月昴的脸亮得像圣诞树，说太好了所以她才是他的EMT——爱蜜莉雅酱、超、级、天、使的缩写。爱蜜莉雅被他逗笑了。很快菜月昴也和她一起笑了。"
  - character: "旁白"
    text: "片尾曲：Styx Helix。第六集 导演剪辑版。完。"
  - character: "爱蜜莉雅"
    text: "第二章。完。"
  - character: "旁白"
    text: "爱蜜莉雅擦去眼角的几滴泪，感觉意外地清爽。"
  - character: "蜜蜜"
    text: "累死了！"
  - character: "库珥修"
    text: "我同意，那个篇章里发生的事太多了。"
  - character: "奥托"
    text: "不知道第三篇章会是什么？"
  - character: "旁白"
    text: "众人惊讶地看到面前打开了十几扇门。每扇门后面都有浴室和卧室，还有食物和水供他们梳洗。狱长让他们好好睡一觉，准备好了告诉他。菜月昴在第三篇章之前不会醒过来。"
  - character: "旁白"
    text: "接下来是OVA 记忆雪……插曲……暂停中，等众人准备好。作者感谢大家的支持，终于完成了这个篇章。冰冻之绊会在第二季之后完成，里面有爱蜜莉雅的背景故事。至于沉睡的少年，作者为他准备了特别的内容。下次放映，在第二章和第三章之间会有一段小插曲。"
