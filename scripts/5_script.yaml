    text: "或者可能是嫉妒魔女……"
  - character: "佩特拉"
    text: "魔、魔女？不！"
  - character: "旁白"
    text: "所有人都因这个揭露而感到恐惧和动摇。连候选人和罗兹瓦尔似乎都大吃一惊。"
  - character: "爱蜜莉雅"
