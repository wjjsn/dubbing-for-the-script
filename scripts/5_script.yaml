    emotion: "悲伤"
    text: "不是我……不是我，菜月昴……求你了——"
  - character: "视频内容"
    text: "雷姆开始朝他走去，脸上带着无动于衷的表情：'是的。'"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "你在他走之前还和他笑着告别！他还笑着感谢你！现在你却杀了他？！"
  - character: "旁白"
    text: "雷姆无法反驳金发少年。女仆震惊地张大了嘴。加菲尔和普莉希拉都注意到了女孩脸上的表情，同时压抑着自己的愤怒。库珥修是唯一一个从一开始就注意到雷姆表情的人，她只是怜悯地看着女仆。"
  - character: "视频内容"
    text: "菜月昴突然笑了，低头看着自己的脚：'该死，我真可悲。我还以为我们相处得很好呢……'"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "菜月昴……"
  - character: "莱茵哈鲁特"
    text: "在一个新世界里尽你所能帮助你交到的朋友。试图从可怕的命运中拯救他们，甚至为他们死了很多次。"
  - character: "威尔海姆"
    text: "结果发现他们才是毫无缘由杀害你的人。"
  - character: "视频内容"
    text: "雷姆在他面前停下：'我姐——'菜月昴喊道：'我不想听！'他突然拿出手机，对准她的脸连续拍照，闪光灯照进她的眼睛。'接招！'菜月昴迅速推开雷姆跑了。"
