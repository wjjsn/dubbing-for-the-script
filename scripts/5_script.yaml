    emotion: "悲伤"
    text: "请停下来……"
  - character: "旁白"
    text: "雷姆恳求着，她睁大的蓝眼睛无法相信这样的景象。她？在折磨她姐姐之后这个世界上她最爱的人？雷姆开始朝他走去，脸上带着无动于衷的表情。"
  - character: "视频内容"
    text: "雷姆继续面无表情地低头看着：'谁雇了你，什么条件？'"
