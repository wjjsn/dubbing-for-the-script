    text: "两人离开后，菜月昴躺回床上，似乎变得更加绝望，因为他的眼睛在很长一段时间以来第一次闭上了。画面显示菜月昴在夜晚挣扎着无法入睡，他的脑海中充满了噩梦。在走廊中死去的记忆。被雷姆和拉姆在森林中杀死时脖子喷涌出血液的记忆。菜月昴穿过森林奔跑。当一个蓝发女仆拿着晨星铁锤站在他面前时，他停了下来。"
  - character: "视频内容"
