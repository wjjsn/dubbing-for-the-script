    text: "碧翠丝撅起了嘴：'我是不情不愿地来的，因为到了约定的时间，但你似乎毫不在意。'菜月昴意识到了发生了什么：'在第四天睡着了……我是什么样的鲁莽白痴？'碧翠丝说：'别抱怨了，我是这么认为的。随便坐哪都行。'菜月昴环顾四周：'禁书库？你在我睡着的时候把我搬到这里来的？'碧翠丝说：'我宁愿不待在那个充满你臭味的房间里，我是这么认为的。'"
  - character: "视频内容"
    text: "菜月昴问：'碧翠丝，我肯定我错了，但你在我睡着的时候没有握着我的手吧？'碧翠丝说：'你确实错了。即使哥哥要求我也会拒绝，我是这么认为的。'碧翠丝握住了他的手，靠过来抱住了她的契约者。'我错了，我是这么认为的。'她轻声低语。"
