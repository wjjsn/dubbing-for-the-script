  - character: "碧翠丝"
    emotion: "悲伤"
    text: "菜月昴……魔女……他一直被魔女纠缠着？"
  - character: "库珥修"
    text: "看来他比我想象的更重要……魔女纠缠着他……但为什么？"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "残忍……那……太残忍了……"
  - character: "旁白"
    text: "半精灵女孩再次低声啜泣着，因为她终于明白了菜月昴的处境有多么绝望。菜月昴的人生只是一场噩梦。爱蜜莉雅的心碎成了两半，因为她意识到她现在什么都做不了来帮他。"
  - character: "视频内容"
    text: "菜月昴坐在床上面对着罗兹瓦尔。他内心想着：'我不能告诉任何人死亡回归的事。我已经在这座宅邸死了三次。我没有在首都经历第四次。如果我再死一次，可能就回不来了。'罗兹瓦尔被展示说了些话后离开，留下疲惫不堪的菜月昴独自思考。少年带着满脸的沮丧凝视着窗户。但随后，黑暗充满了窗户，菜月昴的声音几乎听不见：'我睡不着……'"
  - character: "旁白"
    text: "撞击声和挤压声从画面的黑暗中传来。场景越来越接近罗兹瓦尔宅邸，撞击声变得越来越猛烈。"
  - character: "由里乌斯"
    text: "那是什么声音？"
  - character: "旁白"
    text: "菜月昴的呼吸沉重，场景越来越接近宅邸。"
  - character: "奥托"
    text: "菜、菜月昴怎么了？"
  - character: "加菲尔"
    text: "我不喜欢这个……"
  - character: "库珥修"
    text: "菜月昴……"
  - character: "阿尔"
    text: "不……不，不要……"
  - character: "旁白"
    text: "沉默的女仆们都因持续的声音而畏缩了，拉姆看起来非常愤怒，而雷姆似乎很痛苦。"
  - character: "莱茵哈鲁特"
    text: "菲鲁特大人……你知道那个声音是怎么回事吗？"
  - character: "菲鲁特"
    text: "就……看着吧，莱茵……你自己看。"
  - character: "视频内容"
    text: "转向了一支蘸水笔的特写，金属笔尖上沾满了血。握着笔的手似乎在颤抖。菜月昴的呼吸很沉重。握着笔的手收紧了，可以看到握着它的人再次举起了它。"
  - character: "普莉希拉"
    text: "多么可悲……可怜。"
  - character: "旁白"
    text: "揭露了菜月昴就是那沾满血的蘸水笔和举起它的手臂的主人。菜月昴看起来很疯狂，瞳孔放大，汗水顺着脸流下。他的手臂将蘸水笔刺入了另一只手。他的手上到处都是伤疤。许多刺伤痕迹彼此相邻，流着血。少年咬紧牙关，伤口在流血。他握紧了笔，导致它断了。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "……？！"
  - character: "里卡多"
    text: "天哪……"
  - character: "莱茵哈鲁特"
    text: "他在伤害自己？"
  - character: "旁白"
    text: "由里乌斯带着愤怒的目光，但优雅地克制着自己不去爆发。菲莉丝只是移开了目光。罗兹瓦尔是带着最多情感盯着这一幕的人，这个小丑般的男人只是对这个场景露出了最深的恐惧皱眉。"
  - character: "加菲尔"
