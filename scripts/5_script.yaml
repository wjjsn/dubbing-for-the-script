    text: "这可能是她如此残忍对待菜月昴大人的真正动机。"
  - character: "视频内容"
    text: "雷姆咬牙切齿地低头瞪着少年，眼中闪烁着怒火：'当魔女的气味如此浓重地笼罩着你时，你的厚颜无耻的谎言只能骗到这种程度！'"
