  - character: "旁白"
    text: "碧翠丝悲伤地抬头看着画面。她知道碧翠丝会太固执而不愿和他签订契约。"
  - character: "视频内容"
    text: "碧翠丝说：'我不希望你给这座宅邸带来纷争，我是这么认为的。这个地方对我至关重要。'菜月昴说：'我不打算做任何事。我只想阻止任何火花飞溅。'碧翠丝嘲讽地回应：'对于一个把一切都交给别人的人来说，这动机真令人钦佩。'菜月昴低下了头：'这一次，我无言以对。'碧翠丝命令道：'伸出手来。'"
