    text: "真是一群烦人的家伙，天哪。麻烦都不足以形容这个！"
  - character: "菲鲁特"
    text: "麻烦都不足以形容这个！"
  - character: "旁白"
    text: "在房间的后面，可以看到阿尔正在捡起他曾经的扶手的木头碎片，他用他唯一的好手完全捏碎了它。"
  - character: "阿尔"
