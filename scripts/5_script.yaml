title: "Re:Zero 第五章"
author: "Reactionist"
script:
  - character: "视频内容"
    text: "第五章：导演剪辑版 第四集。"
  - character: "旁白"
    text: "大家都很感激这段来之不易的休息时间。众人擦干眼泪，稍作休息后便去洗手间整理仪容。零食和水瓶在一片沉默中被消耗殆尽，菜月昴那残酷的死状让许多观众陷入了沉默与震惊。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我不该带他来的……我不该让他跟我来的……莱茵哈鲁特会比我更好地保护他……"
  - character: "旁白"
    text: "爱蜜莉雅目光呆滞地凝视着窗户的黑暗处，嘴唇无意识地翕动着。她的双手僵硬地放在膝盖上，不停地握紧又松开成拳头。她的整个神经系统都因菜月昴的死亡而陷入恐惧之中。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我……我明明可以帮你的……你为什么什么都不说……你为什么要因为我而死，昴？！"
  - character: "旁白"
    text: "内疚、被背叛的感觉、想要理解一切的自私欲望，以及对可能得知的真相的恐惧，这一切把爱蜜莉雅逼成了一个喃喃自语的崩溃者。在她身旁，碧翠丝的崩溃则是内向的——她回忆着自己的契约者在她本该保护的宅邸中遭遇了什么。"
  - character: "旁白"
    text: "精灵少女的提问无人作答。碧翠丝只是把头靠在他温暖的肩膀上，因为契约者的处境带来的困惑和心碎，精灵陷入了无依无靠的绝望之中。"
  - character: "弗雷德莉卡"
    emotion: "愤怒"
    text: "罗兹瓦尔大人到底在搞什么……？"
  - character: "旁白"
    text: "弗雷德莉卡已经在那座宅邸工作了多年，和杀死菜月昴的那个人的主人共事。她很清楚那些铁链属于谁。同样的铁链声在菜月昴的惨死之前曾响起过。"
  - character: "弗雷德莉卡"
    emotion: "愤怒"
    text: "你怎么能像对待动物一样把他那样处置？！"
  - character: "佩特拉"
    text: "前……前辈你在对谁生气？"
  - character: "弗雷德莉卡"
    text: "佩特拉——"
  - character: "佩特拉"
    emotion: "愤怒"
    text: "你不想违抗他对吧？告诉我为什么我还要继续保护那个人！他才是造成菜月昴痛苦的人！"
  - character: "弗雷德莉卡"
    text: "佩特拉，我生气的对象不是罗兹瓦尔大人，我只是困惑他当时在做什么。"
  - character: "佩特拉"
    emotion: "愤怒"
    text: "那你刚才在对谁低吼？"
  - character: "弗雷德莉卡"
    text: "杀死菜月昴的人……不是罗兹瓦尔大人。但他们确实为他效力。"
  - character: "旁白"
    text: "佩特拉只是低着头，盯着脚下的地板，沉默笼罩了她。在弗雷德莉卡解释之后，这个小女孩再也无法用平常的眼光看待任何一个穿女仆服的人了。"
  - character: "佩特拉"
    emotion: "悲伤"
    text: "我做这一切是为了菜月昴……这是我来到这个地方、想要留在这些人身边的原因……"
  - character: "旁白"
    text: "几滴眼泪从佩特拉眼角滑落。这身制服现在真的让人恶心。"
  - character: "菲莉丝"
    text: "在看了那一切之后，您还是不觉得他很危险吗，库珥修大人，喵？"
  - character: "库珥修"
    text: "菲莉丝？！"
  - character: "菲莉丝"
    text: "我们俩现在都知道喵，他是被宅邸里的人杀死的。雷姆的武器是——"
  - character: "库珥修"
    text: "是铁链，我知道。但这不构成我们去指控雷姆或菜月昴的理由。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "我们还需要什么证据？！在他那样死在雷姆手下之后？他肯定做了什么见不得人的事来操纵她和其他家仆来复仇！"
  - character: "库珥修"
    text: "菲莉丝，我并不怀疑菜月昴的智谋。我理解你对他使用那种权力的方式感到不安，但我向你保证，我们现在拥有的除了单纯的推测之外什么都不能证明。也许是雷姆杀害了菜月昴……她的理由也许是正当的……但我们不能因此就怀疑我们与他们两人结下的盟友关系。"
  - character: "菲莉丝"
    text: "可、可是……"
  - character: "威尔海姆"
    text: "你不能忘记菜月昴至今所做的一切好事，菲莉丝。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "请允许我打断您，我的大人。但我的首要任务是遵从您的意志，仅此而已。我不会信任一个多次将您的生命置于危险中的人，他与魔女教有牵连，而且可能还是一个受魔女祝福的人类。他的能力让他可以操纵身边的每一个人，而我们所拥有的只是他的一面之词以及他围绕我们所做的安排。如果女仆认为有必要杀他，正如我们所目睹的那样，这难道不说明他身上发生了什么'更深层'的事情吗，喵？！"
  - character: "库珥修"
    text: "菲莉丝……我不需要任何加护来引导我认识到，你刚才所说的……并不是你如此仇恨的真正原因。"
  - character: "旁白"
    text: "库珥修靠向扶手，用指节托住下巴，半眯着眼低头注视着菲莉丝。"
  - character: "库珥修"
    text: "我们在对待画面推进到我们朋友生活中的内容时必须谨慎，菲莉丝。就我们所知，菜月昴只是一个无辜的孩子，被抛入了一个充满危险的世界，除了这个能力之外一无所有……"
  - character: "菲莉丝"
    text: "您就是这样看待他的吗，库珥修大人？"
  - character: "库珥修"
    text: "这是我的信念……我在马车中与雷姆的交谈，我在树下与爱蜜莉雅的骑士的互动……在被证明错误之前，我想要相信这个少年心中最好的一面，菲莉丝。你不必告诉我你相信相反结论的理由……只是不要那么轻率地行动。"
  - character: "旁白"
    text: "治愈师回到了威尔海姆身旁的座位，头发遮住了他的眼睛。可以听到他低声呢喃着。"
  - character: "菲莉丝"
    emotion: "悲伤"
    text: "……没能救你……"
  - character: "威尔海姆"
    text: "感谢您回应了我之前的请求，夫人。"
  - character: "旁白"
    text: "库珥修迅速喝了一口水，她的拳头因对自己愚蠢的愤怒而颤抖着。她差点就把一个正在死去的少年想得最坏。她的目光牢牢锁定在那个救了她的蓝发少女僵硬的背影上。"
  - character: "库珥修"
    text: "那个笑容是假的吗，雷姆？"
  - character: "旁白"
    text: "雷姆坐在少年曾睡过的那一排后面。她的女仆制服的下摆几乎被她不断的紧握和颤抖扯烂了。她的嘴唇疯狂地颤抖着。她浅蓝色的虹膜缩小成了瞳孔的形状。"
  - character: "视频内容"
    text: "雷姆回忆起菜月昴被带到宅邸恢复意识后的第一夜，她把他的身体放到床上，在碧翠丝治愈了他的伤口后脱去他的衣服换上袍子。她记得自己曾多么想掐死这个据说与魔女教有关联的少年。"
  - character: "旁白"
    text: "但现在，当她以完全不同的视角经历了那一周之后，她找到了一份最美好的痴迷。然而所有取代了愤怒的爱意，又一次被另一种情感所取代了——她对少年狂热的关怀和爱在她的心上施加了最痛苦的内疚。"
  - character: "拉姆"
    text: "姐姐。"
  - character: "雷姆"
    text: "……是、是的，姐姐？"
  - character: "旁白"
    text: "拉姆正用一种充斥着绝对愤怒和失望的表情盯着雷姆。雷姆无法承受，她不敢移开视线。"
  - character: "拉姆"
    text: "跟我来，雷姆。"
  - character: "雷姆"
    text: "姐、姐姐——"
  - character: "拉姆"
    text: "罗兹瓦尔大人在等我们，雷姆。请不要让他久等。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "我不能离开菜月昴……"
  - character: "拉姆"
    text: "现在不是你感到内疚的时候。罗兹瓦尔大人希望在画面不可避免地展示巴鲁斯为何被如此凶残地攻击之前，你能待在他身边。不需要问。我知道他发生了什么。"
  - character: "旁白"
    text: "拉姆坐了下来，严厉地在双胞胎妹妹耳边低语，然后粗暴地把她拉了起来，跨过座椅，痛苦地拖拽着雷姆。"
  - character: "拉姆"
    text: "走。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "姐、姐姐……"
  - character: "旁白"
    text: "拉姆并不是想要惩罚或斥责她的妹妹。她对雷姆的所作所为确实感到愤怒，但拉姆更害怕的是，她刚刚从暴食症中把妹妹夺回来，妹妹又会被从她身边夺走。双胞胎在她们侍奉的古怪主人两侧坐下。"
  - character: "罗兹瓦尔"
    text: "哎呀呀，我的员工们今天看起来都很可爱呢，嗯？"
  - character: "雷姆"
    text: "罗、罗兹瓦尔大人，我——"
  - character: "罗兹瓦尔"
    text: "告诉我为什么那种事会发生在他身上，雷姆。"
  - character: "旁白"
    text: "罗兹瓦尔冰冷如霜，语气坚定，毫无戏谑或温暖。"
  - character: "罗兹瓦尔"
    text: "雷姆……我希望你知道，你的所作所为直接违反了我的命令。"
  - character: "雷姆"
    text: "但我没有做，罗兹瓦尔大人，"
  - character: "罗兹瓦尔"
    text: "我知道，雷姆。但你绝不能忽视这样一个事实——是另一个你伤害了菜月昴。"
  - character: "罗兹瓦尔"
    text: "在其他轮回中，你可能伤害他更深。"
  - character: "罗兹瓦尔"
    text: "看着我，雷姆。"
  - character: "罗兹瓦尔"
    text: "如果爱蜜莉雅大人希望的话，你将被解除在马瑟斯宅邸的服务。明白了吗？"
  - character: "雷姆"
    emotion: "悲伤"
    text: "是的，罗兹瓦尔大人。"
  - character: "罗兹瓦尔"
    text: "别担心，拉姆。他们不会动你妹妹一根手指头的。"
  - character: "拉姆"
    text: "谢谢您，罗兹瓦尔大人。"
  - character: "奥托"
    emotion: "愤怒"
    text: "我们不能继续这样兜圈子了。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "你说得对。"
  - character: "菲鲁特"
    text: "大哥……他真的经历了那些？"
  - character: "旁白"
    text: "莱茵哈鲁特从她的语气中判断出她难以置信。独自一人在走廊中死去，手臂被砍断，然后头被炸得粉碎……那实在是……"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "你别告诉我他没跟你们任何人提过那件事！"
  - character: "由里乌斯"
    text: "在我们所看到的只是他被残杀的情况下，我宁愿不去质疑菜月昴动机的有效性。"
  - character: "旁白"
    text: "没有人反对。重要的问题是，到底是谁在走廊里杀了菜月昴。由里乌斯身旁的商贾女王看起来同样怒火中烧，目光直刺向最靠近少年的那些人。"
  - character: "安娜塔西亚"
    emotion: "愤怒"
    text: "既然他已经把你们从这种情况中救了出来，你们一定知道些什么吧？"
  - character: "旁白"
    text: "爱蜜莉雅一行人只是保持沉默。他们分裂了。奥托和加菲尔带着坚毅的表情耐心等待着。"
  - character: "蜜蜜"
    emotion: "愤怒"
    text: "喂！你没听到我们大人的问话吗？到底是谁杀了大哥？！"
  - character: "库珥修"
    text: "爱蜜莉雅大人……我们需要知道菜月昴是如何应对这个威胁的。他有没有告诉你宅邸里有袭击者？"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "菜月昴从来没有告诉过我有人袭击宅邸。他只知道魔兽入侵了庄园下方的村庄。他、他从来没有告诉过我这件事。"
  - character: "旁白"
    text: "爱蜜莉雅想起了那个夜晚他在痛苦中，在她膝上哭泣的夜晚。他是那样破碎。所以他是在求助啊……"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "但你为什么不能告诉我？你为什么什么都不说？"
  - character: "普莉希拉"
    text: "也许那个少年没有提起袭击者，是因为那是一个他已经认识的人。"
  - character: "爱蜜莉雅"
    text: "您是什么意思？"
  - character: "普莉希拉"
    text: "很简单……这个小丑派他的手下去杀你的狗，蠢货。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "我他妈发誓！"
  - character: "旁白"
    text: "加菲尔站了起来，将目标对准了那个小丑。所有人都带着焦虑的表情看向罗兹瓦尔。小丑在这一切中微笑着，仿佛周围什么都没发生。"
  - character: "罗兹瓦尔"
    text: "哎呀呀，你为什么这么说呢，巴利艾尔大人？"
  - character: "普莉希拉"
    text: "很明显你把他当成了间谍，决定除掉他。"
  - character: "罗兹瓦尔"
    text: "好大的指控啊，你把这顶帽子扣在了我身上。我要你知道，我只是满足于看着这个少年在我的领地内生活。我完全没有想要杀害我们亲爱的菜月昴的意思。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "你个满嘴谎言的混蛋！"
  - character: "库珥修"
    text: "他说的是实话。"
  - character: "加菲尔"
    text: "你他妈怎么知道的？！"
  - character: "由里乌斯"
    text: "库珥修大人拥有风读的加护。她能判断一个人是否在说谎。"
  - character: "莱茵哈鲁特"
    text: "我也可以确认他说的是实话。他没有杀害菜月昴的意图。"
  - character: "罗兹瓦尔"
    text: "你满意了吗，巴利艾尔大人？"
  - character: "普莉希拉"
    text: "你，大精灵。"
  - character: "碧翠丝"
    text: "是的，我是。"
  - character: "普莉希拉"
    text: "你能判断是否有入侵者潜入了领地吗？"
  - character: "碧翠丝"
    text: "贝蒂无法判断是否有外来敌对者进入了罗兹瓦尔的领地。但她确实能感知宅邸中所有人的魔力，事实上。"
  - character: "菲莉丝"
    text: "这是什么意思？"
  - character: "弗雷德莉卡"
    text: "意思是碧翠丝大人本应能够感知到宅邸中是否有敌对实体存在。"
  - character: "由里乌斯"
    text: "如果她感知到宅邸内有入侵者，她很可能会介入。"
  - character: "奥托"
    text: "这意味着……宅邸内部的人，一个碧翠丝信任并且不认为是威胁的人，才是杀害菜月昴的人。"
  - character: "爱蜜莉雅"
    text: "雷姆……拉姆……你们……"
  - character: "旁白"
    text: "爱蜜莉雅的语气冰冷而严厉，让所有人都感到脊背发凉。罗兹瓦尔带着狂野的微笑观看着。雷姆恐惧地低下了头，拉姆则直视着精灵少女回以怒视。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "你是谁？你为什么要让我们看这些？"
  - character: "佩特拉"
    emotion: "愤怒"
    text: "你为什么要让菜月昴死？"
  - character: "视频内容"
    text: "画面中的声音回应：别把我卷进你们的混乱中。我给你们看这些，是为了让你们了解他破碎的精神状态。不是为了惩罚你们。我希望你们帮助菜月昴，而不是害怕他。"
  - character: "旁白"
    text: "所有人都困惑地盯着画面。爱蜜莉雅只能坐下来紧紧抱住她的骑士，同时发誓要为她的菜月昴复仇。画面再次开始播放。"
  - character: "视频内容"
    text: "画面在黑暗中打开，微弱的风声可以被听到，随后镜头切换到了菜月昴的睡脸。他在同一张华丽的客房大床上安睡了片刻，突然，他开始尖叫着抱住自己的手臂，仿佛手臂被砍断了一样。他尖叫着坐起身来，眼睛因恐慌和恐惧而睁得大大的。"
  - character: "视频内容"
    text: "昴大喊着'我的左臂！'，呼吸加重，汗水从额头滑落。他看着自己的手，摊开手掌，确认它真的在那里。他说：'我又回来了……不，也许应该说我回来了……'"
  - character: "佩特拉"
    emotion: "悲伤"
    text: "看他脸上的泪水……"
  - character: "里卡多"
    text: "他肯定一直感受到那些痛苦直到最后……或者他现在仍然能感受到？"
  - character: "由里乌斯"
    text: "应该不是那样，因为他看起来已经不再对痛苦做出反应了。"
  - character: "安娜塔西亚"
    text: "或者……菜月昴在醒来后仍然能感受到片刻的痛苦，因为他的能力在死亡和复活之间有一瞬间的时间差，不是吗？菜月昴一直是贵族间热议的话题，我确信他会成为某种……令人垂涎的工具，如果有人在我们之外得知这个'死亡回归'的能力的话……嗯，星信大人？"
  - character: "库珥修"
    text: "……"
  - character: "安娜塔西亚"
    text: "哦？不用担心。虽然我很好奇，但他的那个能力只有在他死亡时才能发动，对我没什么用处。我觉得那样对他来说有点不人道呢~"
  - character: "库珥修"
    text: "那你打算做什么？"
  - character: "安娜塔西亚"
    text: "你真的应该注意一下你看问题的方式呢，公主。菜月昴可不止有这个……死亡回归还是什么的。你的王庭就是不愿意考虑他其他有价值的部分。他们会浪费他以及他带给你的机遇。"
  - character: "旁白"
    text: "库珥修困惑地挑起了眉毛。就连由里乌斯和这位西方少女自己阵营里的其他佣兵都带着惊讶和困惑盯着她。安娜塔西亚一看到奥托投来的灼热目光，就咧嘴笑了。"
  - character: "安娜塔西亚"
    text: "我为什么要浪费这个机会，去跟无用的君主们废话呢？"
  - character: "菲莉丝"
    text: "你是说你不觉得他危险？你不害怕他的力量？"
  - character: "安娜塔西亚"
    text: "说真的，公爵夫人，你应该先担心你那边会对那个孩子做什么，再来担心我的意图。"
  - character: "库珥修"
    text: "……所以你确实有想法？"
  - character: "由里乌斯"
    text: "您在他身上除了力量之外还能看到什么，大人？"
  - character: "普莉希拉"
    text: "哼……他们的绝望到底有多深？为了一个生来就毫无价值的孩子把自己搞得支离破碎。切！"
  - character: "视频内容"
    text: "菜月昴注意到房间里有什么东西站在他面前。他从手上抬起头，发现女仆双胞胎正抱在一起，用惊恐的眼神看着他。意识到自己吓到了她们，菜月昴露出了一个不自在的微笑，说：'哦，抱歉。早上好。'双胞胎用恐惧的眼神看着他，让他叹了口气：'好吧，我猜你们不记得我了……'"
  - character: "里卡多"
    text: "是啊，辛辛苦苦和别人建立关系，然后因为死了就醒来发现对方根本不认识你……那一定很痛苦吧。"
  - character: "库珥修"
    text: "看来我是对的……但雷姆看起来确实因为所发生的事而处于震惊中……到底是怎么回事？"
  - character: "视频内容"
    text: "菜月昴微笑着掀开被子，以他最爱的姿势站了起来——手指指向天空，臀部收紧。他带着灿烂的笑容大喊：'抱歉给大家添麻烦了！菜月昴现在要重新开始了！'双胞胎困惑地对视了一眼。菜月昴笑着问道：'对了，今天几号、几点了？'"
  - character: "菲莉丝"
    text: "他怎么还能笑得出来？"
  - character: "莱茵哈鲁特"
    text: "我觉得这很了不起。"
  - character: "由里乌斯"
    text: "我觉得这很虚伪。"
  - character: "视频内容"
    text: "片头曲一：Redo。"
  - character: "旁白"
    text: "趁着音乐开始播放的机会，库珥修拍了拍爱蜜莉雅的肩膀。"
  - character: "库珥修"
    text: "不要以为这是什么危及你们阵营地位的把戏，但有关你的资助人，我有些事要告诉你。罗兹瓦尔就是下令艾尔莎偷走你徽章的人。"
  - character: "爱蜜莉雅"
    text: "请解释一下，库珥修大人。"
  - character: "库珥修"
    text: "你还记得那个金发少年问他是不是那次袭击的幕后主使吗？加菲尔？是的，罗兹瓦尔说他不是负责——"
  - character: "爱蜜莉雅"
    text: "他在说谎？"
  - character: "旁白"
    text: "库珥修点了点头。爱蜜莉雅一只手握成了拳头，另一只手则开始揉着熟睡少年的头发来发泄她的挫败感。"
  - character: "爱蜜莉雅"
    text: "你为什么什么都不说？你肯定看到了从他那里吹出的不实之风。"
  - character: "库珥修"
    text: "想想我该怎么说。我正要揭露王选候选人之一的资助人，而我自己也在争夺那个王位，他派出了一个契约杀手去偷窃甚至可能杀害他所资助的那个候选人。"
  - character: "旁白"
    text: "爱蜜莉雅对这番逻辑点了点头。库珥修将目光转向菜月昴，伸手用戴着手套的手指揉了揉少年的头。"
  - character: "库珥修"
    text: "这个盟友关系是他拼命争取来的。"
  - character: "爱蜜莉雅"
    text: "非常感谢您，库珥修大人。我一定会报答您的。"
  - character: "库珥修"
    text: "不必放在心上。毕竟我们是盟友。"
  - character: "视频内容"
    text: "第一季 第四集 导演剪辑版。"
  - character: "视频内容"
    text: "开始。"
  - character: "旁白"
    text: "片头曲结束。场景切换到菜月昴闭着眼睛在房间里走来走去，开始哀叹他的上一个轮回。这是他在罗兹瓦尔宅邸的第三个第一天。"
  - character: "视频内容"
    text: "菜月昴思考着：'我感受到的那股寒意……是不是意味着第一次我在睡梦中因为身体虚弱而死了？'他第二个轮回中在走廊里被残忍杀害的闪回记忆浮现了。他继续推理：'但第二次，有一个袭击者。所以如果我被杀了，是不是意味着宅邸里的其他人也被盯上了？'"
  - character: "碧翠丝"
    text: "他开始拼凑线索了，我是这么认为的。"
  - character: "缇碧"
    text: "是啊，但他这次能否凑齐足够的线索来保住自己的命呢？"
  - character: "视频内容"
    text: "菜月昴继续思考：'因为我们参与了爱蜜莉雅的王选，就像在赃物库那样？但即使我知道这些，我也没有证据来解释或者任何方法来避开它。更糟的是，我没有看到袭击者的脸或受害者。我的死完全白费了。'"
  - character: "佩特拉"
    emotion: "悲伤"
    text: "他怎么能说出这种话？"
  - character: "由里乌斯"
    text: "这是他能力的本质。他需要让每一次死亡都有意义，否则……"
  - character: "奥托"
    text: "他会再次死去。"
  - character: "旁白"
    text: "奥托的语气冰冷而毫无感情，死死盯着画面。上一次的死亡让他震惊到了骨子里。"
  - character: "加菲尔"
    text: "你不是一个人，你这个笨蛋。"
  - character: "旁白"
    text: "加菲尔抱起双臂，在朋友身旁坐下，拍了一下奥托的头。"
  - character: "加菲尔"
    text: "你自己说的。要愤怒……不要让任何东西沉淀下来，否则你就会习惯。你快把我烦死了。要么停下来，要么被吹飞。"
  - character: "视频内容"
    text: "菜月昴停止了绕着碧翠丝转圈，对她笑了笑：'哦，抱歉。但不知怎的，绕着圈子走能让我的脑袋转起来。体谅一下嘛，好不好？我们关系很好对吧？'碧翠丝玩着她的螺旋卷发，无精打采地看着一本书：'你到底觉得我们是什么关系呢，我是这么认为的？我们才见过两次。'"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "我真希望当时在那里就好了。"
  - character: "旁白"
    text: "碧翠丝轻声低语，握住了他的手，试图告诉他可以信任她，告诉她他所经历的一切。如果连她自己的契约者都不信任她，她还有什么用？碧翠丝想到这个，疲惫的眼睛泛起了泪光。"
  - character: "视频内容"
    text: "菜月昴微笑着说：'好吧，我不会给你添麻烦的。倒点茶什么的让我放松一下就行。'碧翠丝回应：'好像我会给你端什么东西似的，我是这么认为的。'菜月昴弯下腰，读着她摊开放在膝上的书。碧翠丝恼怒地说：'啊，你好烦啊！'菜月昴问：'你在看什么书？'碧翠丝答：'讲怎么除掉钻进我房间的虫子的，我是这么认为的。'"
  - character: "缇碧"
    text: "我有点喜欢他们之间的互动。"
  - character: "旁白"
    text: "其他人也发出了赞同的咕哝声和自己的小微笑。他们只是很高兴画面上出现了正常的内容。"
  - character: "视频内容"
    text: "碧翠丝恼怒地瞪着菜月昴：'你该走了！你的手已经不抖了。所以你现在可以掩饰你的恐惧了，我是这么认为的。'菜月昴一脸惊讶：'你能看出来？'碧翠丝说：'你一直在试图隐藏，我是这么认为的。被当作纯粹的便利工具对待，真是令人恼火。'"
  - character: "罗兹瓦尔"
    text: "你的观察力很敏锐呢，碧翠丝酱。"
  - character: "加菲尔"
    text: "那个小姑娘帮大将度过难关真是太酷了！"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "贝蒂真的非常抱歉。"
  - character: "旁白"
    text: "爱蜜莉雅同情地看着这个眼眶泛红的小女孩，慢慢起身抱住了她。碧翠丝只是接受了。这个拥抱没有菜月昴的那么温暖，但很令人安慰。"
  - character: "视频内容"
    text: "菜月昴带着紧张的微笑向碧翠丝挥手：'你一点也不友善……不过还是谢谢帮忙。下次还要拜托你了。'碧翠丝回应：'我根本不想被指望，我是这么认为的。所以别再来了。'菜月昴在门口停下，回头看了一眼。碧翠丝可爱地做了一个手势：'去吧，去吧。'菜月昴抬头看去，真相在他面前揭晓了：'等等，你说的虫子是指我？！'碧翠丝怒目而视，朝他举起了手：'现在就给我出去！'"
  - character: "旁白"
    text: "菜月昴还没反应过来就被扔出了房间，飞出了走廊，然后从一扇开着的窗户飞了出去，掉进了窗下的花坛里。奥托和加菲尔相视轻笑了一声。"
  - character: "视频内容"
    text: "菜月昴站起来，全身沾满了泥巴和泥土：'要、要不是这个花坛，那一下就是即死了……'他抬头看向窗户，听到爱蜜莉雅的声音：'那个……我能问一下你还好吗？'菜月昴回头看去，傻傻地笑了：'爱蜜莉雅碳，你的温柔是唯一能治愈我的东西。'爱蜜莉雅说：'你知道吗，雷姆昨天刚在那个花坛里施了肥。'"
  - character: "旁白"
    text: "笑声和咯咯声此起彼伏，每个孩子加上奥托和加菲尔都觉得菜月昴的处境很好笑。然而，爱蜜莉雅是唯一没有笑的人，她看着这个互动，眉头皱得更深了。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "无法逃避……又一个我辜负了他的生命……"
  - character: "旁白"
    text: "爱蜜莉雅意识到菜月昴一直在独自隐藏多少东西后，越来越不安。"
  - character: "视频内容"
    text: "菜月昴赶紧从花坛里跳出来，开始拍打身上的污物：'三秒规则！那不算！那不算对吧？！'爱蜜莉雅同情地笑了笑：'你知道吗，他们说这种事情其实是一种幸运。'菜月昴似乎为此闷闷不乐：'爱蜜莉雅碳已经进入安慰模式了……'"
  - character: "爱蜜莉雅"
    text: "话说回来……如果雷姆和拉姆真的杀了他，为什么他从来没有提过这件事？"
  - character: "旁白"
    text: "银发公主似乎对她所知道的一切感到困惑和迷茫。她对领主的整个认知不得不崩塌，让她看清他到底多么不值得信任。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "你为什么就是不愿意和我说呢……？"
  - character: "视频内容"
    text: "爱蜜莉雅咯咯笑着碰了碰绿色结晶：'帕克，醒一醒。'结晶发出了光芒，帕克从中显现出来，打着哈欠伸着懒腰：'早安，莉雅。'爱蜜莉雅说：'早安，帕克。你刚醒来就麻烦你真不好意思，但你能帮菜月昴洗一下吗？'帕克微笑着迅速朝少年射出了一道水龙卷，让他在里面旋转着尖叫。帕克大笑着停下了水流：'好了，全干净了！'"
  - character: "旁白"
    text: "所有孩子都在笑菜月昴，已经忘记了恐怖，专注于菜月昴被周围的人捉弄的有趣方式。奥托和加菲尔很高兴能借此笑一笑发泄一下他们的挫败感。碧翠丝微笑着看着帕克和菜月昴打闹，她想念她的哥哥。"
  - character: "蜜蜜"
    text: "嘿，那只猫还挺酷的！"
  - character: "缇碧"
    text: "蜜蜜！那可是大精灵！要尊敬他！"
  - character: "旁白"
    text: "缇碧训斥了妹妹，结果被俏皮地拍了一下头。佩特拉对着画面中的小猫发出喜爱的声音，希望能再揉一揉它的毛。"
  - character: "视频内容"
    text: "菜月昴和帕克相视而笑。菜月昴向帕克鞠了一躬：'好了，现在我已经从最初的坏印象中恢复过来了。谢谢你的帮助，岳父大人！'帕克很乐意配合：'你叫谁岳父呢？我可不会轻易把女儿交给你！'爱蜜莉雅对此嗤之以鼻。菜月昴和帕克开始打闹，帕克使出'尾击'和'肉垫碾压'。"
  - character: "爱蜜莉雅"
    text: "天……哪……抱歉……我忍不住了。你们两个在干什么？啊，我的肚子……我要笑死了……"
  - character: "旁白"
    text: "爱蜜莉雅对她的父亲温暖地笑着，他就这样出现在她面前让她感到安心。"
  - character: "视频内容"
    text: "帕克飞下来坐在爱蜜莉雅的肩膀上：'什么都比不上你的微笑，莉雅。你同意吧，菜月昴？'菜月昴站起来摆出了他的姿势：'嗯，完全同意。对我来说，爱蜜莉雅碳的微笑是夜空中第一颗闪耀的星星！'爱蜜莉雅困惑地问：'菜月昴你也来……还有，碳是什么意思？从哪来的？'帕克解释：'这是他们叫昵称的方式。就像帕克叫你莉雅一样。这是一种表达亲密感情的方式。'爱蜜莉雅一脸困惑：'我不记得和你亲近到那种程度了……'"
  - character: "蜜蜜"
    text: "好痛！"
  - character: "奥托"
    text: "我也感受到了……"
  - character: "旁白"
    text: "连威尔海姆都对这个拒绝摇了摇头。爱蜜莉雅真希望能对自己的愚蠢拍个额。"
  - character: "视频内容"
    text: "菜月昴捂着胸口一脸痛苦：'那确实有点伤人，但我不会灰心的！把它当作我们关系的一步进展吧。这说明我希望我们能亲近到用昵称称呼彼此。好吗？'爱蜜莉雅慢慢红了脸，扭过头去：'好吧，我接受。'菜月昴被她脸红的样子愣住了。爱蜜莉雅笑着挥了挥手：'不……别看我！'"
  - character: "菲鲁特"
    text: "你需要更多朋友，大姐！"
  - character: "阿尔"
    text: "难怪你和他相处得那么好。你和我家帕尔一样被保护得太好了。"
  - character: "爱蜜莉雅"
    text: "我……我……"
  - character: "旁白"
    text: "爱蜜莉雅摇着头，看起来因为尴尬而满脸通红。某个身着红色衣装的公主正用明显带着仇恨或厌恶的目光盯着前排。"
  - character: "普莉希拉"
    text: "以为你会为了片刻的正常生活就忘记那个少年的命运，这恰恰说明了你可悲的本质呢，蠢货，切！"
  - character: "视频内容"
    text: "菜月昴转向飘浮的猫：'这该怎么解读呢，解说员帕克先生？'帕克说：'她没什么朋友，所以她渴望昵称之类的东西。她很容易满足。'菜月昴眼中闪烁着变态的光芒：'我的女主角很容易满足，哈？！'爱蜜莉雅撅着嘴把头扭向一边：'哼！笨蛋菜月昴。'"
  - character: "旁白"
    text: "安娜塔西亚和库珥修似乎在为此偷笑。"
  - character: "视频内容"
    text: "拉姆和雷姆出场：'姐姐，姐姐。才这么一小会儿，我们的客人就变成了落汤鸡。''雷姆，雷姆。才这么一小会儿，我们的客人就变成了脏兮兮的旧抹布。'菜月昴看着两个女仆：'我知道我是老鼠。你们不用告诉我。'"
  - character: "拉姆"
    text: "拉姆……"
  - character: "拉姆"
    text: "我知道，雷姆。我知道……"
  - character: "旁白"
    text: "两个女仆此刻都因为这个场景明显地畏缩着。雷姆对很多事情感到内疚，她希望能为菜月昴弥补其中许多。拉姆对此事的内疚感较少，但她更关注的问题是：菜月昴为什么没有向任何人告发她妹妹。"
  - character: "拉姆"
    text: "你做了什么，巴鲁斯？我们被操纵了吗？我们对你伤害太大了，以至于你被困在靠近我们的地方？你忘了？你在策划复仇吗？"
  - character: "旁白"
    text: "拉姆的眼睛猛地睁大，因为她意识到她妹妹被袭击后昏迷了整整一年处于停滞状态……菜月昴难道不能用他的能力救她妹妹吗？现在她仔细想想……他当初为什么那么依恋雷姆？拉姆从这个想法中摇了摇头，但她的眼神似乎并不确定。"
  - character: "视频内容"
    text: "拉姆和雷姆鞠躬并异口同声地说：'我们的领主，罗兹瓦尔大人，回来了。'菜月昴缓缓吸了口气：'来了……'"
  - character: "视频内容"
    text: "菜月昴下定决心：'我第一次见到这座宅邸的领主……我唯一能确定的是第四天晚上会有人袭击。如果能让他们知道就好了，但我无法解释消息的来源。如果我哪怕只知道袭击者的体貌特征，结果可能就不一样了。所以这一次，我要用接下来四天的时间收集情报，找出袭击者是谁。'"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "他没打算活着度过这次轮回。"
  - character: "威尔海姆"
    text: "看来菜月昴大人已经习惯为了收集情报而抛弃生命了。"
  - character: "佩特拉"
    text: "但他为什么不告诉爱蜜莉雅大人呢？她可以帮他啊！"
  - character: "碧翠丝"
    text: "让我们看看最后会怎样吧，我是这么认为的。"
  - character: "视频内容"
    text: "罗兹瓦尔张开双臂：'你可以请求任何奖赏……说出你的愿望。'菜月昴宣布道：'那样的话，让我作为食客住在这里，想吃就吃想睡就睡！'桌上陷入了沉默。"
  - character: "安娜塔西亚"
    text: "他又要去当管家了。哼！真是浪费时——"
  - character: "视频内容"
    text: "菜月昴大声说：'管他们呢！'"
  - character: "安娜塔西亚"
    text: "安娜塔西亚大人！"
  - character: "旁白"
    text: "库珥修、菲鲁特、双胞胎，甚至里卡多都对一脸沮丧的安娜塔西亚咯咯笑了起来。而由里乌斯则带着被冒犯的表情看着她。"
  - character: "由里乌斯"
    text: "这都是菜月昴的错。"
  - character: "视频内容"
    text: "拉姆打了个哈欠。场景切换，菜月昴在走廊里边走边思考：'但我该怎么收集情报呢？我想先从一些间接的询问开始。'"
  - character: "里卡多"
    text: "他做的并没有错。收集情报一直是他最好的武器。"
  - character: "菲莉丝"
    text: "有那样的能力，任何东西都可以成为武器。"
  - character: "视频内容"
    text: "菜月昴停下脚步望向窗外，看到雷姆正在修补他掉进去的花坛。他赶紧跑了出去，走到雷姆身后：'给你添麻烦了，抱歉。'雷姆起身向他鞠了一躬：'这是应该的。那我先告辞了，先生。'雷姆转身离开。"
  - character: "视频内容"
    text: "拉姆看着妹妹，紧紧地抱住了她。雷姆低声呢喃：'我杀了他，姐姐。'拉姆安抚道：'嘘，我们不想让他们听到！'雷姆哭倒在姐姐怀里：'但我杀了他！我杀了这个世界上我最爱的人。这、这就是他没有选择爱我的原因吗？我真的伤害了他那么深吗？'"
  - character: "拉姆"
    text: "巴鲁斯已经死过了，他会好起来的。如果你对他那么残忍，如果你杀了他，你觉得他会在你昏迷的时候帮你吗——连你姐姐都忘了你的时候？"
  - character: "旁白"
    text: "雷姆紧紧抱住姐姐，向所有拥有力量的存在祈祷，请不要让她再伤害她的菜月昴了。拉姆死死地瞪着画面。"
  - character: "拉姆"
    text: "我不确定你到底怎么了，巴鲁斯……但你最好不是因为怨恨而让我妹妹死掉、假装关心她……我希望你不要再痛苦地死去了……巴鲁斯。"
  - character: "视频内容"
    text: "菜月昴开始在宅邸各处搜索：'没看到什么异常的……'他听到了身后铁链的声音，迅速转身，发现某个小丑正站在他身后。"
  - character: "加菲尔"
    text: "那不是杀手的铁链声，冷静下来，加菲尔。"
  - character: "奥托"
    text: "管他是不是铁链，他活该。"
  - character: "缇碧"
    text: "嗯……铁链……"
  - character: "视频内容"
    text: "罗兹瓦尔微笑着问：'你什么都看不出来吗？'菜月昴说：'罗兹酱……别那样吓我。会误导人的。'场景切换，菜月昴正在笔记本上写着什么。"
  - character: "里卡多"
    text: "呃，老大……这些字迹是不是和……有点像？"
  - character: "安娜塔西亚"
    text: "嗯，是的。这书写风格类似于荒野之主星信留下的失落图腾的文字……"
  - character: "由里乌斯"
    text: "菜月昴的语言，那个来自另一个世界的——"
  - character: "安娜塔西亚"
    text: "——和星信大人自己的相似……？！"
  - character: "旁白"
    text: "安娜塔西亚的脸因为震惊而变得僵硬。奥托和加菲尔震惊地对视了一眼。安娜塔西亚立刻注意到自己的失态使她成了前排那个麻烦的商贾少年和身旁库珥修的目标。"
  - character: "安娜塔西亚"
    text: "……这没什么好担心的。"
  - character: "库珥修"
    text: "确实有趣……"
  - character: "视频内容"
    text: "菜月昴在笔记上写下：'睡梦中因虚弱而死（魔法相关？）铁链声。罗兹瓦尔的铁链×误导！'他抓着头发，为他所掌握的证据感到沮丧。敲门声响起，他微笑着看向门口：'请进！'拉姆端着给客人的茶走了进来：'请用，先生。'菜月昴问：'哦，谢谢。要一起喝吗？'拉姆低下了头：'不了，谢谢您，先生。'菜月昴看着拉姆离去的背影：'嘿，你可以对我稍微友善一点的……'"
  - character: "奥托"
    text: "爱蜜莉雅，不要用那种眼神看女仆。什么都还没有确认。"
  - character: "爱蜜莉雅"
    text: "她们还没有回答我……她们为什么不否认？我确信如果是被迫的我们可以想办法——"
  - character: "奥托"
    text: "我觉得我们应该先看完再做决定，爱蜜莉雅大人，我们大多数人都很困惑……上面的双胞胎女仆们更是如此。而且这只是我们对手阵营的领袖的一面之词。我不觉得我们应该把普莉希拉大人的话当真，而无视菜月昴拼了命才救回来的那个女孩，对吧？雷姆看起来不像是坏人……她像吗？"
  - character: "加菲尔"
    text: "你就不觉得红色公主的话可能有点道理吗？"
  - character: "奥托"
    text: "你是说你相信她说的拉姆和雷姆杀了菜月昴？"
  - character: "加菲尔"
    text: "我不知道啊……我的脑子很乱，因为我在雷姆变得……之前的记忆。我不认为她们两个都做了。但是……如果是她们对大将做了那些事，也说得通。她们两个都有冷酷的一面。如果她们就是对大将下那么狠手的人……我会崩溃的……但我不会怪她们。如果大将死在拉姆和雷姆手里，那归根结底是小丑的错。"
  - character: "阿尔"
    text: "这确实有点可疑……"
  - character: "蜜蜜"
    text: "或者也许在这个轮回里她们不喜欢大哥，因为她们把他当成了吃白饭的。"
  - character: "旁白"
    text: "许多人对此感到矛盾。双胞胎真的就是杀手吗，还是她们只是因为菜月昴在这个现实中白吃白住而生气？所有人都专注于画面，专注于菜月昴将如何应对这一切。"
  - character: "视频内容"
    text: "菜月昴走进了禁书库，对着一脸不快的碧翠丝微笑：'哟！'碧翠丝缓缓举起手指向菜月昴：'你每天都来连门都不敲。你真的是一点礼貌都没有。在你被吹飞之前离开对你最有利，我是这么认为的。'少年开始慌张地摆手：'哇！等等，等等！我只是想问点事情！'"
  - character: "视频内容"
    text: "菜月昴问：'有没有什么魔法能让人虚弱，然后像入睡一样死去？'碧翠丝回答：'如果我必须回答的话，确实有。但与其说是魔法，不如说是一种诅咒，我是这么认为的。'"
  - character: "碧翠丝"
    text: "啊……！你就是从这里得到那个信息的，我是这么认为的。"
  - character: "旁白"
    text: "爱蜜莉雅瞥了碧翠丝一眼，因为她听到了小女孩的喃喃自语。精灵比爱蜜莉雅知道得更多，足以理解正在发生的事，她只是缺少几块拼图。而爱蜜莉雅对菜月昴处境的了解比碧翠丝还少。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "如果我的保护不是如此有缺陷、不会成为你被屠戮的原因的话，能不能请你离贝蒂远一点再死呢？"
  - character: "旁白"
    text: "小碧翠丝的心中只剩下羞耻，因为她意识到自己希望在任何一个轮回中都没有辜负他的愿望，正在驱使她希望他干脆死在宅邸之外。她对自己感到失望。"
  - character: "视频内容"
    text: "碧翠丝开始读一本书，菜月昴则在她身后读着。碧翠丝说：'萨满专精的法术中有许多这样的东西。'菜月昴问：'萨满？'碧翠丝拿着一本上面画着粗略图画的书：'巫师。不过，萨满是魔法和精灵术使用者的一个子类，起源于北方的古斯塔科。他们都相当没用，不值得认真对待。但有一种比诅咒更简单的方法，我是这么认为的。'"
  - character: "视频内容"
    text: "碧翠丝可爱的脸扭曲成了一个邪恶的坏笑：'我想你已经体验过了。'菜月昴困惑地看着女孩，直到她把手放在了他的胸口：'等等，你是说……你对我强行做的那种魔力吸取其实能杀死我？！'碧翠丝正在够一本放得太高的书：'抱歉让你失望了，但我很忙。我连杀你的力气都没有。'"
  - character: "佩特拉"
    text: "碧翠丝好过分！"
  - character: "库珥修"
    text: "看起来他目前做得不错，我猜这就是他得知村子里有萨满、揭露魔兽使用者才是真正的威胁的地方？"
  - character: "碧翠丝"
    text: "确实如此，我是这么认为的……"
  - character: "菲鲁特"
    text: "小妹妹好过分！"
  - character: "视频内容"
    text: "碧翠丝解释：'魔力也是一个人的生命力。如果被强行持续吸取，就会虚弱而死，我是这么认为的。'菜月昴问：'等等……杀我的人不是你吧？'碧翠丝说：'在这座宅邸里，只有哥哥和我可以。连罗兹瓦尔都不行。'菜月昴说：'哦……那这其实是相当稀有的技能。别吸太多那东西。尤其别吸我的。我现在严重缺血，一吸就死。'"
  - character: "蜜蜜"
    text: "天哪，她好毒！"
  - character: "视频内容"
    text: "碧翠丝说：'嘲笑我对你没有好处，我是这么认为的……而且我永远不会杀我的契约者。'菜月昴迅速帮她拿到了书。碧翠丝说：'那个傻姑娘还没有治愈致命伤的能力呢，我是这么认为的。'爱蜜莉雅撅着嘴开始拉碧翠丝的脸颊：'我才不傻！'碧翠丝揉着脸颊：'好了！好了！我是这么认为的！她和哥哥稳住了你的伤势，而我治愈了你的伤口。'菜月昴无法相信：'哈？真、真的吗？你开玩笑的吧？当然……是骗人的。是骗人的！骗人不好！不要骗人！'"
  - character: "菲莉丝"
    text: "真是个忘恩负义的白痴。"
  - character: "莱茵哈鲁特"
    text: "我觉得他应该多听听朋友的话。"
  - character: "视频内容"
    text: "碧翠丝朝少年举起了手臂：'闭嘴，我是这么认为的！你太抗拒真相了。不值得救的人就应该消失，我是这么认为的！'她把他从门里吹飞出去，让他再次落在同一个花坛上。"
  - character: "里卡多"
    text: "她好辣！"
  - character: "碧翠丝"
    text: "就是这样，事实上！"
  - character: "旁白"
    text: "碧翠丝迅速跳起来朝犬人扔了一个水瓶，把他淋得像只落水狗。她坐下来，气呼呼地哼了一声。"
  - character: "视频内容"
    text: "爱蜜莉雅同情地微笑着：'那个……你没事吧，再一次？'菜月昴呻吟着。"
  - character: "菲鲁特"
    text: "兄弟，你运气真背啊，噗哈哈！"
  - character: "旁白"
    text: "场景切换，菜月昴深夜坐在书桌前，盯着他的笔记。"
  - character: "视频内容"
    text: "菜月昴在笔记上写道：'所以，最后的关键词是诅咒和铁链。其他的我什么都不知道。如果死亡回归的条件相同，我在首都死了三次，第四次活了下来。但这不意味着我打算把这条命当作弃子。这就是为什么我让帕克帮我盯着爱蜜莉雅。'闪回到菜月昴和帕克交谈的画面。帕克说：'这些都很模糊，但我能看出你是出于对莉雅的关心才问的。'"
  - character: "库珥修"
    text: "嗯，看来他并不像你想象的那么习惯，威尔海姆大人。"
  - character: "缇碧"
    text: "我们甚至不知道他的能力是否有另一个触发条件……或者重来的次数有没有限制？"
  - character: "莱茵哈鲁特"
    text: "我怀疑我们什么都不知道，我们甚至不知道是谁给了他这个能力、把他召唤到了我们的世界。"
  - character: "由里乌斯"
    text: "我们甚至不知道他的'存档点'或时间中的位置是根据他自己的意愿变化还是因为别的什么原因。"
  - character: "视频内容"
    text: "菜月昴在房间里哀叹：'在第四天的早上，我会离开这里然后——'敲门声响起，粉色头发的女仆走了进来：'打扰了，先生。'"
  - character: "安娜塔西亚"
    text: "他说的离开是什么意思？"
  - character: "爱蜜莉雅"
    text: "他……要离开？"
  - character: "旁白"
    text: "爱蜜莉雅突然抬头看向女仆们，注意到她们两人似乎都松了口气。她缓缓将目光移向她们旁边，盯着坐在两人之间的古怪小丑。罗兹瓦尔看起来困惑不已，因为他的表情第一次没有虚假的微笑。"
  - character: "莱茵哈鲁特"
    text: "也许……她们真的是无辜的？看来菜月昴制定了一个收集情报的计划。"
  - character: "旁白"
    text: "莱茵哈鲁特微笑着，饶有兴趣地看着。他确信菜月昴会很快脱身，村子的其他人也会得救。他真心想向他学习如何独自应对这一切。"
  - character: "莱茵哈鲁特"
    text: "但如果他又死了呢……？我希望这不会再发生在你身上，菜月昴。"
  - character: "视频内容"
    text: "菜月昴迅速用纸张盖住了笔记，对端着茶和饼干进来的拉姆微笑。拉姆说：'看来你确实在用功呢，先生。'菜月昴说：'这也太失礼了！我好歹是客人好吧。'拉姆递给他一杯茶：'你是个自称客人的吃白饭的。我就是这么看你的，先生。'菜月昴尝了一口：'谢谢。呃，还是那么难喝。'"
  - character: "拉姆"
    text: "嘘……看来巴鲁斯这次不会待在宅邸了，雷姆。他可能不会死在你手里了……"
  - character: "雷姆"
    text: "我不想……我完全不想那样发生……"
  - character: "旁白"
    text: "雷姆似乎呼吸有些困难，但她的表情中明显有一丝宽慰。"
  - character: "视频内容"
    text: "拉姆在他的床上坐下：'你这是要惹怒宅邸里最好的茶叶了。'菜月昴说：'当着客人的面偷懒？我对你这种厚脸皮无话可说。'拉姆晃着双腿：'是你自己让我对你友善一点的。我只是回应了你的要求。那？你的学习进展如何？'菜月昴翻开一本书：'还行。我现在能读这些简单的童话了。有趣的是，道德教训和我所知道的只是略有不同。这就像真正的跨文化交流。也许我应该从我的家乡进口一些童话故事。比如《哭泣的红鬼》。'"
  - character: "普莉希拉"
    text: "嗯……"
  - character: "碧翠丝"
    text: "哦……我记得这个故事，我是这么认为的……这就是为什么那个故事是你最喜欢的吗，真好奇？"
  - character: "爱蜜莉雅"
    text: "他……给碧翠丝讲过那些故事？"
  - character: "里卡多"
    text: "嘿，这两个人相处得不错啊……他们看起来不是很开心吗？"
  - character: "普莉希拉"
    text: "闭嘴，把你那糟糕的感知力留给自己，狗。"
  - character: "视频内容"
    text: "菜月昴开始讲故事：'从前，住着一只红鬼和一只蓝鬼。两只鬼是非常好的朋友。红鬼想和村子里的人们交朋友。但人们太害怕了，不敢靠近他。蓝鬼不忍心看下去，于是想出了一个计划来帮助他的朋友。我会去村子里闹事，你来阻止我。然后村民们一定会信任你的。'"
  - character: "视频内容"
    text: "菜月昴继续讲：'计划成功了，红鬼和人类成了朋友。但随着时间流逝，他开始担心起来。他的朋友蓝鬼不再来看他了。有一天，红鬼去了蓝鬼的家。门紧闭着，上面贴着一封信。信上写着：红鬼君，请和你的朋友们好好玩吧。如果我继续和你在一起，他们可能也会觉得你是坏鬼。所以我决定去旅行，但我永远不会忘记你。再见。请保重。你永远的朋友……蓝鬼。红鬼一遍又一遍地默默读着这封信。泪水滑落，他开始哭泣。——完。'"
  - character: "旁白"
    text: "佩特拉、蜜蜜和菲鲁特因为这个故事抽泣着。里卡多也在抽泣。"
  - character: "里卡多"
    text: "多么勇敢的鬼啊。"
  - character: "莱茵哈鲁特"
    text: "这是个悲伤的故事……"
  - character: "库珥修"
    text: "菜月昴的世界……在某种意义上是在受苦吗？还是这个故事只是单纯的想象力？"
  - character: "碧翠丝"
    text: "……贝蒂的菜月昴告诉过她，他的世界很美丽，事实上。它之所以美丽，是因为它被黑暗所笼罩。"
  - character: "菲鲁特"
    text: "那是什么意思？"
  - character: "碧翠丝"
    text: "美丽的黑暗，一个希望必须战胜悲剧和流血的世界。一个有时会违背希望、以免腐化希望、将它变成黑暗的世界。"
  - character: "库珥修"
    text: "菜月昴的世界似乎……很复杂？无论如何感谢您的话，大精灵大人。"
  - character: "旁白"
    text: "库珥修向精灵少女低下了头，靠回座位上，手指抵着下巴。思考着她所听到的。"
  - character: "普莉希拉"
    text: "美丽的黑暗？确实是美丽的黑暗！"
  - character: "旁白"
    text: "普莉希拉带着扭曲的愉悦微笑着。鬼的故事是这位绯红色男爵夫人出奇地欣赏的东西。"
  - character: "蜜蜜"
    text: "哇，我还想听更多！"
  - character: "爱蜜莉雅"
    text: "所以……菜月昴是想回去……"
  - character: "雷姆"
    text: "……姐姐。姐姐，请不要自责。"
  - character: "视频内容"
    text: "拉姆慢慢坐起身望向窗外：'那是个悲伤的故事。'菜月昴说：'是啊，是悲伤的。但我觉得也是个甜蜜的故事。'拉姆说：'我觉得里面所有角色都很蠢。红鬼、蓝鬼，还有村民们。'菜月昴说：'那有点苛刻了。我的意思是，我不否认，但……这就是我又爱又恨那个故事的原因。蓝鬼的自我牺牲确实很吸引人，但很蠢因为他什么都没得到。我是那种想要为付出的努力得到回报的人。'"
  - character: "安娜塔西亚"
    text: "是吗？你显然喜欢唾手可得的回报呢。"
  - character: "旁白"
    text: "库珥修听到了，不得不忍住笑。由里乌斯握住了本该挂着剑的位置，试图控制自己。莱茵哈鲁特只是对他笑了笑。"
  - character: "视频内容"
    text: "拉姆低声说：'……这是个苦乐参半的故事……雷姆。'她不在乎那滴从脸颊滑落的泪水。拉姆继续说：'你就是这样看待蓝鬼的吗？但我觉得红鬼才是真正无可救药的那个。他把蓝鬼拖入了自己的欲望，结果自己什么都没失去。'菜月昴问：'那你认为两只鬼应该怎么做？'拉姆说：'如果红鬼真的想和人类交朋友，他应该折断自己的角去找他们。他应该在蓝鬼看不下去之前就这么做。'"
  - character: "视频内容"
    text: "拉姆放下杯子，走近菜月昴：'是吗？两只鬼中你更愿意和谁做朋友？红鬼，那个只会希望被别人照顾的红鬼，还是那个沉浸在自我牺牲中的蠢蓝鬼？'菜月昴在两只手之间看了看，他伸向其中一只，选择了——两只手。他分别握住了她的两只手。"
  - character: "拉姆"
    text: "多么愚蠢的回答。如果你想和两只鬼都交朋友，那你一定是个优柔寡断、花心的人。你总有一天会后悔的。"
  - character: "奥托"
    text: "菜月昴总是说他自私，因为他想不牺牲任何人就拯救所有人。"
  - character: "旁白"
    text: "爱蜜莉雅阵营的其他人，甚至其他阵营的一些人如里卡多、威尔海姆和莱茵哈鲁特也笑了。"
  - character: "安娜塔西亚"
    text: "他确实看起来天真……"
  - character: "库珥修"
    text: "但他心地善良。"
  - character: "普莉希拉"
    text: "好……心？多么愚蠢的念头！愚蠢……"
  - character: "旁白"
    text: "普莉希拉喃喃自语，但她看起来不太确定。罗兹瓦尔只是听到他们的话后深深皱起了眉。"
  - character: "罗兹瓦尔"
    text: "自私……"
  - character: "视频内容"
    text: "拉姆指着其中一本书：'抛开你家乡的童话不谈，这些故事中有什么给你留下了印象吗？'"
  - character: "菲鲁特"
    text: "你们觉得我们该让他讲几个这种故事吗？"
  - character: "菲莉丝"
    text: "来自另一个世界的故事？"
  - character: "奥托"
    text: "听起来确实很令人兴奋。"
  - character: "碧翠丝"
    text: "哼！你们真是太可悲了，事实上！菜月昴一直在给贝蒂讲他世界上最精彩的童话和虚构故事，我是这么认为的。"
  - character: "旁白"
    text: "一个非常得意的碧翠丝坏笑着，骄傲地接受了几位女孩的怒视。菜月昴是她的契约者，不是她们的。"
  - character: "视频内容"
    text: "菜月昴说：'我最喜欢的是中间那个关于龙的，和最后那个关于魔女的。我终于知道龙之王国卢克尼卡这个名字是怎么来的了。'拉姆解释：'书上说王室和龙签订了盟约，所以与其说是童话不如说是民间传说，对吧？'菜月昴说：'是的，因为那是真的。高贵的龙至今仍从远方，从大瀑布的彼岸守护着这个国家。'"
  - character: "由里乌斯"
    text: "你在想什么？"
  - character: "安娜塔西亚"
    text: "我在想也许菜月昴的世界在大瀑布的彼岸。"
  - character: "莱茵哈鲁特"
    text: "这确实很有趣……"
  - character: "库珥修"
    text: "无论听多少遍，那痛苦都不会消散，弗利艾。"
  - character: "视频内容"
    text: "菜月昴问：'等等，签订契约的那个王室不是最近绝嗣了吗？'拉姆回答：'是的，相当突然。没有人知道龙想要什么。在国家目前的状况下，只有神知道……不，只有龙自己知道它会怎么做，先生。'"
  - character: "旁白"
    text: "库珥修微微怒视了一下，保持冷静，因为她记起了自己争夺王位的愿望。暴食症夺走了她的目标和记忆，但她对龙的深深仇恨仍然根植于她心中。"
  - character: "视频内容"
    text: "菜月昴正翻着书：'哦，对了，关于这个魔女的故事……'拉姆迅速打断：'我不想讨论那个。我在这里待太久了。晚饭准备好了我会来通知你的，先生。'拉姆在门口停下：'你给我讲的那个鬼的故事……不要讲给雷姆听。我确定她不会喜欢的。'说完，拉姆关上了身后的门。"
  - character: "雷姆"
    text: "姐姐——"
  - character: "拉姆"
    text: "你现在应该担心别人了，雷姆。"
  - character: "旁白"
    text: "拉姆冷冷地打断了她，把妹妹的心撕成了两半。"
  - character: "视频内容"
    text: "菜月昴躺在床上，盯着手中的书：'可怕的魔女……恐怖的魔女。连提她的名字都令人恐惧。所有人都叫她嫉妒魔女。'画面停在了魔女手绘的脸庞上。"
  - character: "菲莉丝"
    text: "他为什么突然关注起魔女来了？"
  - character: "加菲尔"
    text: "你说呢？"
  - character: "视频内容"
    text: "场景切换到菜月昴站在宅邸前门，爱蜜莉雅、罗兹瓦尔和双胞胎女仆站在他面前。爱蜜莉雅用忧虑的表情看着菜月昴：'你确定吗？我们可以叫一辆龙马拉的车送你去首都……'"
  - character: "爱蜜莉雅"
    text: "他现在要做什么？"
  - character: "安娜塔西亚"
    text: "看来他要离开宅邸了。"
  - character: "佩特拉"
    text: "那他怎么抓到杀手呢？"
  - character: "弗雷德莉卡"
    text: "我们只需要看下去。"
  - character: "旁白"
    text: "弗雷德莉卡揉了揉小女仆的头，年长的女仆只是让小家伙靠在她身上啜泣。"
  - character: "视频内容"
    text: "菜月昴竖起大拇指，露出迷人的微笑：'我会没事的。总有一天，当我成为一个强大、聪明、富有、配得上你的人时，我会骑着白马带你走。'却被忧虑的爱蜜莉雅无视了：'你带手帕了吗？还有水，还有拉古矿石，还有，还有……你能自己睡觉吗？'菜月昴说：'你是我妈吗？！'"
  - character: "旁白"
    text: "骑士三人组嗤之以鼻，而奥托、里卡多、加菲尔和阿尔都对菜月昴失败的尝试大笑起来。"
  - character: "里卡多"
    text: "又一次失败的尝试！"
  - character: "阿尔"
    text: "我替他们感到可怜。"
  - character: "视频内容"
    text: "罗兹瓦尔插了进来，伸出了手：'那么，菜月昴，保重。还有，不要弄丢我给你的礼物。'菜月昴看了看他的包：'封口费，对吧？放心，我懂。我不会说不该说的话。我向龙发誓。'罗兹瓦尔微笑道：'和你说话让任何邪恶计划都失去了意义。在这个国家，向龙发誓是最高的承诺形式。'"
  - character: "普莉希拉"
    text: "他学东西很快呢。"
  - character: "视频内容"
    text: "菜月昴转向双胞胎：'你们两个帮了我大忙。尤其是你，雷姆琳。谢谢你做的所有美食。还有拉姆琪……对了！你很擅长打扫厕所吧？'拉姆忍不住开口：'哼！同样可悲的男人说出的可悲恭维。'双胞胎开始嘲笑他：'姐姐，姐姐。我们的客人在恭维方面毫无希望。''雷姆，雷姆。我们的客人在恭维方面有致命的缺陷。'菜月昴灿烂地对两人笑了笑：'不过还是谢谢了。'"
  - character: "奥托"
    text: "我不觉得……是她们做的。"
  - character: "由里乌斯"
    text: "不能以貌取人。自从被指控后她们什么都没说。"
  - character: "蜜蜜"
    text: "她们甚至没有为自己辩护！"
  - character: "佩特拉"
    text: "可、可是拉姆大人不会杀对我们那么重要的人！她现在看起来那么善良开心，也许是因为别的事情？"
  - character: "旁白"
    text: "爱蜜莉雅只是带着痛苦的眼神看着两人。雷姆避开了她的目光，泪水涌了上来。"
  - character: "视频内容"
    text: "爱蜜莉雅站在菜月昴身后，面带微笑：'菜月昴！谢谢你做的一切。如果需要什么，随时来看我。'菜月昴笑了：'好啊！谢谢你，爱蜜莉雅碳！'"
  - character: "旁白"
    text: "很明显他在计划着什么，她怎么能如此盲目地没有看出来？"
  - character: "视频内容"
    text: "菜月昴开始走远，在路中间停了下来，环顾四周。他改变了路线，跑进了路边的密林中。"
  - character: "菲莉丝"
    text: "嗯，他为什么看起来鬼鬼祟祟的？"
  - character: "弗雷德莉卡"
    text: "我觉得他打算潜入宅邸，看看是否真的有杀手进入。"
  - character: "佩特拉"
    text: "这是一个抓住杀了他的怪物的好计划！"
  - character: "菲鲁特"
    text: "大哥在干什么？宅邸在那边啊！"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "你为什么不试着告诉我呢，菜月昴？"
  - character: "视频内容"
    text: "菜月昴在一个俯瞰整个马瑟斯庄园的悬崖边停了下来：'好了，就是这里。从这里可以特别清楚地看到爱蜜莉雅的房间。现在剩下的就是等待事情发生了……'他从包里拿出了一把刀：'……然后阻止它。'"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "什么？！"
  - character: "由里乌斯"
    text: "这不会有好结果的。"
  - character: "菲鲁特"
    text: "我不明白……听起来是个好计划。"
  - character: "奥托"
    text: "因为他这样看起来更可疑。"
  - character: "罗兹瓦尔"
    text: "她们就一定得介入了！"
  - character: "碧翠丝"
    text: "这对你来说很好笑吗，我是这么认为的？"
  - character: "罗兹瓦尔"
    text: "一点也不！但你必须记住，菜月昴在那个世界里看起来最可疑。所以他是自找的，事实上。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "你是说菜月昴该死？！"
  - character: "罗兹瓦尔"
    text: "我从来没有想要让他死，爱蜜莉雅大人。虽然不幸但事实表明他会在这里以某种方式失败。我不知道他会怎么死，但我知道除非绝对确定他对你是危险的，否则我从未要求我的员工伤害他。"
  - character: "库珥修"
    text: "……所以你是说既然他在这悬崖上显得可疑，就可能被你的员工杀死？"
  - character: "旁白"
    text: "库珥修眯着眼睛怒视着这个男人，她的神圣力量的每一丝都在这个男人身上活跃着。到目前为止他说的都是实话。罗兹瓦尔只是沉默了片刻。拉姆和雷姆盯着地面。"
  - character: "奥托"
    text: "我是说……那两个人似乎被留在了宅邸里……菜月昴真的很远……"
  - character: "加菲尔"
    text: "是啊，确实……"
  - character: "视频内容"
    text: "菜月昴想起了这把刀就是他之前轮回中用来切蔬菜和水果的那把。他唯一的遗憾……用它切手指的次数比切水果还多。'她可能会因为我这样用它而生气的……'菜月昴回头对着宅邸笑了笑。他悲伤地低下了头：'我希望她会……我不想死。'"
  - character: "旁白"
    text: "爱蜜莉雅握着他的手，观看着。她的眼神保持着冰冷和淡然。她准备好了。准备好承受菜月昴的痛苦和折磨。"
  - character: "由里乌斯"
    text: "这真是个糟糕的计划……"
  - character: "视频内容"
    text: "菜月昴抬起头，回忆起了之前所有的轮回。他想起了爱蜜莉雅的微笑：'我不想让她们死。'他想起了碧翠丝和罗兹瓦尔。他看着刀锋上自己的倒影：'即使没有人记得一切重来时发生了什么……你记得。'"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "我没能保护他。我没能保护他。我没能保护他。"
  - character: "旁白"
    text: "碧翠丝握着他的手，带着心碎的表情盯着画面，一遍又一遍地重复着同一句话，咬紧牙关把情绪压住。"
  - character: "阿尔"
    text: "这小子一个人扛了很多啊。"
  - character: "普莉希拉"
    text: "他会失败然后哭泣，我不明白为什么我要看这么无聊的东西。"
  - character: "库珥修"
    text: "我相信这次放映是给所有人看的，巴利艾尔。不只是给你自己。"
  - character: "旁白"
    text: "雷姆只是抱着膝盖，任由泪水滑落，因为她看到她的英雄因为她而多么恐惧和沮丧。"
  - character: "视频内容"
    text: "菜月昴看着日落，天空开始变成橙色。'现在想想，这次我没有去给雷姆买东西。只是因为留给我的饭菜是剩的？'菜月昴突然对什么东西警觉起来。离天黑还有一段时间。他摇了摇头，集中注意力。"
  - character: "里卡多"
    text: "我是说……也许他们不会发现他在悬崖上？"
  - character: "加菲尔"
    text: "那是个很远的悬崖。"
  - character: "由里乌斯"
    text: "所以如果双胞胎要不带菜月昴去购物……他就不会被魔兽使用者杀死，也不会像我们一直推测的那样面临来自女仆的危险……也许在某个地方有第三个威胁？"
  - character: "旁白"
    text: "突然……有什么东西朝他飞来。菜月昴迅速抬头。所有人都从座位上探出了身子。"
  - character: "阿尔"
    text: "来了！"
  - character: "旁白"
    text: "碧翠丝和爱蜜莉雅都带着明显的恐惧眼神注视着。一个铁锤正朝他直飞过来。菜月昴勉强躲开，铁锤把他刚才站的整个悬崖都砸碎了。它擦伤了他的脸颊让他流血。"
  - character: "奥托"
    emotion: "悲伤"
    text: "他到底在干什么？！"
  - character: "加菲尔"
    text: "大将有计划，闭嘴！"
  - character: "旁白"
    text: "加菲尔、弗雷德莉卡、库珥修、罗兹瓦尔和拉姆在铁锤出现的那一刻都屏住了呼吸。"
  - character: "威尔海姆"
    text: "呃……看来我们一直是对的……菜月昴大人正在被自己的盟友杀害……一直以来……"
  - character: "雷姆"
    emotion: "悲伤"
    text: "对不起。"
  - character: "旁白"
    text: "雷姆听到自己的晨星铁锤以杀意冲向毫无防备的菜月昴背后的声音时，她失去了呼吸的能力。菜月昴的身体突然被一根系在树上的绳子拦住。"
  - character: "视频内容"
    text: "菜月昴用刀割断了绳子：'紧急逃生！'一到地面，他就开始逃跑。他边跑边回头看：'我看到了！对，我看到了！我看到了铁链声是从哪里来的！但它现在正朝这边来吗？'"
  - character: "安娜塔西亚"
    text: "他很聪明。"
  - character: "旁白"
    text: "由里乌斯和莱茵哈鲁特点了点头，带着严峻的表情观看着，因为他们知道他的尝试终将徒劳。"
  - character: "视频内容"
    text: "菜月昴停下脚步，抬头看着挡在面前的巨大悬崖。这是一条死路。"
  - character: "佩特拉"
    text: "不好了！"
  - character: "旁白"
    text: "佩特拉尽可能紧地抱住弗雷德莉卡，睁大眼睛盯着画面。"
  - character: "菲莉丝"
    text: "蠢货！"
  - character: "视频内容"
    text: "菜月昴闭上眼睛，带着信念转身面对杀手。他脱下运动外套，用它作为盾牌挡在身前。铁链声充斥着他周围的密林。铁锤被抛向了他。菜月昴尖叫着：'你有那个胆量吗？！'用外套改变了铁锤的方向，击中了他身后的大山。"
  - character: "普莉希拉"
    text: "还不够，但是个好把戏。"
  - character: "视频内容"
    text: "菜月昴迅速抓住铁锤上的铁链，用力拉：'好吧，出来吧，该死的！我经历了各种地狱就是为了看到你的脸！'他试图拉动铁链，但它纹丝不动。菜月昴怒视着袭击者的黑暗身影。他感觉到手中的铁链松动了，微微颤抖着，因为在另一端握着它的人开始朝菜月昴走来。"
  - character: "莱茵哈鲁特"
    text: "他很勇敢。像他这样的普通男孩早就逃跑了。"
  - character: "由里乌斯"
    text: "他已经尝过不止一次死亡的滋味了。他不需要害怕。"
  - character: "视频内容"
    text: "慢慢地，黑暗离开了他们的身影。慢慢地……慢慢地……'那我没办法了，'他们说着，站在了菜月昴面前的光亮中。"
  - character: "佩特拉"
    text: "不……"
  - character: "库珥修"
    text: "为什么……"
  - character: "威尔海姆"
    text: "更重要的是，菜月昴大人为什么还没有逃离这个阵营。"
  - character: "旁白"
    text: "菜月昴看着杀死他的人，震惊充满了他的核心。困惑。难以置信。雷姆看着她英雄的脸，泪水涌了上来。他看起来那么受伤。那么被背叛。"
  - character: "视频内容"
    text: "雷姆用简短的语气说：'理想的状况是在没有人注意到的情况下结束这一切。'菜月昴颤抖着：'雷姆……'"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "雷姆……"
  - character: "碧翠丝"
    text: "我不是告诉过你们那个少年是安全的吗，我是这么认为的？"
  - character: "旁白"
    text: "碧翠丝的低语无人听见，因为她颤抖的身体甚至没有转头去看那两个紧张的鬼族。"
  - character: "视频内容"
    text: "菜月昴难以置信地看着手中的铁链。'你在开玩笑……'他的杀手……是罗兹瓦尔宅邸的蓝发鬼族。"
  - character: "视频内容"
    text: "标题画面：铁链之声。"
  - character: "视频内容"
    text: "雷姆居高临下地盯着他说：'如果你不反抗，我可以让你死得毫无痛苦。'"
  - character: "弗雷德莉卡"
    text: "这就是你对宅邸里任何可疑之人做的事吗？"
  - character: "视频内容"
    text: "菜月昴努力保持冷静：'你为什么要这样做？这太老套了，但你介意我问一下吗？'雷姆回答：'如果有人看起来可疑，就惩罚他们。这是女仆的规矩。'"
  - character: "里卡多"
    text: "……什么鬼？"
  - character: "菲鲁特"
    emotion: "愤怒"
    text: "那不公平！"
  - character: "佩特拉"
    emotion: "愤怒"
    text: "那杀人的理由也太蠢了！"
  - character: "弗雷德莉卡"
    text: "那不是我们被教导的！"
  - character: "视频内容"
    text: "菜月昴问：'拉姆知道吗？'雷姆迅速回答：'我打算在姐姐看到任何东西之前结束这一切。'"
  - character: "普莉希拉"
    text: "嗯，所以粉红色那个没有参与？"
  - character: "拉姆"
    text: "罗兹瓦尔大人命令我们，在巴鲁斯刚来宅邸的时候只是监视他。他明确告诉我们不要在处理他的事情上擅自行动。"
  - character: "安娜塔西亚"
    text: "那蓝发女仆为什么不听话？"
  - character: "由里乌斯"
    text: "看来她的计划是在没有人知道或注意的情况下迅速而安静地解决菜月昴。"
  - character: "库珥修"
    text: "包括她的雇主和她自己的同事以及剩余的居民。"
  - character: "阿尔"
    text: "但这仍然没有回答她为什么要这样做。"
  - character: "加菲尔"
    text: "不，拉姆就在这上面……她肯定在这上面看着这场戏呢。"
  - character: "旁白"
    text: "加菲尔的目光在画面上锁定了那个粉发女仆。"
  - character: "加菲尔"
    text: "对吧，拉姆？不管在哪里，你应该能看出你妹妹有多想杀人。你大概正在用你的千里眼看着……你就那样远远地看着大将遭遇这些……"
  - character: "旁白"
    text: "拉姆只是对加菲尔的指控保持沉默，低头看着自己的鞋。拉姆脸上挂着一道掩饰着悔恨的怒火。"
  - character: "拉姆"
    text: "这个我不熟悉，加菲尔。这个我是不同的一个人。"
  - character: "加菲尔"
    text: "……但那仍然是你。"
  - character: "旁白"
    text: "拉姆的表情变成了痛苦和沮丧。"
  - character: "雷姆"
    text: "不要怪我姐姐——"
  - character: "罗兹瓦尔"
    text: "够了。"
  - character: "视频内容"
    text: "菜月昴绝望地问：'换句话说，这是你自己的决定，不是罗兹瓦尔的命令？'雷姆回答：'我会排除任何挡在罗兹瓦尔大人愿望面前的障碍。'少年松开了铁链，发出一声阴暗笑声：'所以他连自己的走狗都训不好？如果路人被咬了那可就——哇啊！'雷姆将铁链甩向菜月昴的脸侧：'我不允许任何人对罗兹瓦尔大人不敬。'"
  - character: "雷姆"
    emotion: "悲伤"
    text: "雷姆……"
  - character: "罗兹瓦尔"
    text: "雷姆……"
  - character: "普莉希拉"
    text: "这很有意思……"
  - character: "阿尔"
    text: "不高兴你没猜对小丑是杀手吗，公主？"
  - character: "视频内容"
    text: "菜月昴咬紧牙关稳住双脚，眼中的光芒完全消失了。'你就这么不信任我吗？'他问这话时看起来如此破碎。"
