  - character: "旁白"
    text: "爱蜜莉雅紧紧抱住菜月昴，她的眼中终于显示出一种她因为害怕痛苦而一直在忽视的情感。她心中难以想象的内疚开始用巨大的痛苦惩罚她所让这个少年经历的一切。"
  - character: "视频内容"
    text: "雷姆再次举起手，用铁锤再次刺向他，让他的血液四处飞溅，甚至溅到了她的脸上。"
