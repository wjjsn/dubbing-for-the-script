    text: "碧翠丝向他伸出了手：'至少，你需要死在我看不到的地方，否则我会做噩梦的，我是这么认为的。所以我会帮你逃离这个领地。'菜月昴慢慢触碰了碧翠丝的手……然后他想起了那个梦……那种被某人握住双手带来的安全感……'话说回来……那时候……有人握着我的两只手……'"
  - character: "视频内容"
    text: "片尾曲伴随着画面播放：MYTH & ROID《Straight Bet》。"
  - character: "旁白"
    text: "两个女仆站在他两侧、握着他的手的画面。"
  - character: "视频内容"
