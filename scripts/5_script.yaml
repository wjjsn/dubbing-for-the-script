  - character: "旁白"
    text: "普莉希拉动了，用鞋跟踢了男人戴着金属的头。阿尔抢先说了一句话。"
  - character: "阿尔"
    text: "在这个世界上没有人想要变得强大，我们只是因为想要生存才变得强大的，至少我和那边的帕尔是这样。你可以生来强大，你总是可以拥有天赋……但像帕尔那样的人，呃……我们没有那么幸运，公主。只是呃……给他们一个稍微观察的机会，好吗？"
  - character: "普莉希拉"
    text: "……嗯。"
  - character: "旁白"
    text: "普莉希拉的哼声是他得到的唯一回应。阿尔叹了口气，再次弯下腰捡他们座位下面剩下的木头。但他只听到了一个咔嗒声。所有的小碎片和木屑现在都从地板上回到了原来的位置，变成了他曾经弄坏的扶手。"
  - character: "视频内容"
    text: "在花了一点时间度过他的痛苦之后，菜月昴似乎已经平复了呼吸，把他流血的手藏了起来。他看起来筋疲力尽。他的眼睛似乎在拼命地想要闭上。一个僵硬的声音在房间里响起：'你的表情真是太懦弱了，我是这么认为的。'菜月昴慢慢转过头，注意到碧翠丝站在门口。"
  - character: "碧翠丝"
    text: "贝蒂不会伤害她的菜月昴……事实上。"
  - character: "视频内容"
    text: "碧翠丝走进房间：'你来这里干什么？'菜月昴问。碧翠丝说：'小鬼和哥哥叫我来看看你。因为你行为异常，他们怀疑我第一次叫醒你的时候对你做了什么，我是这么认为的。真是无礼！'菜月昴说：'我懂了。我现在没事了。你是来道歉的。这就够了。'碧翠丝说：'我为什么要向你道歉，我是这么认为的？！'"
  - character: "视频内容"
    text: "碧翠丝的鼻子闻到了某种气味后停了下来：'你不仅看起来阴沉，气味也更重了。魔女的气味，我觉得它在压扁我的鼻子，我是这么认为的。'菜月昴问：'魔女……你是说嫉妒魔女？'碧翠丝耸了耸肩：'谁知道呢？不管怎样，作为受到她特别对待的人，你是个负担。'"
  - character: "佩特拉"
    text: "看到了吧？！碧翠丝大人在他身上闻到了，但她没有试图杀他！"
  - character: "弗雷德莉卡"
    text: "别插手这件事，佩特拉。"
  - character: "视频内容"
    text: "碧翠丝说：'如果你没什么要说的，我就走了。我会告诉哥哥你跟我说的话，我是这么认为的。'菜月昴说：'等一下！你对我做的事感到抱歉，对吧？'碧翠丝说：'我不。'菜月昴说：'我要告诉帕克！'碧翠丝咆哮着：'好吧，我可能有那么一点点抱歉，我是这么认为的。'菜月昴恳求道：'如果你后悔你做的事并想要我的原谅，帮我一个忙。在第五天的早晨，后天……你能保护我到那个时候吗？'"
  - character: "弗雷德莉卡"
    text: "所以他去找碧翠丝大人寻求帮助，因为他得不到爱蜜莉雅的帮助？"
  - character: "佩特拉"
