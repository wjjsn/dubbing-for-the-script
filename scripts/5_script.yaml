    text: "他真的想当英雄。"
  - character: "普莉希拉"
    text: "这个人……是个傻瓜？"
  - character: "视频内容"
    text: "碧翠丝看向他身后：'你太慢了。'菜月昴回头看……他面对的是一个愤怒的拉姆。拉姆带着危险的风慢慢向他走来：'我终于找到你了。我不会让你逃走的。'碧翠丝警告道：'退后，我是这么认为的。只要我的契约存在，我就不会手下留情。'拉姆说：'而你，碧翠丝大人，似乎忘了我们现在不在宅邸里。'"
  - character: "视频内容"
    text: "菜月昴走近碧翠丝，抓住了她头上两根螺旋卷发。'弹弹！'碧翠丝尖叫着。'你、你、你在干什么？！你、你想死吗？！'菜月昴用'废话'的表情低头看着她。即使在严峻的处境和绝望的气氛中，菜月昴还是设法让所有人咯咯笑了起来。"
  - character: "视频内容"
    text: "菜月昴对女孩微笑着：'别犯傻。我一点都不想死。我只希望在漫长的人生尽头死一次就够了。这才是我真正的感受。'拉姆看着菜月昴站到了她面前：'你有胆量。所以你终于接受你的命运了？'菜月昴说：'我不会这么说。如果非要说的话，我下定了决心。'他在拉姆面前鞠了一躬：'对不起。我作为一个废人给你们添了很多痛苦。'"
  - character: "拉姆"
    text: "巴鲁斯……"
  - character: "视频内容"
    text: "拉姆低下了头：'救救我妹妹。求你了。'菜月昴说：'不，抱歉，但我真的什么都不知道。坦白说，有太多我不知道的事。但是……我决定去更多地了解那些我不知道的事。'拉姆愤怒地喊道：'你现在怎么能这么说？雷姆已经死了！'"
  - character: "视频内容"
    text: "菜月昴说：'我不会说任何关于我能做什么的漂亮话。毕竟这就是我什么都做不了时发生的事。我比任何人都清楚我的话一点说服力都没有。但我记得。我知道你们两个已经忘记的关于你们的一部分！'拉姆问：'你知道我和雷姆的什么？！'菜月昴说：'你说得对。我什么真正重要的事都不知道。但你也不知道，不是吗？！'拉姆问：'知道什么？'菜月昴深吸一口气，用尽全力喊了出来：'我爱你们！'"
  - character: "爱蜜莉雅"
    text: "……你这个笨蛋。你这个十足的白痴。"
  - character: "碧翠丝"
    text: "你不能因为这么小的理由就原谅那样的事情，我是这么认为的！"
  - character: "旁白"
    text: "两个有罪的双胞胎似乎陷入了木僵状态，两个女孩都无法相信她们所听到的。雷姆和拉姆都感到她们的心在崩塌，或者在恐惧和内疚的紧握中获得了片刻的自由。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "真的对不起……菜月昴。我好自私……我好恶心……"
  - character: "视频内容"
    text: "菜月昴转身朝悬崖跑去。他在房间里迎接他们的记忆。雷姆给他包扎切伤的手指的记忆。他和拉姆一起学习的记忆。爱蜜莉雅和他一起做热身运动的记忆。他帮碧翠丝整理书本的记忆。菜月昴的脑海中播放着这些，坚定了他的信念。他光着脚更快地跑向悬崖，跳了下去：'这是只有我才能做的事！'"
  - character: "视频内容"
    text: "当他在半空中坠落时，被死亡拆散的双胞胎的记忆播放了。紧随其后的是拉姆喊叫的记忆：'我要杀了你！'带着那最后的记忆……菜月昴以高速朝尖刺和岩石坠落下去：'我要救你们！'"
  - character: "旁白"
