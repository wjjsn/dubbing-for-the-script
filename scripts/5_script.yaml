  - character: "安娜塔西亚"
    text: "我猜他没跟任何人说过这件事吧？"
  - character: "旁白"
    text: "爱蜜莉雅在菜月昴的肩膀上打破了堤坝，泪水涌出，对着少年啜泣。"
