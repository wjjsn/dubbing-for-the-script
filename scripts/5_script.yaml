  - character: "视频内容"
    text: "雷姆把刀扔到身后，低头看着少年：'我问你……你是不是支持爱蜜莉雅大人王位竞争对手的派系成员？'菜月昴痛苦地呻吟着：'我的心永远属于爱蜜莉雅碳——'"
  - character: "爱蜜莉雅"
    text: "骗子……"
  - character: "视频内容"
    text: "雷姆迅速将铁锤甩向他，让他的神经承受难以忍受的疼痛，使他尽可能大声地尖叫。"
  - character: "碧翠丝"
