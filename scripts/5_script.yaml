  - character: "旁白"
    text: "罗兹瓦尔对这个决定群起攻击摇了摇头……但他知道这个场景的重要性不在于观众，而在于观众中的两个人。半精灵本人似乎正用手捂着嘴，试图掩盖她柔和的喘息。蓝发女孩似乎带着极大的内疚、悲伤和嫉妒看着这个场景。"
