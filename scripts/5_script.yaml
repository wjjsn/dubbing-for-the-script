  - character: "视频内容"
    text: "碧翠丝检查着他手上许多血淋淋的刺伤：'天哪……你有自残的习惯让你无可救药地奇怪，事实上。恶心。'菜月昴畏缩了：'我……只是没能做成纹身，仅此而已。'碧翠丝冷冷地戳穿了他的谎言：'你既没有审美感，也没有技巧，更没有说谎的能力，我是这么认为的。你无可救药了，事实上。'"
  - character: "碧翠丝"
    text: "即使她注意到了也无法让自己去治愈他，事实上。恶心的娃娃，事实上。"
  - character: "爱蜜莉雅"
    text: "别太苛刻……你那时候不同……你不像我们中的一些人那样和他亲近……"
  - character: "旁白"
    text: "碧翠丝因为爱蜜莉雅安慰的话而感到更加羞愧。慢慢地，她将他们的手指交织在一起，闭上了眼睛。"
  - character: "视频内容"
    text: "碧翠丝说：'我将实现你的愿望。我，碧翠丝，以我的荣誉，从此受此契约约束。无论临时与否，契约就是契约。我会实现你那个无理的请求。'她的脸在阳光下闪耀，菜月昴忍不住第一次感到了希望。"
  - character: "安娜塔西亚"
    text: "这是最理想的解决方案。"
  - character: "弗雷德莉卡"
    text: "是的，让一个大精灵保护你免受和你住在同一座宅邸里的杀手的伤害，是个好计划。"
  - character: "视频内容"
    text: "碧翠丝咆哮道：'别叫我小女孩！如果你告诉哥哥，你会后悔的，我是这么认为的！哼！'菜月昴含泪微笑着：'那对你那么重要吗？你的那种绝望简直是魔性的。'碧翠丝只是可爱地撅着嘴。"
  - character: "视频内容"
    text: "场景切换显示碧翠丝已经离开了房间，现在爱蜜莉雅坐在菜月昴的床边：'我明白了，碧翠丝来好好道歉了。很高兴听到这个。'菜月昴内疚地低下了头：'爱蜜莉雅……我对你说了一些可怕的话。对不起。'爱蜜莉雅微笑着：'我相信那是一时冲动，不是吗？每个人都会经历那样的时期。如果你也能对雷姆和拉姆这样说，我会很高兴的。'"
  - character: "旁白"
    text: "听到这个，菜月昴似乎沉默了。他过去轮回中的所有记忆都在脑海中播放。"
  - character: "库珥修"
    text: "内部总管够了。我亲自确认了她们的感情。"
  - character: "视频内容"
    text: "爱蜜莉雅在房间里四处张望：'果然……饭菜没有吃吧？'菜月昴不满地低声说：'……对不起。'爱蜜莉雅说：'即使你只吃一点点，对你的身体也是好的。'菜月昴苦笑：'我的胃接受不了食物。如果你用'啊——'来喂我，我也许能吃下去。'爱蜜莉雅脸上带着灿烂的微笑：'那就这样吧！'"
  - character: "视频内容"
    text: "爱蜜莉雅迅速站起来拿起他的托盘，放在膝上，在他床边坐好。她举着装满食物的勺子对着他的嘴：'啊——'菜月昴迅速震惊地后仰：'不不不……！等一下！？你在干什么？！'爱蜜莉雅面无表情地看着：'你在说什么，你不是刚刚说我这样做你就能吃下去吗？所以吃吧，我在说啊——'"
  - character: "视频内容"
    text: "菜月昴让步了，张开嘴接受了勺子。爱蜜莉雅说：'好了！现在吞下去！我们一次一勺地继续！好！再来！再来！'菜月昴趴在前臂上对着袖子咳嗽：'够了！你开始是啊——但现在你完全不停顿什么的！停、停一下！我要求休息！'"
  - character: "视频内容"
