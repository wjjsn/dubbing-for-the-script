    text: "确实。"
  - character: "奥托"
    text: "他当然不会。他不想伤害他的朋友。即使他们试图杀他。"
  - character: "视频内容"
    text: "菜月昴在跑……带着孩子般恐惧的表情，用他那双丑陋的眼睛跑着。沉重地呼吸着，吸气呼气。他的双腿在橙色天空下的森林中不停地奔跑。"
  - character: "佩特拉"
    text: "他看起来好害怕。"
  - character: "菲鲁特"
    text: "他当然害怕！他要被一个他以为是朋友的人独自杀死了。"
  - character: "视频内容"
    text: "有什么东西在他身后闪过，一阵风朝他飞来，他还没反应过来……菜月昴就倒下了，开始在森林地面上翻滚。他不知道发生了什么，尖叫着摔停下来。"
  - character: "蜜蜜"
    text: "那是风魔法。"
  - character: "雷姆"
    text: "风、风……？"
  - character: "加菲尔"
    text: "告诉过你了……"
