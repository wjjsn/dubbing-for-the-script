  - character: "视频内容"
    text: "菜月昴回想起了拉姆抱着死去的妹妹时那令人难忘的尖叫。雷姆在第二个轮回中微笑的脸浮现在他的脑海中。他坏笑了：'没错。我保住了这条命，所以……我来决定……如何使用我的生命！'"
  - character: "菲莉丝"
    text: "这家伙……"
  - character: "安娜塔西亚"
