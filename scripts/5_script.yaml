    text: "我可以确认他是盟友。没有他宝贵的信息和战术，我们不可能对抗怠惰。"
  - character: "莱茵哈鲁特"
    text: "他救了我的主人，所以当然，我视他为盟友。事实上，他是我喜欢称之为朋友的人。"
  - character: "旁白"
    text: "普莉希拉哼了一声，保持沉默。她的沉默是她对少年唯一正面的表态，所以库珥修对此得意地笑了。"
  - character: "罗兹瓦尔"
