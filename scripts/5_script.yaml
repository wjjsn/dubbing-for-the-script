    text: "拉姆在风魔法方面更擅长……你也在支援雷姆……那是你，对吧？"
  - character: "拉姆"
    text: "……是的，爱蜜莉雅大人。"
  - character: "旁白"
    text: "爱蜜莉雅的表情扭曲成了含泪的怒视，她在这一刻完全失去了对两个女仆的信任。佩特拉立刻用双手捂住了她的喘息声，啜泣着。罗兹瓦尔沉默地看着这一切，没有为他的女仆们出面干预。"
  - character: "视频内容"
    text: "菜月昴睁开眼睛，看到了面前的东西，震惊到不敢相信。然后疼痛通过肾上腺素击中了他。他慢慢回头看向自己的身体，发现他的腿确实被切断了。'为、为什么？'"
  - character: "加菲尔"
    emotion: "愤怒"
