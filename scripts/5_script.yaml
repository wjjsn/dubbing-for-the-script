    text: "你说得对。"
  - character: "视频内容"
    text: "爱蜜莉雅坐在菜月昴的床边：'菜月昴，拉姆和雷姆真的很担心。她们异常沮丧，想知道她们是否有什么不礼貌的地方……'菜月昴用毫无感情的声音说：'我和她们之间什么都没发生。'"
  - character: "奥托"
    text: "他为什么一直坚持要独自处理？"
  - character: "菲莉丝"
    text: "他真的以为自己是什么英雄吗？"
  - character: "视频内容"
    text: "爱蜜莉雅关切地说：'菜月昴，你还好吗？如果有什么不对的，欢迎你和我谈谈。'菜月昴慢慢低下了头，紧握着被子。他的眼睛颤抖着。爱蜜莉雅催促道：'来吧，告诉我。'菜月昴的眼中闪烁着希望：'对了……一直以来，我一直在独自挣扎着想要改变一切，但是……爱蜜莉雅。有件事我想让你知道。'"
  - character: "加菲尔"
    text: "快点！告诉她啊大将！"
  - character: "视频内容"
    text: "菜月昴坚定了神经：'爱蜜莉雅……直到现在的多次，我已经死过——'"
  - character: "旁白"
    text: "世界停止了。从窗户吹进房间的风消失了。爱蜜莉雅的头发悬浮在空中。纹丝不动。菜月昴周围沉默的世界被一团黑色雾气所笼罩。雾气吞没了爱蜜莉雅和整个房间。菜月昴的眼睛因恐惧和困惑而颤抖。他无法移动、说话或环顾四周。只能看着黑暗在他面前以一只爪状的黑暗之手的形态显现。"
  - character: "视频内容"
    text: "纤细的手慢慢移动，爬上了他僵硬的身体。那只手终于到达了他的心脏并将其捏碎。少年痛苦地呻吟着，僵硬而无法在这个黑暗之手的世界中移动。"
  - character: "爱蜜莉雅"
    text: "菜月昴！"
  - character: "视频内容"
    text: "他的眼睛睁开了，他能感受到心脏摆脱了那只手的束缚。'啊，呃！啊啊啊！呃……'菜月昴呻吟着喘息着，紧握着胸口感受疼痛。爱蜜莉雅带着极度惊慌看着他：'菜月昴！突然怎么了？'菜月昴紧握着胸口，带着恍惚的表情握着胸口。'怎、怎么了？菜月昴，如果有什么事——'菜月昴打断了她：'我有一个请求。不要和我有任何瓜葛。'爱蜜莉雅对此目瞪口呆，有些受伤。菜月昴侧身躺下，背对着爱蜜莉雅。"
  - character: "奥托"
    text: "这、这也太残忍了！"
  - character: "加菲尔"
    text: "那是谁？！他们怎么让世界停止了？"
  - character: "由里乌斯"
    text: "那可能是魔女教的人……"
