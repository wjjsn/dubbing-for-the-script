title: 测试剧本第一章
author: 测试者
script:
  - character: 爱蜜莉雅
    emotion: 高兴
    text: 今天真是个好日子呢。、
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "惊慌失措，声音颤抖"
    text: "是——是的，菜月昴！我在！我在这里！请你……请继续慢慢呼吸。"
  - character: 雷姆
    emotion: 兴奋
    prompt: 语气轻快
    text: 是啊，爱蜜莉雅大人！
  - character: 碧翠丝
    text: 哼，真是一群吵闹的家伙，事实上。
  - character: "拉姆"
    text: "你说什么，姐姐？"
  - character: "雷姆"
    emotion: "悲伤"
    text: "菜月昴没有告诉任何人有关魔兽的事，是因为他没有任何人可以依靠。碧翠丝大人表现得好像他的存在令她厌烦。据我们所知，她是唯一一个愿意在某种程度上帮他的。"
  - character: "罗兹瓦尔"
    text: "嗯……这加载得是不是有点太久了？"
  - character: "奥托"
    text: "你也太幼稚了，加菲尔。"
