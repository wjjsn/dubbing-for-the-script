  - character: "里卡多"
    text: "为什么它给我们的是和我们不同的奇怪事件？我头都疼了。"
  - character: "视频内容"
    text: "小女孩的妈妈：你好啊。这是她丈夫的店。小女孩抱住了她的父亲。摊主：那是我的小女儿。等等，你认识这些穷光蛋？"
  - character: "视频内容"
