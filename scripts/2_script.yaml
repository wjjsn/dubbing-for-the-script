  - character: "库珥修"
    text: "我倒想看看你怎么对付一个苦恼的孩子。"
  # === 第2001-2500行 ===
  - character: "视频内容"
    text: "菜月昴的手出现在两个女孩面前，向她们展示他的十元凹边硬币。他紧紧握在手里，摊开手掌时里面空空如也。女孩惊讶地微笑，他温柔地把硬币展示给孩子：而这……就是硬币藏的地方。这个给你。它很稀有，要好好保管。"
