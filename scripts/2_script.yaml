  - character: "视频内容"
    text: "场景切换到菜月昴和爱蜜莉雅走在非常破旧和粗糙的街区。菜月昴：这里的气氛、空气和居民的态度都很糟糕。你确定她在这里吗？"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：下级精灵说他们看到一个长得像菲鲁特的人往这个方向来了……"
  - character: "视频内容"
    text: "菜月昴看着一个路过的男人：嘿兄弟！一个叫菲鲁特的女孩是住在这一带吗？男人：那边除了老人罗姆的赃物屋什么都没有。"
