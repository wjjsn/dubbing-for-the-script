  - character: "视频内容"
    text: "菜月昴：你什么？没时间了？帕克：我外表可爱，但我是一个精灵。光是维持物理外表就需要大量的魔力。所以晚上我会回到召唤我的水晶里。平均来说，我的理想停留时间大约是早上九点到下午五点。菜月昴：朝九晚五？你听起来像个公务员。"
  - character: "视频内容"
    text: "帕克：别做什么鲁莽的事，如果到了万不得已，用奥德再次召唤我。好了！剩下的就交给你了，菜月昴。他进入了水晶。"
  - character: "视频内容"
    text: "菜月昴拿着他的外套，脸红着：嘿，我从小学之后就没有和女孩独处过了！爱蜜莉雅（屏幕内）本能地警告：别有什么奇怪的想法。我会魔法。"
  - character: "普莉希拉"
    text: "多么有趣的态度变化呢……"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：我去问问下级精灵。菜月昴：下级精灵？爱蜜莉雅（屏幕内）：下级精灵是还没有成为精灵的存在。它们随着时间成长，当它们获得力量和自我意识时，它们就会成为像帕克那样的大精灵。"
  - character: "旁白"
    text: "菜月昴惊叹地看着微小的闪光灯围绕着爱蜜莉雅。他完全被她迷住了。"
  - character: "库珥修"
    text: "你说菜月昴大人救过你一次……是从你和爱蜜莉雅大人似乎忧虑的那个危险中？"
  - character: "菲鲁特"
    text: "大哥的介入救了我，他一个人出现的，没有大姐在身边，而且是在那天很早的时候……"
