  - character: "普莉希拉"
    text: "本宫已经被那个男孩恶心够了；不需要再纠缠于崇拜懦弱的猪猡。"
  - character: "视频内容"
    text: "菜月昴设法坐了起来，用感激的眼神抬头看着穿袍子的女孩：谢谢你救了我——"
  - character: "碧翠丝"
