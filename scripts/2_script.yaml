    text: "帕克：我没有感觉到任何恶意。我觉得你可以接受他的提议。毕竟，在你和混混之间的挡箭牌越多越好。菜月昴愤怒地：这就是你想让我在身边的原因？！"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：我没办法做任何事来感谢你。菜月昴：没问题，交给我吧。"
