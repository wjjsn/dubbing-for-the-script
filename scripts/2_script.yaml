    text: "哼！确实。"
  - character: "视频内容"
    text: "菜月昴：那么，是时候继续去打听了！场景切换到爱蜜莉雅指着一个哭泣的女孩：嘿菜月昴，她看起来是不是迷路了？菜月昴：嗯！"
  - character: "碧翠丝"
    text: "怎么了，我猜？"
  - character: "爱蜜莉雅"
    text: "那个女孩，我以前见过她，几乎以完全相同的方式……只是没有菜月昴。"
  - character: "由里乌斯"
    text: "到目前为止，事情按照我们的菲鲁特大人和爱蜜莉雅大人的经历发展，只是有某些不同。菜月昴的存在是唯一不变的。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：但是……她在哭！她不是吗，菜月昴？"
  - character: "蜜蜜"
    text: "哈！他看起来就像一只害相思病的小狗~！"
  - character: "雷姆"
    text: "爱蜜莉雅大人的善良之心从未停止让我惊叹，我的菜月昴君。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：谢谢你所有的帮助，菜月昴。在我帮了那个小女孩之后，剩下的我自己来处理。"
  - character: "安娜塔西亚"
    text: "赌注二号，他不会离开她身边。"
  - character: "旁白"
    text: "安娜塔西亚愉快地举着手宣布，笑着看房间里几乎每一个人都带着面无表情或深情的表情举起了手。连爱蜜莉雅自己也轻声笑着，手臂举着。"
  - character: "视频内容"
    text: "女孩注意到爱蜜莉雅面带温柔的微笑站在她面前。她注意到了爱蜜莉雅的特征，恐惧地退缩了。"
  - character: "雷姆"
    text: "哦……爱蜜莉雅大人。"
  - character: "普莉希拉"
    text: "本宫觉得这个孩子比那些笨手笨脚的傻瓜聪明。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）蹲下来对着孩子露出温柔的微笑：很抱歉我不是你要找的人。怎么了，你爸爸妈妈不在你身边吗？小女孩似乎被爱蜜莉雅吓到了，开始掉眼泪。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）开始慌张：呃……嗯……请别哭了好吗！我不会对你做什么的，好吗？"
  - character: "普莉希拉"
