    text: "快醒过来吧……"
  - character: "视频内容"
    text: "小女孩突然放开了他们的手，跑进了妈妈的怀抱。菜月昴：看来她找到家人了。爱蜜莉雅（屏幕内）对他微笑：我很高兴。"
  - character: "视频内容"
    text: "场景切换到他们坐在喷泉边。菜月昴：我觉得我们绕了很大一圈，但你坚持说你从中得到了什么好处？"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：很简单。现在我们可以安心地继续搜索了，对吧？话说回来，你为什么帮我？你之前是反对的。菜月昴：我可以说我只是想炫耀我的魔术，但那是骗你的。我告诉过你，找到你的徽章就是我今天的一件好事！"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：那你帮了小女孩，你的一件好事不就结束了？菜月昴：这个反驳太有逻辑了！拜托，一天做不止一件好事有什么不好的？"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：菜月昴，你就是那种基本上浪费自己一生的人，对吧？菜月昴瘫了下去：你是我最不想听到说这话的人。"
