  - character: "旁白"
    text: "罗兹瓦尔的笑容扩大了，他死寂的眼睛闪烁着启动的兴奋光芒，看着那可能是引领他走向命运的力量。"
  - character: "视频内容"
    text: "场景切换到夜晚，两人独自走在空旷的街道上。爱蜜莉雅（屏幕内）：这个地方越来越荒凉了。她真的住在这种地方吗？"
