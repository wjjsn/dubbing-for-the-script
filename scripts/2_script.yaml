    text: "我觉得这个爱蜜莉雅只是对菜月昴大人对她的好意起了疑心。这就是这个爱蜜莉雅大人使用魔女名字的原因。"
  - character: "菲莉丝"
    text: "为了吓跑他？"
  - character: "库珥修"
    text: "一个突然出现带着善意和纯粹意图的男孩对爱蜜莉雅大人这样身份的人来说应该非常可疑。更不用说爱蜜莉雅大人的外貌可能会给她带来很多麻烦，所以她可能是想让菜月昴大人远离，不要牵连他。"
  - character: "旁白"
    text: "听到公爵夫人的理论，爱蜜莉雅微微一缩，低着头。"
  - character: "安娜塔西亚"
    text: "这似乎有道理。"
  - character: "菲鲁特"
    text: "可惜大哥来自另一个世界，他对魔女一无所知。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：不过你不是坏孩子。菜月昴：你为什么又把我当成比你小的？爱蜜莉雅（屏幕内）突然低下头：我觉得在那上面做猜测对你没帮助。我是个半精灵。"
  - character: "旁白"
    text: "没有多少人对此做出明显的外在反应，大多数理解女孩因为外貌而遭受悲惨对待的人只是微微不满地皱了皱眉。"
  - character: "视频内容"
    text: "菜月昴第一次注意到了她的耳朵，惊讶地抬头看她：现在我明白了……爱蜜莉雅握紧了指关节，等待着某种反应的再次到来。"
  - character: "佩特拉"
    text: "她真的很紧张……"
  - character: "爱蜜莉雅"
    text: "这是她第一次和一个喜欢她超过几个小时的人在一起。"
  - character: "视频内容"
    text: "菜月昴：……难怪我觉得你这么可爱！精灵总是很美丽的吧？"
  - character: "里卡多"
    text: "哈哈！"
  - character: "阿尔"
    text: "哈哈！"
  - character: "弗雷德莉卡"
    text: "厉害，菜月昴大人。"
  - character: "威尔海姆"
    text: "好小子。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）张着嘴盯着他：什么？菜月昴：嗯我听到了。爱蜜莉雅从边沿上站起来，双手抱住头，蹲下来不让他看到她的脸红：笨蛋！帕克从她的头发里飞出来轻轻打了菜月昴的脸。"
  - character: "爱蜜莉雅"
    text: "爱蜜莉雅的眼睛微微黯淡，听到那句话被说给了一个不同版本的自己后，心中一阵痛苦的揪紧。"
  - character: "视频内容"
    text: "菜月昴：哼！随便了！我们必须回去继续找了。等一下！没有计划地到处跑从来没有好结果。你要把犯罪现场重温一百遍。你的徽章是在哪里被偷的？"
  - character: "由里乌斯"
    text: "他的世界有精灵的概念吗？我以为菜月昴的家乡只有人类居住。"
  - character: "碧翠丝"
    text: "菜月昴的世界一直依靠想象力和努力……而不是依赖精灵和奥德·拉格纳这样强大实体的恩赐。他们没有那些东西，所以他们必须有创造力。一些人类对自己的世界感到厌倦了，所以他们开始在书中写作和虚构自己的世界，我猜。"
  - character: "由里乌斯"
    text: "你是说精灵只是来自兄弟世界的虚构奇幻故事里的一种虚构种族？"
  - character: "碧翠丝"
    text: "你猜对了，我猜。你似乎有个好脑袋，实际上。"
  - character: "视频内容"
    text: "菜月昴：你看，犯罪似乎就发生在这附近，所以我英勇地告诉她交给我之后，就回到了这个水果摊。摊主：什么？我以为我有客人了，但只是那个穷小子？菜月昴：你没注意到我已经不是以前的我了吗？看看我把谁带来了，她可能会成为常客！"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：嗯，菜月昴，你对我好像有一些奇怪的期望，但我也没有钱。碧翠丝：你们俩真是天生一对，实际上。"
  - character: "视频内容"
    text: "摊主：好了，既然我有两个穷顾客，你想对我说什么？菜月昴：我们在找一个人，希望可以问你一些问题……摊主：那是讽刺地告诉你我没时间理没钱的废物！滚开！"
