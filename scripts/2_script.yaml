  - character: "旁白"
    text: "爱蜜莉雅低声说道，无法理解自己为什么会不记得这样一件真实的事情。半精灵只是默默地凝视着屏幕，害怕她可能看到的东西。"
  - character: "视频内容"
    text: "混混头目：跟我们作对你就去死！你以为有了魔法就能赢？！三对一还是对我们有利！爱蜜莉雅（屏幕内）得意地笑着：你说得对。三对一确实不太公平。她摊开手掌露出一只可爱的小猫。"
  - character: "旁白"
    text: "爱蜜莉雅的眼睛缩了回去，胸口因为激动的情绪而起伏，看到她最年长的同伴和养父精灵的身影让她流下了喜悦的泪水。碧翠丝在座位上兴奋地小声喊了一声'帕克！'"
