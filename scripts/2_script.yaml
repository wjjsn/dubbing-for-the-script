  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：别动！菜月昴看起来被吓了一跳，因为爱蜜莉雅正专注地盯着他，这让菜月昴的双颊泛起了红晕。爱蜜莉雅得意地：看到了吧？你移开目光是因为你心里有鬼！"
  - character: "阿尔"
