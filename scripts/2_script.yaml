title: "Re:Zero 第二章：导演剪辑版"
author: "Reactionist"
script:
  # === 第一集 开始 ===
  - character: "旁白"
    text: "第二章：导演剪辑版 第一集。屏幕闪烁的光芒照亮了整个放映厅，飞速掠过的画面带着不祥而令人不安的意象。在场的众人纷纷对自己所处的困境产生了疑问。"
  - character: "里卡多"
    text: "唉，这孩子好像总是麻烦不断啊？"
  - character: "旁白"
    text: "一个外形精悍的犬人咧嘴笑道，试图缓和气氛。不过，有几个人并没有觉得这玩笑有多好笑。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "别说得好像这是大将的错一样，听到了吗？！"
  - character: "里卡多"
    text: "哇！冷静点小兄弟！我可没有要侮辱你朋友的意思！"
  - character: "旁白"
    text: "里卡多紧张地举起双手，耐着性子道歉。他看得出那金发少年眼中的怒火，以及那张焦躁不安的脸上清晰可见的担忧和困惑。围在沉睡的黑发青年身边的几乎所有人都为那些事件而心神不宁。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "这到底是怎么回事，人家觉得？！贝蒂居然不在这样的事件中，这根本不合理，实际上！"
  - character: "旁白"
    text: "小小的金发钻头卷少女紧紧抱住少年的手臂，愤怒地喊出了她的困惑。恐慌和恐惧的表情深深烙印在她稚嫩的脸庞上。她的契约者不得不独自承受一切、而他所关心的人全部死在他身边的记忆是最糟糕的……但他刺向自己的那一幕……简直令人毛骨悚然。"
  - character: "旁白"
    text: "这个小小的精灵在她悲惨的漫长存在中从未感到如此恐惧。施加在她的菜月昴身上的血腥与恐怖足以让她落泪。碧翠丝发誓要成为他的守护者，保护他免受伤害。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "你不会再伤害贝蒂的菜月昴了，实际上。"
  - character: "旁白"
    text: "精灵危险地低语道，将那恶魔的形象深深烙印在脑海中。但没有人比那位蓝发女仆更加愤怒。雷姆只能努力平复呼吸，紧紧攥着自己的裙摆。她所爱之人刺向自己的记忆深深铭刻在脑海中……"
  - character: "雷姆"
    emotion: "悲伤"
    text: "昴君……"
  - character: "旁白"
    text: "女仆轻声呢喃，从身后凝视着他沉睡的身影。她所处的位置让她只能远远望着他，却不能触碰。小小的鬼族女仆只是摇了摇头，暂时将那段记忆抛开。她一秒钟也不会相信，她的英雄会遭遇到死亡那样可怕的命运。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "菜月昴……醒醒，菜月昴……"
  - character: "旁白"
    text: "一位美丽的银发尖耳女士正对着身旁无辜沉睡的青年说话，语调中满是心碎与难以置信。她的泪水显示出她对那未知事件的痛苦与不安。在那个幻象中……她的骑士独自面对一个怪物，周围是所有人的尸体。"
  - character: "旁白"
    text: "爱蜜莉雅终于鼓起勇气握住了菜月昴无力的手。当她的指尖触碰到他温暖、充满爱意和保护性的手掌时，她的紧张和恐惧几乎瞬间消散了。半精灵少女微笑了一瞬，完全忘记了忧虑和幻象。"
  - character: "旁白"
    text: "她那出色的骑士绝不会做出伤害自己的事。那不是真的。整个幻象不过是一段想象。爱蜜莉雅握住骑士的手，紫绀色的眼眸中透出温暖，为他的安全感到安心。"
  - character: "菲鲁特"
    text: "这也太蠢了吧！你倒是用两只拳头试试把墙打破啊！"
  - character: "加菲尔"
    text: "我已经试了好一会儿了丫头！别烦我！"
  - character: "旁白"
    text: "一个金发蓬乱的年轻男子焦躁地坐在座位上，双手抱头，脸上写满了愤怒和困惑。"
  - character: "由里乌斯"
    text: "菲鲁特大人，请。我想我们应该给他们多一点时间来处理……这场幻象向我们展示的悲剧。"
  - character: "旁白"
    text: "这位魅力十足的说话者只换来了一声恼怒的冷哼，他身旁的小女孩转身跺着脚走向后排的座位。"
  - character: "菲鲁特"
    text: "无聊透了！反正也不是真的！我们为什么要相信这扇蠢窗户给我们看的东西？"
  - character: "旁白"
    text: "红瞳金发的女孩跳到座位上，脸上清晰地写着不满。她那位英俊的红发同伴跟在她身后，在她旁边的座位坐下。"
  - character: "莱茵哈鲁特"
    text: "我一直在想所有可能长得像那个……生物的魔法使用者和神话怪物。但我想不出任何符合它描述的东西。"
  - character: "库珥修"
    text: "你觉得那场幻象是假的吗，菲鲁特大人？"
  - character: "菲鲁特"
    text: "没错，这世上没有任何东西能那么轻易地杀死莱茵哈鲁特。"
  - character: "莱茵哈鲁特"
    text: "您的话太过誉了，我的大人。但我恐怕您对我的信心太过——"
  - character: "菲鲁特"
    text: "行了行了，你很谦虚。闭嘴吧。"
  - character: "旁白"
    text: "一个戴头盔的独臂男子在最后排看到菲鲁特对她骑士谦虚态度的不耐烦，忍不住放声大笑。莱茵哈鲁特因为主人对他能力的过度信任而不安地咬着嘴唇，而那女孩已经转向公爵夫人，毫不在意地解释着她的理由。"
  - character: "菲鲁特"
    text: "这个家伙是世上最强的人。如果那个怪物杀了莱茵哈鲁特，那我们谁都不是它的对手。"
  - character: "旁白"
    text: "绿发公爵夫人托着下巴沉思时，另一个人决定反驳金发女孩的话。"
  - character: "奥托"
    text: "打扰一下。很抱歉打扰，菲鲁特大人、卡尔斯腾大人。但我看不出您的论点如何能反驳我们所见的现实。"
  - character: "菲鲁特"
    text: "你在说什么？！"
  - character: "奥托"
    text: "我、我的意思是，您忽略了这场幻象的其他部分……我们可以从中学习——"
  - character: "菲鲁特"
    text: "没什么可学的！都是假的我告诉你！"
  - character: "奥托"
    text: "但是……您的骑士并不是唯一可见的尸体……"
  - character: "旁白"
    text: "就在那一刻……气氛瞬间黯淡下来，奥托的话语沉甸甸地落在放映厅中。"
  - character: "威尔海姆"
    text: "这个房间里的每个人显然都被这个杀手屠杀了……除了菜月昴大人。"
  - character: "旁白"
    text: "蓝眸锐利的老人若有所思而严肃地沉吟道。气氛变得更加阴沉，每个人都回想起他们的尸体是如何被展示的——被剖开，被抛在草地上，犹如一场恐怖的装饰展演。"
  - character: "旁白"
    text: "莱茵哈鲁特并非唯一一个对自己的失败和无力阻止怪物而感到愤怒的人。在场的每一位骑士、战士和朋友都在愤怒中紧握拳头。"
  - character: "菲莉丝"
    text: "那个怪物不知怎么认识他。为什么菜月昴君会认识那么强大的存在呢？"
  - character: "阿尔"
    text: "你们好像忘了一些重要的事……我们所有人碰巧都在同一个地方，这怎么想都不太对吧？我是说，为什么我们所有人都会站在某个随便的草地上？对我来说这像是人为安排的。"
  - character: "旁白"
    text: "许多人对这个合理的解释点了点头。"
  - character: "罗兹瓦尔"
    text: "嗯，我确实同~意，我们所有人出去野餐然后突然遇到这头野兽的可能性是极~其渺茫的。"
  - character: "旁白"
    text: "画着小丑妆的男子表示赞同，他身旁那位得力的粉发女仆也干脆地点了点头。"
  - character: "安娜塔西亚"
    text: "我同意你的看法。所有这些大人物齐聚如此偏远之地，概率确实微乎其微。所以仅凭这一点就足以否定我们所见的是一场虚假幻象。"
  - character: "旁白"
    text: "这位紫发的善于谋略的女士掌控了谈话时，她露出了锐利的笑容。但她被一位毫不在意的金发女士打断了。"
  - character: "菲鲁特"
    text: "不是那样的，你这个白痴。"
  - character: "安娜塔西亚"
    text: "你说什么？"
  - character: "菲鲁特"
    text: "不只是我们全都死在地上的事实。"
  - character: "旁白"
    text: "她无视了她的骑士如何倒吸一口凉气。她绯红的眼眸缓缓移向房间最前方那位失去意识的少年。"
  - character: "菲鲁特"
    emotion: "悲伤"
    text: "我不敢相信大哥会那样自杀。"
  - character: "库珥修"
    text: "请允许我问一下。你之前就认识菜月昴了？你叫他大哥，看起来和他很亲近。"
  - character: "菲鲁特"
    text: "没错，我以前见过那个白痴。他救过我的命。"
  - character: "旁白"
    text: "雷姆和加菲尔带着兴趣和惊讶看向那女孩。房间里大多数听众都对这个消息感到惊讶。"
  - character: "库珥修"
    text: "哦，是吗？"
  - character: "菲鲁特"
    text: "是啊，几个月前这个蠢货把我从一个很危险的女人手里救了出来。他居然还敢在自己跳入险境为我争取逃跑时间之前，告诉我生活中总会有值得期待的事。"
  - character: "旁白"
    text: "大多数人都被这个故事迷住了，房间里其他人则对这位黑发朋友和同僚的故事报以温暖而自豪的微笑。"
  - character: "雷姆"
    emotion: "高兴"
    text: "我的英雄一直都是这样的人……"
  - character: "旁白"
    text: "奥托无奈地摇了摇头，但还是因为朋友既爱当英雄又是个蠢蛋的习惯而露出了一丝安心的微笑。加菲尔听着他的大将到底有多了不起，带着自豪的咧嘴看向那女孩。"
  - character: "旁白"
    text: "坐在少年身旁的小精灵只是哼了一声，摇了摇头。她的契约者那热爱救人的习惯让她嘴角浮现出一丝微笑。爱蜜莉雅只能对这个故事报以柔和的微笑，与少年初次相遇的记忆给她心中带来了一股温暖而柔软的感觉。"
  - character: "拉姆"
    text: "典型的巴鲁斯，哼！把那根本不存在的魅力施加在这么年轻的少女身上。"
  - character: "旁白"
    text: "拉姆嗤之以鼻，看起来像是嫌弃，但她的小笑容太过明显地暴露了她对此事的真实感受。"
  - character: "库珥修"
    text: "原来如此。谢谢你告诉我们这些。我确实同意菜月昴大人看起来不像是那种会在怪物面前放弃并献出自己生命的人。"
  - character: "安娜塔西亚"
    text: "是~啊，说到菜月昴——"
  - character: "普莉希拉"
    text: "哼！为什么所有人都在重复那个庶民的名字，好像它对这场讨论很重要似的？！我们看到的不过是他有多像一条懦弱的狗而已。"
  - character: "旁白"
    text: "一位火红头发、绯红眼眸的女士翘着腿，用红色折扇轻轻扇着脸，漫不经心地俯视着下方的人群。听到这位女士的话，许多人向她投以炽热的怒视。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "打扰一下，普莉希拉大人。但我不欣赏您谈论我的骑士的名字的方式。"
  - character: "旁白"
    text: "银发女孩迅速用严厉的语气和同样冰冷的表情表达了自己的愤怒。"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "你竟敢教我说话，半妖贱民？"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "我不允许你用懦夫这样的词来玷污我优秀的骑士的名声。菜月昴一直是一个把所有人的幸福置于自己之上的英雄。别让你的话把你带到你可能会后悔的地方。"
  - character: "旁白"
    text: "当爱蜜莉雅用坚定的声音说出明显的威胁时，从雷姆到加菲尔，从奥托到甚至菲鲁特和库珥修，她周围的许多人都点头表示赞同。"
  - character: "普莉希拉"
    text: "我唯一可能会后悔去的地方就是靠近你，或者让你亲吻我的鞋子而不是盯着它看，半魔贱民。你为什么不放弃这些毫无意义的政治争斗，带着你的骑士离我们这些高贵的人远一点呢？"
  - character: "旁白"
    text: "这位女士傲慢地笑着。爱蜜莉雅保持着冰冷的凝视，握紧了骑士的手。"
  - character: "库珥修"
    text: "我想你还没找到离开这里的办法吧，巴莉艾尔？既然我们都在这所监狱里，停止在盟友之间挑起无意义的争斗才是明智之举。"
  - character: "普莉希拉"
    text: "呵呵呵~！你觉得我和你们所有人都被困在这里了？！你真是太天真了我亲爱的垫脚石！世界让我在这里是有原因的，所以我会看下去。但如果我真的想离开这个地方，我只需要想想，世界就会如我所愿地转动。"
  - character: "旁白"
    text: "这位自大、傲慢、狂妄的女士对瞪着她的平民们得意地笑着。"
  - character: "菲鲁特"
    text: "真是个贱人。"
  - character: "旁白"
    text: "爱蜜莉雅发现自己同意这小女孩的话，她也用充满恨意的目光瞪着普莉希拉，雷姆、加菲尔和碧翠丝也是如此。一声拍手声在放映厅中响起，衣着华贵的商界女王露出了恼怒而严肃的表情环顾四周。"
  - character: "安娜塔西亚"
    text: "请把话题集中在正事上，我们需要讨论屏幕接下来会展示——"
  - character: "旁白"
    text: "就在安娜塔西亚终于掌控了对话之时，一个响亮、圆滑的声音充满了放映厅，她再一次失去了对局势的掌控。"
  - character: "视频内容"
    text: "神秘的看守者声音响起：抱歉让大家久等了。希望你们都在为展示给你们的事件而哀叹。"
  - character: "旁白"
    text: "房间里的所有人集体惊跳起来，寻找对他们说话的可疑人物。"
  - character: "蜜蜜"
    text: "那是什么？！嘿，在我脑子里！它在我脑子里！"
  - character: "缇碧"
    text: "搞什么？！冷静点蜜蜜！"
  - character: "旁白"
    text: "每位候选人都严肃而备战地盯着闪烁的屏幕，等待着这个声音揭露自己的身份。"
  - character: "雷姆"
    emotion: "愤怒"
    text: "现身！你为什么对昴君做这种事？！"
  - character: "旁白"
    text: "雷姆愤怒地喊道，伸手去抓她的晨星锤……却发现口袋里什么都没有。"
  - character: "雷姆"
    text: "我的晨星锤！"
  - character: "视频内容"
    text: "看守者声音：啊，对。你们所有人的武器都被收走了。不能让你们互相残杀，否则这一切就白费了。"
  - character: "旁白"
    text: "许多人发现自己居然就这样失去了对武器的感知，这让他们感到不安。就连莱茵哈鲁特的龙剑也被夺走了，这真正让骑士对可能的情况感到恐惧。"
  - character: "视频内容"
    text: "看守者声音：我保证你们的武器是安全的。所以请不要太在意它们。还有，你们的精灵也都安好并被妥善照顾，请不要为它们担忧，由里乌斯。"
  - character: "旁白"
    text: "那位优雅的骑士只是对着闪烁的屏幕投以锐利的一瞥。"
  - character: "安娜塔西亚"
    emotion: "愤怒"
    text: "打扰一下！你能解释一下这里发生了什么吗？我不相信你把我们所有人拖到这里来却不给我们任何解释。"
  - character: "视频内容"
    text: "看守者声音：啊，安娜塔西亚·霍星。一如既往地投机取巧、善于利用机会。"
  - character: "旁白"
    text: "女士被那声音突然对她采取的讽刺语气惊得后退了一步。她身旁的骑士一边警戒，一边锐利地盯着那扇闪烁的窗户。"
  - character: "视频内容"
    text: "看守者声音：我当然知道你是谁。我知道你掌握的力量。我知道你的秘密和目标。"
  - character: "旁白"
    text: "当声音向听众传达这些话时，许多人开始感到怀疑和恐惧充斥了内心。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的罪恶感。"
  - character: "旁白"
    text: "两个鬼族少女和一位红发骑士听到屏幕的话后身体一震。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的悔恨。"
  - character: "旁白"
    text: "由里乌斯和威尔海姆紧握拳头，感觉屏幕正在对他们说话。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的真面目。"
  - character: "旁白"
    text: "菲莉丝和阿尔突然像被某个伤人的事实击中般猛地一缩。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的自私。"
  - character: "旁白"
    text: "爱蜜莉雅畏缩了一下，重新坐了下来，颤抖的手握着菜月昴的手。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的傲慢。"
  - character: "旁白"
    text: "普莉希拉厌恶地深深皱眉，愤怒地咬着嘴唇。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的阴谋。"
  - character: "旁白"
    text: "菲鲁特和安娜塔西亚是突然被这句话击中的人。"
  - character: "视频内容"
    text: "看守者声音：我知道你们的罪行。"
  - character: "旁白"
    text: "一位打扮成小丑、面带大大笑容的男子挑了挑眉，感觉那些话指向了他。"
  - character: "罗兹瓦尔"
    text: "哦，这可有意思了~"
  - character: "视频内容"
    text: "看守者声音：让我告诉你们所有人……我不在乎。你们尽可以尽情自吹自擂。把自己表现得越强大、越适合领导越好。尽力克制你们对彼此的蔑视，互相帮助吧。我不在乎你们做不做这些。你们对我来说不过是囚犯而已。"
  - character: "旁白"
    text: "当这些沉重的话语如雨点般落下时，许多人被那人的严厉语气惊得僵在原地。"
  - character: "视频内容"
    text: "看守者声音：我是你们的看守。我把你们放在这里只有一个原因，仅此一个。你们都将观看一个人的故事，这个人影响了这个世界的核心。"
  - character: "旁白"
    text: "当声音明确了它的立场时，目光纷纷投向那位沉睡的青年。爱蜜莉雅和雷姆带着惊讶和困惑看向那少年。"
  - character: "威尔海姆"
    text: "菜月昴大人到底做了什么，竟惹得如此强大的存在动怒？"
  - character: "视频内容"
    text: "看守者声音：当代的贤者候补。菜月昴。爱蜜莉雅的骑士。以及……她的守护者。"
  - character: "旁白"
    text: "爱蜜莉雅困惑地皱起眉头，紧紧握住骑士的手。什么守护者？为什么\"她\"被如此强调，仿佛说话者在说出这个词时感到痛苦。这个\"她\"是谁？为什么菜月昴是她的守护者？爱蜜莉雅受伤的胸口迫使她开始急促地呼吸。"
  - character: "安娜塔西亚"
    text: "这个少年和我们所有人有什么关系？"
  - character: "普莉希拉"
    text: "你又凭什么替一位女神决定她要看什么？"
  - character: "视频内容"
    text: "看守者声音：一个在她知之甚少的世界里没有力量、没有影响力、没有价值的女神。"
  - character: "旁白"
    text: "安娜塔西亚再一次被无视而怒火中烧时，普莉希拉对屏幕的反驳放声大笑。"
  - character: "普莉希拉"
    text: "世界会按照我的意愿——"
  - character: "视频内容"
    text: "看守者声音：意愿？是啊。不。这里不是那个世界，巴莉艾尔先生。请不要做任何可能干扰观影的事情。"
  - character: "库珥修"
    text: "打扰一下，你为什么要让我们看别人的生活？为什么我们看的偏偏是菜月昴大人的？你为什么一直叫他贤者候补？"
  - character: "视频内容"
    text: "看守者声音：这是一场让你们观看的放映。菜月昴的生活有一个特殊元素，你们都需要从中学习。至于贤者候补的部分嘛……你们到时候就会明白那是什么意思的，亲爱的观众们。我的屏幕已经为你们加载好了这一集，我没有时间让你们认识我们的新观众了。"
  - character: "旁白"
    text: "他说话时，屏幕发出的光芒不再随意闪烁，开始形成一个清晰的画面。爱蜜莉雅一行人困惑地回头，听到了一个震惊的女孩的声音。"
  - character: "佩特拉"
    text: "哇！发生了什么事？！爱蜜莉雅大人？！"
  - character: "爱蜜莉雅"
    text: "佩特拉酱？"
  - character: "旁白"
    text: "小女孩还没来得及说出她的困惑，另一道光芒在她身旁出现又消失，留下一位困惑的金发利齿女士，穿着女仆服。"
  - character: "弗雷德莉卡"
    text: "什么？"
  - character: "加菲尔"
    text: "姐姐！"
  - character: "弗雷德莉卡"
    text: "你这次又干什么了，加夫？你怎么给爱蜜莉雅大人惹出这种麻烦的？"
  - character: "加菲尔"
    text: "诶！喂！我什么都没干！"
  - character: "弗雷德莉卡"
    text: "弗雷德莉卡·鲍尔曼，罗兹瓦尔·L·梅瑟斯大人麾下的女仆。这位是佩特拉·蕾伊，是我的后辈。请原谅我们的打扰。"
  - character: "旁白"
    text: "加菲尔对姐姐礼貌的自我介绍嗤之以鼻。"
  - character: "佩特拉"
    text: "怎么回事？我们为什么突然在这里？"
  - character: "旁白"
    text: "佩特拉困惑地环顾四周，直到注意到某个熟悉的身影。"
  - character: "佩特拉"
    text: "菜月昴！"
  - character: "旁白"
    text: "小女孩想要扑向她无比信任的英雄，却被导师抓住了手，按在了座位上。"
  - character: "弗雷德莉卡"
    text: "你还不能过去。有非常重要的事情正在发生……"
  - character: "旁白"
    text: "佩特拉不太明白那是什么意思，但她非常信任自己的导师，于是乖乖坐回座位，担忧地望着菜月昴的后脑勺。弗雷德莉卡几乎立刻就注意到了房间里的紧张气氛。"
  - character: "视频内容"
    text: "看守者声音：现在所有人都到齐了。"
  - character: "弗雷德莉卡"
    text: "什么？！"
  - character: "佩特拉"
    text: "呃！"
  - character: "视频内容"
    text: "看守者声音：让我开始放映吧。好好欣赏。"
  - character: "旁白"
    text: "听到那干巴巴的语气，他们知道不该对这个屏幕抱有任何希望。爱蜜莉雅一行人忧心忡忡地看着，目光在屏幕和坐在他们中间沉睡的少年之间来回移动。于是他们看着，屏幕停止了闪烁片刻……然后变暗了。第一季第一集 导演剪辑版。开始。"
  - character: "视频内容"
    text: "窗户展示了一片黑暗的虚空中闪烁着光芒。沉重而痛苦的喘息声传来，仿佛有人在挣扎着呼吸。"
  - character: "雷姆"
    text: "这是谁……"
  - character: "旁白"
    text: "雷姆立刻捕捉到了那个声音，当她认出那声音时，她的眼睛瞪大了。"
  - character: "视频内容"
    text: "菜月昴挣扎着喘息：这下糟了……非常糟糕……"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "菜月昴！"
  - character: "旁白"
    text: "爱蜜莉雅对着屏幕呼唤，为她骑士挣扎的声音满脸忧虑。"
  - character: "菲莉丝"
    text: "听起来他很痛苦。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：菜月昴？你怎么了？"
  - character: "爱蜜莉雅"
    text: "我和他在一起？"
  - character: "佩特拉"
    text: "爱蜜莉雅大人会保护菜月昴的！她很强的！"
  - character: "旁白"
    text: "黑暗短暂地散去，露出了一只手，下方是一滩正在扩大的血泊。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "什么？！"
  - character: "雷姆"
    emotion: "悲伤"
    text: "不！"
  - character: "旁白"
    text: "爱蜜莉雅和雷姆惊恐地倒吸凉气，认出了少年运动服的标志性线条。两位女士脸上写满了难以置信和痛苦。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我在哪里？！"
  - character: "安娜塔西亚"
    text: "看起来他正在地上流血。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "大将需要帮助！"
  - character: "旁白"
    text: "金发少年身体前倾，准备随时冲向屏幕。在他身旁，奥托也好不到哪去，勉强压抑着恐惧和极度的担忧。"
  - character: "视频内容"
    text: "窗户切换了场景，展示了一排排方形建筑，上面灯火通明。其中一栋建筑被特别展示出来。里面摆满了一排排各种金属圆筒和小纸书。在其中一排旁边，一个眼神锐利、黑发熟悉的年轻人正在读一本带图画的书。"
  - character: "视频内容"
    text: "菜月昴翻着书：啊，我明白了。这就是他们把你吸进去的地方。"
  - character: "普莉希拉"
    text: "什……么……？！"
  - character: "阿尔"
    text: "该死……兄弟……"
  - character: "里卡多"
    text: "看看那些建筑！"
  - character: "莱茵哈鲁特"
    text: "这是什么地方？为什么菜月昴行动得那么自然，好像这不是一个不寻常的环境？"
  - character: "由里乌斯"
    text: "这里一定是他的家乡……"
  - character: "旁白"
    text: "爱蜜莉雅的眼睛瞪大了，她的目光在屏幕和沉睡的骑士之间来回移动，为自己能够更多地了解少年的出身而感到一丝喜悦。"
  - character: "安娜塔西亚"
    text: "看看这些器具！那些精美的装饰！所有那些小塔！"
  - character: "旁白"
    text: "安娜塔西亚惊叹不已，她严肃的气场消失了，取而代之的是对这片异域之地的一切以及如何将其用于商业的贪婪渴望。"
  - character: "菲莉丝"
    text: "这看起来像是贵族区。菜月昴君在那里也是仆人吗？"
  - character: "雷姆"
    text: "菜月昴君提到过，他来自一个人人平等的地方。他在那里可能也是个贵族。我从不知道那里看起来这么……与众不同。"
  - character: "库珥修"
    text: "所以菜月昴大人在他来的那个地方是贵族？"
  - character: "威尔海姆"
    text: "菜月昴大人究竟来自哪里？"
  - character: "旁白"
    text: "爱蜜莉雅阵营的成员面面相觑，脸上写满了困惑。"
  - character: "拉姆"
    text: "巴鲁斯从来没有跟我们说过他的家乡。他只告诉我们他不被允许再回去了，那是一个在卢克尼卡东方的小岛国。"
  - character: "旁白"
    text: "爱蜜莉雅为她的骑士微微黯然神伤。她一直觉得令人心碎的是，菜月昴不愿意和他们谈论他的家人或家乡。她对眼前的景象感到相当惊叹。"
  - character: "爱蜜莉雅"
    emotion: "兴奋"
    text: "菜月昴的家乡真的好酷！"
  - character: "旁白"
    text: "她为终于能够了解她所宣称的骑士这位谜一般的人物而感到高兴。"
  - character: "莱茵哈鲁特"
    text: "东方的小岛？但那是……"
  - character: "安娜塔西亚"
    text: "……不可能的，因为东方没有岛国。"
  - character: "旁白"
    text: "一抹越来越大的笑容浮现在她脸上。她的猜测是对的——这个少年确实来自他们世界的尽头之外。观众中的许多人困惑而惊叹地看着屏幕。"
  - character: "罗兹瓦尔"
    text: "嗯嗯，菜月昴君也许并不完全像福音书所描述的那样。"
  - character: "旁白"
    text: "罗兹瓦尔盯着那番景象低语道，眼中满是惊叹和惊讶。"
  - character: "普莉希拉"
    text: "真是引人注目……"
  - character: "旁白"
    text: "普莉希拉的绯红眼眸紧紧锁定少年周围的一切，仿佛她真的对他的世界产生了兴趣。然而这个黑发庶民却在到处闲逛，翻看着奇怪的图画书，好像这只是他平常的一天。这孩子到底是谁？"
  - character: "视频内容"
    text: "场景再次切换到那只手和不断扩大的血泊，此刻那只手正在原地抽搐，显然那个人已经失去了意识。"
  # === 第501-1000行 ===
  - character: "视频内容"
    text: "菜月昴痛苦地挣扎着喊道：不……快跑！快！"
  - character: "旁白"
    text: "砰！另一具身体突然倒在了那只手旁边，就在血泊的边缘——一个穿着白紫色长袍的银发少女的尸体。"
  - character: "佩特拉"
    emotion: "悲伤"
    text: "爱蜜莉雅大人？！"
  - character: "旁白"
    text: "佩特拉惊恐地捂住嘴巴倒吸凉气。恐怖和惊讶的表情弥漫在各自阵营的成员和库珥修派系的盟友脸上。莱茵哈鲁特、由里乌斯和菲鲁特则愤怒而不安地看着屏幕。其他人如罗兹瓦尔、普莉希拉和安娜塔西亚则以无聊、感兴趣或好笑的态度观看着。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "什……"
  - character: "旁白"
    text: "所谓的无用少女发现自己喃喃道，眼前的情景深深震撼了她的内心。恐惧和困惑突然充斥了爱蜜莉雅的心，她因此开始急促地呼吸……"
  - character: "库珥修"
    text: "爱蜜莉雅大人。我们需要继续看下去才能理解。我怀疑这一切根本不是真的。"
  - character: "旁白"
    text: "库珥修不知何时已经站在了她的椅子后面，一只手坚定地放在爱蜜莉雅的肩上。公爵夫人用坚定的表情点了点头，让所有人都充满了决心。"
  - character: "加菲尔"
    text: "公主殿下不会那么容易死的……"
  - character: "雷姆"
    text: "爱蜜莉雅大人……请原谅我。菜月昴君一直在为你而奋斗……我不认为他会那么轻易地让你死去……他总是能在危急关头自救并帮助所有人。我觉得这是假的……或者也许是未来的幻象……但你不应该让这影响到你。"
  - character: "旁白"
    text: "从库珥修和雷姆那里获得了鼓励，爱蜜莉雅发现自己被驱使着无视自己死亡的震惊画面，继续带着同样的怀疑态度观看着。她唯一的安慰来源是菜月昴就坐在她身边，于是她迅速挽起他的手臂，心情才慢慢平复下来。"
  - character: "罗兹瓦尔"
    text: "没用……"
  - character: "旁白"
    text: "小丑般的领主比对他资助的那个女孩表现出了更多的兴趣。"
  - character: "罗兹瓦尔"
    text: "多么美妙的事情……我终于能看到你的力量到底蕴含着什么了……"
  - character: "旁白"
    text: "他那双异色瞳因为眼前上演的事件而闪烁着愉悦和兴奋。他终于可以了解这个少年的道路是如何被福音书塑造的……以及最终这个少年是如何偏离那条道路，走出了自己的路。"
  - character: "罗兹瓦尔"
    text: "这就是我困惑的答案……这次放映是一份巨大的礼物。"
  - character: "普莉希拉"
    text: "如此肮脏的蟋蟀。"
  - character: "旁白"
    text: "普莉希拉从那个一直让她本能感到厌烦的小丑身上移开目光，看着屏幕，想弄清楚世界为什么要向她展示这些事件。"
  - character: "视频内容"
    text: "场景切换到菜月昴从货架上拿起彩色杯子和袋装食物。"
  - character: "视频内容"
    text: "菜月昴：不，纳豆。"
  - character: "莱茵哈鲁特"
    text: "这变得有点太突兀了……"
  - character: "由里乌斯"
    text: "我确实同意，如果它不打算解释发生了什么，这就变得有点多余了。"
  - character: "视频内容"
    text: "场景切回了那位女士已经无力的身体，鲜血突然充满了她下方的区域。开头那只挣扎的手缓缓移向了女孩无力的手。"
  - character: "视频内容"
    text: "菜月昴喘息着说：等一下……"
  - character: "旁白"
    text: "包括爱蜜莉雅、奥托和碧翠丝在内的许多人完全是在瞪着屏幕，因为它展示了菜月昴的整个挣扎过程却没有解释任何事情。一个金发小女孩突然瞪大了眼睛，因为她注意到……那个地方看起来真的很眼熟。菲鲁特的心也开始变得沉重……有什么不对劲。"
  - character: "视频内容"
    text: "场景再次切换到菜月昴在柜台前和另一个人说话。"
  - character: "里卡多"
    text: "啊……"
  - character: "旁白"
    text: "里卡多呻吟道，他正被之前的场景吸引，结果又被切回了这个他完全不理解的奇怪地方。"
  - character: "视频内容"
    text: "店员：一共是363日元。菜月昴拿起一枚金属硬币，停下来端详着：哦，一枚有凹槽边缘的十元硬币。"
  - character: "安娜塔西亚"
    text: "我猜那是他家乡的货币？"
  - character: "旁白"
    text: "安娜塔西亚自言自语般地沉吟道，带着极大的兴趣观看着。她的注意力只集中在一件事上——菜月昴的出身……她看得越多，就越想了解这个少年和他的家乡。安娜塔西亚的眼睛高度集中，分析着屏幕上每一个物体和形状。"
  - character: "旁白"
    text: "付完钱后，菜月昴走出了那栋建筑。他在一条马路前停下，看着一个金属盒子从他身边飞速驶过。那疾驰而过的交通工具震惊了在场的许多观众。"
  - character: "奥托"
    text: "那是什么？！"
  - character: "旁白"
    text: "奥托看到那个方块经过菜月昴时问道。加菲尔看到那台机器后目瞪口呆地站在他身旁。"
  - character: "碧翠丝"
    text: "你们不会知道那台机器是什么的，我猜。"
  - character: "旁白"
    text: "所有人都把目光转向了坐在失去意识的青年旁边的金发双马尾小女孩。"
  - character: "碧翠丝"
    text: "所以你说的都是真的啊。我从没怀疑过我的契约者的故事，但我从没想过……我会亲眼看到它们，我猜。"
  - character: "奥托"
    text: "说的是真的？碧翠丝大人……您……之前就听说过这个不寻常的地方了？"
  - character: "安娜塔西亚"
    text: "小丫头为什么会知道和菜月昴君的住所相关的事？"
  - character: "碧翠丝"
    text: "在和一位比你年长得多的精灵说话时，你最好认清自己的位置，女孩。"
  - character: "旁白"
    text: "安娜塔西亚的眼睛眯了起来，她那强撑的笑容变薄了。但安娜塔西亚不打算就此罢休。在她能进一步追问之前，一只坚定的手按在了她戴着手套的手上。"
  - character: "由里乌斯"
    text: "我建议不要这样，女士。我很抱歉，安娜塔西亚大人，但那并不是您试图套话的普通女孩。"
  - character: "安娜塔西亚"
    text: "哦，由里乌斯君？你的女士被一个小孩子侮辱了，你就这么算了？"
  - character: "由里乌斯"
    text: "传言和我弟弟的报告都是真的。菜月昴是一位精灵骑士。而那个小女孩是一位大精灵。"
  - character: "旁白"
    text: "安娜塔西亚不得不相信他，他是这个房间里唯一能够感知灵体的人。目光追随着那位优雅的精灵少女，安娜塔西亚只能恼怒地咬着嘴唇。"
  - character: "爱蜜莉雅"
    text: "碧翠丝酱……你知道这个地方吗？你知道菜月昴家乡的事吗？"
  - character: "碧翠丝"
    text: "我怀疑贝蒂的菜月昴不会告诉你们任何人，实际上。你们中没有人和他的精灵有同样的联系。"
  - character: "旁白"
    text: "爱蜜莉雅和雷姆都有些被这个小女孩骄傲的语气和得意的笑容吓到了。"
  - character: "爱蜜莉雅"
    text: "所以……菜月昴以前跟你讲过他的家乡？"
  - character: "碧翠丝"
    text: "哼，当然！贝蒂的契约者会花很多夜晚给贝蒂讲述他的家乡和他的人民所实现的许多奇妙概念，那些充满奇迹和纯粹创造性想象力的故事，如果不是贝蒂的契约者告诉贝蒂，贝蒂是不会相信的。"
  - character: "旁白"
    text: "碧翠丝抱起双臂，高昂着头，露出高贵而骄傲的表情。"
  - character: "库珥修"
    text: "如果可以的话，大精灵大人，我想更多地了解这个地方在哪里，以及为什么菜月昴大人会离开它来到一个远没有那么先进的国家。"
  - character: "碧翠丝"
    text: "贝蒂的契约者告诉贝蒂的事情，你和我们周围这些人甚至都无法理解，更不用说相信了。每天晚上讲一年的故事只会让贝蒂对他所解释的一切更加渴望了解和学习。他特殊的出身和生活方式只存在于贝蒂一个人心中，因为她是他的精灵，实际上。"
  - character: "雷姆"
    text: "可、可是碧翠丝大人！我们只是想更多地了解菜月昴君——"
  - character: "碧翠丝"
    text: "我不会在这件事上让步的，女仆。这是菜月昴的故事，由他自己来分享，实际上。"
  - character: "旁白"
    text: "碧翠丝彻底拒绝了所有人对菜月昴早年生活的提问，并回绝了受伤的雷姆。"
  - character: "佩特拉"
    text: "你至少能解释一下那个金属马车是什么吧，碧翠丝大人？"
  - character: "碧翠丝"
    text: "这个我可以解释，我猜。你们看到的那个在轮子上移动的金属盒子，是菜月昴向我解释的一种新的交通工具，是我们所谓的龙拉马车的升级版，我猜。菜月昴的人民叫它'汽车'。"
  - character: "加菲尔"
    text: "啥玩意儿是汽车？"
  - character: "弗雷德莉卡"
    text: "加菲尔！"
  - character: "加菲尔"
    text: "怎么了？"
  - character: "碧翠丝"
    text: "那是菜月昴家乡的人用来更快出行的东西。他的岛上根本没有地龙，所以他们创造了一种有轮子的金属盒子，跑起来比龙更快更平稳，实际上。"
  - character: "莱茵哈鲁特"
    emotion: "兴奋"
    text: "菜月昴的家乡实现了比龙还快的旅行？"
  - character: "旁白"
    text: "由里乌斯、安娜塔西亚和库珥修都开始盘算如何获取这样的设计和信息。加菲尔和奥托只是在想开一辆这样的东西该有多酷。"
  - character: "菲鲁特"
    text: "哇，兄弟的家乡是给聪明人住的啊。"
  - character: "旁白"
    text: "普莉希拉只是挑了挑眉，然后继续漫不经心地扇着扇子。碧翠丝尽职地握住契约者的手臂，脸上挂着愉快幸福的小笑容……没有注意到爱蜜莉雅正带着心碎的目光在她和菜月昴的沉睡脸庞之间来回打量。"
  - character: "拉姆"
    text: "我们的世界真的存在这样一个国家吗，罗兹瓦尔大人？"
  - character: "罗兹瓦尔"
    text: "嗯嗯……老师会喜欢这个的……还是她已经知道了？为什么她没有把这些知识刻在福音书里给我呢，我想……她难道一直在寻找菜月昴的世界吗？"
  - character: "罗兹瓦尔"
    text: "我们可能得开始让菜月昴君和我们分~享他的故事时间了……等我们离开这里后请记下这一点，亲爱的拉姆。"
  - character: "拉姆"
    text: "遵命，罗兹瓦尔大人。"
  - character: "视频内容"
    text: "场景切回了那只缓慢移动的手，它终于够到了女孩无力的手。菜月昴被揭示为那只手的主人，他的嘴在流血，脸因痛苦而扭曲。"
  - character: "视频内容"
    text: "菜月昴从喷血的喉咙中挤出声音：去……"
  - character: "由里乌斯"
    text: "我觉得这像是在暗示某个事件。如果这一切都是假的，我们可以简单地忽略它。如果这是对我们未知的未来的讲述，我们也许可以从中学习，阻止这些事件发生。"
  - character: "旁白"
    text: "由里乌斯自告奋勇地用自己的理论来回答公爵夫人的询问。"
  - character: "奥托"
    text: "这一切一定是有原因才被展示的……但为什么是关于菜月昴君的……为什么他总是那个死去的人……"
  - character: "旁白"
    text: "奥托·斯文一直在盯着屏幕，蓝色的眼眸中闪烁着要理解这一切全部原因的决心。他的手紧握着一个隐藏的小口袋，那口袋被一个方形物体撑得变了形。他握着口袋里烧焦的福音书，希望它能告诉他所需的一切答案。"
  - character: "旁白"
    text: "无论这将展示什么，奥托需要保持这个阵营的团结，并隐藏任何可能被其他阴谋家揭露的信息。"
  - character: "视频内容"
    text: "场景回到菜月昴，他手里提着一个白色塑料袋走出了建筑的停车场。"
  - character: "爱蜜莉雅"
    text: "看起来又切换了……"
  - character: "旁白"
    text: "爱蜜莉雅脸上带着非常忧虑的表情看着屏幕，不喜欢自己不得不又一次看到菜月昴流血，而她自己则作为一具尸体躺在他身边。"
  - character: "雷姆"
    text: "我们必须找到办法解除菜月昴的诅咒，离开这里！"
  - character: "旁白"
    text: "雷姆厉声低语道，蓝色的眼眸在整个黑暗的放映厅中闪烁着决心。"
  - character: "旁白"
    text: "菜月昴觉得站够了，开始把手插在口袋里穿过宽阔的街道……然后……一只尖锐的爪子，裹着一层黑暗的迷雾，被展示为从一片白色的空间墙壁中伸出来，直直地伸向菜月昴。"
  - character: "旁白"
    text: "一声恐惧的尖叫同时从佩特拉和缇碧那里传来。"
  - character: "菲鲁特"
    text: "那是什么？！"
  - character: "旁白"
    text: "菲鲁特惊恐地站起来喊道。警觉感充满了大多数骑士。"
  - character: "雷姆"
    emotion: "愤怒"
    text: "它为什么冲着他来？！菜月昴君只是在走回家！"
  - character: "旁白"
    text: "碧翠丝和爱蜜莉雅互相看了一眼，眼睛睁得大大的，然后看向身旁的少年。只是为了确认她们都握着他的手。"
  - character: "碧翠丝"
    text: "不管这是什么，它都碰不到贝蒂的契约者，我猜！"
  - character: "旁白"
    text: "小女孩嘟囔着握着少年的手，愤怒地瞪着那只手，在脑海中记忆和寻找与此类魔法相关的任何信息……令她震惊的是，她找不到任何与这只手相关的东西。这让碧翠丝有些颤抖。"
  - character: "爱蜜莉雅"
    text: "如果菜月昴在这里受到攻击……如果他……如果他没能活下来，他是怎么离开他的岛国来到我们身边的？"
  - character: "旁白"
    text: "爱蜜莉雅温柔的声音渐渐消散，她回想起所有三场幻象中她的骑士要么流血致死，要么在自己的城镇里受到攻击。她的思绪混乱而困惑。"
  - character: "库珥修"
    text: "我建议不要太早投入感情，爱蜜莉雅大人。这可能是绑架者制造的骗局。"
  - character: "旁白"
    text: "同样的想法再次充满了每个人的心。然而后排的某位小丑只是眯着眼睛、微微皱眉地看着，他是唯一知道真相的人。这是一个现实。这是一个不断循环的傻瓜拒绝贤者之路的故事。"
  - character: "罗兹瓦尔"
    text: "啊……他再也看不到他的家乡了，对吧？"
  - character: "旁白"
    text: "罗兹瓦尔低声自语，表情变成了怜悯。一股奇异的风力扫过菜月昴周围的世界，像是在扫描什么。"
  - character: "视频内容"
    text: "菜月昴环顾四周，耸了耸肩：在房间里窝了一整天打游戏之后，任何人的眼睛都会累吧。"
  - character: "弗雷德莉卡"
    text: "刚才……那是什么……？"
  - character: "由里乌斯"
    text: "为什么突然安静下来了？"
  - character: "旁白"
    text: "其他人则恐惧地看着，担心那黑暗的爪子可能会从任何地方扑向那个忙着揉眼睛的少年。"
  - character: "佩特拉"
    text: "菜月昴桑……"
  - character: "视频内容"
    text: "菜月昴揉了一会儿眼睛。在他揉眼睛的时候，场景开始变化。他努力在突然的光亮中睁开眼睛。爱蜜莉雅和碧翠丝忧心忡忡，她们感到一阵沉甸甸的感觉侵入胸口。这种感觉弥漫在整个放映厅，让所有观看的人都感到胃里翻涌。"
  - character: "旁白"
    text: "所有人都带着一种不祥的预感观看着，觉得有什么不对劲正在向那个少年逼近……而当一切都明朗时，他们全都明白了哪里不对劲……当他睁开眼睛……用一种受惊的表情看着面前的城市时。他们每一个人，都带着难以置信的睁大的眼睛看着。有些人甚至变得恐惧起来。"
  - character: "菲鲁特"
    emotion: "悲伤"
    text: "不可能……！"
  - character: "旁白"
    text: "菲鲁特低声喘息道，跌坐在座位上，表情从困惑变成了对所目睹之事的怜悯。然而，菜月昴的朋友们脸上只有恐惧。"
  - character: "奥托"
    emotion: "愤怒"
    text: "哦……哦这不公平……这不对！"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "喂，喂，喂！这本来就讲不通，但你他妈得给我解释一下大将这里到底发生了什么，听到了吗！"
  - character: "旁白"
    text: "奥托和加菲尔喊出了他们的愤怒，因为他们理解了眼前场景的极度不道德。正是因为这个原因，爱蜜莉雅、碧翠丝和雷姆用手捂住了嘴巴，或者因为所发生的事而震惊和受伤地张大了嘴。"
  - character: "视频内容"
    text: "菜月昴环顾四周，缓慢而毫无表情，没有意识到他刚刚被从家乡传送到了这里。"
  - character: "菲莉丝"
    text: "哦，这下就说得通多了。"
  - character: "旁白"
    text: "菲莉丝说着，捂脸想起了他多少次无法理解这少年的说话习惯。"
  - character: "威尔海姆"
    text: "啊！"
  - character: "旁白"
    text: "菲莉丝身旁的老人露出了一脸惊讶的表情，就连剑鬼也对这个揭示感到惊叹。他们的女士放下了托着下巴的手，无法合上下巴。"
  - character: "视频内容"
    text: "菜月昴的嘴唇动了动：怎么回事？眼睛仍然四处张望，仿佛不敢相信。"
  - character: "蜜蜜"
    text: "我还以为他说他来自远方是在说谎呢。"
  - character: "旁白"
    text: "蜜蜜震惊地说。她的弟弟只能在旁边语无伦次，而里卡多的脸则显示出他有多惊讶。"
  - character: "由里乌斯"
    text: "不……"
  - character: "旁白"
    text: "由里乌斯低声喃喃，绝望地轻轻捂住了脸，他想起了在远征中再次见到那少年之前，他是多么无知和愚蠢地看待他。"
  - character: "莱茵哈鲁特"
    text: "难怪他在卢克尼卡的礼仪举止表现不佳……我一直以为是因为他来自远方……没想到会是这样的原因。"
  - character: "旁白"
    text: "红发剑客的声音中充满了对屏幕上黑发少年的极度怜悯。"
  - character: "视频内容"
    text: "菜月昴终于意识到了自己的处境，大声喊道：我被召唤到了一个平行世界！"
  - character: "旁白"
    text: "标题卡：Re:Zero 从零开始的异世界生活。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "可、可是……那他的家呢？他的父母和朋友呢？"
  - character: "旁白"
    text: "银发半精灵结结巴巴地说，脸上写满了困惑和怜悯。她在异世界一直是一个人吗？他无法向她倾诉他的旧生活吗？……他不信任她吗？这个想法让爱蜜莉雅的紫绀色眼眸微微黯淡了下来。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "他不能告诉我吗？"
  - character: "普莉希拉"
    text: "看来他和你一样是从大瀑布幸存下来的，阿尔德巴兰。"
  - character: "旁白"
    text: "一位冷艳的红衣美人用扇子后面沉吟道，带着些许忧虑盯着屏幕。戴头盔的骑士只是低下了头。"
  - character: "雷姆"
    text: "菜月昴君对我们世界的知识相当匮乏，而且他的衣服和物品都来自我们从未见过或听说过的不寻常地方……"
  - character: "碧翠丝"
    text: "一定是那只影之手，实际上。有人把贝蒂的契约者从另一个世界抓了过来，我猜。"
  - character: "旁白"
    text: "碧翠丝通过向屏幕投以仇恨来表达愤怒……但如果她不感激他在她的世界里，那她就是在说谎。"
  - character: "奥托"
    text: "菜月昴君来自另一个世界……哇……"
  - character: "旁白"
    text: "轻轻发光的商人惊叹道，为能与如此了不起的人成为亲密朋友而感到惊奇，然而他的惊奇很快变成了冷血的恐慌，因为他想起了他帮助菜月昴不被暴露给这些人的既定任务。他在这个任务还没开始之前就已经失败了。"
  - character: "安娜塔西亚"
    text: "这确实解释了为什么我找不到关于他的任何信息。"
  - character: "旁白"
    text: "奥托的后背僵在了原地，加菲尔注意到了这一点。广为人知的霍星公司的商界女王正愉快地笑着，眼中充满愉悦地盯着屏幕。"
  - character: "旁白"
    text: "奥托和加菲尔并不是唯一警惕地看着这位女士的人，爱蜜莉雅和雷姆也迅速用惊愕而保护性的目光看向了这位候选人。碧翠丝迅速以冰冷而恶毒的目光侧视着商界女王候选人，但发现她的力量在这个放映厅里似乎被完全剥夺了。"
  - character: "库珥修"
    text: "如果我能稍微冒犯一下的话，霍星大人。巴鲁斯的出身和您或您的阵营有什么关系？"
  - character: "安娜塔西亚"
    text: "他在制定了应对大灾厄的精彩计划后引起了我的兴趣。既然他是我对手的骑士，我需要了解他的一切。但遗憾的是，关于他的出身和之前的人际关系几乎没有任何信息。这让我很惊讶，因为我的商业网络在挖掘信息方面是最好的。"
  - character: "旁白"
    text: "安娜塔西亚的眼中闪过一丝愉悦的光芒。这一切都让这位商业大师兴奋到了骨子里。"
  - character: "视频内容"
    text: "场景切换到一个金发小女孩在城市屋顶上以极快的速度奔跑。她手中握着一颗奇怪的宝石，中间镶嵌着一颗血红色的红宝石。"
  - character: "菲鲁特"
    text: "哈？！这东西在展示这个？"
  - character: "爱蜜莉雅"
    text: "那就意味着……菜月昴在卢克尼卡的第一天是……我们相遇的那一天。"
  - character: "旁白"
    text: "爱蜜莉雅轻声低语，脸上带着难以置信却又欣喜的表情。她的心因为这个事实而温暖起来。"
  - character: "菲莉丝"
    text: "菲鲁特大人拿着的不是龙石吗，喵？"
  - character: "普莉希拉"
    text: "嗯？为什么一个阴沟老鼠会拿着一个，而骑士团甚至都不知道她可悲的存在呢？"
  - character: "莱茵哈鲁特"
    text: "我的主人奔跑的速度真是惊人！多么壮观的景象！"
  - character: "菲鲁特"
    text: "马屁精。"
  - character: "爱蜜莉雅"
    text: "她跑是因为她偷了我的徽章。"
  - character: "旁白"
    text: "莱茵哈鲁特瘫坐在座位上，下巴不由自主地掉了下来，他的计划被彻底粉碎了。"
  - character: "菲莉丝"
    text: "她偷了徽章，喵？！"
  - character: "加菲尔"
    text: "你们都给我安静坐好看。"
  - character: "安娜塔西亚"
    text: "像你这样的篡位者丢了这么重要的东西倒也合适。"
  - character: "旁白"
    text: "爱蜜莉雅只是做了个苦脸，看着前方。菲鲁特带着内疚看着这一幕。"
  - character: "视频内容"
    text: "场景切换到菜月昴走在街上，手里仍然提着塑料袋，脸上带着若有所思的微笑。"
  - character: "拉姆"
    text: "他看起来并不怎么担心自己被召唤到了远离自己世界的地方。"
  - character: "奥托"
    text: "也许……菜月昴君在他原来的世界里生活得不太好？这是唯一能解释他对这个突然降临在他身上的处境不会感到沮丧的原因。"
  - character: "旁白"
    text: "加菲尔带着更加悲伤的表情盯着屏幕。爱蜜莉雅、雷姆和碧翠丝对少年对自己家乡的失望态度也露出了同样悲伤的皱眉。"
  - character: "视频内容"
    text: "菜月昴：我猜我可以假设这是一个幻想世界，有着典型的中世纪风格文化。"
  - character: "爱蜜莉雅"
    text: "菜月昴总是说些最奇怪的话。"
  - character: "由里乌斯"
    text: "我很想理解菜月昴的话是什么意思，这可能有助于我们理解他或他来自哪里。"
  - character: "碧翠丝"
    text: "中世纪，是菜月昴家乡用来描述很久以前失落文化的一个词。在他的时代，文化被称为'现代'，其中有机器或机械装置使人类的日常生活变得便利，就像那些汽车一样。"
  - character: "旁白"
    text: "碧翠丝从沉睡少年旁边的座位上无聊地向他们解释道，暗自享受着房间里几乎每个人都用惊讶和好奇的目光看她的感觉。"
  - character: "雷姆"
    text: "很久以前失落的……？"
  - character: "旁白"
    text: "雷姆轻声低语，想知道这种文化是否因为类似于她族群因种族消亡而被抹去的方式而被遗忘。"
  - character: "库珥修"
    text: "那就意味着菜月昴大人的世界发展得比我们更先进。我们对菜月昴的时代来说真的那么落后吗？"
  - character: "旁白"
    text: "一位盘腿而坐的绿发公爵夫人严肃地分析了她所听到的所有信息。她的目光中充满了迷恋。"
  - character: "拉姆"
    text: "看来巴鲁斯聪明到学过他自己世界的历史，真令人意外。"
  - character: "碧翠丝"
    text: "当然！贝蒂的菜月昴和她分享了大量关于他世界的知识！我的契约者非常精通历史，并且非常乐于尽可能多地获取知识，这就是贝蒂喜欢他的地方，我猜。"
  - character: "旁白"
    text: "可爱的小女孩骄傲地高昂着头，脸上带着满意的得意笑容。"
  - character: "由里乌斯"
    text: "在这样一个社会里，战争会是什么样子呢，我想？"
  - character: "旁白"
    text: "由里乌斯的表情显示出他已经完全沉浸在这个话题中了。安娜塔西亚的笑容悄悄扩大了一寸，她向后靠去，吸收着她渴望的信息。商界女王正在大快朵颐。"
  - character: "碧翠丝"
    text: "他们不用剑，实际上。"
  - character: "库珥修"
    text: "那他们用什么，魔法？他们是否已经将魔法的运用发展到了足以影响常规战争的程度？"
  - character: "旁白"
    text: "房间里大多数骑士和安娜塔西亚都用饥渴的目光看着精灵。"
  - character: "碧翠丝"
    text: "在菜月昴的家乡，没有魔法的知识或使用。"
  - character: "菲鲁特"
    text: "什么？"
  - character: "由里乌斯"
    text: "请再说一遍？"
  - character: "旁白"
    text: "其余人也惊讶地眨了眨眼，连看起来无聊的普莉希拉也突然对这个信息感到意外，罗兹瓦尔只是带着震惊的表情听着这一切。"
  - character: "爱蜜莉雅"
    text: "这就解释了为什么他无法正常使用他的门。老实说，他的世界听起来太棒了！他为什么不也告诉我这些事呢……？"
  - character: "碧翠丝"
    text: "因为我是他的贝蒂，实际上！"
  - character: "旁白"
    text: "爱蜜莉雅听到精灵的回答忍不住更加沮丧了，知道少年信任某个人超过信任她。在她们身后，一位蓝发沉默的女仆正在思考着她中了暴食的诡计之前离开时的每个人和她现在看到的每个人之间的所有差异……他们是什么时候变得如此关心和亲近菜月昴的？雷姆在后排座位上微微撅着嘴。"
  - character: "莱茵哈鲁特"
    text: "他们用什么打仗，大精灵大人？他们已经在自己内部实现了和平吗？"
  - character: "碧翠丝"
    text: "他的家乡的战争比我们的要残酷得多，实际上。战争法则经常被忽视，他们的战斗没有荣誉准则，只有一种'杀光敌方所有人'的心态。他们有一种'现代'版本的弓箭，叫做'枪'。它们从远距离以惊人的速度发射金属弹丸，可以在开枪的一瞬间造成严重伤害或立即致死。他们还有装了枪的汽车，被装甲保护着。他们还有形状像鸟的飞行金属盒子，可以投下接触地面就会爆炸的金属棒。菜月昴在和我讲述它们时看起来非常痛苦，我猜。"
  - character: "旁白"
    text: "说所有人脊背发凉都是轻描淡写了，就连罗兹瓦尔也显得心烦意乱。莱茵哈鲁特迅速闭上嘴低下了头，满脸沮丧。"
  - character: "安娜塔西亚"
    text: "多么不人道的战斗方式……他们拥有所有这些卓越的知识，却用它来杀害无辜的旁观者？！"
  - character: "普莉希拉"
    text: "本宫很不情愿承认这一点……但那个半妖得到了我的同意。"
  # === 第1001-1500行 ===
  - character: "旁白"
    text: "绯红眼眸的巴莉艾尔和紫绀色眼眸的半精灵都对这种懦弱的战斗方式感到愤怒，将无辜者的生命当作赢得战争的筹码。"
  - character: "佩特拉"
    text: "好、好可怕……"
  - character: "旁白"
    text: "佩特拉低声说着，低头看向自己的鞋子。菜月昴的世界现在排在了这个女孩度假目的地清单的最后一位。"
  - character: "蜜蜜"
    text: "嗯，那个地方看起来很恐怖~！我想去那里！"
  - character: "缇碧"
    text: "我甚至不确定我们的战斗能力能否击败他们大部分的地面攻击战术……更不用说飞行盒子的空中攻击了！"
  - character: "加菲尔"
    text: "我能干翻他们！"
  - character: "旁白"
    text: "奥托拍了拍加菲尔的后脑勺。众人试图克服从菜月昴世界的可怕描述中涌来的吞噬般的恐惧。"
  - character: "菲莉丝"
    text: "我不理解……他的世界里也没有亚人种族吗？"
  - character: "旁白"
    text: "碧翠丝只是带着坚定的表情摇了摇头，表示这个话题应该立刻被搁置。"
  - character: "由里乌斯"
    text: "他为什么说得好像他只要看一眼我们的城市就能预测我们的历史？"
  - character: "普莉希拉"
    text: "他说的是事实。"
  - character: "旁白"
    text: "普莉希拉半瞥着屏幕，带着无聊的表情叹了口气沉吟道。她同意了菜月昴的说法。"
  - character: "旁白"
    text: "突然，他锐利的目光迅速落在了一个在周围平民中引起恐慌的情况上。一个小男孩倒在了路中间，一辆由巨型爬行动物拉着的大马车正高速驶向那个孩子。"
  - character: "佩特拉"
    text: "小心！"
  - character: "库珥修"
    text: "这倒令人意外。"
  - character: "爱蜜莉雅"
    text: "希望他不要伤到自己。"
  - character: "旁白"
    text: "爱蜜莉雅无奈地叹了口气，想着她那个傻骑士肯定会以某种方式拯救那个男孩。"
  - character: "视频内容"
    text: "菜月昴兴奋地大喊：就是这个！这是我的机会！这一定是我施展第一个魔法的地方！他开始原地摆姿势，而人群则为那个孩子越来越恐慌。"
  - character: "由里乌斯"
    text: "一个人在看到危机时不应该那样表现。"
  - character: "加菲尔"
    text: "大将在这里怪怪的。"
  - character: "旁白"
    text: "金发少年锐利的眼中满是失望地瞪着屏幕。菜月昴用尽全力大喊，双手伸在面前摆好姿势，试图施放魔法来帮助那个孩子。什么都没发生，那个男孩即将被碾死。"
  - character: "碧翠丝"
    text: "他不知道魔法是怎么运作的……"
  - character: "旁白"
    text: "碧翠丝摇了摇头，把通红的脸藏在手掌后面。幸运的是，一位全副武装的骑士跳过道路围栏，将孩子抱在怀里，马车疾驰而过。人群为这位勇敢的英雄欢呼。"
  - character: "视频内容"
    text: "菜月昴缓缓后退，看起来很尴尬：看来我还没准备好使用魔法。"
  - character: "碧翠丝"
    text: "别笑了，我猜！他还不知道怎么用魔法，所以这是预期的反应，实际上！"
  - character: "爱蜜莉雅"
    text: "对不起，碧翠丝酱——喘气——太好笑了！菜月昴真是个傻瓜！"
  - character: "旁白"
    text: "爱蜜莉雅继续嘲笑少年的缺乏经验和尴尬的举动，碧翠丝交叉双臂对她投以炽热的怒视。奥托作为菜月昴众多受害者之一，决定报复并享受他最好的朋友这次失败的时刻，尽情大笑。"
  - character: "加菲尔"
    text: "那个姿势一点都不酷！肯定是因为大将看起来太逊了！"
  - character: "奥托"
    text: "哈哈哈哈！"
  - character: "旁白"
    text: "奥托笑得摔倒了，比之前笑得更大声。菲鲁特、双胞胎和佩特拉都在像孩子一样笑着。普莉希拉、安娜塔西亚和库珥修都失望或无聊地摇了摇头。菲莉丝、里卡多和阿尔都轻声笑着，而由里乌斯则采取了更严肃的态度。莱茵哈鲁特只是和他们一起笑了笑。"
  - character: "视频内容"
    text: "屏幕展示了迷失的男孩穿过市场，打量着周围的多家商店和摊位。他在一个摊位前停下，查看展示的水果，看到一个招牌上写着陌生的文字。"
  - character: "视频内容"
    text: "菜月昴：我读不懂这个。"
  - character: "拉姆"
    text: "巴鲁斯对我们语言和文字的知识极度匮乏，但他基本功还是不错的。比一个孩子强……如果他来自另一个世界的话……"
  - character: "弗雷德莉卡"
    text: "他就不会知道我们国家的书写系统，所以这就解释了为什么他看不懂这个招牌。"
  - character: "雷姆"
    text: "这好像不太对。"
  - character: "碧翠丝"
    text: "你，那边的女仆。为什么贝蒂的契约者知道我们语言的基础会这么耐人寻味，我想知道。"
  - character: "雷姆"
    text: "我很抱歉，碧翠丝大人，但是……菜月昴君是在爱蜜莉雅大人的宝石被偷走的同一天被带到我们身边的。从我们看到的菲鲁特大人之前的部分来看，那应该就是他突然被召唤到我们身边的同一天。"
  - character: "缇碧"
    text: "所以……这意味着这个男孩在同一天遇到你们之前就学会了语言？"
  - character: "莱茵哈鲁特"
    text: "不太可能。"
  - character: "旁白"
    text: "菲莉丝点了点头，想起了他第一次见到菜月昴的那天。"
  - character: "库珥修"
    text: "嗯，我建议我们现在继续观看。这件事正在被一扇可疑的窗户指出，别忘了。我们必须对所看到的一切持保留态度，否则我们可能会落入这个看守设下的某种圈套。"
  - character: "旁白"
    text: "所有人都听从了库珥修的警告，不安地看着屏幕。除了罗兹瓦尔，他坐着，目光极度专注地盯着，瞳孔缩到了极致。"
  - character: "罗兹瓦尔"
    text: "终于要展示了！"
  - character: "视频内容"
    text: "摊主：你穿的衣服可真奇怪啊小子。菜月昴指着红色的水果：那些是什么？摊主：那些是阿帕果。菜月昴低声：所以他们能听懂我说话啊。"
  - character: "旁白"
    text: "从钱包里拿出几枚硬币，菜月昴把它们放在阿帕果老板摊开的手掌上。"
  - character: "视频内容"
    text: "摊主：你在卢克尼卡不能用那些东西。也就是说你穷得叮当响，对吧？滚开！别妨碍我做生意！男人朝菜月昴吼道，把硬币扔到了他脸上。"
  - character: "旁白"
    text: "菜月昴一脸沮丧地走开了。"
  - character: "佩特拉"
    text: "坏蛋！"
  - character: "爱蜜莉雅"
    text: "他没必要那么粗鲁！"
  - character: "旁白"
    text: "爱蜜莉雅对男人对菜月昴的粗暴态度不满地哼了一声。她不会相信她的骑士经历了如此艰难的开始。"
  - character: "雷姆"
    text: "哦菜月昴君……"
  - character: "旁白"
    text: "雷姆温柔地微笑着摇了摇头，知道在她英雄面对这次严酷对待之后，他会在同一天以某种方式来到她身边。"
  - character: "视频内容"
    text: "菜月昴无奈地叹了口气：没有别的办法了，我只好先四处收集信息了。"
  - character: "库珥修"
    text: "我确实好奇。一个迷路的年轻人是如何在来到这个世界的第一天就效力于一位王选候选人的？"
  - character: "安娜塔西亚"
    text: "这也是我自己一直在思考的问题。考虑到他对我们的世界几乎一无所知，他看起来不像是那种会耍手段进入王选阵营来获取筹码的人。"
  - character: "奥托"
    text: "菜月昴君真的在这一天遇到了你吗，爱蜜莉雅大人？"
  - character: "爱蜜莉雅"
    emotion: "兴奋"
    text: "没错没错！菜月昴和我的相遇也是他第一次救了我的命~！"
  - character: "旁白"
    text: "爱蜜莉雅兴奋而温暖地握住菜月昴的手，眼中满是激情地对少年微笑。"
  - character: "爱蜜莉雅"
    text: "他从来不告诉我们关于他自己的任何事。他只是冲进去做他想做的事。"
  - character: "拉姆"
    text: "巴鲁斯的愚蠢不应该被视为他对我们的不信任，爱蜜莉雅大人。他只是一个自尊心和他的自我一样便秘的傻瓜。"
  - character: "雷姆"
    text: "请别对他那么刻薄，姐姐。"
  - character: "旁白"
    text: "菜月昴被展示经历了各种倒霉事和混乱场面，最终他坐在一条巷子里，衣服因为在掉进水渠后湿透了。"
  - character: "奥托"
    text: "哈哈哈哈！"
  - character: "加菲尔"
    text: "哈啊啊啊啊！"
  - character: "旁白"
    text: "奥托和加菲尔正在用拳头砸地板，大笑着菜月昴所有的糗事。"
  - character: "碧翠丝"
    text: "你们在——噗——笑、笑什么，我猜？！"
  - character: "爱蜜莉雅"
    text: "真的很抱歉，碧翠丝酱！噗！菜月昴的旅程真、真的好艰难！我们不应该——咯咯——不应该嘲笑他糟糕的选择……嘿嘿嘿嘿嘿嘿！"
  - character: "碧翠丝"
    text: "别撒谎了，我猜！"
  - character: "旁白"
    text: "碧翠丝愤怒地喊道，爱蜜莉雅陷入了无法控制的狂笑。雷姆更善于控制自己的笑声。拉姆坐在她们的领主旁边，脸上只是带着一个锐利而深情的得意笑容。"
  - character: "拉姆"
    text: "巴鲁斯的运气真是一直在控制着他和他的自尊心，连拉姆大人也对他可悲的状况感到一丝愧疚。"
  - character: "旁白"
    text: "罗兹瓦尔忍不住对女仆的话轻笑起来。其他候选人要么咯咯笑或大笑，要么带着好笑的笑容摇头。威尔海姆终于对这个年轻人在一个陌生世界中学习和安顿的决心露出了好笑的笑容。"
  - character: "佩特拉"
    text: "这一点都不好笑！"
  - character: "旁白"
    text: "佩特拉孩子气地嘟囔道，怒视着每一个嘲笑她最崇拜的男孩的人。撅嘴的琥珀色头发女孩遇到了一只温柔的手掌，轻轻拍了拍她的头。一位金发翡翠色眼睛的兽人女士温暖而骄傲地微笑着。"
  - character: "视频内容"
    text: "菜月昴双手抱头绝望地抱怨：就应该是这样的吗？我不是被召唤到平行世界了吗？！我的主角光环去哪了？！"
  - character: "雷姆"
    text: "菜月昴君从一开始就过得很艰难呢……"
  - character: "普莉希拉"
    text: "我不理解这个孩子。"
  - character: "碧翠丝"
    text: "他基本上是在问为什么他被召唤到这个世界却没有人来迎接或引导他，我猜。"
  - character: "由里乌斯"
    text: "他期望一切都给他准备好吗？"
  - character: "安娜塔西亚"
    text: "嗯，如果他家乡世界的展示是可信的，他看起来像是一个被宠坏的男孩。"
  - character: "爱蜜莉雅"
    text: "他的手像婴儿的一样柔软，嗯嗯。自从我们相遇以来，他一直在努力提升自己。"
  - character: "库珥修"
    text: "那个魔石器……就是他用来协调白鲸远征的那个。"
  - character: "旁白"
    text: "库珥修的胜利笑容绽放在脸上，因为她想起了对抗命运的艰苦战斗。加菲尔的翡翠色眼睛因为贵族女士的话而闪烁着好奇。"
  - character: "加菲尔"
    text: "……你觉得我们可能会看到大将的冒险吗？"
  - character: "奥托"
    text: "嗯？你说什么，加夫桑？我们需要把任何泄露的信息记下来，否则安娜塔西亚大人的阵营一旦我们离开这里就可能给我们一个措手不及。"
  - character: "加菲尔"
    text: "没事，没事，你就盯着这些混蛋就行了。"
  - character: "奥托"
    text: "他在这里看起来更开心了……眼睛下面没有黑眼圈。"
  - character: "旁白"
    text: "突然的脚步声从他坐着的巷子口传来，菜月昴迅速好奇地抬头看向从阴影深处走向他的人。"
  - character: "视频内容"
    text: "菜月昴：嘿，她终于来了吗？召唤我的可爱女孩……"
  - character: "视频内容"
    text: "他停止了说话，场景揭示了三个衣衫褴褛的年轻人对他得意地笑着。"
  - character: "佩特拉"
    text: "这些坏蛋是谁？"
  - character: "菲鲁特"
    text: "嗯？这三个人就是我收留过的那几个！"
  - character: "爱蜜莉雅"
    text: "这些人在你的阵营里？"
  - character: "旁白"
    text: "爱蜜莉雅脸色变得难看。半精灵少女用手掌揉着少年的脸颊，怜悯地盯着他。"
  - character: "拉姆"
    text: "巴鲁斯的运气一定是最卑鄙的精灵造出来的。"
  - character: "旁白"
    text: "拉姆冷冷地嘟囔道，想起了她自己和这三个混混的相遇。她开始为菜月昴感到难过了。"
  - character: "视频内容"
    text: "混混头目抓住菜月昴的衣领：你在胡说什么？如果你不想受伤，就把你身上所有值钱的东西交出来！"
  - character: "碧翠丝"
    text: "他们最好别伤害贝蒂的菜月昴，实际上！"
  - character: "旁白"
    text: "雷姆和爱蜜莉雅看起来已经准备好跳进去揍这三个家伙了。"
  - character: "威尔海姆"
    text: "这三个年轻人走上了一条不幸的道路。"
  - character: "菲鲁特"
    text: "我要你记下这些小混蛋对大哥做的每一件事。他们不会逃脱伤害他的惩罚的！"
  - character: "加菲尔"
    text: "我喜欢那个小家伙。"
  - character: "莱茵哈鲁特"
    text: "我想那可能是多余的，因为这将是我第一次遇到菜月昴的地方。我们的相遇方式……很不寻常。但我不会以任何其他方式改变它。"
  - character: "由里乌斯"
    text: "你看起来非常珍视那段记忆，莱茵哈鲁特桑？"
  - character: "莱茵哈鲁特"
    text: "除非你亲眼看到，否则你不会明白的，由里乌斯大人。而那正好是……"
  - character: "旁白"
    text: "莱茵哈鲁特转身，几乎兴奋地指向屏幕……直到。"
  - character: "视频内容"
    text: "一个金发女孩跑过巷子，恐慌地喊着：让开，让开！你们给我让开！"
  - character: "莱茵哈鲁特"
    text: "糟了！……现在。"
  - character: "旁白"
    text: "莱茵哈鲁特带着困惑和错愕看向屏幕。所有人都盯着坐在震惊骑士旁边的金发萝莉。"
  - character: "菲鲁特"
    text: "哈？！我那天在巷子里根本没看到那四个人！那不是我！"
  - character: "视频内容"
    text: "菜月昴欣喜地：那是召唤我的可爱女孩吗？！金发少女眨了眨眼：召唤？我不知道你在说什么，但我很忙！抱歉，加油活下去！她给了菜月昴一个歉意的微笑和一个鼓励的大拇指，然后跳过了巷子尽头的墙。"
  - character: "菲鲁特"
    text: "哇——哇等等！"
  - character: "旁白"
    text: "菲鲁特挥舞着双手，爱蜜莉雅和加菲尔用被背叛的表情看着她，碧翠丝和雷姆也怒视着她。"
  - character: "菲鲁特"
    text: "我向你保证，我保证，我直到很久以后才在秘密藏身处外面遇到大哥的！这根本不是发生的事情！"
  - character: "碧翠丝"
    text: "如果你说的是真的……"
  - character: "罗兹瓦尔"
    text: "看来我们在这次事件讲述中找到了第一个破绽……"
  - character: "菲莉丝"
    text: "看来这真的不是一个现实呢，喵！"
  - character: "雷姆"
    text: "菜月昴君仍然有危险！"
  - character: "旁白"
    text: "爱蜜莉雅和碧翠丝屏住呼吸，用忧虑的目光盯着屏幕。"
  - character: "视频内容"
    text: "菜月昴：嘿，那件事有没有让你决定对我少一点敌意？混混：事实上，它打乱了我们的计划，让事情变得更糟了。菜月昴紧张地笑：是啊当然嘿嘿……"
  - character: "蜜蜜"
    text: "啊糟了！"
  - character: "库珥修"
    text: "他真的只是个孩子。他根本没有理由出现在我们的世界里。"
  - character: "奥托"
    text: "这是什么意思，如果我可以问的话，库珥修大人？"
  - character: "库珥修"
    text: "别担心，奥托君，我不是在暗示希望菜月昴被驱逐或回到他的原始家乡。他对爱蜜莉雅大人阵营和我自己的阵营中的许多人来说都是珍贵的人。"
  - character: "由里乌斯"
    text: "那我就放心了，库珥修大人。菜月昴在这个他身处的新世界中已经成为许多人珍视的人，不仅仅是提到的两个阵营。"
  - character: "视频内容"
    text: "菜月昴：冷静下来，菜月昴。从古代起就有长期规则，被召唤到平行世界的人会展现超自然的力量！"
  - character: "由里乌斯"
    text: "他是在傲慢的冲动下行事。"
  - character: "库珥修"
    text: "他为什么认为仅仅因为他从家乡被召唤就会获得特殊能力？"
  - character: "碧翠丝"
    text: "要向你们解释需要太长时间，你们只需要知道贝蒂的契约者从他的旧世界里有一些……被误导的信念，认为他因为被某人选中就应该获得某种力量。"
  - character: "视频内容"
    text: "菜月昴向站在右边最高的混混送上了一记快速的勾拳。"
  - character: "爱蜜莉雅"
    text: "哇？！"
  - character: "普莉希拉"
    text: "看来他至少能打。"
  - character: "视频内容"
    text: "菜月昴迅速转身，一脚将矮个子踢倒在地：那是我第一次打人，我没想到会那么疼……但这个世界被设定成我会变强的！"
  - character: "加菲尔"
    emotion: "兴奋"
    text: "让他们看看谁才是老大！"
  - character: "菲莉丝"
    text: "天哪，他的世界一定很无聊，如果他以前没打过架的话。"
  - character: "旁白"
    text: "爱蜜莉雅和雷姆的眼睛瞪大了，她们意识到菜月昴到底有多弱。"
  - character: "视频内容"
    text: "菜月昴自信地转身：我的肾上腺素在飙升！我能行。开始向第三个人跑去。"
  - character: "加菲尔"
    text: "给他们点颜色看看，大将！"
  - character: "雷姆"
    text: "小心点，菜月昴君！"
  - character: "碧翠丝"
    text: "停下！别再卷入更多了，我猜！"
  - character: "旁白"
    text: "最后一个混混在菜月昴自信地冲向他时甚至没有退缩，他保持冷静，露出了隐藏的两把刀刃。"
  - character: "爱蜜莉雅"
    text: "菜月昴！"
  - character: "雷姆"
    text: "菜月昴君！"
  - character: "阿尔"
    text: "啊，该死！"
  - character: "菲鲁特"
    text: "你说过你在那里是为了救他的！"
  - character: "视频内容"
    text: "菜月昴让所有人惊讶地停下了冲锋，在罪犯的脚前额头着地：对不起！都是我的错！原谅我！饶了我吧！"
  - character: "奥托"
    text: "好了，我们和这个人没有关系。"
  - character: "旁白"
    text: "加菲尔用手捂住了脸，看着大将可悲的样子流下了一滴眼泪。由里乌斯和里卡多也移开了目光。"
  - character: "普莉希拉"
    text: "哼！这个弱者真令人恶心。"
  - character: "爱蜜莉雅"
    text: "菜月昴……"
  - character: "库珥修"
    text: "他在做聪明的事，投降是在小巷里毫无意义的死亡时的最佳选择……虽然，老实说，我不禁觉得他如此迅速地抛弃自尊是令人厌恶的，即使这是必要的。"
  - character: "菲莉丝"
    text: "喵！这本来就是他这种人的预料之中~！"
  - character: "由里乌斯"
    text: "为了像区区一个小偷这样卑微的人而放弃自己的骄傲，菜月昴不应该被迫做这样的——"
  - character: "安娜塔西亚"
    text: "别忘了他只是一个普通的男孩，从一个被宠坏的、几乎和平导向的世界里被摘取出来的。菜月昴君很快意识到自己无法在这里战斗，并选择了为了生存的最佳行动方案。没有身体来挥舞它，骄傲就什么都不是。"
  - character: "旁白"
    text: "爱蜜莉雅阵营中许多人因为这个揭示终于向他们解释了为什么这个男孩对自己如此严苛而震惊地瞪大了眼睛。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "菜月昴一直在承受这么多！"
  - character: "碧翠丝"
    text: "你甚至不知道其中的一半，实际上……"
  - character: "旁白"
    text: "高贵的精灵低声说着，握着契约者的手，目光集中在屏幕上，试图忍住一些眼泪。安娜塔西亚自己的脑海中也充满了不愉快的记忆。"
  - character: "由里乌斯"
    text: "我深感抱歉，安娜塔西亚大人，我不是有意轻视你所经历过——"
  - character: "安娜塔西亚"
    text: "没关系，由里乌斯君。你是为了你的朋友而愤怒，我理解。"
  - character: "旁白"
    text: "菜月昴被一脚踢在了脸上。当他痛苦地扭动时，他之前打倒的两个人开始站起来向他走去。"
  - character: "视频内容"
    text: "混混：跟我们耍花样你就去死吧！人渣！三个混混踢打着少年，他试图用赤裸的手臂保护自己。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "该死！"
  - character: "旁白"
    text: "雷姆和大多数骑士都想跳进去让这些混混尝尝巷子里的鹅卵石地板的味道。爱蜜莉雅从屏幕上移开了目光，无法看这一幕。"
  - character: "视频内容"
    text: "一个权威而坚定的命令在巷子里回荡：够了！"
  - character: "旁白"
    text: "所有人的眼睛都瞪大了，爱蜜莉雅慢慢转回头面向屏幕。四个人都看向了现在站在巷子入口处的人——一位美丽的银发半精灵，皮肤如雪般白皙，眼睛在巷子里闪烁着紫色的光芒。"
  - character: "爱蜜莉雅"
    text: "我……我不记得这个……我从来没去过那条巷子……我根本没有在那样的地方遇到菜月昴！"
  - character: "菲鲁特"
    text: "看到了吧？！我就知道这东西有问题！"
  - character: "奥托"
    text: "到底怎么回事？"
  - character: "威尔海姆"
    text: "把我们带到这里的人设法把雷姆桑从睡美人病中救了回来，我不认为他们会用这样卑劣的玩笑来浪费我们的时间。无论这是什么，我们必须看到最后才能得出正确的结论。"
  - character: "缇碧"
    text: "但是……我们为什么要看这样一种疏远的事件讲述？爱蜜莉雅大人和菲鲁特大人都不知道发生了什么，所以我们怎么可能与这次放映产生共鸣或从中理解任何东西呢？"
  - character: "里卡多"
    text: "我们就看看这个，看它会怎么发展。"
  - character: "视频内容"
    text: "混混充满敌意地喊：你到底是谁？！爱蜜莉雅（屏幕内）：现在停下，我就既往不咎，所以请乖乖归还你们偷的东西。"
  - character: "旁白"
    text: "穿着皇家长袍的女士用不容置疑的语气坚定地评估着混混们。目睹她的美丽，菜月昴的眼睛几乎闪闪发光。"
  - character: "视频内容"
    text: "混混困惑地：我们偷了什么？"
  - character: "菲鲁特"
    text: "这个爱蜜莉雅认为他们偷了她的徽章……这几乎是个太好的巧合了。"
  - character: "旁白"
    text: "菲鲁特听起来很沮丧，因为她开始思考菜月昴为什么对艾尔莎知道那么多。"
  - character: "菲鲁特"
    text: "这不是一个被篡改的展示，是吗？"
  - character: "旁白"
    text: "年轻女孩惆怅地嘟囔道，无法理解到底发生了什么。这不是假的，无论有什么反对的证据。爱蜜莉雅心中也有同样的感觉，目光锁定在屏幕上。"
  - character: "爱蜜莉雅"
    text: "这……这就是他告诉我的吗……"
  - character: "旁白"
    text: "一段遥远的记忆中，一个哭泣的恳求的男孩告诉她，'你救了我。'一个令人困惑的想法。一个没有根据或基础的句子，因为她不记得自己做过任何接近的事情。"
  - character: "爱蜜莉雅"
    text: "怎、怎么……"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：拜托了。这对我很重要。其他东西我可以放弃，但那个我不能让你拿走。乖乖交出来吧，拜托了。"
  - character: "视频内容"
    text: "混混指着被揍的菜月昴：你不是来救这个孩子的？爱蜜莉雅（屏幕内）：他穿的衣服好怪，如果你问我是否和他有关系，我得说没有。"
  - character: "碧翠丝"
    text: "终于有人还记得贝蒂的契约者了。"
  - character: "普莉希拉"
    text: "哈哈哈哈！"
  - character: "加菲尔"
    text: "那可真不厚道啊，公主。"
  - character: "佩特拉"
    text: "你那样做太冷酷了，爱蜜莉雅大人。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "她、她怎么能那样说？！他迫切需要她的帮助！"
  - character: "由里乌斯"
    text: "看来即使是爱蜜莉雅大人也不赞同这个事件，也许这是在告诉我们一个爱蜜莉雅大人在某种程度上不同的世界？"
  - character: "视频内容"
    text: "混混：那你和我们没什么好说的！如果有人偷了你的东西，那可能是刚才跑过去的那个小鬼！爱蜜莉雅（屏幕内）：哦他们看起来不像在撒谎，我得去追她。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "到底会有多少人抛弃他，我猜？！"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "我绝不会那样做！这个我到底怎么了？！"
  - character: "旁白"
    text: "但突然间，她停下了脚步，转向那群混混和受伤的男孩，表情变成了愤怒。"
