  - character: "旁白"
    text: "爱蜜莉雅、雷姆和碧翠丝都从歇斯底里的状态中平静下来，带着灿烂的愉悦表情看着这一幕。没有人像她们三个那样了解菜月昴，她们都了解到菜月昴对膝枕有多看重。"
  - character: "视频内容"
    text: "菜月昴的目光转向坐在那只戏弄人的恶魔猫旁边的人——那个使用冰的银发救了他的女孩。她眯着眼睛不信任地看着他。"
