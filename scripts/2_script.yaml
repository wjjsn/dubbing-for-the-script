    text: "菜月昴：就这么点小忙，你说得好像我欠你很大人情似的。爱蜜莉雅（屏幕内）：没有的事。你知道是谁偷了我的徽章吧？"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）如释重负地叹了口气：那就没办法了，但你给了我你什么都不知道的信息。所以你给了我治疗你的答案。好吧，我很急，所以我要走了。下次别一个人闯进这种巷子。"
