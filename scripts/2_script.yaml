  - character: "库珥修"
    text: "她不应该为这个版本的自己的行为负责，安娜塔西亚·霍星。我们还没有确定这是否与我们自己的爱蜜莉雅有关，所以我认为因为她甚至没有做的事而教训她对我们没有帮助。"
  - character: "旁白"
    text: "商界女王让步了，对着虎视眈眈的公爵夫人哼了一声。"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）：我没有姓。你叫我莎缇拉就行了。菜月昴对她微笑：我明白了……莎缇拉……好名字。"
