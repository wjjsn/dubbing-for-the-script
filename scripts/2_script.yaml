    text: "多么令人恶心的画面，啧！"
  - character: "视频内容"
    text: "爱蜜莉雅（屏幕内）嗤之以鼻：往好了说，我最多只能把你当成她的哥哥。菜月昴痛苦地喊：你怎么觉得我比你小那么多？！"
  - character: "由里乌斯"
