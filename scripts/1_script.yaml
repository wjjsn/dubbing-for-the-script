title: Re:Zero 第一章：问候
author: Reactionist
作者的话: 以下内容包含小说及动画后续篇章的剧透。建议阅读网络小说到第六章，并观看动画和OVA。
script:
- character: 视频内容
  text: 在通往水门都市普利斯特拉的路上，一辆载满了喧闹乘客的马车疾驰而过。
- character: 视频内容
  text: 菜月昴双手抱着气鼓鼓的碧翠丝坐在马车上，揉着她的脑袋嬉闹。爱蜜莉雅坐在对面看着他们。
- character: 爱蜜莉雅
  emotion: 高兴
  text: 菜月昴！别那样对贝蒂！
- character: 碧翠丝
  emotion: 愤怒
  text: 如果区区一座大都市就能让你忽视贝蒂的可爱，那你可真是个糟糕的契约者，我可是这么想的呢。哼！
- character: 视频内容
  text: 爱蜜莉雅用手捂着嘴，紫绀色眼眸中满是笑意地看着菜月昴和碧翠丝。菜月昴使劲安抚着碧翠丝的怒气。
- character: 视频内容
  text: 菜月昴夸张地抱怨着，紧紧抱住碧翠丝。碧翠丝满意地昂着头，享受着他的抚摸和拥抱。
- character: 碧翠丝
  emotion: 兴奋
  text: 你运气好，贝蒂是有史以来最宽宏大量、最高贵的精灵，我可是这么想的呢。在旅途结束之前，你可要好好摸头来讨好你的精灵，实际上。
- character: 视频内容
  text: 菜月昴用夸张的疲惫表情看向爱蜜莉雅，假扮单亲爸爸求妻子帮忙。碧翠丝得意地享受着拥抱。
- character: 爱蜜莉雅
  emotion: 高兴
  text: 你真是个傻孩子，菜月昴。
- character: 碧翠丝
  emotion: 兴奋
  text: 没错，我可是这么想的呢。我很高兴你对贝蒂这么好，菜月昴。精灵就像家人一样，你应该始终用爱和关怀来对待她们。
- character: 视频内容
  text: 菜月昴温柔地注视着爱蜜莉雅，注意到她因为想起帕克而微微颤了一下。爱蜜莉雅低下头，脸上浮现出悲伤的笑容。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 我……每次看到你和贝蒂在一起，我就会想起我和帕克以前在一起的时光。
- character: 碧翠丝
  emotion: 兴奋
  text: 你应该嫉妒才对，实际上。帕克是个了不起的精灵，但贝蒂和菜月昴才是最好的搭配，我可是这么想的呢——诶诶诶！
- character: 视频内容
  text: 菜月昴竖起手指严肃地教训碧翠丝，揪起了她的双马尾。碧翠丝痛苦不堪地尖叫。
- character: 视频内容
  text: 菜月昴单膝跪在爱蜜莉雅座位前，握住她的手，用令人安心的目光仰望着她。
- character: 爱蜜莉雅
  emotion: 高兴
  prompt: 结结巴巴，害羞
  text: 菜、菜月昴……我一点都不难过……
- character: 视频内容
  text: 菜月昴温柔地握住爱蜜莉雅的手，说他知道她一直在想念帕克，理解她想把帕克找回来的心情。爱蜜莉雅感受到了他的温暖和爱意，回以微笑。
- character: 视频内容
  text: 碧翠丝一脸不爽地盯着他们，抱怨他们浪费时间。菜月昴和爱蜜莉雅同时咧嘴一笑，从后面扑过来把碧翠丝抱住。
- character: 碧翠丝
  emotion: 愤怒
  text: 诶诶诶？！你们两个在干什么，我可是这么想的呢？！你们两个都给我放手！
- character: 视频内容
  text: 爱蜜莉雅戏谑地逗弄碧翠丝，菜月昴把自己的脸颊贴在精灵的脸颊上蹭来蹭去。三人嬉闹成一团。
- character: 视频内容
  text: 马车前面传来声音，奥托探头看向马车里面。加菲尔把奥托推到一边，朝里面坏笑着。
- character: 加菲尔
  emotion: 兴奋
  text: 喂，大将！咱们的旅程快到头啦！抱歉打扰你和你家 lady 和孩子的时光了。
- character: 碧翠丝
  emotion: 愤怒
  text: 你说什么？！你怎么敢叫贝蒂是孩子，我可是这么想的呢？！
- character: 视频内容
  text: 爱蜜莉雅和碧翠丝同时撅着嘴，用愤怒的目光盯着菜月昴。菜月昴跪倒在地痛苦哀求。
- character: 爱蜜莉雅
  emotion: 愤怒
  text: 你是个坏~骑士，菜月昴！
- character: 碧翠丝
  emotion: 愤怒
  text: 你真是个没用的契约者，我可是这么想的呢。
- character: 视频内容
  text: 菜月昴捂着肚子陷入了歇斯底里的大笑，爱蜜莉雅和碧翠丝面无表情地看着他。两位女士带着宠溺的微笑看着他在地上打滚。
- character: 碧翠丝
  text: 笨蛋。没用的东西，我可是这么想的呢。
- character: 视频内容
  text: 菜月昴站起身来，脸上挂着自信的笑容。他温柔地告诉爱蜜莉雅一切都会好，他们会和安娜塔西亚见面帮她拿到精灵石，然后找回帕克。
- character: 视频内容
  text: 菜月昴耳语说带奥托来就是为了谈判，末了还眨了眨眼。奥托突然打开窗户大喊他听到了。两人斗嘴，爱蜜莉雅朝奥托露出感激的微笑。
- character: 奥托
  emotion: 高兴
  prompt: 脸红
  text: 当、当然了，爱蜜莉雅大人！我随时都会竭尽全力帮助你的阵营的。
- character: 视频内容
  text: 菜月昴嫉妒地看着奥托和爱蜜莉雅的互动，假装愤怒地宣布奥托是敌人。爱蜜莉雅和碧翠丝咯咯笑了起来。
- character: 视频内容
  text: 突然气氛一变，加菲尔朝窗户里大喊。菜月昴焦急地爬出窗户查看。马车急停，黑龙发出咆哮。
- character: 爱蜜莉雅
  emotion: 愤怒
  prompt: 惊慌
  text: 菜、菜月昴！怎么回事？！
- character: 视频内容
  text: 马车里突然充满了明亮的光芒，一个声音在脑中响起：'时间，贤者候补？真的又到了那个时候了吗？'光芒将整个世界覆盖成了一片空白。
- character: 视频内容
  text: 光芒消散后，爱蜜莉雅睁开眼睛，茫然地环顾四周。她身处一个没有门窗的封闭房间，一排排舒适的椅子排列着，面前是一块嵌入墙壁的巨大屏幕。爱蜜莉雅阵营被放在了最前排。
- character: 加菲尔
  emotion: 愤怒
  text: 搞毛啊，老子们怎么到这里来了！
- character: 奥托
  text: 冷静点，加菲尔君！
- character: 视频内容
  text: 房间里还有许多其他阵营的人。加菲尔注意到房间最后方出现了一道微弱光芒，露出了一个粉发女仆——拉姆。紧接着罗兹瓦尔也出现在她身旁。
- character: 拉姆
  emotion: 愤怒
  text: 这到底是怎么回事？！
- character: 罗兹瓦尔
  text: 这可真是有趣啊……看来我们都是被违背意愿传送过来的呢。
- character: 视频内容
  text: 罗兹瓦尔注意到房间里除了他的阵营之外，其他四位王选候选人和她们的亲信也都坐在里面，座位安排让每个阵营彼此分开。
- character: 爱蜜莉雅
  emotion: 高兴
  text: 菲鲁特酱？你也在这里？
- character: 菲鲁特
  emotion: 高兴
  text: 哟，大姐头！看到你平安无事真是太好了。
- character: 爱蜜莉雅
  emotion: 高兴
  text: 看到你也不错，菲鲁特酱。希望你最近没有偷东西。
- character: 菲鲁特
  text: 拜托！我不是道过歉了吗？！而且，我因为那档子事被抓去干王选这个破活儿，就当是惩罚了吧。
- character: 视频内容
  text: 莱茵哈鲁特身着近卫骑士团制服坐在菲鲁特身旁，迅速向爱蜜莉雅低下了头致意。
- character: 莱茵哈鲁特
  text: 再次见到您非常荣幸，爱蜜莉雅大人。很高兴看到您自上次重逢以来平安无恙。
- character: 爱蜜莉雅
  text: 很高兴见到你，莱茵哈鲁特大人。看到你也安好我很高兴。
- character: 莱茵哈鲁特
  text: 您不必用那种敬语将我视为与您同等的人，爱蜜莉雅大人。我不过是一名效忠于女王陛下的王国的普通骑士罢了。
- character: 视频内容
  text: 爱蜜莉雅询问菲鲁特和莱茵哈鲁特是否也被光芒传送过来。菲鲁特干巴巴地确认了。莱茵哈鲁特表示无论怎么尝试都找不到出路，他的力量和加护都毫无作用。
- character: 视频内容
  text: 碧翠丝焦急万分地疯狂摇晃着沉睡的菜月昴。爱蜜莉雅立刻跳起来朝他们跑去，跪下来检查菜月昴。她握住他的手检查脉搏，感觉到微弱的脉搏——他还活着。
- character: 碧翠丝
  emotion: 悲伤
  text: 菜月昴，快醒醒，我可是这么想的呢！他就是醒不过来，我可是这么想的呢！
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 贝蒂，菜月昴怎么了？！菜月昴……
- character: 视频内容
  text: 加菲尔和奥托跑了过来，蹲在爱蜜莉雅和碧翠丝身旁，看着昏迷的兄弟，脸上满是痛苦和惊慌。
- character: 威尔海姆
  text: 不必为菜月昴阁下惊慌，他会没事的。
- character: 视频内容
  text: 菲莉丝用爪子般的手势比划着，自信地安抚众人说菜月昴会没事。爱蜜莉雅的目光移向库珥修——绿发女士穿着标志性的蓝色制服，回以坚定不移的自信微笑。
- character: 库珥修
  text: 不必惊慌，爱蜜莉雅大人。看来把我们带到这里的人设法恢复了我的记忆。我确信菜月昴阁下没有醒来是有原因的，很快就会得到解释。
- character: 奥托
  text: 呃……抱歉，卡尔斯滕大人……但是……您说'很快就会得到解释'是什么意思？没有人拥有这样的力量啊。
- character: 菲莉丝
  text: 胆子不小啊，敢打断我家 lady 说话，小家伙，喵！
- character: 加菲尔
  emotion: 愤怒
  text: 喂，猫崽子！别以为你自己就不小了你听见没！
- character: 菲莉丝
  text: 哎呀呀。一上来就这么大火气。你们肯定是菜月昴的熟人吧。
- character: 碧翠丝
  text: 你这话什么意思，贝蒂实在不明白？
- character: 视频内容
  text: 库珥修解释说他们比其他人早到很多，一个声音告诉他们等待'贤者候补'的出现才能得到解释。爱蜜莉雅阵营震惊地互相对视，确认都听到了那个声音。
- character: 奥托
  text: 他在我的脑海中也是对贤者候补说的……贤者候补到底是什么？
- character: 菲鲁特
  text: 贤者候补到底是什么？
- character: 莱茵哈鲁特
  text: 我不知道那是什么……
- character: 碧翠丝
  text: 贝蒂是伟大的知识精灵，我可是这么想的呢。但贝蒂的档案中完全没有这个名称的记录，实际上。
- character: 视频内容
  text: 爱蜜莉雅大声向所有人解释光芒中听到的声音提到了'贤者候补'，并将目光转向沉睡的菜月昴。库珥修眯起眼睛饶有兴趣地问道。
- character: 库珥修
  text: 你觉得他们指的是菜月昴大人吗？
- character: 爱蜜莉雅
  text: 我觉得他们的目标可能是菜月昴……他是这里唯一一个没有醒来的人……他们一定想对他做什么特别的事情，因为他是……什么贤者候补。
- character: 菲莉丝
  text: 菜月君总是能吸引到最糟糕的麻烦呢，哈。
- character: 库珥修
  text: 嗯。看来把我们带到这里的那个人，掌握着我们所不知道的事情。
- character: 视频内容
  text: 安娜塔西亚带着她的佣兵团和骑士由里乌斯一同出现。阿尔从房间另一侧喊话确认不是安娜塔西亚的手笔。由里乌斯优雅地否认了。
- character: 安娜塔西亚
  text: 看来把我们带到这里的人比剑圣本人还要强大呢？
- character: 由里乌斯
  text: 这不是安娜塔西亚大人的所作所为。无论什么把我们带到这里，始作俑者肯定不是我们中的任何一个。
- character: 视频内容
  text: 爱蜜莉雅和碧翠丝坐在菜月昴旁边，每人握着他的一只手。后排又出现一道微弱光芒，露出了一个蓝发女仆——雷姆。
- character: 拉姆
  emotion: 高兴
  prompt: 震惊、幸福的泪水
  text: 雷姆！
- character: 视频内容
  text: 拉姆震惊地看着一个和她长得一模一样、但头发是蓝色而非粉色的人。蓝发少女困惑地眨了眨眼，拉姆紧紧地抱住了她，幸福的泪水从眼角滑落。
- character: 加菲尔
  text: 她不是大将的土豆吗？
- character: 爱蜜莉雅
  text: 那、那是雷姆小姐，没错。但是……我不记得……
- character: 罗兹瓦尔
  text: 我们还是不记得她是谁呢。
- character: 视频内容
  text: 蓝发女仆沉默地搂住惊慌失措的姐姐，轻拍着她的背。她扫视房间和里面的每个人，眼中充满了惊奇和困惑。
- character: 雷姆
  text: 我……我是雷姆……L.马瑟斯宅邸的女仆长……以及菜月昴的看护人。我能看出大家对我的身份感到困惑……如果打扰了你们的聚会，我很抱歉。
- character: 爱蜜莉雅
  emotion: 悲伤
  prompt: 担忧、心痛
  text: 菜月昴的……看护人？菜月昴……也爱着雷姆。
- character: 旁白
  text: 爱蜜莉雅的心痛苦地揪紧。她回忆起菜月昴每晚在入睡前深情凝视雷姆沉睡面容的记忆。嫉妒的羞耻感压倒了她。她甚至不记得这个女仆是不是她的朋友。
- character: 视频内容
  text: 库珥修注意到雷姆的震惊目光落在她身上，严厉地问道。雷姆似乎不愿提起她最后一次清醒时的那几分钟——公爵夫人在那次噩梦般的袭击中于她身后流血倒地的情景。
- character: 库珥修
  text: 冒昧问一下……我认识你吗？
- character: 视频内容
  text: 突然一个响亮的咔嗒声充满整个剧院，所有人都痛苦地抱住了头。瞬间之后消失了。加菲尔愤怒地大喊，他的目光被吸引到女仆身上。某种记忆正渗入他的脑海。
- character: 加菲尔
  emotion: 愤怒
  text: 什么鬼东西？！
- character: 视频内容
  text: 雷姆的存在回归被确认。所有人的脑海中迅速回放着每一段记忆、每一处空白，蓝发鬼族女仆在其中的正确位置被填补了回来。加菲尔震惊地流下了眼泪。
- character: 加菲尔
  emotion: 悲伤
  prompt: 震惊、泪水
  text: 天、天哪！雷姆！
- character: 视频内容
  text: 爱蜜莉雅和库珥修慢慢抬起头，眼中充满了惊骇的理解。罗兹瓦尔慢慢露出了充满真正喜悦的微笑。加菲尔颤抖着走向雷姆。
- character: 雷姆
  emotion: 高兴
  text: 加菲尔君？！你离开圣域了？！
- character: 加菲尔
  emotion: 悲伤
  prompt: 咬牙、沮丧
  text: 雷姆……对不起……我把你忘了……我们所有人都忘了你是谁。
- character: 视频内容
  text: 拉姆向雷姆解释，她和库珥修在前往王都途中遭到暴食大主教袭击，雷姆被暴食的权能击败，导致她的存在从所有人的记忆中被抹去，陷入昏迷沉睡。
- character: 雷姆
  emotion: 悲伤
  prompt: 颤抖、恐惧
  text: 你、你没有让我那样活着……对吧？
- character: 视频内容
  text: 拉姆低头沉默。雷姆慢慢后退，双眼因痛苦的真相而模糊。她颤抖着看向房间最前方沉睡的菜月昴。
- character: 雷姆
  emotion: 悲伤
  prompt: 呜咽
  text: 他……他有没有……
- character: 拉姆
  text: 他没有。巴鲁斯……是整个世界上唯一一个还能记住你是谁的人。
- character: 雷姆
  emotion: 高兴
  prompt: 纯粹喜悦的泪水
  text: 菜、菜月昴君？他还能记得我？
- character: 拉姆
  text: 巴鲁斯不知怎么拥有了保留被暴食抹去的记忆的能力。他把你留在身边，向所有人解释你是谁。
- character: 视频内容
  text: 雷姆带着纯粹的喜悦和释然的表情在原地颤抖。她紧紧地抱住满怀愧疚的姐姐，给予她温情。
- character: 雷姆
  text: 姐姐不应该因为忘了雷姆而自责。你能为她感到愧疚就已经够了不起了。
- character: 视频内容
