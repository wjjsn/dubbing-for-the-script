  - character: "爱蜜莉雅"
    text: "弗雷德莉卡和佩特拉当时不在宅邸里，正如你所看到的，莱茵哈鲁特。"
  - character: "旁白"
    text: "爱蜜莉雅天使般银铃般的声音迅速回答了骑士，即使隔着所有的模糊，他也能感受到半精灵语气中那令人沮丧的情绪。莱茵哈鲁特决定不再追问，因为他意识到这些观影对整个爱蜜莉雅阵营的影响。他不禁惊叹于菜月昴在被传送到这个世界后如此短的时间内就与这些人建立了如此深的联系。这与他自己阵营的成员在与莱茵哈鲁特本人建立联系方面形成了鲜明的对比。骑士只能暂时将这些感受埋藏起来。"
  - character: "由里乌斯"
    text: "没错……"
  - character: "旁白"
    text: "由里乌斯终于开口了。他的声音更轻了，但也更冷了。"
