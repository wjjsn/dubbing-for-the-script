  - character: "旁白"
    text: "奥托紧张地笑了笑。安娜塔西亚只是耸了耸肩，无视了偷笑的库珥修和咯咯笑的菲鲁特。两位候选人都能看到她把外套攥得有多紧。'这个少年该再挨一顿打！'安娜塔西亚只是原地生闷气。"
  - character: "视频内容"
    text: "屏幕开始展示菜月昴与双胞胎一起做家务的画面，这些来自之前的循环。他的心声在蒙太奇画面上响起：要在罗兹瓦尔的宅邸里生存一周，需要满足两个条件——首先是赢得这里工作人员的信任，其次是击败袭击宅邸的术士。"
