    text: "巴鲁斯从未告诉过我们他是怎么知道术士的事，但在看了屏幕上的事件之后，我大致有个想法了。"
  - character: "旁白"
    text: "拉姆觉得有必要回应这兴奋的低语，不过当她收到来自女仆同事和前排两个金发女孩的几道怒视时，她不禁缩了缩。"
  - character: "威尔海姆"
    text: "先看吧。"
  - character: "旁白"
    text: "威尔海姆建议道，他坐在座位边缘继续观看。老人想看看菜月昴是如何设法脱困的，他也注意到随着焦虑笼罩人群，对女仆们的敌意正在酝酿。"
  - character: "库珥修"
    text: "威尔海姆大人，你要么真的很想帮助那两个女仆，要么就是对这个年轻人产生了新的好感。"
  - character: "旁白"
    text: "公爵夫人带着了然的笑容斜眼看着老骑士。"
  - character: "威尔海姆"
    text: "我的女士，他从不放弃……如果换作是我，我不会给宅邸的人第二次机会，直接离开去走自己的路。然而，他找到了某种东西，让他能够放下这些人对他权利的背叛，找到了某种不可思议的东西……仁慈。"
  - character: "旁白"
    text: "库珥修听着老人的语气，微微皱眉。对于像他这样坚强的人来说，这听起来太阴郁了。"
  - character: "威尔海姆"
    text: "爱情是如此善变的东西，库珥修大人。它要么把你弯曲直到你彻底折断，毫不留情；要么它会成为你在最严酷的困境面前保持坚强的理由。"
  - character: "库珥修"
    text: "那比爱情更强烈的情感呢？"
  - character: "旁白"
    text: "年轻的家族领袖发现自己正严厉地盯着自己的脚。她无法找到正确的方式来理解老人的话。无法理解这种让她回想起心中某种可怕记忆的情感。"
  - character: "威尔海姆"
    text: "如果有那样的东西存在的话，库珥修大人。我至今还没有遇到过。"
  - character: "旁白"
    text: "威尔海姆对他的主君露出了一个奇异的微笑，几乎是自嘲的微笑，由衷地回答道。库珥修觉得最好保持沉默，将目光转向屏幕所在的方向。奇怪的是，她盯着菜月昴的后脑勺看了好一会儿。"
  - character: "库珥修"
    prompt: "内心独白"
