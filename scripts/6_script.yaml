title: "Re:Zero 第六章"
author: "Reactionist"
script:
  - character: "旁白"
    text: "第六章：导演剪辑版 第五集。剧院里的观众望着漆黑的屏幕，反应各异。房间里的空气在某种意义上是浑浊的，弥漫着一种令半数观众作呕的污浊感。这并非源于大厅设施本身的缺陷，而是来自于在场许多人所散发出的浓烈的悔恨与厌恶之情。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "所以他自杀了？"
  - character: "旁白"
    text: "银发的半精灵少女——爱蜜莉雅——面颊上挂着泪痕，脸上写满了难以置信与恐惧。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "是因为我把他带去的吗？是因为我只是想在那座孤寂的宅邸里有个朋友……菜月昴就受到了那么大的伤害吗？"
  - character: "旁白"
    text: "她强忍着不让声音破碎，呜咽着将脸埋入掌心，另一只手轻轻握着身旁之人的手。躺在她身旁的少年正沉睡着，对这安慰之举毫无反应。若非握住时还能感受到那份温暖，爱蜜莉雅握着的简直就是一具尸体的手。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "他自杀了……却连告诉我都不能……哦，菜月昴。"
  - character: "旁白"
    text: "爱蜜莉雅意识到那片黑暗与她目睹骑士在其中遭受折磨的影之世界极为相似后，便一直闭着眼睛。语言无法描述爱蜜莉雅对这一令人震惊的事实所感到的恐惧，也无法描述她得知骑士一直以来都背负着这个事实时的心碎。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我对他的痛苦一无所知……"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "我想，没有人能预料到这种事。"
  - character: "旁白"
    text: "在半精灵因愧疚而深受震撼的同时，某个精灵少女则更倾向于紧紧抱住契约者的手臂。她摩挲着某个部位——那是她曾与他在无数个夜晚争论过无数次的地方。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "原谅贝蒂吧，我是这么想的。"
  - character: "旁白"
    text: "碧翠丝一边喃喃自语，一边抱着菜月昴的手臂，摩挲着那些她曾见他抓挠过的地方。碧翠丝明白他为什么要在夜里做那些事了。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "他拼命想要得到解脱，实际上。"
  - character: "旁白"
    text: "她低语道，任由那份温暖将自己吞没。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "碧翠丝……"
  - character: "旁白"
    text: "爱蜜莉雅终于打破了沉默，银发少女似乎终于看清了坐在她对面的娇小精灵的模样。爱蜜莉雅深深地皱起了眉头——精灵那不再优雅从容的状态让她心疼。碧翠丝的脸颊上残留着干涸的泪痕，即使在房间昏暗的光线下也清晰可见。她的螺旋双马尾正一秒一秒地散开。那身精心穿着的华美连衣裙皱巴巴的，折痕破坏了它原本的魅力。但爱蜜莉雅的心之所以碎裂，并不仅仅是因为小女孩悲伤的这些可见痕迹。她能看到那孩子眼中的愧疚。碧翠丝握着菜月昴的手，用一个可爱女孩脸上所能呈现的最凄惨的表情凝视着它。这将半精灵的心撕成了两半。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "这太不公平了……"
  - character: "旁白"
    text: "爱蜜莉雅的思绪被一个突然涌上心头的念头骤然打断。刹那间，半精灵的眼中似乎燃起了希望，精神为之一振。她迅速站起身，活动着僵硬的肌肉。因为长时间保持不动，脚踩在地毯上时她感到一阵头晕目眩。顾不上那一丝恶心感，爱蜜莉雅非常乐意停下这短短的路程，跪下来将金发萝莉拥入怀中。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "这是什么意思呢？"
  - character: "旁白"
    text: "精灵用嘶哑而虚弱的声音问道，无法从公主那令人怜爱的紧拥中挣脱。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我能只是……你看起来真的很伤心……我也是。我……我觉得我们都需要这样。"
  - character: "旁白"
    text: "碧翠丝听了爱蜜莉雅的话，眯起了眼睛。"
  - character: "碧翠丝"
    emotion: "悲伤"
    text: "贝蒂只是在感受她应该感受的东西，实际上。他是我的契约者——"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "他是我的骑士，碧翠丝。他是唯一一个对我说过爱我并且是真心的人。"
  - character: "旁白"
    text: "爱蜜莉雅打断了精灵的话，同时松开了拥抱。银发的公主跪在碧翠丝的座位前，即便如此仍能比金发少女高出一英寸。碧翠丝面对爱蜜莉雅认真的神情似乎更加恼怒了。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "那告诉我，爱蜜莉雅。你为什么原谅了那些杀人凶手？"
  - character: "旁白"
    text: "王选候选人似乎被那冰冷的语气刺痛了。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "什……不，不，不！别把这说得好像我原谅了雷姆和拉姆的所作所为。即使菜月昴对那些被她们夺走的生命失去了所有记忆，我也永远不会原谅。"
  - character: "旁白"
    text: "爱蜜莉雅瞪大了眼睛，她终于明白了碧翠丝所暗示的意思。碧翠丝仔细审视着爱蜜莉雅，怒视似乎愈发强烈了。爱蜜莉雅激烈的否认和近乎天真的被背叛的表情，与这位半精灵刚刚的举动形成了一幅矛盾的画面。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "那你把你所做的称之为什么？为什么当我们把她们置于审视之下时，你却让她们逍遥法外呢？我是这么想的。"
  - character: "旁白"
    text: "精灵的质问几乎立刻被爱蜜莉雅语气中那令人惊讶的自信所反驳。"
  - character: "爱蜜莉雅"
    text: "我没有原谅她们……但是……我认为她们不配受到惩罚。"
  - character: "旁白"
    text: "爱蜜莉雅的目光柔和了下来，此刻投向了地面。"
  - character: "爱蜜莉雅"
    text: "无论她们让我多么愤怒，我真的不觉得菜月昴会希望在他……缺席的时候发生什么过激的事情。"
  - character: "旁白"
    text: "她的语气变得微弱，目光投向沉睡的骑士，眉头紧锁。"
  - character: "碧翠丝"
    text: "爱蜜莉雅。"
  - character: "旁白"
    text: "半精灵将视线转向面前的女孩。碧翠丝脸上带着一种难以解读的神情，无法分辨她是愤怒还是仅仅对爱蜜莉雅感到沮丧。"
  - character: "碧翠丝"
    text: "请回去坐好吧，我是这么想的。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "碧翠丝……"
  - character: "旁白"
    text: "意识到无法将局面变得更好，爱蜜莉雅优雅地接受了她与精灵之间这道明显的裂痕。她点了点头，起身回到自己的座位。爱蜜莉雅紧抿双唇，强忍着不让泪水滑落。失望和愧疚的沉重感在她的胸口变成了一个严重的问题。有一瞬间她甚至忘记了如何呼吸。半精灵所能做的，只有在脑海中不断回放蓝发女仆哭泣的面庞。看到雷姆脸上那纯粹的绝望，对一个杀人犯感到心痛。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "内心独白"
    text: "她看起来那么无辜……我为什么不惩罚她？……她对他做了那些事；对菜月昴做了那些事。"
  - character: "旁白"
    text: "从银发公主和她内心的愧疚与绝望中转移开来，另一位蓝发鬼族少女对自己的愧疚和恐惧似乎有着更为外露的态度。雷姆……亲爱的，可怜的雷姆。鬼族女仆已经崩溃了。她像一个球一样蜷缩着抱住自己的双腿，试图躲避这个世界。她试图将脸埋在穿着长袜的膝盖里，用哭泣来掩盖那压倒性的羞耻。看到自己的死亡，看到姐姐在她尸体前精神崩溃。姐姐不应该为她这样毫无价值的人哭泣！她本该是一个自私的怪物，理应被遗忘。她杀害了一个无辜的少年，让姐姐痛哭流涕。她本该受到惩罚。然而，雷姆的角还在。她依然拥有姐姐的爱。她依然被菜月昴拯救了。他甚至不惜以如此残忍的方式结束自己的生命，只为保住她的性命。"
  - character: "雷姆"
    emotion: "悲伤"
    text: "对不起，菜月昴。你真的很了不起。"
  - character: "旁白"
    text: "女仆可怜地低语着她的歉意和崇拜，拼命希望能被允许坐在他身旁，拥抱他的背脊，感受他身体的温暖和胸膛里的心跳。给大家一点时间来消化刚才所看到的内容。房间里大部分人的共识与屏幕上那个神秘声音的观点一致。最后一幕深深震撼了所有观众。除了房间里的某些人。其中一位……"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "真是浪费时间，令人失望！哼！"
  - character: "旁白"
    text: "一位有着火红长发和血红眼眸的公主面带不悦地将视线从屏幕上移开。"
  - character: "库珥修"
    text: "巴莉耶尔候选人，你是在说刚才向我们展示的那一幕不重要吗？"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "你比平时更烦人了，平民。"
  - character: "旁白"
    text: "尽管那绯红的双眼正充满恨意地眯起来，库珥修依然坚定地站着，用琥珀色的眼眸直视着普莉希拉。"
  - character: "库珥修"
    text: "我不会问你为什么对那孩子的精神状态毫无感触，我们大多数人都知道跟你这种人谈感情是多么徒劳。但我确实想知道，你为什么仍然坚持说这是在浪费时间。"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "只有平民和杂种才会纠结于感情。感情就是你们这些肮脏的老鼠唯一在乎的东西，这让我非常恼火。"
  - character: "库珥修"
    text: "啊，所以你觉得我们的情感很碍事？"
  - character: "旁白"
    text: "库珥修带着一丝同情的皱眉问道，目光投向这位身着红装的女性。"
  - character: "普莉希拉"
    text: "哼！更像是有时候玩起来挺有趣，有时候看着又很无聊。"
  - character: "旁白"
    text: "橙发少女一边扇着扇子，一边居高临下地盯着库珥修。"
  - character: "安娜塔西亚"
    text: "那么，你为什么对刚才在屏幕里看到的东西感到恼火呢？"
  - character: "旁白"
    text: "安娜塔西亚·霍星带着毫无表情的面容加入了这场对峙，之前观影的影响仍然让她无法拾起微笑的客套。普莉希拉缓缓将扇子指向沉睡中的菜月昴。"
  - character: "普莉希拉"
    text: "那边那个。"
  - character: "旁白"
    text: "库珥修和安娜塔西亚困惑地看着少年，然后又望向红装公主。"
  - character: "普莉希拉"
    text: "不知为何……他极大地取悦了我。"
  - character: "旁白"
    text: "普莉希拉低语道，目光却怒视着他。"
  - character: "安娜塔西亚"
    text: "是的，我想他现在已经引起了所有人的注意，你到底想说什么？"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "哼！像你们这样的机会主义老鼠应该能看出，这个家伙那令人作呕的能力究竟有多么强大。"
  - character: "旁白"
    text: "安娜塔西亚带着恨意怒视着公主，但保持了沉默。"
  - character: "库珥修"
    emotion: "愤怒"
    text: "你什么意思，巴莉耶尔？"
  - character: "罗兹瓦尔"
    text: "巴莉耶尔大人想说的是，菜月昴拥有实现任何他想要的事情的能力。"
  - character: "旁白"
    text: "当那个令人不安且不值得信赖的罗兹瓦尔以半带阴谋的语气发表意见时，几乎所有三位少女都对他投以憎恶的目光，尤其是普莉希拉。拉姆惊讶地看向他，试图理解他为何要以这种方式介入讨论。这位魔法之主的手微微颤抖，只有她能注意到。即使他朝候选人露出的那怪异的假笑也无法掩饰他变得多么紧张。"
  - character: "拉姆"
    prompt: "内心独白"
    text: "罗兹瓦尔大人……您也在担心巴鲁斯吗？"
  - character: "旁白"
    text: "这个问题没有得到回答，因为它只存在于拉姆的脑海中。但她不能向他提出这个问题，尤其是在她已经知道答案的时候。但她不明白的是，为什么他要在此刻，在候选人和她们的骑士面前行动？"
  - character: "安娜塔西亚"
    text: "我不记得有小丑被纳入我们的对话中。"
  - character: "旁白"
    text: "安娜塔西亚若有所思地说，同时怒视着那个阴险的小丑。罗兹瓦尔并未因三位候选人对他投来的憎恶目光而受到影响。他咧嘴一笑，向后靠在座位上。"
  - character: "罗兹瓦尔"
    text: "我确实认为我有权就此发表自己的看法。菜月昴毕竟是一位登记在册的马特斯骑士。"
  - character: "旁白"
    text: "有那么一瞬间，罗兹瓦尔露出了得意的表情。"
  - character: "库珥修"
    text: "你那番话是什么意思？"
  - character: "旁白"
    text: "库珥修压下厌恶感，敦促这位魔法师继续说下去。"
  - character: "罗兹瓦尔"
    text: "很简单。巴莉耶尔大人所厌恶的是，菜月昴拥有造王者的能力。"
  - character: "旁白"
    text: "安娜塔西亚和库珥修瞪大了眼睛看着小丑，明白了其中的含义。拉姆眯起眼睛看着他。"
  - character: "拉姆"
    prompt: "内心独白"
    text: "他在做什么？他一定知道如果向其他候选人暴露这种能力的用途，会给菜月昴带来怎样的危险。他为什么要这么做？"
  - character: "旁白"
    text: "当女仆陷入更深的困惑时，她的雇主继续与那些接受王冠考验的王族女士们对峙。罗兹瓦尔脸上的得意笑容更加扩大了。"
  - character: "罗兹瓦尔"
    text: "你们还不明白吗？菜月昴成功地让相互竞争的阵营达成了三方同盟，完成了击败白鲸这一不可能的壮举。你们认为他是怎么知道所有必要的情报的？"
  - character: "旁白"
    text: "罗兹瓦尔得意地俯视着两位震惊的候选人。"
  - character: "库珥修"
    text: "他……通过死亡回归。"
  - character: "旁白"
    text: "库珥修瞪大了眼睛脱口而出。在一切纷乱之中她没有时间去细想。但她记得菜月昴是如何完美地预判了她的计划，并通过实施自己的方案让其中的缺陷和褶皱消失的。"
  - character: "罗兹瓦尔"
    text: "完全正确！那么想象一下，如果被选为王国下一任统治者的人不是爱蜜莉雅大人，菜月昴会怎么做呢？"
  - character: "旁白"
    text: "此刻，罗兹瓦尔的脸扭曲到了极点，他脸上的笑容扭曲得如此之大，以至于未被小丑妆容覆盖的皮肤都显露了出来。那很丑陋。拉姆知道也理解假笑和刻意展示给对手最丑陋一面的冷笑之间的区别。"
  - character: "拉姆"
    prompt: "内心独白"
    text: "而罗兹瓦尔大人只是利用这一点来误导别人……他这样把巴鲁斯暴露在这些女孩面前，究竟想做什么？他想通过把她们引到这里来达成什么目的？"
  - character: "旁白"
    text: "房间里所有人都听到了他的话，并且都理解了其中的含义。一位半精灵低下了头，双手颤抖。"
  - character: "安娜塔西亚"
    emotion: "悲伤"
    text: "他……可以改变任何他不喜欢的结果。"
  - character: "旁白"
    text: "安娜塔西亚沮丧地盯着地面，这种能力的全部含义终于在她商人的头脑中扎根。这让她感到恐惧。拥有如此凌驾于命运本身的力量。带着沉思的皱眉，商人候选人开始干巴巴地喃喃自语。"
  - character: "安娜塔西亚"
    text: "我本以为这种能力并不重要，因为他无法使用它……但最后一次观影表明他确实做到了——"
  - character: "库珥修"
    text: "但菜月昴不会做那种事。"
  - character: "旁白"
    text: "安娜塔西亚惊讶地看向绿发少女。房间里大多数人也是如此。"
  - character: "安娜塔西亚"
    text: "你认为那孩子不会利用他的能力在这次选举中占据上风？"
  - character: "旁白"
    text: "安娜塔西亚质问看起来很坚定的库珥修。卡尔斯腾家的继承人点了点头，目光中充满了信念。"
  - character: "阿尔"
    text: "现在想想，帕尔在白鲸和怠惰的讨伐中已经抢走了大部分功劳。这两件事对爱蜜莉雅的声誉非常有帮助……这非常可疑。"
  - character: "旁白"
    text: "阿尔在普莉希拉身旁的位置上沉思道。那些有着相同思路的人开始同意他的观点。"
  - character: "缇碧"
    text: "是啊，也许菜月昴确实用了他的作弊能力来在公众中赢得一些好感。"
  - character: "旁白"
    text: "缇碧点了点头，他那策略驱动的头脑开始高速运转。观众中的一些人对这番话点了点头。"
  - character: "由里乌斯"
    text: "我们已经看到他对自己生命的漠不关心。他微笑着跳下了悬崖。"
  - character: "旁白"
    text: "由里乌斯低语道，目光投向下方，咀嚼着这些话语及随之而来的思绪。他内心矛盾。他的内心在呐喊，说菜月昴是一个英雄，值得尊敬和赞扬，因为他为这个世界变得更美好而努力。他想成为那个少年的朋友，因为他真心喜欢那个家伙。但他作为骑士和战士的自尊却在一点一点地让他对那个少年产生恐惧。如果菜月昴用那种能力来夺取王国怎么办？谁能阻止他？如果他被魔女控制了怎么办？这是一个可怕的想法。这对由里乌斯来说比对他们友谊的影响更令人心碎。"
  - character: "由里乌斯"
    text: "菜月昴可能从一开始就在利用我们所有人来实现他想要的任何目标。"
  - character: "旁白"
    text: "一些人难以置信地看着紫发青年……而另一些人开始同意他的看法。莱茵哈鲁特沮丧地看了一眼他的朋友。"
  - character: "莱茵哈鲁特"
    text: "你是说菜月昴对我们所有人都在撒谎？只是为了通过这次选举获取一些人脉？"
  - character: "旁白"
    text: "当由里乌斯避开他的目光时，莱茵哈鲁特的心揪紧了。"
  - character: "里卡多"
    emotion: "愤怒"
    text: "但你说过菜月昴是好人之一？"
  - character: "旁白"
    text: "里卡多失去了笑容，怒视着他在同一阵营的朋友。这位犬人因为菜月昴的忠诚被质疑而感到愤怒。"
  - character: "阿尔"
    text: "没有人会为了救一个杀过他的人而跳下该死的悬崖。"
  - character: "旁白"
    text: "阿尔从后方沉思道，让里卡多愤怒地瞪了他一眼。真遗憾……在开始的时候这两人还是很好的朋友。戴头盔的独臂骑士耸了耸肩，不予理会。看起来这位骑士对这场讨论毫不在意。拉姆正以怀疑的目光注视着他。"
  - character: "缇碧"
    text: "他可能只是想留在宅邸里。如果他救了蓝发女仆，他就能成为永久的客人，享受皇室般的待遇。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "我不得不承认，菜月昴是一个不值得信任的人。"
  - character: "库珥修"
    emotion: "愤怒"
    text: "菲莉丝！你怎么回事？！为什么你这么充满敌意？"
  - character: "旁白"
    text: "库珥修看着她的骑士，眼中满是被背叛的神色。猫耳少年惊讶了所有人——他站起来，泪眼婆娑地怒视着他的主人。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "如果他那么倾向于使用那种肮脏的魔女能力来占据上风，那你为什么还能如此信任他？！"
  - character: "旁白"
    text: "库珥修对她忠诚的朋友的愤怒瞪大了眼睛。自从她认识他以来，菲莉丝第一次直接挑战她。"
  - character: "莱茵哈鲁特"
    text: "你什么意思？"
  - character: "旁白"
    text: "莱茵哈鲁特问他的少数朋友之一，他的愧疚感越来越强。为什么他当时不把菜月昴一起带走？为什么他让那个少年就这样抛弃自己的生命？"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "大将一直在用这种能力帮助你们所有人！你们为什么对他这么生气？"
  - character: "旁白"
    text: "加菲尔愤怒地盯着猫耳少年，随时准备揍扁他，因为他居然无视大将的英勇。他亲眼看着菜月昴跳下悬崖去救一个杀害过他的人！"
  - character: "加菲尔"
    emotion: "兴奋"
    text: "大将是我所认识的最伟大的英雄。他承诺过要拯救所有人，即使他会死。"
  - character: "旁白"
    text: "加菲尔对菜月昴的自杀深感震惊。他曾认为这种能力可能会让他的大将变成一个没有心脏、不在乎任何人的怪物，因为他能够操控时间本身。但那场自杀向加菲尔展示了一个被击垮的孩子，一个愿意为救他在乎的人做任何事的孩子。那个孩子……就是他的大将。那个将他从圣域中拯救出来的人。如果他们胆敢轻视他的兄弟，加菲尔绝对饶不了他们。当满怀愧疚的莱茵哈鲁特和怒不可遏的加菲尔面对他、要求他对憎恨他们的朋友做出解释时，菲莉丝只是盯着他的主人，冷冷地回答。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "如果菜月昴是用死亡回归的能力来为爱蜜莉雅赢得选举……那不就解释了为什么你的记忆仍然被夺走了吗？"
  - character: "旁白"
    text: "库珥修眯起眼睛看着菲莉丝……她很失望。"
  - character: "加菲尔"
    emotion: "愤怒"
    text: "你在说什么？！"
  - character: "旁白"
    text: "加菲尔咆哮道，已经受够了这只猫。菲莉丝的恨意再次涌出，他怒视着金发少年。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "如果菜月昴真的关心他的朋友，他当时就应该自杀，阻止库珥修大人和女仆被暴食袭击。"
  - character: "旁白"
    text: "众人都瞪大了眼睛，倒吸一口凉气——治疗师面对盾之少女，眼中满是纯粹的愤怒。"
  - character: "菲莉丝"
    emotion: "愤怒"
    text: "菜月昴明白救雷姆也能拯救库珥修，所以他没有自杀，让女仆保持着睡美人的昏迷状态！如果他自杀了，阻止了库珥修和她带走的伤员，最受欢迎的候选人就不会失去记忆，而爱蜜莉雅在这场选举中也会有一个诚实的对手！"
  - character: "库珥修"
    emotion: "愤怒"
    text: "菲莉丝！"
  - character: "旁白"
    text: "猫耳少年的整个身形僵住了。他的身体在颤抖。他的面容扭曲成了恐惧。他回过头去。一道冰冷而愤怒的目光。一副失望而严厉的表情。双眸中都闪烁着受伤的光芒。在她那美丽的、闪耀着蜂蜜色泽的眼眸中。"
  - character: "库珥修"
    emotion: "愤怒"
    prompt: "语气冰冷而威严"
    text: "坐下。"
  - character: "旁白"
    text: "菲莉丝低下了头，服从了他的主人。他那失望的主人。库珥修转向加菲尔，低下了头。"
  - character: "库珥修"
    text: "我为我骑士的言辞道歉。"
  - character: "旁白"
    text: "她谦逊地对少年说道。加菲尔摇了摇头，坐了下来，目光始终停留在猫耳少年和他身旁的骑士身上。"
  - character: "安娜塔西亚"
    text: "但你的骑士所说的话仍然有道理。菜月昴为什么不使用他的能力来帮助拯救你呢？"
  - character: "旁白"
    text: "安娜塔西亚看着沉睡的菜月昴，表情矛盾。"
  - character: "里卡多"
    text: "老大……大罪司教是在我和老哥对付怠惰的时候发动攻击的。"
  - character: "旁白"
    text: "里卡多面色凝重。"
  - character: "由里乌斯"
    text: "他本可以在库珥修大人离开之前警告她的。"
  - character: "旁白"
    text: "由里乌斯默默地说道，他的面容毫无表情，目光投向地面。他希望他的朋友是清白的，没有使用那些卑劣的手段……但是……他就是无法说服自己。"
  - character: "缇碧"
    text: "但他需要为此而死啊……"
  - character: "旁白"
    text: "缇碧的声音传来，他站在安娜塔西亚一边。蜜蜜迅速拍了弟弟的脑袋一下。"
  - character: "缇碧"
    text: "哎呀！"
  - character: "蜜蜜"
    emotion: "愤怒"
    text: "够了！大哥在那场战斗中全力以赴了！同时对付白鲸和那个可怕的男人！你没有权利把他当作恶棍来谈论！"
  - character: "旁白"
    text: "蜜蜜对着弟弟喊道，她对菜月昴那晚的勇敢行为的敬畏和惊叹之情全面爆发。加菲尔对这个小女孩笑了笑。他能和她相处！她知道他的大将有多了不起！"
  - character: "阿尔"
    text: "不过确实很可疑……他为什么不警告其他人暴食的袭击？他为什么要独揽两场战斗的功劳？现在很清楚他可以毫无顾忌地自杀，因为这就是他在上一次观影中所做的。"
  - character: "旁白"
    text: "阿尔向矛盾重重的人群沉思道，对他的话给下方人们造成的影响毫无悔意。这让拉姆怒火中烧。"
  - character: "拉姆"
    emotion: "愤怒"
    text: "别再煽风点火了！"
  - character: "旁白"
    text: "她朝那个可怕的骑士唾弃道，后者耸了耸肩，举起了双手。"
  - character: "阿尔"
    text: "嘿，如果需要的话，不能怪我，女仆小姐。你的朋友们此刻正在犯傻，不是我的错。"
  - character: "旁白"
    text: "粉发女孩被这个回答弄得措手不及，惊讶的神情取代了她的表情，然后她再次怒视他。"
  - character: "拉姆"
    emotion: "愤怒"
    text: "你什么意思？"
  - character: "旁白"
    text: "阿尔从她身上移开目光，朝下面几排的人点了点头。拉姆顺着他的方向看去，困惑地观望着。莱茵哈鲁特看了看由里乌斯，又看了看菜月昴。"
  - character: "莱茵哈鲁特"
    text: "我们看到了他是如何来到这个世界的。他是如何遇到我和爱蜜莉雅大人的。我不认为他在利用我们为一个他来到这个世界之前根本不知道的选举获取进一步的优势。"
  - character: "旁白"
    text: "莱茵哈鲁特试图理性分析。他想要相信菜月昴是朋友。他想拥有他这个朋友。由里乌斯看起来并不信服。他害怕菜月昴。他害怕他的朋友是敌人。"
  - character: "由里乌斯"
    text: "那魔女为什么要支持他？"
  - character: "莱茵哈鲁特"
    text: "这……确实值得问。"
  - character: "旁白"
    text: "莱茵哈鲁特缓缓低下头，握紧了拳头。他想成为菜月昴的朋友……但证据不容忽视，他有一套准则，让他将怀疑置于感情之上。但菜月昴并不是只有莱茵哈鲁特这一个朋友……还有另一位朋友在听到这些无稽之谈时正在浑身发抖。幸运的是……这个人不需要遵循什么准则。"
  - character: "奥托"
    emotion: "愤怒"
    text: "由里乌斯。"
  - character: "旁白"
    text: "由里乌斯缓缓抬起头，看看是谁在叫他。砰！"
  - character: "由里乌斯"
    text: "该死！"
  - character: "旁白"
    text: "所有人都震惊而惊讶地看着由里乌斯突然被一拳打在脸上。"
  - character: "奥托"
    emotion: "愤怒"
    text: "我知道那没有伤到你，由里乌斯。所以请看着我的眼睛，听我说话。"
  - character: "由里乌斯"
    text: "这种行为可能会导致你被处决，你知道吗？你刚刚袭击了一位皇家骑士。"
  - character: "旁白"
    text: "由里乌斯缓缓而冰冷地转过头，面对着站在他面前的商人。奥托只是用严厉的目光俯视着由里乌斯。"
  - character: "奥托"
    emotion: "愤怒"
    text: "你看起来需要这个。"
  - character: "由里乌斯"
    text: "何以见得？"
  - character: "奥托"
    emotion: "愤怒"
    text: "因为你忘记了谁是你的朋友。"
  - character: "旁白"
    text: "由里乌斯的呼吸一滞。"
  - character: "奥托"
    emotion: "愤怒"
    text: "你刚才在害怕菜月昴。不是吗？"
  - character: "旁白"
    text: "由里乌斯瞪大了眼睛。"
  - character: "奥托"
    emotion: "愤怒"
    text: "你试图抓住任何东西，只为给正在你心中蔓延的恐惧找一个正当理由，而你忘记了菜月昴是你的朋友，忘记了他是谁。"
  - character: "旁白"
    text: "商人的怒视穿透了这位优雅骑士的防线。"
  - character: "由里乌斯"
    text: "怎……怎么……唔！"
  - character: "旁白"
    text: "由里乌斯握紧拳头，移开了目光。奥托从一开始就看穿了他。"
  - character: "奥托"
    text: "想想你和菜月昴度过的所有时光。那个你认识的人。"
  - character: "旁白"
    text: "商人严厉地指着骑士的胸口，脸上满是失望和愤怒。由里乌斯无法反驳奥托……他的从容消失了，他的优雅在那个他以为是跟在爱蜜莉雅阵营后面的小商人的干预下碎裂了。奥托转过身走回自己的座位，留下那个满脸伤痕的骑士独自思考他究竟是如何看待那个名叫菜月昴的少年的。一个能毁灭他王国的怪物？一个利用他和他朋友的骗子？还是那个拥有一颗金子般的心的了不起的混蛋？他的朋友。莱茵哈鲁特低下了头，也思考着奥托的话。他开始哀叹自己与那个眼神凶恶的少年之间的所有交集。"
  - character: "莱茵哈鲁特"
    emotion: "悲伤"
    text: "我希望我能花更多时间陪他。"
  - character: "旁白"
    text: "他喃喃自语，因为他发现自己与朋友的记忆少得可怜。"
  - character: "菲鲁特"
    text: "这就是你不贪婪的下场。"
  - character: "旁白"
    text: "一个早已被遗忘的声音响起。"
  - character: "莱茵哈鲁特"
    text: "菲鲁特大人？"
  - character: "旁白"
    text: "那个一直沉默的金发少女终于用一种嘲讽而又真诚的语气开口了，她对她的骑士露出了一抹坏笑。"
  - character: "菲鲁特"
    text: "你需要贪婪一点。你需要让你的朋友多花些时间陪你。"
  - character: "旁白"
    text: "莱茵哈鲁特对此感到惊讶。一个因自私和怠惰而撕裂了他的家庭、毁掉了许多人生命的少年，怎么可能变得更贪婪？"
  - character: "菲鲁特"
    text: "这是命令。你需要成为大哥真正的朋友。"
  - character: "旁白"
    text: "菲鲁特对他坏笑着。莱茵哈鲁特……只能微笑。这是他的大人的命令。他会变得贪婪。小女孩微笑着靠回座位，看着她的大哥。她不是傻瓜。她明白那个灰发笨蛋在打由里乌斯的时候在做什么。她为菜月昴的人生如此艰难而震惊。但她永远不会对他有不好的看法。她之前错过了机会，在菜月昴的命运被决定时她被打晕了。这次她不会再失去他。如果因为没有人愿意帮助他，他得到的只有痛苦和死亡，那么她和莱茵哈鲁特会拯救他。菲鲁特有了自己的心态。她也想变得贪婪。库珥修对绿衣少年的发言点了点头。在得知菜月昴的能力时她曾目瞪口呆。她对其中的含义感到恐惧。但在她心中，有一件事让她对那个黑发少年——骑士——的信念坚定不移。他是一位骑士，她需要尊重这一点。在奥托的行动激励下，库珥修以自己坚定的立场面对普莉希拉和安娜塔西亚，菲莉丝的看法丝毫没有阻碍她看待事物的方式。"
  - character: "库珥修"
    text: "那个少年永远不会将那种能力用于自己的利益。"
  - character: "安娜塔西亚"
    text: "你凭什么这么说？他独揽了你的军队和我的雇佣兵共同战斗的功劳。"
  - character: "旁白"
    text: "安娜塔西亚用一种并非指责但仍十分精明的语气问库珥修。当然，她的雇佣兵只是被派去支援的，她也只接受了采矿权和安全贸易路线作为报酬……她对人们只谈论爱蜜莉雅的骑士，仿佛他是唯一出力的人这件事有些不满。令商人和在场所有人惊讶的是，这位公爵发出了爽朗的笑声。"
  - character: "库珥修"
    emotion: "高兴"
    text: "让我纠正一下各位对菜月昴的某种误解。"
  - character: "旁白"
    text: "安娜塔西亚和房间里的大多数人都看向了站着的库珥修。"
  - character: "库珥修"
    text: "在白鲸被讨伐之后，菜月昴拒绝了我对他的任何赞扬。当我告诉他，他所做的一切将得到应有的荣誉时，他感到很震惊。他甚至试图让我把所有的荣耀都揽在自己身上。"
  - character: "旁白"
    text: "库珥修对着沉睡的少年温暖地笑了笑。是的，一个没有力量也没有天赋的少年。"
  - character: "库珥修"
    text: "如此巨大的努力出自这样一个少年之手，理应受到赞扬并昭告天下。是我，赞扬了他，向世人宣告了他的成就。"
  - character: "旁白"
    text: "库珥修自信地向剧院里的观众宣布。"
  - character: "爱蜜莉雅"
    emotion: "兴奋"
    text: "什么？菜月昴做了这些？"
  - character: "旁白"
    text: "爱蜜莉雅惊叫出声，眼睛瞪得大大的，难以置信。她虚弱地问道，眉头皱得更深了。她觉得自己被排除在对话之外，不喜欢这种感觉。安娜塔西亚瞪大了眼睛，她从未想过菜月昴会拒绝这样的赞扬。或者说她本该想到的……"
  - character: "安娜塔西亚"
    text: "当然了，这个没有野心的白痴会做这种事。"
  - character: "旁白"
    text: "安娜塔西亚一巴掌拍在自己脸上，想起了这个少年迄今为止的性格。一丝微笑浮上了她的嘴角。"
  - character: "阿尔"
    text: "所以他没有利用你？我的错。"
  - character: "旁白"
    text: "阿尔用无聊的语气说道，靠回了座位。拉姆震惊地看着他。"
  - character: "库珥修"
    text: "没有。"
  - character: "阿尔"
    text: "是的。你的朋友们只需要一点推动就能得出关于我朋友的正确结论。仅此而已。"
  - character: "旁白"
    text: "阿尔在拉姆震惊的目光下耸了耸肩。"
  - character: "拉姆"
    text: "你是想让大家停止对巴鲁斯的负面看法……通过让他看起来很糟糕？"
  - character: "旁白"
    text: "拉姆质疑道，表情传达出这个想法有多么荒谬。戴头盔的骑士没有回头看她。"
  - character: "阿尔"
    text: "嘿，我知道朋友有一些很棒的朋友会保护他的形象。我只需要搭好舞台。"
  - character: "拉姆"
    text: "……你为什么要那样做？你能得到什么？"
  - character: "阿尔"
    text: "没什么。我只是想离开这里，而你们在浪费时间讨论这些事。我需要加快进度。另外，我不喜欢那个小丑家伙帮助我朋友形象的方式。"
  - character: "旁白"
    text: "听到这话，拉姆的头脑立刻拼凑出了他的意思。在菜月昴是否值得信任这件事上，众人意见分歧。她之前没看出来，但在那场自杀性的死亡之后，每个人的想法都发生了变化。如果使用者认为自己的生命是廉价的代价，死亡回归就是危险的。"
  - character: "拉姆"
    text: "罗兹瓦尔大人……"
  - character: "旁白"
    text: "拉姆回头瞥了一眼她的雇主，他站在离她几排远的地方，就在普莉希拉的座位旁边。他安排这一切是为了让大家都能讨论？为了让菜月昴的朋友们消除其他人的担忧？罗兹瓦尔操纵下方的人们是为了帮助菜月昴还是为了别的什么？粉发女仆在审视她的主人时显得有些犹豫。"
  - character: "罗兹瓦尔"
    text: "如此多的混乱！我想这就是你想要的吧？"
  - character: "旁白"
    text: "罗兹瓦尔对坐在同一排、身着红装的公主微笑道。普莉希拉面无表情地扇着扇子，俯视着下方的人群。公主叹了口气，将扇子丢在阿尔的腿上。"
  - character: "阿尔"
    text: "公主？"
  - character: "旁白"
    text: "阿尔抬起头，他的主人从座位上站了起来，然后——啪！"
  - character: "旁白"
    text: "罗兹瓦尔大人！拉姆迅速跑去扶起她的主人，他正躺在地板上。小丑缓缓挥了挥手，揉了揉被普莉希拉鞋底踢中的脸。"
  - character: "罗兹瓦尔"
    text: "没事的拉姆。我想巴莉耶尔大人踢我这张英俊的脸一定有充分的理由吧？"
  - character: "旁白"
    text: "橙发公主脸上带着厌恶的表情，放下腿，在地毯上擦了擦鞋子。"
  - character: "普莉希拉"
    text: "阿尔德巴兰，你待会儿要舔干净我的鞋子。恐怕它碰到了下水道的污泥。"
  - character: "旁白"
    text: "罗兹瓦尔眯起眼睛看着公主，在女仆的搀扶下站了起来，似乎有些恼怒。"
  - character: "阿尔"
    text: "公主，请不要与最强大的魔法使用者以及另一位候选人的赞助者开战。"
  - character: "旁白"
    text: "戴头盔的骑士叹了口气，试图让少女冷静下来。"
  - character: "普莉希拉"
    text: "哼！这条狗需要一些管教，我亲自来纠正他。我厌恶的原因并非这条狗的暗示。我有另一个原因，让我对那个少年既厌恶又觉得有趣。"
  - character: "旁白"
    text: "库珥修咧嘴一笑，她不得不承认，那一脚踢得看着很爽，她身旁的紫发商人也在外套后面偷笑。"
  - character: "安娜塔西亚"
    text: "什么原因？"
  - character: "旁白"
    text: "安娜塔西亚愉快地问道。普莉希拉看起来很恼火自己不得不与这些平民说话。"
  - character: "普莉希拉"
    text: "我想像我这样的女神，应该是向肮脏的杂种们解释的那个人。那个少年让我觉得有趣，也让我厌恶……因为我不理解他。"
  - character: "旁白"
    text: "公主指向沉睡中的菜月昴，同时露出了感兴趣的神情。"
  - character: "菲鲁特"
    text: "你什么意思？"
  - character: "旁白"
    text: "菲鲁特终于加入了讨论，她想知道这个讨厌的女孩对她大哥有什么看法。"
  - character: "普莉希拉"
    text: "哼！像你这样的老鼠不会明白的。我想知道的是，为什么这个少年不用他的能力来消除他的耻辱？"
  - character: "佩特拉"
    text: "你在说什么？"
  - character: "旁白"
    text: "佩特拉终于忍不住开口了，她疲惫地看着公主。小女孩的心已经碎了——她的英雄自杀了，还被她所敬仰的人杀害。而现在又有一件事增添了他的「耻辱」？佩特拉快要撑不住了。"
  - character: "威尔海姆"
    text: "我想我明白候选人大人在说什么。"
  - character: "旁白"
    text: "所有人的目光都转向了坐在僵硬的菲莉丝身旁的老管家。"
  - character: "库珥修"
    text: "威尔海姆大人？"
  - character: "旁白"
    text: "库珥修惊讶地看着她的骑士。说实话，她把他忘了。"
  - character: "威尔海姆"
    text: "抱歉打扰，但我可能理解了巴莉耶尔大人那矛盾情感背后的含义。"
  - character: "普莉希拉"
    text: "一个疯疯癫癫的老傻瓜怎么可能理解女神的想法。但看着你尝试倒也有点意思。"
  - character: "旁白"
    text: "库珥修对公主的自负叹了口气，转向鞠躬的管家，点头表示许可。威尔海姆对着绯红眼眸的少女说话，同时将声音控制在刚好让其他人也能听见的音量。"
  - character: "威尔海姆"
    text: "昴大人没有使用他的能力来抹去那天在王宫里表现出的那些令人羞耻的行为。"
  - character: "旁白"
    text: "由里乌斯和菲莉丝瞪大了眼睛看着老人。"
  - character: "莱茵哈鲁特"
    text: "没错！"
  - character: "旁白"
    text: "莱茵哈鲁特有生以来第一次想要大笑出声，但因为这是他祖父在发言，他决定不打断他。但他确实感到更加受伤——自己的祖父比他更挺身而出为菜月昴辩护。老人温暖地微笑着，蓝色的眼睛里闪烁着尊敬和信念。"
  - character: "威尔海姆"
    text: "你感到困惑和厌恶，是因为你无法理解一个人可以拥有如此无私善良的灵魂。你以为这种能力会造就一个机会主义的冷血怪物。"
  - character: "旁白"
    text: "普莉希拉瞪大了眼睛——老人精确地描述了她的想法。库珥修骄傲地笑了。"
  - character: "威尔海姆"
    text: "然而我们所看到的，只是一个少年用他所拥有的一切去拯救朋友，而这正是你无法理解的。"
  - character: "旁白"
    text: "普莉希拉恨不得把鞋跟踩在这个老家伙的脸上。"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "你竟敢……"
  - character: "旁白"
    text: "她想要对他大喊，当场杀了他。他怎敢这样读她的心思！？她，一个平民渣滓中的神，居然无法理解一个软弱可怜少年的善良之心？多么愚蠢的骗局！？那个黑发少年是……砰！"
  - character: "阿尔"
    text: "嗷！公主！？"
  - character: "旁白"
    text: "一些人因普莉希拉踢向骑士腹部的一脚而面露苦色。他被踢飞到了墙上。普莉希拉哼了一声坐了下来，怒视着远处沉睡的少年——他正被一个小金发女孩抱着，还有一个执着的银发半傻瓜黏在他身上。爱蜜莉雅迎上了普莉希拉的目光，紧紧地抱住了菜月昴的手臂。半精灵不喜欢所有人似乎都把菜月昴当作一个物品来追逐他们的兴趣。威尔海姆坐了回去，恢复了静默观察的姿态。库珥修和安娜塔西亚坐在她们矛盾的骑士身旁。所有人都和普莉希拉一样矛盾。有些人无法抑制内心的愧疚——当他们本可以帮助保护那个少年时却没有出手，比如弗雷德莉卡和佩特拉。其他人则只是等待着更多内容的揭示。罗兹瓦尔被护送回两位尽职的女仆之间坐下，他的表情是纯粹的宽慰。只有拉姆注意到了这一点。"
  - character: "拉姆"
    text: "你又在帮助巴鲁斯了？"
  - character: "罗兹瓦尔"
    text: "我并不总是像你所看到的那样在帮助菜月昴，拉姆。我需要以某种方式尽我的职责。我很高兴阿尔大人和他尊敬的主君允许我利用他们，这样我就能把大家推向一条更好地看待我们英雄的道路。"
  - character: "旁白"
    text: "领主用柔和的语气说道，只有她能听见。即使他只是低头看着自己的裤子、拍掉上面的灰尘，脸上也挂着一抹悲伤的微笑。拉姆的沉默证明了她的震惊。她的面容没有显露出来，但内心充满了难以置信的愧疚和羞耻。"
  - character: "拉姆"
    text: "所以你这么做是因为你觉得巴鲁斯死那么多次是你的错？"
  - character: "旁白"
    text: "她不明白为什么之前从未想到过这一点。当然，罗兹瓦尔觉得一切都是他的错。不管别人怎么说，他是指挥宅邸的人，有权力保护里面每一个人。菜月昴的死亡，在任何会思考的人看来，与其说是雷姆的错，不如说是他自己的错。即使他摆脱了嫌疑，内心仍然背负着大量的愧疚。这让鬼族少女为自己竟然怀疑主人而感到无比羞耻。当她意识到这一切有多少是她的错时，她的羞耻感变得更加强烈了。如果她是一个更好的姐姐，帮助雷姆克服她的不安……菜月昴就不必遭受如此残忍的结局，她的主人也不需要操纵其他人、把更多注意力引到自己身上来保护她们的形象。在某种程度上，拉姆知道他把妹妹变成那样的责任归咎于自己。粉发恶魔用颤抖的拳头攥紧了裙摆。覆盖在她愤怒握紧的拳头上的手套在一定程度上让她冷静了下来，但无法阻止羞耻的火焰灼烧她的心。罗兹瓦尔只是轻轻拍了拍她的手，目光继续投向屏幕。他的嘴唇抿成一条线。"
  - character: "旁白"
    text: "让我们继续观看以获取更多信息。这可能会让你们安心一些。当看守者的声音响起，穿透了充满揣测的氛围时，所有人的注意力都被推向了那扇开始恢复生气的漆黑屏幕。第一季第五集导演剪辑版，开始。一只漆黑的手从虚空中伸向菜月昴。一个模糊的画面……一个微弱的声音……"
  - character: "视频内容"
    text: "菜月昴睁开眼睛，发现重置房间的同一片天花板在头顶上方。他通过死亡回归了。双子女仆出现在他面前。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "这太令人恼火了，实际上。"
  - character: "旁白"
    text: "碧翠丝抱怨道，怒视着屏幕上的两个女仆。同一排的另一个金发女孩同意精灵的看法。"
  - character: "菲鲁特"
    text: "我理解你。在看过那些之后，这真的很恶心。"
  - character: "旁白"
    text: "菲鲁特将视线从屏幕上移开，她的皱眉让骑士察觉到有什么不对，但她也对他移开了目光，保持着面无表情。"
  - character: "加菲尔"
    text: "好了啦……我们只需要等大将醒来问他该怎么办就行了。没必要让自己生气——"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "我们有理由生气。"
  - character: "旁白"
    text: "金发虎人在爱蜜莉雅冰冷的目光下微微一缩，菲鲁特和碧翠丝的怒视更是雪上加霜。"
  - character: "奥托"
    text: "爱蜜莉雅大人，我觉得最好还是听听加菲尔的建议，不要发表过于笼统的言论。"
  - character: "旁白"
    text: "奥托让半精灵吃了一惊——他停止观看屏幕，给了她一个阴沉的表情。银发公主愣了一下，然后恢复了镇定。"
  - character: "视频内容"
    text: "菜月昴缓缓坐起身，盯着站在他面前的雷姆和拉姆。他闭上眼睛回忆着上一个循环，以及这两人当时是多么崩溃。注意到他脸上痛苦的表情，两人带着担忧的神情跑到了他身边。"
  - character: "视频内容"
    text: "菜月昴抬头看着担忧的女仆们，迅速将她们的手各握在自己手中，说要看看她们的手。雷姆和拉姆都震惊地瞪大了眼睛。"
  - character: "雷姆"
    text: "就是这个？就是这个人？"
  - character: "旁白"
    text: "雷姆用一种可以描述为充满喜悦和希望的语气问道。黑发青年凝视着她和拉姆时眼中没有恐惧或恶意，这也让她的心怦怦直跳。坐在她身旁的粉发双胞胎姐姐对此大为震惊。"
  - character: "视频内容"
    text: "菜月昴缓缓闭上眼睛，回忆起他做噩梦的那段时间。那双手……就是当时帮助他的那双手。他如释重负地微笑着，真诚地握着她们的手。"
  - character: "视频内容"
    text: "女仆们看起来很恼火，迅速将手从他的掌握中抽出来，退后一步怒视着他。"
  - character: "阿尔"
    text: "从她们的角度来看，这确实看起来很变态。"
  - character: "旁白"
    text: "阿尔若有所思地说，一些人点头表示同意。拉姆似乎恢复了镇定，忍住了对屏幕上所展示的行为的侮辱性评论。她仍然能感受到当时的厌恶，只是现在她更加震惊的是——那个少年对她和她妹妹的奇怪互动，她自己也直接参与了其中。当时他看起来像是个小变态……现在她明白了。"
  - character: "菲莉丝"
    text: "换了任何女孩都会因为那种行为扇他一巴掌，我不意外。"
  - character: "库珥修"
    text: "我不觉得他的行为有什么值得担心的。"
  - character: "旁白"
    text: "库珥修代替菜月昴反驳道，她的表情是对亚人治疗师的不满。菲莉丝咬了咬嘴唇，将视线从她和旁边穿管家服的老人身上移开。"
  - character: "视频内容"
    text: "菜月昴不好意思地笑了笑，向双胞胎道歉并表示信任她们。他缓缓下了床，穿着睡袍站在两人面前，微笑着伸出手提议做朋友。"
  - character: "普莉希拉"
    text: "他有多蠢？"
  - character: "旁白"
    text: "普莉希拉怒视着这一幕，脸上满是困惑。"
  - character: "安娜塔西亚"
    text: "我确定他是被所有那些死亡搞疯了，对吧？一定是痛苦让他这么容易就原谅了。"
  - character: "阿尔"
    text: "拜托，老兄。你不能就这样原谅！"
  - character: "旁白"
    text: "双胞胎困惑地看着这个男人的轻浮。一个新的声音进入了房间。"
  - character: "视频内容"
    text: "爱蜜莉雅带着真诚的微笑走进房间，看着少年。爱蜜莉雅那冰冻而恍惚的面容突然转变为纯粹的宽慰和喜悦，她的笑容咧到了耳边——这是很久以来的第一次。"
  - character: "爱蜜莉雅"
    emotion: "高兴"
    text: "就是这个！我记得的就是这样！"
  - character: "菲鲁特"
    text: "所以他不会再死了？"
  - character: "旁白"
    text: "菲鲁特惊讶地笑着问道。"
  - character: "视频内容"
    text: "菜月昴对爱蜜莉雅灿烂地笑着，说她是他心灵需要的灵丹妙药。爱蜜莉雅看起来很困惑。"
