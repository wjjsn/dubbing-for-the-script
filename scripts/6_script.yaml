    text: "包括你？"
  - character: "旁白"
    text: "阿尔忍不住调侃女仆，也忍不住对她变得多红而大笑。"
  - character: "视频内容"
    text: "一个看起来上了年纪的老太太慢慢跟在菜月昴身后，然后拍了他的屁股。菜月昴目瞪口呆。老太太说她感觉年轻了好多然后走开了。一个老人拍了他肩膀然后走开了。菜月昴回以微笑，在脑海中想着所有人都碰过他了。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "不许碰商品！"
  - character: "旁白"
    text: "所有人都在笑菜月昴脸上的表情，在爱蜜莉雅大喊时更是完全笑翻了。"
  - character: "视频内容"
    text: "菜月昴注意到蓝发翡翠绿眼睛的女孩拉着他的外套，那是刺客。他蹲下来面对她。女孩指着村子边缘，一只熟悉的小黑狗朝她跑来，她迅速抱起它。"
  - character: "碧翠丝"
    text: "你们两个怎么会不觉得可疑呢，一只狗居然在这个女孩的意愿下方便地进出屏障，实际上？"
  - character: "旁白"
    text: "碧翠丝问女仆们。"
  - character: "雷姆"
    text: "除非需要补给，否则我们不去村子。巴鲁斯是我们和伊尔拉姆村民社区变得如此亲密的原因。"
  - character: "旁白"
    text: "雷姆对姐姐的话点了点头。"
  - character: "库珥修"
    text: "不管怎样，这变得紧张起来了。"
  - character: "旁白"
    text: "库珥修凑近，表情说明她一看到小黑狗就明白了一切。"
  - character: "视频内容"
    text: "菜月昴伸手去摸小狗，但它对他咆哮。孩子们说她平时很温顺的，只对菜月昴生气。小狗闭上了眼睛在女孩怀里睡着了，菜月昴趁机揉小狗的小爪子和下巴下面。他注意到头顶上有一块秃斑，开始摸那个地方。小狗咆哮着瞬间咬了少年。"
  - character: "普莉希拉"
    text: "真是个白痴。"
  - character: "阿尔"
    text: "他被诅咒了对吧？"
  - character: "碧翠丝"
    text: "确实，实际上。那只兽不喜欢贝蒂的菜月昴，我是这么想的。"
  - character: "视频内容"
    text: "菜月昴缓缓将一个巨大的桶放到地上，看起来筋疲力尽。罗兹瓦尔穿着黑色衣服走出了宅邸，说要去见一个穿普通衣服很难对付的人，所以穿了正装。他预计今晚不回来，让拉姆和雷姆照顾好一切。罗兹瓦尔停下来把手放在菜月昴的肩膀上，不带口音地说他也指望菜月昴，让他好好照顾爱蜜莉雅大人。然后他飘向云端，以疯狂的速度疾驰而去。"
  - character: "由里乌斯"
    text: "为什么？"
  - character: "旁白"
    text: "由里乌斯简洁地问道，盯着小丑。许多人用怀疑的目光看着罗兹瓦尔。"
  - character: "菲鲁特"
    text: "你知道什么我们不知道的吗？"
  - character: "旁白"
    text: "菲鲁特怒视着那个奇怪微笑的男人问道。罗兹瓦尔注意到了紧张、侵略、敌意和即将到来的质问风暴。当所有人准备扑向他时，他勇敢而缓慢地举起了双手。然后他对许多怒视着他的人做了一件令人震惊的事——耸了耸肩说'噗！我不知道！'"
  - character: "视频内容"
    text: "菜月昴站在碧翠丝书房门口，说自己觉得被诅咒了，请求确认。碧翠丝惊讶地发现诅咒的痕迹，确认他真的被诅咒了。菜月昴说术士果然是村民之一。碧翠丝说一旦诅咒激活，他很可能会死。菜月昴说他超级怕死，但这一次要找到出路摆脱这个命运。他请求碧翠丝帮他解除诅咒。"
  - character: "视频内容"
    text: "菜月昴威胁碧翠丝说如果他死了帕克会很伤心，如果爱蜜莉雅震惊帕克也会受伤害，如果碧翠丝本可以阻止却没有阻止，帕克会怎么看她。碧翠丝被说服了，激活了法术摧毁诅咒中使用的法术。法术烧在了术士触碰他的地方，黑雾从被咬过的手上冒出。碧翠丝握住了黑雾让它消失。菜月昴得出结论那只小狗竟然真的是术士，必须去村子。"
  - character: "加菲尔"
    text: "天啊！大将真的很可怕，兄弟！"
  - character: "安娜塔西亚"
    text: "他确实知道怎么按对别人的按钮来为自己谋利。"
  - character: "旁白"
    text: "安娜塔西亚由衷地为这个少年终于展现出一些机智和话术感到骄傲。"
  - character: "碧翠丝"
    text: "别那样看我，我是这么想的。贝蒂无论如何都会帮助菜月昴的，实际上，哼！"
  - character: "爱蜜莉雅"
    text: "我不是因为那个看你。我知道你反正会帮他……但帕克也很关心菜月昴……不要说得他好像冷血一样。"
  - character: "旁白"
    text: "碧翠丝只是将目光从半精灵身上移开，没有对女孩说一个字。"
  - character: "视频内容"
    text: "菜月昴跑出碧翠丝的书房，说必须去村子。他告诉拉姆和雷姆关于诅咒和小狗的事。拉姆允许他按自己的判断行事。雷姆陪他去，拉姆留下保护爱蜜莉雅大人。爱蜜莉雅提着睡袍跑下楼梯，问他发生了什么。菜月昴说可能有事情发生但不用担心。爱蜜莉雅触碰菜月昴的胸口，低头低语愿精灵的祝福与他同在，意思是安全回来。"
  - character: "库珥修"
    text: "他设法让整个村子的人都碰了他，就为了找出谁是杀手，把自己当诱饵。"
  - character: "旁白"
    text: "莱茵哈鲁特骄傲地笑着点了点头。由里乌斯对这个计划的粗暴感到惊讶。"
  - character: "安娜塔西亚"
    text: "那个计划没有看起来那么厉害，由里乌斯。他记不住每个村民……他设法让所有人都碰了他很厉害，但他记不住他们所有人。"
  - character: "旁白"
    text: "库珥修对商人的话点了点头，同意她的失望。"
  - character: "奥托"
    text: "幸好他还是做到了。也多亏了碧翠丝大人。"
  - character: "旁白"
    text: "奥托似乎被安娜塔西亚不断打击菜月昴努力的行为惹恼了，于是保护性地回应道。"
  - character: "视频内容"
    text: "菜月昴和雷姆在村子里奔跑，发现孩子们失踪了，结界破了。菜月昴注意到泥地上有多个脚印延伸进森林，决定去救那些孩子。雷姆质疑这可能是转移宅邸注意力的诡计。菜月昴冷静地反驳说如果不在乎明天所有村民都死了，回宅邸加强戒备是一个选择。他告诉雷姆那些孩子对他很重要，他知道他们的名字、脸和梦想，答应过明天再一起做广播体操。雷姆第一次笑了，说她的命令是监视他。"
  - character: "奥托"
    text: "好帅。"
  - character: "旁白"
    text: "奥托说，他看到菜月昴颤抖的样子时也这么想，但他从未放弃。"
  - character: "由里乌斯"
    text: "即使害怕他也想帮助孩子们？"
  - character: "旁白"
    text: "由里乌斯对屏幕上的少年笑了。"
  - character: "菲莉丝"
    text: "这就是这个年轻人，菲莉丝。"
  - character: "库珥修"
    text: "这就是这个年轻人，菲莉丝。"
  - character: "旁白"
    text: "库珥修一边揉着骑士的头一边确认道。"
  - character: "视频内容"
    text: "菜月昴和雷姆在森林中找到了被诅咒的孩子们，他们还活着但非常虚弱。佩特拉醒来说还有一个孩子还在。菜月昴发现扎辫子的小女孩不见了。雷姆留下治疗孩子们，菜月昴去找失踪的女孩。菜月昴和雷姆用小指约定，说等这一切处理完了要聊到嗓子沙哑。"
  - character: "加菲尔"
    text: "大将真是个泡妞高手！"
  - character: "旁白"
    text: "加菲尔捂着胸口，睁大眼睛看着菜月昴。他对他大将流畅地和女人说话的能力感到震惊。"
  - character: "奥托"
    text: "他怎么这么会撩？！"
  - character: "旁白"
    text: "奥托沮丧地喊道。"
  - character: "库珥修"
    text: "他就是这样赢得你的信任和爱的吗？"
  - character: "旁白"
    text: "库珥修微笑着问雷姆。令人惊讶的是，雷姆摇了摇头，她带着令人窒息的笑容看着这一幕。"
  - character: "雷姆"
    text: "那是后来的事了。"
  - character: "旁白"
    text: "她嘶哑地低语，继续看着，眼中满是纯粹的崇拜。"
  - character: "视频内容"
    text: "菜月昴独自穿过灌木丛找到了女孩，但那是一个陷阱。一只凶猛的犬形魔兽出现，菜月昴用外套裹住手臂与它搏斗，将狗推向树干刺穿了它的心脏。但整个森林都布满了红色的闪光眼睛——整个魔兽群。菜月昴宣布想打架就来吧，将自己挡在怪物和女孩之间。"
  - character: "奥托"
    text: "哦靠！"
  - character: "加菲尔"
    text: "他真的做到了！"
  - character: "旁白"
    text: "加菲尔和奥托为他欢呼，他们看到一个没有力量、被逼到绝境的菜月昴有多酷。爱蜜莉雅对她的骑士看起来多酷感到惊叹。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "等我们出去了我要惩罚梅莉。"
  - character: "旁白"
    text: "爱蜜莉雅愤怒地咆哮，手指做着捏的动作。弗雷德莉卡和佩特拉愤怒地点了点头。"
  - character: "库珥修"
    text: "这很棘手。"
  - character: "旁白"
    text: "库珥修喃喃道，已经投入到菜月昴所进行的战斗中，为他感到担忧。"
  - character: "视频内容"
    text: "五只愤怒的狗冲向菜月昴，其中一只跳起来差点咬掉少年的脸。雷姆手持狼牙棒出现，轰掉了狗头。她将孩子们安全送回村子后来支援。雷姆迅速将狼牙棒向身后挥去，杀死了从背后攻击她的两只野兽。菜月昴惊叹她好强。两人在魔兽群的包围中奔跑，雷姆制造尘土掩护菜月昴抱着女孩穿过狗群。"
  - character: "佩特拉"
    text: "雷姆！"
  - character: "旁白"
    text: "佩特拉惊恐地看着女仆可怖的样子大喊。雷姆浑身是血。"
  - character: "阿尔"
    text: "她好厉害！"
  - character: "里卡多"
    text: "看到她的残忍之后我们现在居然在为她加油，真是太疯狂了。"
  - character: "加菲尔"
    text: "她是唯一在帮大将的人，而且他们两个有一个很好的感情时刻。"
  - character: "旁白"
    text: "加菲尔一看到雷姆被打得那么惨就立刻为她说话。她那小小的微笑值得碧翠丝的怒视和爱蜜莉雅及其他王选候选人的侧目。"
  - character: "视频内容"
    text: "魔兽的首领发动了土属性攻击，雷姆迅速将菜月昴推开，自己被击中。她的身体被击飞了。菜月昴带着震惊和恐惧的表情看着雷姆的身体坠落。狗群站在他四周，中间是那只同样的小狗。"
  - character: "旁白"
    text: "爱蜜莉雅和拉姆捂住了嘴巴，看着这一幕的残酷。"
  - character: "碧翠丝"
    text: "这应该是那个！"
  - character: "旁白"
    text: "碧翠丝沮丧地咆哮道。"
  - character: "视频内容"
    text: "雷姆的身体开始站起来，一只发光的角从她的额头冒了出来。雷姆疯狂的笑声充斥了森林，她的眼中充满了疯狂的光芒。她的角明亮地闪烁着粉白相间的光芒。雷姆缓缓踱步站在了怪物群面前，瞬间将狼牙棒朝它们挥去，轰掉了每一个的头。她在屠杀它们。"
  - character: "莱茵哈鲁特"
    text: "鬼族魔法？"
  - character: "旁白"
    text: "莱茵哈鲁特惊讶地低语，带着极大的兴趣看着。"
  - character: "安娜塔西亚"
    text: "我以为他们灭绝了……"
  - character: "旁白"
    text: "安娜塔西亚评论道。"
  - character: "缇碧"
    text: "一个可怕，一个可爱。"
  - character: "旁白"
    text: "缇碧大声喊道，困惑不解。雷姆看着屏幕，面露苦相——她看到菜月昴对她有多害怕。"
  - character: "普莉希拉"
    text: "恶心！"
  - character: "威尔海姆"
    text: "这非常令人不安。"
  - character: "旁白"
    text: "威尔海姆用久经沙场的语气说道，他想起了那些像这样战斗的士兵——疯狂而失去理智。"
  - character: "罗兹瓦尔"
    text: "这就是鬼族之角的力量。"
  - character: "旁白"
    text: "罗兹瓦尔面无表情、眉头深锁地看着说道。"
  - character: "安娜塔西亚"
    text: "这就是你把她们纳入家中的原因？"
  - character: "旁白"
    text: "安娜塔西亚眯起目光看着那个男人问道。罗兹瓦尔只是点了点头。"
  - character: "视频内容"
    text: "菜月昴盯着雷姆屠杀怪物群，她一直疯狂地大笑着。他说道'她是恶魔'。雷姆的角消失了，她疯狂的笑容变成了震惊的表情，她恢复了原来的自己。她看着菜月昴替她承受了本该是她的攻击。那些本该咬她的狗包围了少年，咬遍了他的全身。雷姆立刻抓住狼牙棒攻击正在吃他的魔兽。菜月昴的尖叫声充斥空气。"
  - character: "奥托"
    text: "那不太好……"
  - character: "旁白"
    text: "奥托缓缓看向雷姆，发现她被菜月昴的话深深伤害了。他为她感到怜悯。"
  - character: "爱蜜莉雅"
    text: "这应该是那个！"
  - character: "旁白"
    text: "爱蜜莉雅愤怒而恐惧地重复着碧翠丝的话。"
  - character: "菲鲁特"
    text: "哦不。"
  - character: "旁白"
    text: "菲鲁特大喊，焦虑地站在座位上。"
  - character: "视频内容"
    text: "雷姆迅速跪在他失去知觉的身体旁，抱着他的头恳求道'别死'。菜月昴的眼珠翻到了脑后。黑暗……标题卡：勇气的意义。片尾曲：Styx Helix。第五集导演剪辑版完。"
  - character: "加菲尔"
    text: "哦，拜托！"
  - character: "蜜蜜"
    text: "请告诉我们接下来发生了什么！求求求求了！"
  - character: "旁白"
    text: "蜜蜜和弟弟一起对着屏幕鞠躬恳求。"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "我宁愿你们停止这场闹剧，立刻让我离开这个房间！这个世界是为了取悦我而存在的。如果它把我送到这里，那一定有原因。到目前为止我所看到的是一头猪未能正确使用他的伟大力量来取悦一个白痴半智障。几条不听话的狗。一个失败的精灵守护者和一个不断哭泣的可悲男孩。打开这个可悲地方的门，立刻放我出去！"
  - character: "旁白"
    text: "当太阳公主如此要求时，她得到的只是一个冷静的声音——不。一股力量再次涌遍整个房间，普莉希拉发现自己站在那里，周围没有一丝火焰。她发现自己再也无法使用魔法了。绯红装束的女士带着杀意怒视着屏幕，准备将所有地狱倾泻在它的主人身上。"
  - character: "旁白"
    text: "看守者的声音响起：普莉希拉大人，通往你最伟大命运的道路需要你对周围的弱者有更多的耐心。如果你不看完全程，你就不配拥有世界的忠诚。有生以来第一次，红玫瑰不知所措。在她来得及回复之前，看守者已经激活了屏幕，加载了下一次观影。第六集……第二章的延续（最终）……开始。"
