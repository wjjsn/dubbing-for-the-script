    text: "由里乌斯觉得问这个不合适，但他必须更多地了解他的朋友。如果他要成为他的朋友的话。"
  - character: "奥托"
    text: "他仍然认为他来到另一个世界就应该得到某种力量。"
  - character: "旁白"
    text: "奥托叹了口气。但随即他僵住了，因为某个念头闪过他的脑海。大多数观众也沉默下来，思考着这个想法。"
  - character: "阿尔"
    text: "我的天！他确实得到了超能力！"
  - character: "旁白"
    text: "阿尔和里卡多以及大部分演员都无法相信。"
  - character: "安娜塔西亚"
    text: "这么蠢的规则是真的？"
  - character: "旁白"
    text: "安娜塔西亚问道，她为死亡回归是菜月昴被赋予的能力而感到遗憾。"
  - character: "库珥修"
    text: "就是这么告诉我们的。但这种能力并没有真正帮助他在世界上找到安宁或地位……只是心灵的安宁。"
  - character: "旁白"
    text: "库珥修耸了耸肩，她无法否认这种能力让菜月昴取得了一些惊人的成就。"
  - character: "菲莉丝"
    text: "库珥修大人，您说了什么吗？"
  - character: "旁白"
    text: "菲莉丝第一次开口了，他感觉到主人的低语因某种原因变得充满了失望。"
  - character: "库珥修"
    text: "没什么，菲莉丝。没什么。"
  - character: "旁白"
    text: "公爵夫人摇了摇头，无视了她的骑士。菲莉丝皱起了眉头。"
  - character: "视频内容"
    text: "爱蜜莉雅向菜月昴解释阴魔法——可以遮蔽对手的视野、屏蔽声音、减缓他们的行动等等，全是减益效果。菜月昴脸上的所有兴奋都消失了，取而代之的是一副面无表情的死鱼眼。"
  - character: "加菲尔"
    text: "那是什么鬼？"
  - character: "旁白"
    text: "加菲尔看向碧翠丝寻求解释。得意的萝莉不会放过一个分享她的菜月昴知识的机会，她沉浸在来自某些女孩的嫉妒目光中。尤其是一个撅嘴的半精灵和一个怒视的鬼族少女。"
  - character: "碧翠丝"
    text: "减益效果就是你会称之为削弱敌人或盟友力量的属性或效果。"
  - character: "莱茵哈鲁特"
    text: "但那不是很好的能力吗？"
  - character: "旁白"
    text: "莱茵哈鲁特问道，不理解为什么菜月昴不喜欢这样的能力。"
  - character: "碧翠丝"
    text: "贝蒂的菜月昴仍然沉迷于他成为最了不起的英雄的幻想，实际上。他想要一种能让他像你——剑圣——对付那个肠猎女孩那样一击打败所有敌人的魔法力量，我是这么想的。"
  - character: "莱茵哈鲁特"
    text: "但在经历了这一切之后，他为什么还想要那个？"
  - character: "奥托"
    text: "想想看，他被召唤到另一个世界，拥有将时间据为己有的能力，他有一个能控制对我们来说极其稀有的魔法的门，他完全认为自己会成为一个传奇人物。"
  - character: "旁白"
    text: "奥托对他兄弟那冰冷的心态摇了摇头。"
  - character: "安娜塔西亚"
    text: "这……可以理解。"
  - character: "旁白"
    text: "安娜塔西亚沉思着，回想起她曾把他当作一个只会大喊大叫的无能小子。"
  - character: "阿尔"
    text: "伙计，我开始理解那座王宫里到底发生了什么了。"
  - character: "旁白"
    text: "阿尔自言自语，但他的话传遍了整个房间。某个紫发青年再次低下了头，哀叹着脑海中的那些话。"
  - character: "视频内容"
    text: "帕克开始向菜月昴演示夏玛克咒语——一个致盲咒语。帕克对少年施放了咒语。菜月昴坐在无尽的黑暗虚空中，试图尖叫和呐喊，但自己的声音被夺走了。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "天啊，那个魔法好可怕！"
  - character: "旁白"
    text: "缇碧紧紧抱住姐姐，佩特拉也睁大了眼睛看着。"
  - character: "佩特拉"
    text: "他为什么……"
  - character: "弗雷德莉卡"
    text: "他想起了和魔女在一起的那段时光。"
  - character: "旁白"
    text: "弗雷德莉卡紧紧抱住她的小女仆。"
  - character: "拉姆"
    text: "巴鲁斯仍然害怕嫉妒之魔女的黑暗。"
  - character: "旁白"
    text: "拉姆哼了一声，用充满怜悯的目光看着少年。"
  - character: "加菲尔"
    text: "他当然害怕！她抓住了他的心脏！还把它捏碎了！"
  - character: "旁白"
    text: "看到当好兄弟的机会，奥托转过身来，脸上带着得意的笑——啪！"
  - character: "奥托"
    text: "哎呀！你为什么打我？！"
  - character: "旁白"
    text: "奥托揉着后脑勺，怒视着兽人少年。"
  - character: "加菲尔"
    text: "你正要问一个蠢问题，答案是不，我不怕她。"
  - character: "旁白"
    text: "加菲尔一脸不屑。"
  - character: "视频内容"
    text: "菜月昴睁开眼睛，发现自己在花园的另一个区域，帕克停止了咒语。帕克问他觉得怎么样。菜月昴紧张地咽了口口水，意识到没有什么东西来碾碎他的心脏。他是安全的。缓缓转过身，对爱蜜莉雅和帕克微笑，说自己没事。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "菜月昴……从一开始你就承受了这么多。"
  - character: "旁白"
    text: "爱蜜莉雅低语道，她阵营里的其他人也和她有同样的想法。"
  - character: "普莉希拉"
    emotion: "愤怒"
    text: "他需要认清自己是多么无能！"
  - character: "旁白"
    text: "在所有人之上，普莉希拉似乎对这一幕最为激动。仿佛菜月昴与魔法的互动是这个房间里最令她作呕的东西。"
  - character: "里卡多"
    text: "她真的气疯了。"
  - character: "旁白"
    text: "里卡多对着公主所在方向传来的热浪缩了缩，他正好坐在她的正下方，这更糟了。"
  - character: "视频内容"
    text: "菜月昴和帕克握了握手和爪子以示团结，开始练习夏玛克。帕克让他想象魔力在体内流动，然后通过门排出体外。菜月昴闭上眼睛集中注意力，开始模仿帕克的魔法音效。屏幕展示了一个白色球体和一团黑色触手涌入其中。帕克缓缓抬起头，脸上带着沮丧的表情。菜月昴的身体爆炸成一团巨大的黑色云雾，笼罩了整个宅邸。"
  - character: "佩特拉"
    text: "呃……"
  - character: "旁白"
    text: "佩特拉和菲鲁特厌恶地出声。"
  - character: "库珥修"
    text: "这就是他的门受损的原因吗？"
  - character: "旁白"
    text: "爱蜜莉雅点了点头。"
  - character: "碧翠丝"
    emotion: "愤怒"
    text: "多么无用的教学，我是这么想的。一定是你对小猫咪的影响才让他用这么无能的方式教我的契约者，实际上！"
  - character: "旁白"
    text: "碧翠丝从座位上暴怒道，抱着菜月昴的手臂，怒视着某个半精灵。公主只是将目光移向地面，紧张地挪动着双腿，作为移动的表示。爱蜜莉雅紧抿的嘴唇是安娜塔西亚、菲鲁特和库珥修因她的愧疚而爆发出笑声的唯一原因。"
  - character: "菲鲁特"
    text: "老兄交朋友的运气真是差到好笑。"
  - character: "旁白"
    text: "菲鲁特看到她的话造成的效果后太满意了。这个金发女孩一直在发泄她的挫败感——她的骑士搞砸了，让菜月昴从她手中溜走，落入了像爱蜜莉雅这样……「不靠谱」的人手中。"
  - character: "视频内容"
    text: "帕克解释说菜月昴的门使用得并不多，体内的魔力无视了使用者的意志自己爆发出来了。菜月昴带着苦恼的表情说自己是什么，一个瓶盖松了的酱油瓶。少年试图从长椅上起身，但他的身体拒绝移动。帕克说他用光了体内所有的魔力，今天可能没办法再工作了。但菜月昴突然大喊着强行站起来，咬紧牙关，沮丧地强迫自己的肌肉动起来，说一天都不能浪费。"
  - character: "安娜塔西亚"
    text: "他需要强迫自己克服疲劳。"
  - character: "旁白"
    text: "安娜塔西亚同情地皱眉说道。雷姆和爱蜜莉雅看着他强迫自己站起来的样子，都缩了一下。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "我应该注意到他的痛苦的。"
  - character: "旁白"
    text: "爱蜜莉雅轻声皱眉，低下了头。"
  - character: "雷姆"
    text: "你确实注意到了。你帮助了他。"
  - character: "旁白"
    text: "雷姆用柔和而破碎的语气向爱蜜莉雅指出。半精灵在女仆的话中更深地陷进了座位里。她无法控制对蓝发女孩厚颜无耻的愤怒。爱蜜莉雅只是带着困惑的表情低头看着他。"
  - character: "视频内容"
    text: "爱蜜莉雅走近菜月昴，把一种叫'波可果'的紫色小果实塞进了他的嘴里，手掌按在他的嘴唇上让他闭嘴。菜月昴缓缓吞下后，涌遍全身的能量让他重新站稳了双腿。爱蜜莉雅解释说波可果吃下去后体内的魔力会被激活，门会恢复一点力量。菜月昴带着愧疚的表情道歉说好像给她添麻烦了。爱蜜莉雅瞪着他说听到一声谢谢比听到很多声对不起更让人满足，她这么做是因为想帮他，不是因为想要道歉。"
  - character: "蜜蜜"
    text: "你们两个好甜蜜啊！"
  - character: "旁白"
    text: "蜜蜜从后面喊道。爱蜜莉雅感到一抹悲伤的微笑浮上了她沉重的嘴唇。她很高兴自己经历过那样的时刻。"
  - character: "视频内容"
    text: "场景切换。屏幕展示了深夜的L·马特斯宅邸。罗兹瓦尔坐在办公椅上，望着窗外。"
  - character: "视频内容"
    text: "罗兹瓦尔问拉姆觉得菜月昴怎么样。拉姆说就能力而言他完全不行，但在关键时刻可以异常机敏，有必要暂时监视他一段时间。罗兹瓦尔说必须极其谨慎处理这个问题，给出适当的警告，这样妹妹就不会做出鲁莽的举动。"
  - character: "罗兹瓦尔"
    text: "看！我是在乎我的菜月昴的！"
  - character: "旁白"
    text: "所有人都哼了一声，从小丑那里移开了视线……除了两个人。"
  - character: "库珥修"
    text: "他说的是真的。"
  - character: "旁白"
    text: "库珥修轻声自语，因为她从未感受到任何不真实的风从这个小丑身边吹来。莱茵哈鲁特将目光锁定在魔法师身上。这个男人有些不对劲。为什么他自己的阵营不信任他？他们简直恨他。"
  - character: "菲鲁特"
    text: "怎么回事？"
  - character: "旁白"
    text: "菲鲁特注意到他认真的表情，问道。"
  - character: "莱茵哈鲁特"
    text: "没什么，菲鲁特大人。反正到时候会揭晓的。"
  - character: "旁白"
    text: "莱茵哈鲁特对他的主人笑了笑。金发女孩耸了耸肩，转向屏幕。"
  - character: "视频内容"
    text: "场景切换到雷姆从门缝中偷看菜月昴打扫浴室。"
  - character: "雷姆"
    text: "他已经熟悉了宅邸和设施，所以我必须监视他。我从来不想杀他。"
  - character: "旁白"
    text: "雷姆惊慌地解释道，爱蜜莉雅冷冷地转向她。半精灵紫色的眼眸停留在雷姆蓝色的泪眼上。她转过身，揉了揉菜月昴的头发来发泄她的沮丧。"
  - character: "碧翠丝"
    text: "你把他当狗一样对待，实际上。"
  - character: "爱蜜莉雅"
    text: "哦，安静点贝蒂。"
  - character: "旁白"
    text: "爱蜜莉雅对小女孩轻声哼道，看起来沮丧又愤怒，揉少年头发的力度更大了。"
  - character: "视频内容"
    text: "菜月昴穿着运动服躺在床上，想着第一天大概就只能期待这么多了。他从拉姆和雷姆那里赢得了不少信任，但问题是术士的攻击，他不知道该怎么对付。"
  - character: "视频内容"
    text: "场景切换到碧翠丝在她的书房里。菜月昴问她关于术士和诅咒的事。碧翠丝说一旦诅咒被激活就没有办法解除了，诅咒就是这样的。但她说在被激活之前，诅咒只是简单的法术，她可以轻松解除。碧翠丝突然困惑地抬起头，嗅了嗅空气，惊讶地低语魔女的气味。"
  - character: "视频内容"
    text: "菜月昴假装困惑地问碧翠丝魔女是谁，魔女和术士有关系吗。碧翠丝解释说在这个世界上'魔女'这个词只指一个人——嫉妒魔女莎缇拉。很久以前她吞噬了六位以致命罪名命名的魔女，吸干了半个世界。碧翠丝说据说她渴求爱情，不懂人类语言，身体永不枯萎衰弱或死亡，被龙、英雄和贤者的力量封印了但无法毁灭她的肉体。碧翠丝恨恨地说出最后一句——据说她的身体是有着银发的半精灵。"
  - character: "旁白"
    text: "爱蜜莉雅低下了头，握紧了双手。她的眼中充满了悲伤。"
  - character: "普莉希拉"
    text: "哼！多么令人作呕的外貌。"
  - character: "奥托"
    text: "我希望你不要因为外貌而侮辱我们阵营的领袖。"
  - character: "旁白"
    text: "奥托将目光锁定在屏幕上，驳斥了普莉希拉，甚至让他的兄弟都为他的骨气感到惊讶。"
  - character: "菲鲁特"
    text: "用大哥的话说，好助攻！"
  - character: "旁白"
    text: "菲鲁特竖起了大拇指，用她记得菜月昴对莱茵哈鲁特说过的一句话。"
  - character: "视频内容"
    text: "菜月昴带着理解的表情看着碧翠丝。他的脑海中闪回到他在这个世界第一个循环的片段，当时爱蜜莉雅坐在桥的边缘说'我……是莎缇拉'。菜月昴明白了——如果人们只把她当作一个疯狂的怪胎，她就不必卷入这场王选的麻烦中了。"
  - character: "安娜塔西亚"
    text: "他认为爱蜜莉雅不想参与选举？"
  - character: "旁白"
    text: "她得到的只是耸肩。"
  - character: "罗兹瓦尔"
    text: "然而，她那样做是疯狂的。"
  - character: "旁白"
    text: "罗兹瓦尔从上方斥责道，语气中带着明确的失望，只针对那位半精灵本人。爱蜜莉雅带着悲伤的表情继续看着。一如既往地沉默。"
  - character: "视频内容"
    text: "菜月昴在宅邸外面大声喊叫，完成热身。爱蜜莉雅和帕克在旁边看着他。菜月昴突然在爱蜜莉雅身边坐下，说当仆人的生活让他疲惫时会来枕在她的腿上休息，让她留着。"
  - character: "爱蜜莉雅"
    text: "我也觉得这很奇怪，但真的很美好又傻气。"
  - character: "旁白"
    text: "爱蜜莉雅对着一脸怀疑的库珥修和感到怪异的安娜塔西亚说道。由里乌斯和菲莉丝只是厌恶地眯起了眼睛。银发公主对那些因为无法理解而贬低如此纯粹的事物的人摇了摇头。他们所有人都太愚蠢了。"
  - character: "视频内容"
    text: "菜月昴疯狂地朝帕克大喊，问他精灵是否也会犯困。帕克解释说精灵在魔力耗尽时也会经历类似的事情。菜月昴说他喜欢谁说出来很害羞，但还没说完，爱蜜莉雅就缓缓闭上眼睛说她喜欢的是帕克，帕克喜欢的是她，对话结束。"
  - character: "加菲尔"
    text: "大将又被射中了！"
  - character: "旁白"
    text: "虽然他们很同情他，但奥托和加菲尔必须遵循准则所暗示的职责。这就是为什么他们在嘲笑菜月昴。同甘共苦，永远的兄弟。"
  - character: "阿尔"
    text: "这家伙的人生真惨。"
  - character: "旁白"
    text: "阿尔捂着肚子，忍住笑声，低声说道。"
  - character: "里卡多"
    text: "靠。"
  - character: "旁白"
    text: "里卡多趴在地上喘不过气来。"
  - character: "菲莉丝"
    text: "他太可怜了。"
  - character: "旁白"
    text: "菲莉丝厌恶或尴尬得脸色发白。"
  - character: "视频内容"
    text: "菜月昴惊恐地问那他算什么。帕克得意地说莉亚被他的魅力迷得神魂颠倒，菜月昴什么都不是。菜月昴愤怒地咆哮。突然，一个半精灵女孩站在两人之间，揪住了他们两个的耳朵，严厉地训斥他们别得意忘形。"
  - character: "碧翠丝"
    text: "你们都是小丑，我是这么想的。除了小猫咪。哼！"
  - character: "奥托"
    text: "别嫉妒了，碧翠丝大人。菜月昴给你讲了各种有——用的故事和信息。"
  - character: "旁白"
    text: "奥托非常乐意调侃这个女孩，发泄一些他知道她更了解他兄弟的不满。当然，她是他的精灵，但他是菜月昴的兄弟。他有权了解电子游戏或者不管它们叫什么！碧翠丝怒视着少年，看起来随时要爆炸了。离开那个书房是个错误！"
  - character: "视频内容"
    text: "菜月昴突然看了看他光秃秃的手腕，惊讶地倒吸一口气，说该走了不然女仆姐妹们会生气的。他匆匆离开，爱蜜莉雅挥了挥手。帕克担忧地看着爱蜜莉雅，问她怎么了。爱蜜莉雅只是闭上眼睛叹了口气，说觉得有点不安，没法解释。帕克说这已经变成了一个有点麻烦的问题。"
  - character: "视频内容"
    text: "场景切换。雷姆惊讶地看着菜月昴，他站在走廊中央，脚边是一个碎花瓶。菜月昴不好意思地疯狂揉着头说别担心。"
  - character: "拉姆"
    text: "多么没用的工人。巴鲁斯真应该为那个受罚。"
  - character: "雷姆"
    text: "那是他第一天，他在没有引导的情况下就知道储藏室的确切位置，让我和姐姐都很困惑。"
  - character: "旁白"
    text: "雷姆用理解的目光看着。她明白了为什么他那一周那么努力工作。是因为她。"
  - character: "视频内容"
    text: "场景切回帕克的解释。帕克说菜月昴的心很混乱，内在和外在都混淆了。爱蜜莉雅在精灵的话中脸色沉了下来。"
  - character: "普莉希拉"
    text: "多么愚蠢。他只需要离开宅邸获得自由就行了。"
  - character: "安娜塔西亚"
    text: "我确实认为他可以让L·马特斯的无限资金给他建一座自己的房子，他可以住在那里。"
  - character: "库珥修"
    text: "但他爱着爱蜜莉雅，他想拯救雷姆，所以他把自己置于一个需要比以往任何时候都更努力工作来赢得她们信任的位置。"
  - character: "旁白"
    text: "库珥修同情地叹了口气，带着一点点喜爱。"
  - character: "菲鲁特"
    text: "如果他失败了，他就会被杀。"
  - character: "旁白"
    text: "菲鲁特喃喃道，她理解了整个情况对她大哥的全部后果。"
  - character: "里卡多"
    text: "我想知道他是怎么熬过这一切的。"
  - character: "旁白"
    text: "里卡多的声音传来，他坐在座位边缘，满怀期待。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "我从来没要求过那些……我没有要求他为了我这样对待自己。"
  - character: "旁白"
    text: "爱蜜莉雅愤怒而厌恶地咬着嘴唇，希望那个她甚至无法正视的少年赶快醒过来，这样她就可以扇他一巴掌，然后在他怀里哭泣。"
  - character: "视频内容"
    text: "雷姆在菜月昴清理残局时和他说话，说这是一种令人钦佩的态度，但花瓶是他打碎的，她去拿个替换的。菜月昴跑到雷姆面前拦住了她，说花瓶和花他来处理，让她去做自己的工作。"
  - character: "缇碧"
    text: "他又开始可疑了！"
  - character: "旁白"
    text: "缇碧警觉地说道，他注意到雷姆的眼睛眯了起来。"
  - character: "菲鲁特"
    text: "没错，不开玩笑，这太紧张了！"
  - character: "旁白"
    text: "菲鲁特紧张地抓住椅子两侧。蓝发鬼族仍然蜷缩在穿着长袜的膝盖后面。"
  - character: "视频内容"
    text: "帕克说如果他继续这样下去，很快就会把自己累垮的。屏幕展示菜月昴从一个黑暗的房间拿来一个新花瓶，在原来打碎的位置放好后插上了花。菜月昴擦了擦额头，叹了口气，对站在他身后的雷姆说话。"
  - character: "雷姆"
    text: "但这是你自己造成并自己处理的工作。你什么时候学会花瓶放在哪里的？"
  - character: "旁白"
    text: "当雷姆怀疑的目光落在他身上时，菜月昴缩了一下。"
  - character: "雷姆"
