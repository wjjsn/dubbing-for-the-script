  - character: "旁白"
    text: "公爵夫人抿着嘴唇，眯起眼睛看着那个男人。他对自己的漠不关心，以及他不断扭曲爱情来贬低自己成就的做法，让她感到完全不光明正大，也是对这种情感记忆的侮辱。她对菜月昴浪费了多少爱情来忽视自己的问题感到失望。"
  - character: "库珥修"
