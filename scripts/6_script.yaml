  - character: "旁白"
    text: "莱茵哈鲁特带着忧伤的表情看向雷姆。他想要相信她这次不会做出什么令人遗憾的事。蓝发女仆茫然地看着骑士，无法给出答案，因为她的脑海中浮出了多个理由和与之相关的记忆。这些记忆迫使女仆重新跪了下来，不让任何人看到她的眼泪。拉姆只是轻轻皱着眉头，抚摸着妹妹的背。莱茵哈鲁特对此感到有些愧疚，但他更加好奇，甚至更加担忧这些反应意味着什么。于是骑士看向了宅邸的第三位女仆，他惊讶地发现弗雷德莉卡和佩特拉都在用杀人的目光怒视着上方的鬼族双子女仆。"
