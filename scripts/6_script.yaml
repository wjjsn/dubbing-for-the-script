  - character: "视频内容"
    text: "场景切换。"
  - character: "视频内容"
    text: "菜月昴倒在草地上，看起来很累。帕克漂浮在他上方，倒悬着。帕克称赞他是个勤劳的人。菜月昴说还没完，还需要准备晚饭和打扫房间。帕克降了下来，脸上带着兴奋的微笑。菜月昴看向一旁，凝视着爱蜜莉雅——她正与环绕在她周围的小光球交谈。"
  - character: "旁白"
    text: "雷姆微微低下了头。愧疚和嫉妒交织在一起，她希望自己能取代爱蜜莉雅的位置。即使她满足于第二名，她仍然希望菜月昴能那样看着她。但她现在只希望得到他的原谅。爱蜜莉雅看着菜月昴看她的方式，心弦被轻轻拨动了。她希望有一天能用同样的目光，给这个少年同样的感觉。"
  - character: "视频内容"
    text: "菜月昴问帕克爱蜜莉雅用什么魔法。帕克解释说莉亚是精灵术使用者，不是真正的魔法使用者。帕克解释了魔法使用者和精灵术使用者的区别——魔法使用者用自己的魔力施法，精灵术使用者从大气中的魔力汲取。区别在于是否使用门。"
  - character: "加菲尔"
    text: "嘿，说起来，为什么菜月昴也有门呢？"
  - character: "旁白"
    text: "加菲尔困惑地看着奥托。"
  - character: "奥托"
    text: "你什么意思？"
  - character: "加菲尔"
    text: "我的意思是，如果他来自另一个世界，而碧翠丝大人刚才也确认了，加上他自己的反应，他的世界没有魔法使用者或任何使用魔力的实例，那他怎么能拥有一个门呢？"
  - character: "碧翠丝"
    text: "我……不知道，我是这么想的。"
  - character: "旁白"
    text: "碧翠丝沉思着，开始思考这个问题。"
  - character: "爱蜜莉雅"
    text: "也许他世界的人类确实有门，但因为他的世界没有魔力，所以无法使用？"
  - character: "旁白"
    text: "爱蜜莉雅在观看屏幕上的帕克时带着悲伤的表情给出了自己的意见。一些人对这个解释点了点头。"
  - character: "菲鲁特"
    text: "也可能是魔女赋予的。"
  - character: "旁白"
    text: "菲鲁特说出了这句话，让几个人倒吸一口冷气，僵硬地转向她。"
  - character: "菲鲁特"
    text: "什么？"
  - character: "旁白"
    text: "小金发注意到有人盯着她，问道。"
  - character: "莱茵哈鲁特"
    text: "请不要这么轻率地提起她，菲鲁特大人。"
  - character: "旁白"
    text: "莱茵哈鲁特结巴着，震惊于他的主人竟然如此大胆地随意提起那样的怪物。他几乎感到骄傲，但他不能让她在公开场合这样说话，否则会招来处决她的呼声。"
  - character: "菲鲁特"
    text: "怂包！"
  - character: "旁白"
    text: "菲鲁特哼了一声，将视线从她的怂包骑士身上移开。莱茵哈鲁特看到孩子们加上里卡多和阿尔都在嘲笑他，显得很担忧。他希望这个外号不会一直跟着他。"
  - character: "视频内容"
    text: "帕克将尾尖碰了碰菜月昴的额头，开始测试他的属性。菜月昴的额头开始发光，喵喵声在他脑海中响起。帕克宣布菜月昴的属性是「阴」。菜月昴哀嚎所有幻想都被否决了。"
  - character: "爱蜜莉雅"
