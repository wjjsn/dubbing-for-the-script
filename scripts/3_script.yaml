  text: 碧翠丝给了他一眼，然后坐回了手放在昴手上的位置。爱蜜莉雅仍然僵在座位上。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 昴没有我会过得更好……？
- character: 碧翠丝
  text: 是的。
- character: 缇碧
  text: 这……确实是真的。如果老板这么说，他会是一个好商人。
- character: 威尔海姆
  text: 如果他只是一个简单的商人，我们就不会击败白鲸了。
- character: 库珥修
  text: 看到你的错误并努力变得更好。为了你和菜月的双方，爱蜜莉雅大人。
- character: 雷姆
  text: 是的，有……心软的人……
- character: 视频内容
  text: 昴回想起爱蜜莉雅救他的时候，她刚刚被偷走了珍贵的东西却救了一个无用的陌生人甚至治愈了他。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 我真的没有……
- character: 佩特拉
  text: 拜托……回去救他们，昴。
- character: 视频内容
  text: 昴注意到一对夫妇牵着孩子的手，番茄从购物袋里掉出来被马车轮子压碎，映射了一个血腥的场景。他不安地盯着它，记起了爱蜜莉雅在赃物屋中倒在他身边。
- character: 由里乌斯
  text: ……
- character: 威尔海姆
  text: ……
- character: 菲莉丝
  text: 嗯，看起来他要离开了……一个人经历了那种事不可能还会回来。
- character: 视频内容
  text: 昴记起了艾尔莎坐在他身上带着残忍的微笑而他流血在地上的时候。无论重复多少次那都不会改变。爱蜜莉雅听到莎缇拉的名字被叫时畏缩了。
- character: 视频内容
  text: 昴恐惧地慢慢触摸他的肚子。他回想起爱蜜莉雅灿烂微笑的图像。慢慢地，昴的脚转向了。他跑了起来。
- character: 视频内容
  text: 昴心想：如果我知道我曾经认识的人会被杀——我不能就这样无视它！
- character: 奥托
  text: 伙计，他真酷。
- character: 加菲尔
  text: 好！大将还在那里！
- character: 由里乌斯
  text: 他是一个可敬的年轻人。
- character: 阿尔
  text: 所以他明知道可能会死还冲进去？以这种方式在另一个世界开始旅程真令人沮丧。他本可以有一个完美的出路。和平的生活。
- character: 拉姆
  text: 他最终会被卷入麻烦的。巴鲁斯制造混乱的能力令人震惊。
- character: 菲莉丝
  text: 至少他在帮助无辜的人。
- character: 爱蜜莉雅
  emotion: 高兴
  text: 昴回来了！
- character: 碧翠丝
  text: 至少他会见到贝蒂呢。
- character: 安娜塔西亚
  text: 我本想看他发展自己的事业。但我理解他需要成为小公主的英雄。
- character: 库珥修
  text: 他又来了。他一头扎进去，不考虑自己。
- character: 菲鲁特
  text: 大哥最棒了。
- character: 普莉希拉
  text: 他用恶魔给予的力量通过了考验；他只能说自给自足的正义来让他看起来更好。真是头猪！
- character: 弗雷德莉卡
  text: 讨厌的女士……
- character: 视频内容
  text: 昴回到苹果摊问小贩附近有没有发生过扒窃事件。小贩说上一次很不寻常：'他们在街上施了几次魔法。像冰柱一样的东西飞来飞去，嵌在了墙里。但它们很快就消失了。'
- character: 视频内容
  text: 昴看向旁边的房子上面布满了洞：'我太晚了？我以为如果我能阻止徽章被偷，那么也许……'
- character: 视频内容
  text: 小贩：'没什么大不了的！像你这样的穷小子，刚才帮了我迷路的女儿。'昴微笑着想起了爱蜜莉雅。
- character: 爱蜜莉雅
  text: ……
- character: 视频内容
  text: 昴：'我想命运也是一种不可抗拒的力量……我下次会买一个苹果的！'小贩：'当然。买一个，你就是顾客了。去工作吧，穷小子！'
- character: 视频内容
  text: 昴穿过小巷思考着：'莎缇拉只是一个化名，不是吗？那么这次我必须让她告诉我她的真名-'他发现小巷出口被同样的三个盗贼挡住了。
- character: 视频内容
  text: 盗贼：'如果你不想受伤，就把你身上所有值钱的东西交出来。'昴面无表情地看着他们：'我受够看到你们的脸了，拉里、莫和卷毛。做了四次之后我学到教训了！'
- character: 加菲尔
  text: 揍他们的屁股，大将，报仇！
- character: 旁白
  text: 昴踢了地面，像婊子一样尖叫起来：'卫兵！'
- character: 加菲尔
  text: 哈哈哈！
- character: 奥托
  text: 我们不认识这个人。
- character: 旁白
  text: 房间里的人们对昴发出的声音咯咯地笑了起来。甚至爱蜜莉雅、雷姆和碧翠丝也忍不住发出几声无声的轻笑。
- character: 莱茵哈鲁特
  text: 就是这样。
- character: 视频内容
  text: 盗贼们拿出武器。昴怒视着他们准备战斗。
- character: 由里乌斯
  text: 他将不得不再次强行通过他们。
- character: 里卡多
  text: 这对可怜的小伙子来说可能是另一个假结局。
- character: 菲鲁特
  emotion: 愤怒
  text: 我发誓……！
- character: 旁白
  text: 雷姆不喜欢他脸上的表情。她不满意她爱的男孩即使在可怕的结局之后也会不断地为自己的生命而战。
- character: 视频内容
  text: 一个声音响起：'够了。'一个令人印象深刻的身影站在光线中——红头发，还有一把骑士剑上面有龙爪留下的划痕。
- character: 爱蜜莉雅
  text: 好！
- character: 佩特拉
  text: 好！
- character: 视频内容
  text: 莱茵哈鲁特：'看来我不需要自我介绍了。不过，那个绰号有点过了。我不知道我微薄的力量能在多大程度上帮助他。但如果你诉诸极端手段，作为骑士，我将不得不反击。'
- character: 旁白
  text: 莱茵哈鲁特将手移到剑柄上仿佛即将拔剑。三个盗贼被剑圣的怒视吓跑了。
- character: 视频内容
  text: 莱茵哈鲁特：'我很高兴我们都安全了。你没有受伤吧？'
- character: 雷姆
  text: 这是你记得的事情吗，剑圣大人？
- character: 莱茵哈鲁特
  emotion: 高兴
  text: 是的。这就是我和昴相遇的方式。
- character: 菲鲁特
  text: 莱茵，这是不是意味着我认为的那个意思？！
- character: 莱茵哈鲁特
  emotion: 高兴
  text: 这个我记得很清楚。昴和我的相遇就是这样。
- character: 由里乌斯
  text: 他这次可能不会遇到他的末日了。
- character: 安娜塔西亚
  text: 这意味着我们要看他最后一次对付刺客了。我非常好奇他是如何在这次做对的。
- character: 雷姆
  text: 刺客？
- character: 安娜塔西亚
  text: 亲爱的，你一定注意到肠狩猎者是被某人雇来偷你赞助人的徽章的，不是吗？这意味着她是另一个对你公主有敌意的幕后人物的雇佣帮手。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 这-这个委托人会是谁？
- character: 安娜塔西亚
  text: 虽然我希望我们有更多可以告诉你的，爱蜜莉雅大人，但我不得不让你失望。我们对派艾尔莎去追杀你的人一无所知。
- character: 爱蜜莉雅
  text: 我有太多需要弥补的了……
- character: 拉姆
  text: 罗-罗兹瓦尔大人……
- character: 罗兹瓦尔
  text: 让我们继续看吧，拉姆。让我看……拜托。
- character: 旁白
  text: 拉姆让步了，害怕和担心她的主人对自己和剧院另一边沉睡的男孩做了什么。
- character: 视频内容
  text: 昴微笑着挺直了背：'请-请允许我衷心感谢你救了我的命！我，菜月昴，深深敬佩你的无私！'莱茵哈鲁特：'不需要如此正式。一旦是三对二，他们就失去了优势。'
- character: 莱茵哈鲁特
  text: ……
- character: 菲莉丝
  text: 太谦虚了~
- character: 由里乌斯
  text: 你们似乎比我当初相处得更好。
- character: 视频内容
  text: 昴：'嗯……莱茵哈鲁特先生，对吧？'莱茵哈鲁特：'你可以直接叫我莱茵哈鲁特，昴。'
- character: 菲鲁特
  text: 听起来你只是想要一个朋友！
- character: 莱茵哈鲁特
  text: 昴太有趣了，不和他交谈不行，菲鲁特大人。
- character: 威尔海姆
  text: ……
- character: 视频内容
  text: 昴：'好吧，再次感谢莱茵哈鲁特，你是唯一听到我喊叫并来帮忙的人……说起来真孤独。'莱茵哈鲁特：'对大多数人来说，面对那样的人风险太大。就目前而言，你呼叫卫兵是对的。'
- character: 视频内容
  text: 昴：'你是卫兵吗，莱茵哈鲁特？你看起来不像……'
- character: 菲莉丝
  text: 多么讽刺。
- character: 奥托
  text: 菜月先生在到达首都的第一天就遇到了全能的剑术大师，真是太方便了。
- character: 佩特拉
  text: 嗯！就在他需要帮助的时候！
- character: 加菲尔
  text: 这真让人头大……对不起，大将。
- character: 视频内容
  text: 莱茵哈鲁特害羞地耸了耸肩：'我今天休假，所以没有穿制服。而且我意识到我看起来并不特别有威慑力。'昴：'说起来，他们不是叫你剑术大师吗？'莱茵哈鲁特：'我的家族相当独特。每天我都觉得会被他们的期望压垮。'
- character: 威尔海姆
  text: 罗-……请原谅，库珥修大人。口误了。
- character: 库珥修
  text: ……
- character: 视频内容
  text: 莱茵哈鲁特：'总之，昴……你有相当不寻常的头发、服装和名字。你来自哪个国家？目前，卢克尼卡比和平时期更加动荡。如果你有问题，我很乐意帮助你。'
- character: 视频内容
  text: 昴：'你愿意来赃物屋吗？！'但他想起了爱蜜莉雅在他身边死去的闪回：'不-不用了……忘了它。我不能麻烦你那个……'
- character: 由里乌斯
  text: 那是因为他认为他可以在艾尔莎到达之前拯救所有人。
- character: 拉姆
  text: 我觉得他只是不想再牵扯更多人了。他可能认为莱茵哈鲁特大人没有那么强大到可以和艾尔莎战斗。
- character: 莱茵哈鲁特
  text: ……
- character: 视频内容
  text: 昴：'我会自己处理剩下的，无论如何。'
- character: 罗兹瓦尔
  text: ……
- character: 里卡多
  text: 啊，该死。这要变糟了不是吗？
- character: 缇碧
  text: 是的，要出问题了……如果没有后备的话。
- character: 菲鲁特
  text: 幸好这没有发生，因为这个白痴在我们需要他的时候帮助了我们！
- character: 由里乌斯
  text: 所以即使昴拒绝了你，你还是去了那里？
- character: 莱茵哈鲁特
  text: 我只是觉得他有什么不对劲，必须亲自检查一下。
- character: 雷姆
  text: 谢谢你，英雄大人。
- character: 视频内容
  text: 昴：'但是……如果你能传达一个消息，我会很感激。你有没有看到一个穿着白色长袍、银色头发的女孩在附近？她还极其漂亮！'
- character: 爱蜜莉雅
  emotion: 高兴
  text: 昴——！
- character: 视频内容
  text: 昴：'那么，如果你见到她，告诉她不要靠近赃物屋，无论发生什么。我会找到她在寻找的东西，亲自带给她。'莱茵哈鲁特：'好的。如果我见到她，我会转达你的消息。'
- character: 菲鲁特
  text: 所以那天你在贫民窟附近的原因就是这个。
- character: 莱茵哈鲁特
  text: 我知道昴会发生什么事，因为情感感知的神圣祝福，而我感觉到的只是强烈的恐惧。
- character: 视频内容
  text: 场景改变到了贫民窟的屋顶。昴向人打听菲鲁特的窝在哪里。
- character: 菲鲁特
  text: 该死的告密者！这些贫民窟里不能有垃圾！
- character: 奥托
  text: 即使在贫民窟也不欢迎隐私啊。
- character: 视频内容
  text: 昴加快步伐，太阳开始落山。他想着用手机换徽章，走路时看着手机撞到了某人。
- character: 碧翠丝
  text: 他仍然计划放弃这样有价值的东西呢。
- character: 爱蜜莉雅
  text: 他是为了我这样做的。
- character: 碧翠丝
  text: 贝蒂应该在那里敲他的头呢。所以现在不要开始沉溺于羞愧。
- character: 菲鲁特
  text: 等等！那件斗篷！
- character: 里卡多
  text: 哦，该死！
- character: 佩特拉
  emotion: 悲伤
  text: 哦不！
- character: 视频内容
  text: 昴撞到的人正是艾尔莎。她咯咯笑着：'怎么了？你不必害怕；我不会对你做任何事。'
- character: 普莉希拉
  text: 哼。那个傻瓜甚至无法掩饰他的情绪。没用。
- character: 阿尔
  text: 他是个孩子，公主。他当然做不了什么。
- character: 视频内容
  text: 艾尔莎：'你的气味。当人们害怕时，我可以闻到他们的恐惧。现在，你很害怕。你也很生气，是吧？对我。'她微笑着走开。
- character: 视频内容
  text: 昴：'如果你太吓人了，那种美就浪费了，那可不是什么好事-'但艾尔莎正站在他身后。'哦，很好。隐藏你的敌意，你会更好。'她的鼻子碰到他的鼻子。
- character: 奥托
  text: 她甚至能闻到他的愤怒和恐惧！
- character: 拉姆
  text: 巴鲁斯处境很糟。
- character: 视频内容
  text: 艾尔莎：'好吧，我现在要走了。有预感我们会再见面的。'
- character: 里卡多
  text: 感谢精灵！
- character: 爱蜜莉雅
  text: 我不知道昴独自经历了这样的处境……他真的太幸运了。我非常感激和欣慰！
- character: 库珥修
  text: 幸好她似乎更专注于她的任务，而不是她对菜月昴的玩味。
- character: 菲鲁特
  text: 太近了！
- character: 加菲尔
  text: 大将能搞定。
- character: 视频内容
  text: 昴走到一所被树覆盖的破房子前——菲鲁特的赃物屋。
- character: 视频内容
  text: 菲鲁特对着昴：'你以为你在干什么，偷看别人的房子？'她收起了刀：'滚！'
- character: 普莉希拉
  text: 这是你的家？
- character: 菲鲁特
  text: 它仍然比你的性格干净，你这个贱人。
- character: 阿尔
  text: 算了，公主……她只是个笨孩子。请在这里小心一点，我们不需要更多的敌人。
- character: 旁白
  text: 普莉希拉用手一推迫使她的骑士戴头盔的脸塞进了座位之间的地板上。
- character: 普莉希拉
  text: 本宫没有允许你吠！
- character: 视频内容
  text: 菲鲁特开始用刀砍昴。昴继续躲避，踩到石头后摔倒。菲鲁特将剑压在他头上。她打断了支撑房子的柱子，让它塌在昴身上。
- character: 视频内容
  text: 菲鲁特踩在他被压住的身体上把刀指向他的脸：'对此我很抱歉，但你永远不能相信那部分的-'
- character: 奥托
  text: 我们理解，别担心。
- character: 莱茵哈鲁特
  text: ……
- character: 视频内容
  text: 昴：'拜托！就听我说，菲鲁特！我是为了重要的事情来见你的。'菲鲁特：'你怎么知道我的名字？你想让我为你偷东西？'
- character: 视频内容
  text: 昴：'有一件事我想要，就在此时此刻，我想买你偷的徽章！'
- character: 安娜塔西亚
  text: 走在了曲线前面。在会面开始之前让她交出货物，这么好的技术。
- character: 视频内容
  text: 昴向菲鲁特展示手机并给她拍了一张照片。他正在解释它是如何工作的。
- character: 由里乌斯
  text: 它确实具有和我们的魔法器一样的品质。我想他很幸运，他在那些东西变得值得注意但仍然非常稀少的时候被传送了。
- character: 菲莉丝
  text: 我觉得他的时间安排比魔法器作为奢侈品的兴起更正确，由里乌斯君~。
- character: 视频内容
  text: 菲鲁特：'在贫民窟的最边缘有一个赃物屋。公平的做法是让住在那里的老头子，罗姆爷爷，来评估它。'
- character: 佩特拉
  text: 他仍然需要去那个地方。
- character: 菲鲁特
  text: 没事……它进行得很顺利……
- character: 视频内容
  text: 昴低声咒骂：'所以，它还是到了那个地步……'
- character: 阿尔
  text: 面对死亡和不确定的事件链，伙计。你会怎么做？
- character: 视频内容
  text: 昴迅速抓住菲鲁特的手：'好了，我们走。快走！快点！我们让他看一眼然后离开那里！'
- character: 阿尔
  text: 你当然选择了战斗。
- character: 碧翠丝
