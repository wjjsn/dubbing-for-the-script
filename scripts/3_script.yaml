title: Re:Zero 第三章 导演剪辑版
author: Reactionist
script:
- character: 视频内容
  text: 第三章：导演剪辑版 第二集开始。
- character: 旁白
  text: 坐在影院里的众人陷入了无力而又困惑的沉默，对菜月昴此前的死亡感到无能为力。
- character: 由里乌斯
  emotion: 愤怒
  text: 那不可能！违抗死亡是一回事……但直接经历死亡再回来，那完全是另一种力量。
- character: 缇碧
  emotion: 悲伤
  text: 他不可能做到那种事！
- character: 安娜塔西亚
  text: 看来你的小预测落空了呢，库珥修大人。这孩子身上似乎还有更多的秘密。
- character: 安娜塔西亚
  text: 这孩子身上有某种东西……某种需要警惕的东西。
- character: 库珥修
  text: 毫无疑问，菜月昴在每次遭遇死亡时，都在以某种方式穿越时间。
- character: 菲莉丝
  emotion: 悲伤
  text: 他的死亡太过真实，不可能是假的，库珥修大人。
- character: 威尔海姆
  text: 更不用说那个男孩似乎记住了在他被谋杀之前发生的事情。
- character: 奥托
  emotion: 愤怒
  text: 这不该是真的……不可能！菜月先生！这不可能是真的！我们一起经历了那么多，他不可能经历了那些却不告诉我们！
- character: 雷姆
  emotion: 悲伤
  text: 昴君的死亡……那一定是真的……他的痛苦太……太真实了。
- character: 碧翠丝
  emotion: 悲伤
  text: 那一切都是真的呢。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 贝蒂？你知道这一切吗？昴有没有告诉过你他经历了什么？！
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 不……不……我不能成为他不信任的人……如果那是真的，他一定会告诉我的……
- character: 奥托
  text: 碧翠丝大人……如果你知道关于这件事的任何事情，拜托了！
- character: 碧翠丝
  emotion: 愤怒
  text: 我说了那一切都是真的呢！
- character: 旁白
  text: 一道疾驰的魔法攻击差点擦过奥托，强大的能量力场在黑色玻璃屏幕上爆炸。然而屏幕变得更加明亮，精灵的愤怒毫无作用。碧翠丝放下手臂，头低垂着，小小的肩膀耷拉下来，微微抽泣了一下，慢慢坐回座位蜷起膝盖把脸藏起来。
- character: 奥托
  text: 你那是什么意思……？
- character: 加菲尔
  text: 你不会得到答案的。那女孩已经崩溃了，伙计。我觉得大将什么都没告诉她……他也不信任她。
- character: 普莉希拉
  text: 看来那个男孩身上果然还有更多秘密。本宫非常好奇，为什么你们在看着那个蠢货以如此可怜的方式再次失败后都如此崩溃？难道你们没有看到自从他来到我们的领域以来，事情对他来说一直都很顺利吗？
- character: 拉姆
  emotion: 愤怒
  text: 巴鲁斯在首都的旅程除了苦难还是苦难，最后，从我们所看到的，他被杀了两次……你怎么能把这种好得离谱的运气描述为对他来说'顺利'？在我看来你必须睁开眼睛看看，丢掉一些明显过时的眼线笔了，普莉希拉大人！
- character: 普莉希拉
  emotion: 愤怒
  text: 你怎敢？！本宫会把你的灵魂烧成灰烬，为你的无礼付出代价！
- character: 雷姆
  emotion: 愤怒
  text: 不许你碰我姐姐！
- character: 普莉希拉
  emotion: 愤怒
  text: 你们这些肮脏的动物应该被消灭，无论你们的存在多么可怜！
- character: 莱茵哈鲁特
  text: 非常抱歉，普莉希拉大人。但我们需要彼此才能度过这一关。
- character: 普莉希拉
  emotion: 愤怒
  text: 再一次，你证明了自己不过是个杂种。
- character: 威尔海姆
  text: 请考虑一下这种行为的后果，普莉希拉大人。
- character: 安娜塔西亚
  text: 你似乎忘记了我们仍然被困在一个我们一无所知的实体的力量之下。你最好小心你往哪里发射魔法，普莉希拉小姐~。
- character: 库珥修
  text: 你没有考虑到你的魔法可能会伤害到这个房间里的无辜生命。
- character: 普莉希拉
  text: 毫无价值的垃圾。本宫的神圣火焰只会烧焦那些我认为浪费生命的人。这是一种只有高于神明的存在才能使用的力量。
- character: 菲莉丝
  text: 等等……你们两个怎么在这里能用魔法的？！
- character: 库珥修
  text: 有人能感觉到与自己门的连接恢复了吗？
- character: 菲莉丝
  emotion: 兴奋
  text: 我的魔法回来了！
- character: 蜜蜜
  text: 我们怎么恢复力量的？！
- character: 里卡多
  emotion: 兴奋
  text: 那意味着我们可以从这里出去了！
- character: 由里乌斯
  text: 那不会管用的，里卡多。墙壁仍然被施了魔法，把我们困在里面。我们的魔法对它们来说根本不存在。
- character: 弗雷德莉卡
  text: 我们至少不能试试吗？
- character: 罗兹瓦尔
  text: 恐怕我们的魔法比没用还糟糕。
- character: 莱茵哈鲁特
  text: 罗兹瓦尔大人？
- character: 罗兹瓦尔
  text: 谢谢你保护我亲爱的~工作人员，剑圣大人~。我本可以轻松地击退布蕾莉小姐的火焰，但你的存在已经足够令人安~慰了。
- character: 罗兹瓦尔
  text: 有~什么问题吗，剑圣大人~？
- character: 莱茵哈鲁特
  text: 完全没有，边境伯·L·梅瑟斯大人。
- character: 罗兹瓦尔
  text: 这些墙壁……它们是预~期用来困住我们所~有人的。我们拥有的任何魔法都无法打破这些墙壁。
- character: 旁白
  text: 罗兹瓦尔手指上闪过一丝纯血的火花，一团高温火焰爆炸开来，燃烧得如此炽热，形成了一道持续的纯怒红色流，冲向天花板。整个剧院充满了灼热的空气。
- character: 加菲尔
  emotion: 愤怒
  text: 搞什么鬼？！
- character: 库珥修
  emotion: 愤怒
  text: 立刻停止！
- character: 罗兹瓦尔
  text: 我最深~深的歉意。我需要全力以赴，这样我们才能确~定。
- character: 加菲尔
  emotion: 愤怒
  text: 喂！你以为你在干什么？！
- character: 由里乌斯
  emotion: 愤怒
  text: 边境伯·L·梅瑟斯。你意识到你给五位王龙公主和我们的王位带来了多么严重的危险吗？
- character: 罗兹瓦尔
  text: 现~在，现在……你们只需要看看我做了什么就能理~解了。
- character: 旁白
  text: 罗兹瓦尔燃烧之火触碰过的墙壁在融化后突然再次变成了坚硬的石头，没有留下一丝痕迹。他最强大的火魔法未能打破守护者的墙壁。
- character: 缇碧
  text: 这很糟糕……非常非常糟糕。
- character: 安娜塔西亚
  text: 所以除非我们想互相残杀，任何形式的魔法对这个监狱都无效。
- character: 里卡多
  text: 是谁建造了这样一个地方……这是一种魔法吗？
- character: 罗兹瓦尔
  text: 是谁或什么建造的并~不重要。很清~楚，这个监狱是为了让我们待很~长时间而建造的~
- character: 加菲尔
  emotion: 愤怒
  text: 现在不是开玩笑的时候！
- character: 拉姆
  text: 加菲尔！
- character: 视频内容
  text: 突然，剧院的黑暗被照亮，屏幕再次激活，开始闪烁和加载。
- character: 碧翠丝
  text: 它要给我们看更多了……
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 我不被他信任……我配看这些吗？
- character: 加菲尔
  text: 又来了？！
- character: 奥托
  text: 是的。它在做和上次一样的事情。
- character: 库珥修
  text: 让我们……先坐下吧……这是我们唯一能做的。
- character: 安娜塔西亚
  text: 你看起来挺配合的嘛，公主大人~
- character: 威尔海姆
  text: 如果我们看更多这个……我们可能会找到更多关于昴大人的答案。
- character: 加菲尔
  emotion: 愤怒
  text: 你就这样让他逍遥法外吗？！
- character: 奥托
  text: 我们坐下吧，加菲尔先生。除了再次观看这个，我们现在无事可做。我们需要在引发大战之前了解更多关于这个实体和这些影像的性质……再说了，菜月先生不会希望我们因为和赞助人争吵而毁了阵营的所有计划。
- character: 拉姆
  text: 罗兹瓦尔大人……
- character: 罗兹瓦尔
  text: 很高兴你没事，拉姆。
- character: 莱茵哈鲁特
  text: 这是一种危险的力量……也许那是一次侥幸？也许昴发现了死亡有多痛苦，然后再也没有这样做过？也许昴停止使用它是因为我帮助了他。
- character: 旁白
  text: 莱茵哈鲁特保持着沉默。在他旁边，菲鲁特一直低着头，双臂交叉在胸前，泪痕留在脸颊上，看着老人死去两次，看着善良的男孩因她而成为艾尔莎的刀下亡魂。
- character: 菲鲁特
  emotion: 愤怒
  text: 你那样说是什么意思？
- character: 普莉希拉
  text: 学会如何称呼你的长辈，渣滓。
- character: 菲鲁特
  emotion: 愤怒
  text: 我说，你那样说大哥是什么意思？你为什么觉得他过得很轻松？
- character: 莱茵哈鲁特
  text: 菲鲁特大人，我们可能不得不停止激怒其他-
- character: 菲鲁特
  emotion: 愤怒
  text: 我们需要这样做，莱茵！
- character: 普莉希拉
  text: 你想要理解一个如此显而易见的观点？你真的比孩子还笨。
- character: 菲鲁特
  emotion: 愤怒
  text: 你说大哥'过得很轻松'或者好或者不管什么！你那是什么意思？！你怎么能认为他的痛苦和死亡对他来说是好事？！
- character: 库珥修
  text: 如果你不介意，巴利艾尔。我同意菲鲁特女士，这一点必须解释清楚。
- character: 安娜塔西亚
  text: 我相信我们所有人都想参与其中~
- character: 普莉希拉
  text: 嗯，我想这是让你们所有人看看本宫的知识是多么优越的机会~
- character: 普莉希拉
  text: 那个男孩只是在他的'旅程'中的每一转折点都很幸运。
- character: 菲鲁特
  emotion: 愤怒
  text: 但他身上什么都没有！你看到他因为不了解首都而不得不承受多少虐待，如果不是那边的大姐，他到达的第一天就被抢劫了！更不用说他死了的事实！
- character: 普莉希拉
  text: 你完了吗？现在像一条好狗一样听着，否则永远不要再在本宫的方向说话。那个男孩在这里的开始可能糟糕得多。他可能被扔在魔兽猎场的中央。蛇的巢穴。角斗士的战场。古斯提科的冰冻荒地。佛拉基亚肮脏的战斗竞技场。然而他得到的只是安全首都的一条随机街道。
- character: 雷姆
  text: 但-但是当他四处游荡时遇到了很多麻烦-
- character: 普莉希拉
  text: 呵呵呵~对像他这样可耻的猪来说，一次尴尬的经历总比野兽的爪子陷入他的蛋蛋要好，我说错了吗？因为不懂新语言而被打一巴掌，总比在荒野中饿死要好。
- character: 奥托
  text: 他也不是那么安全！他立刻就被抢劫了！
- character: 普莉希拉
  text: 你被情绪蒙蔽了。这种情况对平民和杂种来说更常见，我一点也不惊讶这个家伙这么快就让自己陷入了这种境地。
- character: 奥托
  text: 但他可能会被杀！
- character: 普莉希拉
  text: 正是如此，你这个平民男孩。他差点被杀……但突然之间，他没有。他被她救了。一位对我的王位的'竞争者'。
- character: 安娜塔西亚
  text: 你是说他以某种方式策划了这样的事情？
- character: 普莉希拉
  text: 本宫是说他很幸运。发生在他身上的一切从一开始就只是提高了他在我们世界中生存的机会。我觉得为他感到如此悲伤是浪费。
- character: 菲莉丝
  emotion: 愤怒
  text: 但他死了！
- character: 普莉希拉
  text: 然后呢？
- character: 由里乌斯
  text: 他……死了……
- character: 普莉希拉
  text: 他回来了，不是吗？不仅如此，他显然还把时间倒转了。他被赐予了一种力量，无论发生什么，都能拯救他的生命。
- character: 蜜蜜
  emotion: 愤怒
  text: 他必须死才能让这种力量运作！
- character: 普莉希拉
  text: 你们都不知道这个。从已经展示的内容来看，这个男孩显然和我们一样不理解正在发生什么。他可能不知道如何控制它，但他除了死亡之外也没有尝试其他方式来使用它。
- character: 缇碧
  text: 嗯，这确实很有道理。也许那种力量除了死亡之外还有其他激活方式？
- character: 蜜蜜
  emotion: 愤怒
  text: 别忘了大哥死了！
- character: 缇碧
  text: 差点被骗了。
- character: 加菲尔
  emotion: 愤怒
  text: 你他妈说什么？！
- character: 里卡多
  text: 缇碧，伙计。那是什么？
- character: 缇碧
  text: 我-我是说……他看起来一点都不痛苦！他好像很快就接受了自己的死亡……仿佛痛苦在他闭上眼睛的那一刻就消失了……这种力量有可能消除痛苦或创伤什么的吗？
- character: 佩特拉
  emotion: 愤怒
  text: 他……他没有时间哭泣……他的一生在他眼前回放……而他所能想到的只有他有多痛苦……这怎么不是……这怎么不是足够的证据，证明他的死亡是有意义的？！
- character: 普莉希拉
  text: 有趣。
- character: 菲莉丝
  text: 昴君似乎更关心正在发生的事情，而不是他实际的死亡。他应该比展示出来的更加不安。对于一个已经死了两次的人来说……这不正常。他可能对死亡漠不关心-
- character: 旁白
  text: 笑声充满了整个剧院，一个戴头盔的男人歇斯底里地大笑，阻止了所有人的话语。
- character: 阿尔
  text: 哈哈哈……我很抱歉，伙计。你-你刚才说了一些对我来说真的很有趣的事情。
- character: 普莉希拉
  text: 阿尔德巴兰。解释一下。
- character: 阿尔
  text: 记住一件重要的事情兄弟们。一件如此重要的事情，它可能只会让你们免于再次看起来这么他妈的蠢。
- character: 加菲尔
  text: 是吗？那是什么大个子？！
- character: 阿尔
  text: 死亡是没有人会忘记的事情。永远不会。无论它发生在你身上多少次，无论它多么无痛……你永远无法逃脱它带来的黑暗。噩梦。那些声音。它永远不会成为可以变得'漠不关心'的事情，伙计。
- character: 普莉希拉
  text: 小心你的爆发，阿尔德巴兰。别忘了狗是有主人的。
- character: 阿尔
  text: 抱歉，公主。只是必须说清楚。
- character: 普莉希拉
  text: 只要记住不要再这样做了。你很幸运我知道为什么这个对话对你这么重要。
- character: 旁白
  text: 戴头盔的骑士将目光集中在屏幕上，他的眼睛偶尔会闪烁到前面那团黑发上，注意到昴眼睛下方出现的轻微黑眼圈。那些是因为压力和创伤，而不是因为疲倦。阿尔非常清楚这一点。
- character: 拉姆
  text: 你回来了？！
- character: 由里乌斯
  text: 发生了什么？
- character: 安娜塔西亚
  text: 他和我们第一次与他交谈时完全不同。
- character: 里卡多
  text: 他听起来被打败了。
- character: 视频内容
  text: 屏幕停止了随机图像的闪烁，发着白光，然后变成了一个在时间中暂停的连贯图像。然后图像开始移动。
- character: 视频内容
  text: 第一季第二集导演剪辑版开始。场景展示了一个困惑的昴站在拥挤的人群中间，爱蜜莉雅愤怒地瞪着他。
- character: 安娜塔西亚
  text: 我们是从上一个停下的地方开始的？
- character: 库珥修
  text: 似乎是这样。
- character: 佩特拉
  text: 菲鲁特大人在看着他们？
- character: 菲鲁特
  text: 看来我还没动手偷大姐的东西呢。
- character: 视频内容
  text: 爱蜜莉雅瞪着男孩问道：'我再问一次。你为什么用嫉妒的女巫的名字称呼我？'昴困惑地回答：'因为你让我这样叫的。'
- character: 里卡多
  text: 啊，这家伙在这里处境真的很糟糕。
- character: 安娜塔西亚
  text: 这是谁的错呢，我想知道。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 哦，昴……不。
- character: 碧翠丝
  text: ……
- character: 库珥修
  text: 你不能为此责怪自己，爱蜜莉雅大人。
- character: 雷姆
  text: 他这次要怎么脱身？
- character: 视频内容
  text: 爱蜜莉雅愤怒地颤抖着：'我不知道谁告诉你这个的，但他们的品味太差了！嫉妒的女巫是禁忌的化身，你却用大多数人连说都不敢说的名字来称呼我！'人群开始跟着爱蜜莉雅点头，怒视着昴。
- character: 视频内容
