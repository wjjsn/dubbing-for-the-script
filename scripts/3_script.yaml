  text: 艾尔莎从背后拔出第二把刀挥向莱茵哈鲁特。昴喊道：'她有第二把刀，莱茵哈鲁特！'
- character: 视频内容
  text: 艾尔莎：'如果我失去了我的獠牙，我会用我的爪子。如果我失去了我的爪子，我会用我的骨头。如果我失去了我的骨头，我会用我的生命。'她开始以恶魔般的速度到处跳跃。
- character: 视频内容
  text: 爱蜜莉雅发出信号。昴：'做你的事吧，莱茵哈鲁特！'莱茵哈鲁特激活祝福吸收周围空气中的所有魔力。
- character: 视频内容
  text: 莱茵哈鲁特和艾尔莎对峙。莱茵哈鲁特举起发光的剑，用如此强大的力量击中了艾尔莎，让整个赃物屋爆炸了。
- character: 奥托
  text: 这太过分了！
- character: 视频内容
  text: 莱茵哈鲁特害羞地微笑。剑在打击中蒸发成了尘土。'对不起，我对你要求太多了。现在好好休息吧。'
- character: 加菲尔
  text: 这家伙到底有多强？！
- character: 普莉希拉
  text: 太棒了，结束了。
- character: 视频内容
  text: 昴站起来环顾四周：'连影子都没有了，更不用说尸体了……一剑之后就剩下这些了？'
- character: 视频内容
  text: 爱蜜莉雅站起来试图走路但差点摔倒。昴立即接住了她。
- character: 视频内容
  text: 昴：'是啊，你说得对。很明显对吧？我也还有胳膊。而且我背上没有刀，肚子上也没有一个大洞。'爱蜜莉雅：'你说得好像你以前经历过那些事情一样。'昴：'曾经有一段时间我确实经历过。'
- character: 雷姆
  text: 看到他这样谈论这件事真是病态。
- character: 奥托
  text: 他确实经历了所有那些……我无法相信他的力量……这太过分了。
- character: 视频内容
  text: 昴：'莱茵哈鲁特……我还没有感谢你。你救了我的命！在小巷里也是。我想你听到了我内心的呼救，朋友。'莱茵哈鲁特：'如果我确实那样做了，我当然会感到骄傲……朋友。'
- character: 由里乌斯
  text: 你们看起来很亲密。
- character: 视频内容
  text: 莱茵哈鲁特看着菲鲁特从一堵破墙进来：'她绝望地在街上跑来跑去，请求我的帮助。'
- character: 视频内容
  text: 艾尔莎从碎片中出现，带着凶恶的眼神向爱蜜莉雅跑去。昴迅速拿起球棒把爱蜜莉雅推开站在艾尔莎面前用球棒保护自己的内脏。
- character: 阿尔
  text: 好险！
- character: 由里乌斯
  text: 漂亮的击退。
- character: 视频内容
  text: 艾尔莎向莱茵哈鲁特扔出刀但没打中。她得意地笑：'很快，我就会剖开这里所有人的肚子。在那之前，好好保管你们的内脏。'她爬上墙壁消失在夜色中。
- character: 加菲尔
  emotion: 愤怒
  text: 我们又见到了那个婊子。
- character: 视频内容
  text: 莱茵哈鲁特跑到爱蜜莉雅身边：'你没有受伤吧？'爱蜜莉雅走到遍体鳞伤的昴身边：'你还好吗？那太鲁莽了！'
- character: 视频内容
  text: 昴迅速指着天空摆出姿势：'我的名字是菜月昴！我刚从一个十恶不赦的恶棍手中救了你的命！我们在这点上没问题吧？'
- character: 安娜塔西亚
  text: 让我们看看他怎么使用这个。他会要求金钱吗？还是名声？
- character: 视频内容
  text: 昴：'我只有一个请求！告诉我你的名字。'
- character: 安娜塔西亚
  text: 那太令人失望了。
- character: 威尔海姆
  text: 他把心掏出来了。
- character: 视频内容
  text: 爱蜜莉雅轻声笑了：'爱蜜莉雅。我的名字是爱蜜莉雅。只是爱蜜莉雅。'她在月光下微笑。
- character: 视频内容
  text: 爱蜜莉雅：'谢谢你，昴。救了我。'她为他张开了手掌。昴握住了爱蜜莉雅的手。
- character: 由里乌斯
  text: 你自找的，傻瓜。
- character: 佩特拉
  text: 这就像故事书里的情节。不公平！
- character: 视频内容
  text: 莱茵哈鲁特捡起球棒但它被切成了两半。昴的衣服被切开了。他的内脏爆开了血流得到处都是，他倒下了昏了过去。
- character: 佩特拉
  emotion: 悲伤
  text: 哦不！
- character: 里卡多
  text: 这里到底发生了什么？
- character: 拉姆
  text: 爱蜜莉雅大人还在那里治疗巴鲁斯那中了毒的身体。
- character: 视频内容
  text: 爱蜜莉雅跪在昴身边：'昴？'昴抬头看着她心想：天啊……她惊慌的时候真可爱……
- character: 爱蜜莉雅
  emotion: 高兴
  text: 昴——！
- character: 视频内容
  text: 黑暗。昴的治疗完成了。
- character: 视频内容
  text: 爱蜜莉雅：'我们该怎么处置他？我很乐意把他作为客人带回家。'罗姆：'不，我会带他回家。'
- character: 莱茵哈鲁特
  text: 我想，我们现在知道了。
- character: 菲鲁特
  emotion: 愤怒
  text: 你是想告诉我，我们本可以让昴加入我们的团队！你为什么不带他一起走？！
- character: 普莉希拉
  text: 没有人会抢走他的，平民们。
- character: 视频内容
  text: 爱蜜莉雅看着菲鲁特和罗姆：'他们会怎么样？'莱茵哈鲁特：'从官方上讲，我不能忽视他们所做的事。但……不幸的是，我今天休假。'
- character: 威尔海姆
  text: 嗯……也许他真的变了。我变软弱了。
- character: 视频内容
  text: 菲鲁特向爱蜜莉雅张开手掌露出徽章。莱茵哈鲁特睁大了眼睛看着宝石——那块石头在发光。他粗暴地抓住菲鲁特的手腕：'这-这怎么可能？你叫什么名字？'
- character: 菲莉丝
  text: 所以最后一位候选人就是这样被找到的，嗯。
- character: 由里乌斯
  text: 一切似乎都紧密相连。就像命运和天意在这里发挥了作用。不仅是莱茵哈鲁特和菲鲁特大人的相遇，还有昴的到来以及他和爱蜜莉雅大人的相遇。
- character: 安娜塔西亚
  text: 更不用说他的那种力量了。
- character: 视频内容
  text: 莱茵哈鲁特带着挣扎的菲鲁特站了起来：'我需要你跟我来。对不起，我不能允许你拒绝。'他把菲鲁特的魔力都吸了出来让她昏迷。
- character: 阿尔
  text: 这男人以为自己是萝莉控。
- character: 视频内容
  text: 莱茵哈鲁特公主抱起菲鲁特，把宝石还给了爱蜜莉雅：'请照顾好昴。'
- character: 视频内容
  text: 他们身后的月亮灿烂地发光。莱茵哈鲁特：'今天可能是我们最后一次平静地凝视月亮的机会。'
- character: 视频内容
  text: 屏幕停在昴沉睡的脸上。
- character: 罗兹瓦尔
  text: 这一点都不令人担心呢~
- character: 视频内容
  text: 第二个标题卡：从零开始的异世界生活。片尾曲：Styx helix 原声版。第二集导演剪辑版结束。
- character: 旁白
  text: 第一幕结束。
- character: 菲鲁特
  text: 所以……那之后发生了什么？
- character: 爱蜜莉雅
  text: 莱茵哈鲁特带你走后不久，拉姆就进了赃物屋。她帮我把昴抬到马车上……然后我们离开了。
- character: 阿尔
  text: 所以……这就是男孩来到你们阵营的方式，嗯？该死……我不知道他是比我的容易还是更难。
- character: 菲莉丝
  text: 但就这样了吗？我们现在看完了吗？
- character: 视频内容
  text: 屏幕再次激活。守护者的声音听起来匆忙而恐慌。
- character: 里卡多
  text: 我们到底该怎么做？
- character: 视频内容
  text: 屏幕再次亮起，闪烁着图像。
- character: 爱蜜莉雅
  text: 接下来会发生什么……？
- character: 视频内容
  text: 第二幕开始。第三集即将开始。
