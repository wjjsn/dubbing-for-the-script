title: "Re:Zero 第八章"
author: "Reactionist"
script:
  # === 爱蜜莉雅的噩梦 ===
  - character: "旁白"
    text: "爱蜜莉雅在梦中回到了一座空旷的宫殿。菜月昴浑身是血地躺在她的膝上，却依然微笑着望着她。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "惊慌失措，声音颤抖"
    text: "是——是的，菜月昴！我在！我在这里！请你……请继续慢慢呼吸。"
  - character: "视频内容"
    text: "菜月昴疲惫却兴奋地笑着，问爱蜜莉雅还有什么任务需要他帮忙。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "帮我？就你现在这样？你真是个无可救药的家伙，菜月昴。"
  - character: "视频内容"
    text: "菜月昴虚弱地笑着说自己拼尽全力去救她了，还故作轻松地请她原谅把血弄到她裙子上。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "强忍泪水，打趣的语气"
    text: "你这个大变态~"
  - character: "旁白"
    text: "爱蜜莉雅虽然在笑，泪水却止不住地滑落。她的鲜血浸满了宫殿的走廊，蔓延在瓷砖和地板上。她曾经历过这一切，一次又一次，反反复复。"
  - character: "视频内容"
    text: "菜月昴让爱蜜莉雅不要自责，说她只需要不为他哭泣就好。他最后说——我又要死了，请为我祈祷下一次能成功吧。"
  - character: "旁白"
    text: "无论多少次感受到他的手变得冰冷，每一次爱蜜莉雅都忍不住笑得酣畅淋漓。不是因为死亡本身，而是他死前最后一句话实在太可笑了。"
  - character: "旁白"
    text: "她以为他在用死亡拯救她，但他其实是在这个空荡荡的世界里抛下她，独自逃离死亡。经历这么多次之后，她已经分不清这是真实重演还是脑海中的回响。"
  - character: "旁白"
    text: "虚无之云逼近——莎缇拉不满的浪潮。阴影抹去了宫殿、鲜血和冰冷的尸体。莎缇拉在爱蜜莉雅面前驻足片刻，审视着她与自己的相似之处。"
  - character: "旁白"
    prompt: "低沉、充满怨恨"
    text: "自私的懦夫。"
  - character: "旁白"
    text: "莎缇拉夺走了爱蜜莉雅所有的记忆。阴影在魔女的快意中吞噬了她的本质。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "绝望地呼唤"
    text: "菜月昴……菜月昴……菜月昴。"
  - character: "旁白"
    text: "她不想忘记。她不想让这一轮的记忆被抹去。她不想把他一个人留下。但在莎缇拉轻蔑的目光下，爱蜜莉雅什么都不是。"
  - character: "旁白"
    text: "即使莎缇拉最后一次朝她吐口水，爱蜜莉雅也无法责怪她。她确实活该孤独一人。她软弱的意志迫使菜月昴开启了又一个存档点。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "低声呜咽"
    text: "这不公平……这不公平……这不公平！"
  - character: "旁白"
    text: "半精灵蜷缩着身体，任由泪水浸湿了床单。她不想让惩罚这么快就结束——至少当噩梦再次开始时，她能在里面听到菜月昴的声音。"
  # === 爱蜜莉雅与碧翠丝的对话 ===
  - character: "旁白"
    text: "一个螺旋双马尾的小女孩从门口望向巨大的剧场房间。她身旁站着美丽的半精灵，两人一同凝视着漆黑的房间。"
  - character: "碧翠丝"
    prompt: "淡淡的关心"
    text: "你睡得好吗？"
  - character: "爱蜜莉雅"
    prompt: "勉强回答"
    text: "嗯？呃，是的。我睡得很好，谢谢你关心，贝蒂。你——"
  - character: "碧翠丝"
    prompt: "赌气的语气"
    text: "如果你要问贝蒂昨晚有没有睡好的话，答案当然是没有呢。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "……你也做噩梦了，是吧。"
  - character: "碧翠丝"
    text: "这问题可真够蠢的呢。被迫在那个窗户里看到自己最大的耻辱，我当然会做噩梦啊。"
  - character: "爱蜜莉雅"
    text: "你不是一个人。"
  - character: "碧翠丝"
    text: "你也一直在自责吧？"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    text: "他承受那么多痛苦都是因为我。是我让他独自经历了这些痛苦和恐惧。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "颤抖着，自责地"
    text: "我知道他因为……嗯，他的那个能力……什么都不能告诉我。但是……我真的好想帮帮我的骑士啊！"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "越说越激动"
    text: "孤身一人……来自另一个世界……一次又一次地死去……为了救我……为了帮助我……而他还在等着我说出'我爱你'！"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    prompt: "带着哭腔的愤怒"
    text: "他是个笨蛋！一个又棒又蠢的大傻瓜！我恨他第一次死掉的时候为什么不从我身边逃走！我恨他在经历了那么多痛苦之后还在救我、救我们所有人！"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "声音逐渐变小"
    text: "我希望他还能在我身边。我希望他更爱我……"
  - character: "碧翠丝"
    text: "你可真是个孩子呢。"
  - character: "爱蜜莉雅"
    emotion: "愤怒"
    text: "是，我知道这是个非常非常自私的愿望。但是……我不在乎！"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "语气变得坚定"
    text: "我不在乎……我想更多地了解我对他做过什么。这种痛苦……不应该让任何人独自承受。"
  - character: "碧翠丝"
    text: "你得和那个嫉妒之魔女战斗呢。"
  - character: "爱蜜莉雅"
    text: "我会为他而死。"
  - character: "碧翠丝"
    text: "他也会跟着死的呢。"
  - character: "爱蜜莉雅"
    text: "……那我就帮他一起承受痛苦。"
  - character: "碧翠丝"
    text: "膝枕和可爱微笑可帮不了多少忙呢。"
  - character: "爱蜜莉雅"
    emotion: "兴奋"
    prompt: "坚定不移地"
    text: "我想让他知道我对他的爱。我不会再把他输给死亡了。"
  - character: "碧翠丝"
    emotion: "悲伤"
    prompt: "带着内疚和泪水"
    text: "你觉得那对他来说是最好的选择吗？在我们忽视了他的痛苦和精神不稳定之后？你知道他在猎鲸和圣域事件中可能已经死过更多次了吗？"
  - character: "碧翠丝"
    emotion: "悲伤"
    prompt: "声音破碎"
    text: "贝蒂……也想帮他呢。他是贝蒂的菜月昴！应该是我帮他渡过这些痛苦才对！"
  - character: "旁白"
    text: "碧翠丝紧紧抱住自己的手臂，开始啜泣。她不再是那个优雅的存在，只是一个为自己的无能而哭泣的小女孩。"
  - character: "爱蜜莉雅"
    prompt: "温柔地安慰"
    text: "他看不出来的，贝蒂。当然，我们本可以多做些努力去帮助他。但我们选择了尊重他的隐私。"
  - character: "碧翠丝"
    text: "你不明白呢……"
  - character: "爱蜜莉雅"
    prompt: "起了疑心，命令式地"
    text: "你为什么不敢看我的眼睛，贝蒂？你知道什么我们——我不知道的事情？"
  - character: "碧翠丝"
    text: "我从没想过你能用这种语气对我说话……"
  - character: "爱蜜莉雅"
    prompt: "锐利而令人生畏"
    text: "请告诉我。你看到了什么？"
  - character: "碧翠丝"
    emotion: "悲伤"
    prompt: "呜咽着，认输的语气"
    text: "我……我不行呢。因为菜……菜月昴让贝蒂发过誓……"
  - character: "爱蜜莉雅"
    prompt: "温柔地"
    text: "嘘……"
  - character: "碧翠丝"
    emotion: "悲伤"
    prompt: "断断续续地啜泣"
    text: "我……我想帮他……他……他说贝蒂理解不了他，他要一个人做……我想阻止他……但他一直不理贝蒂。"
  - character: "旁白"
    text: "爱蜜莉雅安静地抱着啜泣哽咽的小精灵，将她搂得更紧。从绝望精灵少女断断续续的倾诉中，她明白了一件事——菜月昴正在做一件非常、非常愚蠢的事。"
  - character: "爱蜜莉雅"
    emotion: "悲伤"
    prompt: "轻声叹息"
    text: "你还要独自承受多少苦难？我可怜的骑士。"
  # === 莱茵哈鲁特与菲鲁特的对话 ===
  - character: "旁白"
    text: "莱茵哈鲁特察觉到他的主君有些不对劲。上一次观影结束时，他没有注意到菲鲁特大人太过安静了。这是他作为骑士的重大失职。"
  - character: "菲鲁特"
    prompt: "不耐烦地"
    text: "哟，莱茵哈鲁特！快进来，我可没那么多时间等你。"
  - character: "莱茵哈鲁特"
    prompt: "恭敬地"
    text: "我来为您效劳了，菲鲁特大人，我们敬爱的未来的女——"
  - character: "菲鲁特"
    text: "行了行了，别废话！我要跟你谈谈我们在那个房间里看到的东西。"
  - character: "莱茵哈鲁特"
    emotion: "悲伤"
    text: "……那确实值得深思。"
  - character: "菲鲁特"
    emotion: "悲伤"
    prompt: "轻声低语"
    text: "我不知道他怎么做到的……经历了那一切之后，他怎么还能笑得出来！他死了啊，莱茵哈鲁特！死了！而且不是什么简单干脆的死法。"
  - character: "菲鲁特"
    emotion: "悲伤"
    prompt: "啜泣着"
    text: "*啜泣*……大哥承受了那么多痛苦，而那个魔女不让他跟任何人倾诉……"
  - character: "菲鲁特"
    emotion: "愤怒"
    text: "我想救他。我想让他待在我身边，让他远离那个诡异的小丑。"
  - character: "莱茵哈鲁特"
    text: "大……大人，您知道菜月昴是马特斯家名下的骑士，更是爱蜜莉雅大人亲选的骑士。他将成为效忠另一位王选候补者的王族骑士。您不能——"
  - character: "菲鲁特"
    emotion: "愤怒"
    text: "我不在乎。我想让他为我效力。我不想让他做我的骑士，但至少我能做到让他不被杀掉。"
  - character: "莱茵哈鲁特"
    text: "这从何说起，大人？为什么您如此坚定地要——"
  - character: "菲鲁特"
    text: "因为我在贪婪。"
  - character: "菲鲁特"
    text: "我这辈子几乎一无所有……突然被卷入这个愚蠢的王选之争，面对一个我讨厌且想摧毁的王国。如果不是因为大哥，我根本不需要参加这场竞争！"
  - character: "菲鲁特"
    prompt: "坏笑"
    text: "我要让他承担责任，帮我渡过这一切。"
  - character: "莱茵哈鲁特"
    text: "但他想和爱蜜莉雅大人在一起！"
  - character: "菲鲁特"
    text: "那就让她加入我们。"
  - character: "莱茵哈鲁特"
    text: "抱歉，大人……什么？"
  - character: "菲鲁特"
    prompt: "恶魔般的微笑"
    text: "你听到那个小丑想做什么了吧？"
  - character: "莱茵哈鲁特"
    emotion: "愤怒"
    text: "当然听到了，如果可以的话我当场就把他送上断头台了！"
  - character: "菲鲁特"
    text: "我要你在我们离开这里之后逮捕那个家伙。"
  - character: "莱茵哈鲁特"
    text: "他赞助了一个与您的阵营竞争王位的阵营。人们可能会认为您在撒谎。"
  - character: "菲鲁特"
    text: "如果让大姐加入我们的阵营就不会了。"
  - character: "莱茵哈鲁特"
    text: "我觉得这不是您能做到的事，菲鲁特大人……"
  - character: "菲鲁特"
    text: "当然能做到！如果大姐那么想当国王，那我们就告诉她，我们两个可以一起治理这个王国。"
  - character: "莱茵哈鲁特"
    text: "我们不能那样做，大人！而且您为什么想让爱蜜莉雅阵营加入我们？"
  - character: "菲鲁特"
    text: "你没听到我刚才说的什么吗？我要把大姐拉进我的阵营，因为那样她就无法参加王选了。"
  - character: "莱茵哈鲁特"
    text: "您……您想让我关押爱蜜莉雅阵营的赞助人。没有资金和地位来打动王族，爱蜜莉雅大人就无法在评议会面前立足。"
  - character: "菲鲁特"
    prompt: "得意地微笑"
    text: "那样的话，我就会给大姐一个加入我阵营的机会，让她辅佐我们登上王位。"
  - character: "莱茵哈鲁特"
    text: "但……但爱蜜莉雅大人有她自己的理由要成为国王。"
  - character: "菲鲁特"
    text: "对。为所有人争取平等，打造一个对所有人都理想的王国。那正是我们要做的事，所以即使我当了国王，她也能实现她想要的一切。她只需要加入我的阵营。"
  - character: "莱茵哈鲁特"
    text: "……然后菜月昴就会跟随她到您身边，这就实现了您的愿望，而且因为爱蜜莉雅大人为您效力，他也会留下来帮助您。"
  - character: "菲鲁特"
    text: "菜月昴无法抛下他的朋友。"
  - character: "莱茵哈鲁特"
    text: "那把他们也收进来。"
  - character: "莱茵哈鲁特"
    text: "你为什么这么反对这个想法？"
  - character: "菲鲁特"
    text: "我没有。"
  - character: "菲鲁特"
    text: "那你为什么要阻止我？几个小时前你还想当场处决那个小丑。现在有什么不同？"
  - character: "莱茵哈鲁特"
    emotion: "悲伤"
    prompt: "面露愧色"
    text: "我觉得我还不够格做他们的朋友，让他们信任我——"
  - character: "菲鲁特"
    prompt: "坚定地"
    text: "你可以做大哥的朋友。你可以有朋友。我也想要他做我的朋友。"
  - character: "旁白"
    text: "当菲鲁特抱住他的腰时，莱茵哈鲁特差点噎住。"
  - character: "菲鲁特"
    prompt: "温柔地"
    text: "我告诉过你……要贪婪一点。"
  - character: "旁白"
    text: "有那么一瞬，剑圣几乎落下了泪水。"
  # === 安娜塔西亚阵营 ===
  - character: "安娜塔西亚"
    prompt: "轻松愉快地"
    text: "很高兴大家都能来喝一杯，我们的东道主在美酒佳肴方面似乎相当慷慨。"
  - character: "旁白"
    text: "安娜塔西亚微笑着喝了口茶，同时抚摸着她心爱的毛皮围巾。紫发商人对她沉默的阵营成员们露出灿烂的笑容。"
  - character: "由里乌斯"
    prompt: "恭敬地"
    text: "希望您睡得好，安娜塔西亚大人。"
  - character: "安娜塔西亚"
    text: "嗯！我睡得跟木头一样沉！希望大家也都睡好了？"
  - character: "旁白"
    text: "安娜塔西亚看到的是一张张不安的脸。她只是闭上眼睛，点了点头。"
  - character: "安娜塔西亚"
    text: "我猜到我们大多数人没睡好。毕竟刚看了那些东西。"
  - character: "里卡多"
    prompt: "不耐烦地"
    text: "我们为什么在这里，老大？"
  - character: "安娜塔西亚"
    text: "好吧，我们来谈正事……"
  - character: "旁白"
    text: "安娜塔西亚将杯子放在桌上，看向在场的阵营成员——由里乌斯、里卡多、蜜蜜和缇碧都在耐心等待着他们的老板。"
  - character: "安娜塔西亚"
    prompt: "纯真的微笑"
    text: "我做出了一个可能会改变历史进程的决定。"
  - character: "缇碧"
    text: "您有什么打算，老大？"
  - character: "安娜塔西亚"
    text: "在我告诉大家我的想法之前，我想先听听你们对我们被卷入的这些'观影'有什么看法。"
  - character: "旁白"
    text: "回应她的只有沉默。双子破天荒地安静了下来，面面相觑，眼中满是困惑和悲伤。"
  # === 安娜塔西亚阵营讨论（续） ===
  - character: "由里乌斯"
    text: "这和菜月昴有关吗？"
  - character: "里卡多"
    text: "当然有关。从我们被传送到这个世界开始，我们一直在观看他在我们的世界里的生活。"
  - character: "安娜塔西亚"
    text: "说对了！我想知道，既然我们都知道了他的小秘密，你们现在对那个男孩怎么看。"
  - character: "蜜蜜"
    emotion: "兴奋"
    text: "我觉得他超厉害！"
  - character: "缇碧"
    prompt: "紧张地搓手臂"
    text: "我觉得他好可怕。"
  - character: "里卡多"
    emotion: "兴奋"
    text: "我不太明白这是怎么回事，老大。但我可以告诉你，经过猎鲸那件事之后，我现在比之前更尊敬那个男孩了。这一点绝对没错。"
  - character: "由里乌斯"
    text: "我认为他是个麻烦。"
