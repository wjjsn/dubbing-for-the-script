  - character: "旁白"
    text: "屏幕缓缓亮起——四位长着翅膀的庄严天使缓缓飞落，掀开了男孩的被子。只是这些美丽庄严的小天使都长着罗兹瓦尔的脸。"
  - character: "旁白"
    text: "佩特拉和蜜蜜吓得尖叫。其他人则笑得前仰后合。所有候补者和她们的阵营都在大笑，甚至威尔海姆都握拳轻笑。罗兹瓦尔直接笑瘫在了地上。"
  - character: "旁白"
    text: "小罗兹瓦尔们缓缓抓起沉睡的菜月昴，带着他飞了起来。直到他醒过来发现——根本没有小罗兹瓦尔天使，播放的音乐是手机闹钟，而且他的房间冷得要命。"
