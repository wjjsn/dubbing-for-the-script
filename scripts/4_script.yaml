  text: 那不是我跟菜月昴醒来后见面的方式。
- character: 旁白
  text: 爱蜜莉雅用坚定的语气说道，目光低垂。
- character: 佩特拉
  emotion: 悲伤
  text: 不……不可能。
- character: 旁白
  text: 佩特拉绝望地哽咽着，蓝色的双眼充满了恐惧的泪水。
