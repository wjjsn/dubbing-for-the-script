- character: 旁白
  text: 碧翠丝对菜月昴的沉睡身影毫无感情、冰冷地说道。好像他会告诉她似的，不管他是在展示他恐怖的剧场里，还是当他们在他的房间里的床上之后……他什么都不会告诉她。碧翠丝不知道为什么。但她知道的是，这不是她的时间线。她从来没有那么早就和菜月昴有过这样的互动。那不是他们第二次见面的方式。但破碎的精灵不打算告诉任何人。他们可以自己弄明白，让她沉浸在羞愧中吧。
- character: 视频内容
  text: '菜月昴轻声恳求着，双手合十做出请求的姿势。''抱歉。就让我待在这里吧。''

    碧翠丝说：''上次有，现在又来了……你是怎么突破我的门之穿越的？''

    菜月昴从膝盖上抬起头看向女孩。''碧翠丝……''

    碧翠丝说：''不加称谓地叫我，我想？''

    菜月昴说：''你说我上次和现在都突破了你的门之穿越，对吧？''

    碧翠丝毫无兴趣地翻了一页。''我三四小时前才拿这件事取笑你，说你迟钝。''

    菜月昴说：''如果这是我第二次在宅邸里醒来……那你还记得我，对吧？''

