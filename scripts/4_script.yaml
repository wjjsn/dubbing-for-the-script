  text: 一个银铃般的声音颤抖着说道。
- character: 弗雷德莉卡
  text: 什么？
- character: 旁白
  text: 弗雷德莉卡僵硬地问道，突然转向银发少女，瞪大了眼睛。
- character: 爱蜜莉雅
