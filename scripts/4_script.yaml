  text: 安娜塔西亚连续两次浪费了这样的机会。菜月昴在和第一次循环一样的更衣室里思考着。循环的情节就是这样运作的。沿着相同的路径走，你就会到达同一个地方。
- character: 库珥修
  text: 所以他试图沿着和上一次生命相同的步骤走，来弄清楚到底是什么杀死了他。
- character: 旁白
  text: 库珥修点了点头，认为这是最合理的计划。菜月昴热情地走进房间，雷姆和拉姆跟在他身后。雷姆正瞪着他。雷姆的眼睛恐惧地瞪大了，呼吸悄悄地急促起来。
- character: 罗兹瓦尔
  text: 看来开始了……
- character: 旁白
  text: 罗兹瓦尔低声说道，眼中闪烁着光芒。根据她的肢体语言和屏幕上她表现出的精确行为，法师断定雷姆确实一直在心里隐藏着对自己的轻微怀疑。拉姆听到了领主说的话，这让她再次眯起眼睛看向妹妹。
- character: 视频内容
  text: 菜月昴开始拿起一套制服。拉姆说：'那太大了，巴鲁斯。'
- character: 旁白
  text: 菜月昴停下来，惊讶地看着拉姆——她改变了循环。
- character: 视频内容
  text: '拉姆环顾了一下衣柜。''这里除了女装没有你能穿的。雷姆，帮他改一下那件。''

    雷姆说：''是，姐姐。''

    菜月昴说：''那就量我的尺寸吧。男人什么尴尬都能承受！''

    雷姆说：''我们晚点再量你。''

    菜月昴说：''嗯？''

    拉姆说：''跟我来，巴鲁斯。''

    菜月昴说：''你要带我参观吗？''

    拉姆说：''那个也可以等。你先帮我干活。''

    菜月昴说：''嘿，等等！'''
- character: 奥托
  text: 这……这次为什么不一样了？
- character: 旁白
  text: 奥托被突然的事件变化吓了一跳，问道。拉姆冷冷地耸了耸肩。
- character: 加菲尔
  text: 他做了什么不同的事吗？
- character: 视频内容
  text: 加菲尔困惑地问道，身后的人同样困惑地耸了耸肩。场景转换。菜月昴在大浴缸里泡澡，一边思考着。
- character: 视频内容
  text: '菜月昴心想：重走我昨天走过的路。那是我打算做的，但……这跟上次完全不同。就像你做了一份小抄，但看到答案时发现是错误的科目。完全白费力气。

    罗兹瓦尔说：''嗨，你好！我可以一起——''

    菜月昴说：''不，你不可以。'''
- character: 旁白
  text: 双胞胎同时叫了出来，她们的眼睛被里卡多和由里乌斯都捂住了。佩特拉的眼睛被弗雷德莉卡捂住了，她嘟囔着说看主人的私处极其不合适。莱茵哈鲁特捂住了菲鲁特的眼睛，微笑着——他成功保护了主君的纯洁。结果心脏差点停跳——菲鲁特用随意的语气说。
- character: 菲鲁特
  text: 又不是没见过。
- character: 旁白
  text: 爱蜜莉雅缓慢而自信地爬过菜月昴的身体，捂住了碧翠丝的眼睛。
- character: 碧翠丝
  text: 你在干什么，我想？
- character: 爱蜜莉雅
  text: 嘘。我不会让贝可的纯洁消失的。
- character: 碧翠丝
  text: 你有资格说我！放开我！我四百岁了，实际上！
- character: 旁白
  text: 爱蜜莉雅无视她，手掌一直捂在萝莉精灵的小脸上。
- character: 视频内容
  text: '菜月昴拒绝了裸体的罗兹瓦尔进入浴缸。法师开始左右摇晃臀部，让他的小球晃来晃去。''这个设施是我宅邸的一部分，所以是我的财产。我想怎么用就怎么用。''

    菜月昴说：''那你何必问呢？想洗就洗呗。''

    罗兹瓦尔摇了摇头。''哎呀，真严厉！而且你似乎不明白。是的，这个浴缸是我的财产……但作为我的员工的一部分，你难道不也是我的财产吗？''他捏住菜月昴的下巴。'
- character: 旁白
  text: 菜月昴只是看着上方的男人……然后咬了他的手。像个狠角色。
- character: 奥托
  text: 我佩服他这一点。
- character: 旁白
  text: 奥托点着头，同时捂着加菲尔的眼睛。别问……兄弟就是懂彼此。佩特拉在座位上扭动了一下，恨不得立刻洗个澡——小丑谈论为他工作的人是财产时那种肮脏的感觉让她无法忍受。她宁愿踢他一百次那个见不得光的地方，也不想再有这种感觉。加菲尔本人对此表现出了极度的烦躁，因为那意味着小丑也把弗雷德莉卡当财产。
- character: 视频内容
  text: '菜月昴说：''毫不犹豫！这跟我想的也不一样。''

    罗兹瓦尔说：''我不知道你在烦恼什么，但人生充满了不如意的事。顺便问一下，你觉得你能跟拉姆和雷姆相处好吗？''

    菜月昴说：''我还没怎么跟雷姆说过话，但我跟拉姆相处得很好。事实上，我觉得她可能有点太友好了。真不敢相信她那样还能当女仆。'''
- character: 拉姆
  text: 试图诋毁我名声的可悲尝试。哼！对巴鲁斯这种没用的员工，我果然不该抱任何期待。
- character: 奥托
  text: 这次没有平时那么毒辣呢，拉姆桑。
- character: 旁白
  text: 奥托悲伤地微笑着说。粉发少女只是抿了抿嘴唇，目光紧盯着屏幕。
- character: 由里乌斯
  text: 老实说这整个场景很奇怪。你不应该这样随意对待你的员工。
- character: 旁白
  text: 由里乌斯尖锐地建议身后的法师。
- character: 莱茵哈鲁特
  text: 我觉得一个领主能跟员工这么自在，算是很慷慨了。
- character: 旁白
  text: 莱茵哈鲁特天真地耸了耸肩，让他的主君笑了。
- character: 菲莉丝
  text: 不过也没自在到光着身子的程度。
- character: 视频内容
  text: '罗兹瓦尔说：''嗯，雷姆弥补了拉姆做不到的事情。作为姐妹，她们必须互相帮助。从这个意义上说，我觉得她们两个相处得相当好。''

    菜月昴一脸无奈。''拉姆只是她姐姐的劣化版，雷姆做的就是替她收拾烂摊子。然而她们坚持说拉姆更优秀因为她更年长。她们的厚脸皮真是可怕。''

    罗兹瓦尔看着菜月昴。''说到厚脸皮，你的似乎也相当厉害呢。''

    菜月昴从浴缸里出来了。''该死，搞得我头晕。蠢罗兹瓦尔……''

    罗兹瓦尔说：''哎呀，我只是想~~要个朋友嘛~'''
- character: 碧翠丝
  text: 这一点都不好笑，我想。
- character: 旁白
  text: 菜月昴走出来，发现拉姆就在门旁等着。菜月昴是裸着的……拉姆盯着……他的私处……我们的少年尖叫着试图遮住他的男性部位。
- character: 视频内容
  text: 拉姆说：'把你那可怜的东西遮起来。'
- character: 旁白
  text: 大房间里到处都传来了笑声。连普莉希拉都在嗤之以鼻。
- character: 视频内容
  text: '菜月昴尴尬地问道：''你在这里干什么？！''

    拉姆说：''我只是在这里等着帮罗兹瓦尔大人换上新衣服。很抱歉告诉你我已经洗完了，所以我不会换衣服。''

    菜月昴说：''我没在想那个！而且，你太宠他了！让他自己穿！'''
- character: 爱蜜莉雅
  text: 这有点不合适呢，拉姆桑。
- character: 旁白
  text: 爱蜜莉雅对女仆开的这种玩笑失望地皱了皱眉。拉姆只是面无表情地盯着她。
- character: 视频内容
  text: '拉姆怒视着他。''我不会容忍对罗兹瓦尔大人的不敬。下次我会用武力。''

    菜月昴说：''再多说一句，我就捅马蜂窝了……''

    拉姆说：''顺便问一下，巴鲁斯，你之后有什么计划吗？''

    菜月昴说：''没有，就去睡觉。''

    拉姆说：''那请在你的房间等一下。我晚点过去。''

    菜月昴说：''嗯？'''
- character: 加菲尔
  text: 真……真他妈走运的……
- character: 旁白
  text: 加菲尔因为不公平而捏碎了手掌。为什么他的队长得到了所有女孩？！
- character: 拉姆
  text: 嗯，我想我知道这是怎么回事了。
- character: 旁白
  text: 拉姆自娱自乐地点了点头，对加菲尔和菜月昴的下流想法翻了个白眼。
- character: 视频内容
  text: '菜月昴心想：她没有别的意思……她没有别的意思。清空脑袋，清空脑袋！爱蜜莉雅碳是我唯一的选择！冷静，冷静……一个爱蜜莉雅碳，两个爱蜜莉雅碳，三个爱蜜莉雅碳……

    菜月昴眼中含着幸福的泪水笑了。''我上天堂了吗？！'''
- character: 旁白
  text: 爱蜜莉雅脸颊泛红地咯咯笑了，终于露出了一个带有笑意的表情。
- character: 视频内容
  text: '爱蜜莉雅用温柔轻柔的语气说道，眼中恢复了一些光芒。''不管发生什么都这么傻……你真傻。''

    拉姆进来了。''你太吵了，巴鲁斯。现在是晚上，安静点。''

    菜月昴脸红地缩到了床角，捂住了脸。''噫！''

    拉姆命令道，把什么东西放在了桌上。''巴鲁斯，过来。''

    菜月昴说：''等等！我的心已经属于一个人了，她的名字叫爱蜜莉雅碳！''

    拉姆说：''你在说什么？我让你坐在这里是为了教你读写。''

    菜月昴说：''这我还是第一次听说！'''
- character: 旁白
  text: 里卡多和阿尔大笑。雷姆和拉姆的眼睛亮了起来。
- character: 雷姆
  text: 原来菜月昴就是这样学会读写的！
- character: 拉姆
  text: 我想这说得通，多么可怕的经历。教动物需要神一般的努力。
- character: 视频内容
  text: 奥托说：'也……也许你不该对菜月君那么严——'
- character: 旁白
  text: 遵守兄弟的约定，加菲尔迅速捂住了奥托的嘴，告诉他闭嘴否则就死定了。如果奥托回头看，他就会见到撒旦本人。爱蜜莉雅和碧翠丝发现自己被这一幕的幽默逗笑了。
- character: 弗雷德莉卡
  text: 他这么快就克服困难，表现得那么正常，有点让人安心呢。
- character: 旁白
  text: 弗雷德莉卡微笑着沉吟道。
- character: 佩特拉
  text: 不是那样的。菜月昴只是在装作没事，因为他不想让别人用不同的眼光看他。
- character: 旁白
  text: 佩特拉稚嫩的声音充满了悲伤，她低着头插话道。弗雷德莉卡拍了拍小女仆的头，脸上带着忧虑的表情。
- character: 弗雷德莉卡
  text: 你想太多了，亲爱的。
- character: 佩特拉
  text: 不代表我错了。
- character: 视频内容
  text: 佩特拉抬头皱眉看着老师，注意到弗雷德莉卡无法直视她的眼睛。场景转换为菜月昴在写字，拉姆从旁边观察。
- character: 视频内容
  text: '菜月昴一边继续写一边问道。''不过这是从哪来的？''

    拉姆说：''我一看就知道你不识字也不会写字。如果你不会读写，我就不能派你去买东西，你也写不了订单。我们从这本儿童童话集开始。从今晚开始，我每天晚上帮你学习。''

    菜月昴说：''你为什么对我这么好？''

    拉姆说：''不然呢？是为了让……不，是为了让我自己轻松点。''

    菜月昴说：''那根本不是在纠正自己！你就没有出过戏对吧？''

    拉姆用邪恶而冰冷算计的眼神低头看着她的学生。''这不是显而易见吗？你能做的事越多，我需要做的就越少。我需要做的越少，雷姆也是。这是双赢。''

    菜月昴说：''但那会给我留下堆积如山的工作啊！'''
- character: 旁白
  text: 拉姆解释说有三种文字他应该记住。
- character: 视频内容
  text: '菜月昴说：''有三种不同的类型？光听就让人沮丧……''菜月昴用日语写着什么，拉姆看不懂。

    拉姆说：''你没时间浪费在涂鸦上了。我们明天要早起，时间很紧。''拉姆打了个哈欠。''我也困了。''

    菜月昴说：''我得说我不讨厌你在最后悄悄塞进自己感受的方式，前辈。''

    拉姆说：''我相信诚实是我最迷人的特点。现在，开始吧。'''
- character: 视频内容
  text: 场景转换为菜月昴在笔记本上写着很多文字。
- character: 视频内容
  text: '菜月昴说：''太单调了，我感觉自己要出现完形崩溃了……''

    菜月昴转身发现她睡在了他的床上。''不过，即使你是为了让自己轻松才这么做，我还是很高兴。老实说，我一直觉得你不太喜欢我，以后我可能还会给你带来更多麻烦。但我会尽快变得有用的……'''
- character: 旁白
  text: 他把羽毛笔折断了。当通常的那群人大笑时，拉姆是唯一一个皱着深深眉头看着的人。
- character: 拉姆
  text: 我其实很想教他的……
- character: 视频内容
  text: 场景转换为菜月昴试穿雷姆为他做的新衣服。那位女仆站在更衣室门口，看着他在镜子前摆姿势。
- character: 视频内容
  text: '菜月昴说：''不想承认……但很完美。看来这次不需要我的缝纫技术了。''

    雷姆在门口问道：''你喜欢缝纫吗？''

    菜月昴开心地笑着，对雷姆展示了一根量绳。''算是吧。对了，罗兹酱和爱蜜莉雅碳好像有很多衣服，但没看到你和拉姆有。要我给你们缝几件吗？我来量你的尺寸。''菜月昴兴奋地问。'
- character: 菲鲁特
  text: 啊，看他说得多兴奋！
- character: 旁白
  text: 菲鲁特轻声说道。雷姆从屏幕上移开了目光，无法面对自己的样子。她一看到屏幕上自己的眼神就意识到了那致命的杀意。她向任何存在的神明祈祷，她不会在这个时候——在她和菜月昴有这么美好时刻的时候——做那件事。他想给她缝衣服！
- character: 视频内容
  text: '雷姆说：''那没有必要。这些制服是我和姐姐所需要的全部。''

    菜月昴说：''你们怎么能除了制服什么都没有？你们所有的衣服都是女仆装吗？''

    雷姆说：''在陪罗兹瓦尔大人外出办事或在宅邸工作时没有任何问题。它们也消除了需要解释我们等级地位的必要，所以非常合理。''

    菜月昴说：''但这不是合不合理的问题。我想说的是可爱的女孩有打扮的义务，这样可以让别人赏心悦目。''菜月昴系好领带，对雷姆微笑。

    雷姆说：''我姐姐是另一回事，但没人会高兴看到我打扮的。'''
- character: 旁白
  text: 拉姆对此怒视了一眼。
- character: 罗兹瓦尔
  text: 你对自己有点太苛刻了呢，雷姆酱。
- character: 旁白
  text: 罗兹瓦尔温柔地责备道。
- character: 库珥修
  text: 你应该对自己的外表更有信心，雷姆阁下。
- character: 旁白
  text: 库珥修发现自己同意领主的话，带着黯淡的微笑面对着沮丧的女孩。蓝发少女只是用饱受煎熬的目光与他们对视了一眼，然后默默地转向屏幕，双手明显在颤抖。
- character: 菲莉丝
  text: 她怎么了，喵？
- character: 旁白
  text: 菲莉丝皱着眉问道。
- character: 威尔海姆
  text: 她难过是因为某个对她很重要的人要死了，她必须看着这些被夺走的美好时刻。
- character: 旁白
  text: 菲莉丝和库珥修对老管家的解释只是皱了皱眉。
- character: 库珥修
  text: 我不认为是那样，威尔海姆阁下。
- character: 旁白
  text: 库珥修带着忧虑的皱眉看着雷姆。
- character: 视频内容
  text: '雷姆说：''嗯，我会的。让你开心会有什么好处吗？''

    菜月昴看着微笑的少年说：''我可能会对这里的工作更有自豪感，这可能会提高我的生产力。''

    雷姆说：''我不知道你为什么那么说。''

    菜月昴说：''我也会期待看到你在服装选择上的不同……''

    雷姆开始从衣柜走开。''那不关你的事。我和姐姐看起来一样有什么不方便的吗？''

    菜月昴在衣柜里对她走开的背影说：''你太爱你姐姐了。'''
- character: 弗雷德莉卡
  text: 你为什么在这里这么敏感？
- character: 旁白
  text: 弗雷德莉卡困惑地问道。
- character: 库珥修
  text: 看来双胞胎似乎以某种方式打乱了整个循环。
- character: 视频内容
  text: 库珥修自言自语地沉吟道。场景转换……菜月昴在厨房里削苹果。
- character: 视频内容
  text: '菜月昴像个混蛋一样叫着，他又割到了手指，开始流血。''嗷！''

    拉姆说：''你不会用刀，巴鲁斯。''

    菜月昴说：''我知道！把刀握稳，转动蔬菜，对吧？''菜月昴一边削蔬菜，雷姆在厨房里的位置盯着他。

    菜月昴尴尬地笑着对雷姆说。''你这样专注地盯着我好尴尬……''雷姆从他身上移开了目光。

    拉姆从旁边说：''你那难看的样子很显眼。尤其是你的头发。非常粗糙。''

    菜月昴说：''我自己剪的，觉得剪得还不错啊。''

    拉姆说：''顺便说一下，在这座宅邸里，雷姆负责打理所有人的头发。她每天早上也为我梳头和穿衣。不是很好吗？''

    雷姆说：''姐姐你多少也出点力啊！'''
- character: 旁白
  text: 一段蒙太奇展示拉姆在修剪灌木丛，把它们搞得一团糟。只有雷姆在姐姐后面收拾，把灌木丛变得漂亮。
- character: 佩特拉
  text: 拉姆桑真的没用呢。
- character: 旁白
  text: 佩特拉低声自语。弗雷德莉卡没有反驳。
- character: 视频内容
  text: '菜月昴和拉姆在修剪灌木丛，雷姆站在一旁，时不时地瞥他们一眼。拉姆和菜月昴注意到了，菜月昴停下来向拉姆求助。拉姆呼唤道：''雷姆……''听到姐姐呼唤，蓝发鬼族看向两人。拉姆说：''如果你愿意的话，可以帮巴鲁斯整理一下头发。''

    拉姆转向少年笑了笑。''你听到了。你应该接受她的提议。她的手会把你带到天堂的。''

    菜月昴怒视着拉姆。''你说得好色情……''他转向雷姆微笑道，''如果你不想，你应该直接告诉她。不是说我不愿意，但是……''

    雷姆摇了摇头。''不，不是那样的。其实确实有点在意……非常地，一点点……极其地，一点点。'''
- character: 里卡多
  text: 哈哈，你好像真的很在意呢。
- character: 旁白
  text: 里卡多从上方调皮地调侃道，蓝发少女只是愤怒地摇着头，眼中充满了愧疚和绝望——她知道屏幕上自己为什么那么关注菜月昴。不是因为什么发型。从黑发少年踏入宅邸的那一刻起，掐死他、丢弃他那散发着肮脏魔女气味的身体的冲动就成了压倒性的生存需求。
- character: 视频内容
  text: 拉姆说：'好吧，总之，这证明了它确实在困扰你。'
- character: 旁白
  text: 碧翠丝被展示从窗户里看着三人。
- character: 视频内容
  text: '帕克说：''怎么了，贝蒂？''

    碧翠丝说：''没什么，布比。更重要的是，我今天有好吃的点心呢，我想。跟我一起吃吧！''

    帕克说：''好吃！'''
- character: 视频内容
  text: 场景转换……菜月昴在擦浴室地板时注意到雷姆站在门口。
- character: 视频内容
  text: '菜月昴说：''怎么了？来帮我吗？''

    雷姆说：''不，是关于我们午饭时讨论的事。''

    菜月昴说：''午饭？哦，关于我的头发？你真的要帮我弄？''

    雷姆深深地鞠了一躬。''不，我觉得我说了一些不应该说的话。非常抱歉。我们虽然是同事，但作为爱蜜莉雅大人的救命恩人，你的地位高于我。''

    菜月昴说：''你是这么想的？抱歉让你这么为难。''

    雷姆移开了目光。''不，我应该为说了这么无意义的话道歉。请忘了吧。''

    菜月昴开始想办法让她好受些，同时停止了擦拭浴缸。''我想事情从来不会那么简单。这就是做人难的地方。好吧，那我给你一个条件！如果你同意，我就忘了你刚才说的一切。''菜月昴对困惑的女仆微笑道。

    雷姆说：''一个条件？好吧，我听听。''

    菜月昴得意地做了他最喜欢的姿势。''如果你帮我梳梳头发、修齐发尾，我就放过你！'''
- character: 安娜塔西亚
  text: 这次我就放过他了，因为他只是个好孩子。
- character: 旁白
  text: 安娜塔西亚嘟囔道。
- character: 由里乌斯
  text: 目前看起来没有什么不对劲的地方。你说菜月昴是被魔兽的诅咒杀死的？
- character: 旁白
  text: 由里乌斯带着严肃的表情转向雷姆。蓝发少女似乎对骑士跟她说话感到不安，眼中充满了惊慌。
- character: 雷姆
  text: 是……是的。菜月昴被狗咬伤是魔兽的诅咒。
- character: 旁白
  text: 她用颤抖的声音说道。拉姆和罗兹瓦尔都对女孩的行为眯起了眼睛。由里乌斯觉得她有点奇怪，但眨了眨眼就转开了。精灵骑士不再盯着她，雷姆终于能暗自松一口气，平复紧张的神经和紧握的拳头。
- character: 雷姆
  text: 一切都好。菜月昴君会温暖我的心……我不会杀他。我不会杀他。
- character: 旁白
  text: 雷姆只是沉默地注视着少年。
- character: 视频内容
  text: 菜月昴说：'你沉默不语的时候，其实更伤人……'
- character: 旁白
  text: 雷姆迅速脱下鞋袜，拿起扫帚帮少年打扫浴室。
- character: 视频内容
  text: '雷姆说：''正如爱蜜莉雅大人所说。你一点野心都没有。''

    菜月昴说：''奇怪……我以为这会让你重新爱上我，而不是厌恶你。''

    雷姆说：''我姐姐说跟你独处时你的眼睛会变得很下流。所以老实说，我已经做好了听你提出那种建议的准备。''

    菜月昴愤怒地把扫帚杵进地板。''她在毁我的名声！''

    雷姆说：''傻瓜，巴鲁斯。我毁不了你根本没有的东西。'''
- character: 阿尔
  text: 他还在烦人地善良着。
- character: 旁白
  text: 阿尔烦躁地叹了口气。
- character: 视频内容
  text: '雷姆优雅地鞠了一躬。''我接受你的条件。我会照你说的做。''

    菜月昴紧张地笑了笑。''那等我遵守完对爱蜜莉雅碳的承诺就好了。''

    雷姆说：''承诺？''

    菜月昴不好意思地笑了笑。''嗯，我还没做出承诺呢。'''
- character: 阿尔
  text: 一边找杀他的人一边还在想她。男人陷入爱河了。
- character: 里卡多
  text: 而我在愉快地看着它开花。
- character: 视频内容
  text: 阿尔和里卡多互相点了点头。场景转换到阿拉姆村。菜月昴在村庄周围一些美丽的地方走动。
- character: 碧翠丝
  text: 那只动物应该在这里，我想。
- character: 旁白
  text: 碧翠丝提醒其他人，同时爱蜜莉雅阵营中的宅邸居民——甚至佩特拉——从村庄出现的那一刻起就已经紧张起来了。
- character: 视频内容
  text: 菜月昴心想：在我做出承诺之前先踩点约会地点可能很聪明……我研究了风景最好的地方！剩下的就是……
- character: 旁白
  text: 镜头拉近到一脸苦恼的菜月昴，他被孩子们缠住了，两条手臂被拉着，后背上还爬着人。
- character: 视频内容
  text: 孩子们喊：'菜月昴！他回来了！他的脸又变奇怪了！'
- character: 旁白
  text: 菜月昴苦着脸，爬在他背上的孩子开始用流着鼻涕的鼻子蹭他的管家外套。
- character: 视频内容
  text: '菜月昴说：''我得确保这些家伙不会找到我们。''

    孩子们说：''找到你们是什么意思？你尿裤子了吗？我们在玩捉迷藏吗？'''
- character: 由里乌斯
  text: 感觉像在欺负他。
- character: 旁白
  text: 由里乌斯好笑地嗤了一声。
- character: 莱茵哈鲁特
  text: 他看起来是那种除非有害否则就让孩子想干什么就干什么的类型。
- character: 旁白
  text: 莱茵哈鲁特微笑着看着这一幕。
- character: 菲莉丝
  text: 集中注意力，喵。菜月昴提到了孩子们玩的一只狗。
- character: 旁白
  text: 菲莉丝对两位骑士插话道。
- character: 佩特拉
  text: 是那只狗……
- character: 旁白
  text: 佩特拉内疚地低头看着自己的双手低语。雷姆提着两个棕色购物袋，看着孩子们和菜月昴玩耍。
- character: 视频内容
  text: '菜月昴说：''冷静点，小鬼们！我之前陪你们玩过了！''

    孩子们说：''再玩一会儿！玩！玩！换裤子！'''
- character: 菲鲁特
  text: 他们好像很喜欢他。
- character: 旁白
  text: 菲鲁特嫉妒地说，因为他们能跟他一起玩。
- character: 视频内容
  text: 孩子们说：'菜月昴有最好玩的游戏。他来村子之前我们从没那么开心过。'
- character: 旁白
  text: 菲鲁特踢了莱茵哈鲁特一脚。她就是踢了。
- character: 莱茵哈鲁特
  text: 菲鲁特大人！
- character: 旁白
  text: 菜月昴召集孩子们围成一圈，蹲下来跟他们保持眼神接触说话。
- character: 视频内容
  text: 菜月昴对孩子们微笑着。'好了，听着。下次我来这里的时候，我会在约会。你们识相点，好吗？'他注意到一个女孩抱着一只小狗。一个蓝发女孩……一个翡翠色眼睛的女孩……
- character: 佩特拉
  text: 那是梅莉！
- character: 旁白
  text: 佩特拉低吼道。
- character: 库珥修
  text: 谁？
- character: 旁白
  text: 库珥修看着爱蜜莉雅阵营要么低吼要么怒视那个女孩。雷姆看起来很困惑。
- character: 奥托
  text: 那个女孩是袭击宅邸的刺客。
- character: 旁白
  text: 奥托解释道。
- character: 由里乌斯
  text: 那个女孩？刺客？
- character: 旁白
  text: 由里乌斯惊讶地问。
- character: 拉姆
  text: 我知道这看起来不太可能。但看看她手里拿着什么。
- character: 旁白
  text: 拉姆厌恶地指着说。所有人都瞪大了眼睛。
- character: 视频内容
  text: '菜月昴伸手去摸那只动物。''不过我允许这只小动物跟爱蜜莉雅碳一起玩。''但小狗躲开了，咬了他的手。

    菜月昴捂着手痛苦不堪。''嗷！又来？！'''
- character: 旁白
  text: 孩子们大笑着。
- character: 视频内容
  text: 雷姆看着少年流血的手。'菜月昴君，原来你在这里。你还好吗？'
- character: 普莉希拉
  text: 他就是这样死的吗？
- character: 旁白
  text: 普莉希拉在扇子后面说道。看到朋友以如此随意的方式被诅咒，所有人都感到悲伤。他会死。他们已经确认了。
- character: 弗雷德莉卡
  text: 至少不会有痛苦。
- character: 旁白
  text: 弗雷德莉卡试图以病态的方式缓和气氛。
- character: 佩特拉
  emotion: 悲伤
  text: 他还是会死。
- character: 旁白
  text: 佩特拉含着泪冷冷地低语，眼睛在这一幕面前闭上了。
- character: 由里乌斯
  text: 该死！
- character: 旁白
  text: 由里乌斯低声咒骂，保持着威严的姿态挺直后背。不过他的表情远谈不上威严或迷人——他正对屏幕上的事件投以恶狠狠的怒视。爱蜜莉雅用手捂住了张开的嘴，呼吸也急促起来。她合上了下巴，随后闭上了眼睛，形成了一个绝望的皱眉，在目睹骑士面带微笑承受诅咒后才平静下来。
- character: 视频内容
  text: '菜月昴说：''我没事，我没事……东西都买好了，雷姆凛？''

    雷姆说：''是的，很顺利。'''
- character: 旁白
  text: 随着太阳开始落山，菜月昴和雷姆开始离开孩子们，向他们挥手告别。
- character: 视频内容
  text: '孩子们失望地挥手告别。''啊，你要走了吗？别走！你们有地方回家吗？''

    雷姆在走回宅邸的路上决定闲聊几句。''你在他们中间很受欢迎呢。''

    菜月昴疲惫地笑了笑。''不知为什么，小孩子一直都喜欢我……''

    雷姆说：''就像动物一样，孩子们会观察等级关系。他们能分辨出是否可以小看某人。''

    菜月昴怒视着。''那些小鬼……一点礼貌都没有。''

    雷姆说：''你有没有向他们展示过你值得尊重的地方？''

    菜月昴笑了笑。''说得有道理。不过，一开始就小看我好像也不太对。拉姆好像很擅长处理这种事。''

    雷姆走在他身边微笑着说。''我姐姐很了不起，对吧？''

    菜月昴说：''老实说，我觉得她的性格应该经常引起冲突才对。''

    雷姆悲伤地笑了笑，看向地面。''我姐姐自信满满的样子正是她的魅力所在。我完全做不到那样。''

    菜月昴说：''对了，你的学习进展如何？''

    雷姆说：''只能说在慢慢推进。拉姆其实也是个不错的老师。虽然我希望她不要在上课上到一半就睡在我的床上。那有点打击我的积极性。''

    菜月昴说：''我姐姐那样做只是为了刺激你的积极性。''

    菜月昴说：''你为什么对姐姐有这么绝对的信任？那不正常……你简直像个恶魔一样狂热。'''
- character: 旁白
  text: 雷姆的眼睛瞪大了。原来他是这个意思才对她说那些话的？！那些美好的话。这个美好的时刻。为什么它必须被从她身边夺走？！
- character: 视频内容
  text: '雷姆说：''像恶魔一样狂热？''

    菜月昴说：''是恶魔版的神灵附体。听起来挺酷的，对吧？'''
- character: 加菲尔
  text: 确实挺酷的。
- character: 旁白
  text: 加菲尔点了点头。他是唯一一个发表评论的人，因为剧场里的其他人要么像某位红之公主和绿发公爵夫人那样太过投入，要么对菜月昴再次死去的方式太心碎和厌恶了。拉姆只是深深地皱着眉头，意识到让菜月昴跟妹妹一起去买东西而不是自己跟去是多么严重的失误。她本可以立即检查那只狗。她不确定妹妹为什么没有对那只狗是魔兽产生怀疑，但拉姆决定给她一些信任，因为她在屏幕上看起来在和少年交朋友。现在只希望剧场里真正的妹妹在她另一个自己和菜月昴独处时不要表现得那么害怕就好了……
- character: 视频内容
  text: '雷姆说：''你喜欢恶魔吗？''

    菜月昴说：''嗯，神灵通常什么都不做，但当你谈论未来计划时，恶魔会跟着你一起笑。尤其是明年之类的。他们会笑掉大牙。'''
- character: 旁白
  text: 雷姆突然停下来，看着菜月昴。他看着她。她笑了。她真的笑了。
- character: 视频内容
  text: '菜月昴盯着她看了一秒。然后得意地笑着在原地跳起了舞。''那个微笑值一百万伏特！''

    雷姆从他身边走开。''我要去告诉爱蜜莉雅大人。''

    菜月昴急忙追了上去。''我不是在撩你！'''
- character: 弗雷德莉卡
  text: 你们很般配。
- character: 视频内容
  text: 弗雷德莉卡温柔地鼓励雷姆。没有削弱笼罩着气氛的黑暗基调……这让爱蜜莉雅不知为何嘟起了嘴。蓝发少女只是把嘴唇抿得更紧了。场景转换。现在是晚上，菜月昴在……他紧抓着椅子，用鼻子呼吸着，仿佛在闻空气中的毒品。他红着脸，不敢看某个人。爱蜜莉雅在他身后。有些人嘲笑这个可怜少年的样子。而爱蜜莉雅只是对他的行为叹了口气。他为什么在她这样的人面前紧张？
- character: 视频内容
  text: '爱蜜莉雅说：''有人好紧张！哈哈哈。拉姆和雷姆都说今晚不会来看你了，所以我答应帮你学习。不过我恐怕帮不了太多。''

    菜月昴大汗淋漓，竭尽全力不回头看身后的女士。''现在，我在写基本的i文字直到记住它们……'''
- character: 旁白
  text: 爱蜜莉雅从他肩后探过来，带着钦佩的微笑，让他更加颤抖和脸红。
- character: 视频内容
  text: 爱蜜莉雅说：'哇！你学习的强度比我想象的要大！'
- character: 旁白
  text: 菜月昴僵硬而缓慢地在自己脸和爱蜜莉雅之间放了一本书。
- character: 视频内容
  text: 菜月昴说：'因……因为这些童话是面向儿童的，所以主要是i文字，据说是这样……所以我的目标是现在能……读懂这个……'
- character: 旁白
  text: 菜月昴突然站起来，开始向半精灵求约。僵硬而紧张地，他开始了邀请她约会的过程。
- character: 奥托
  text: 第……第五个赌局，他用搞笑的方式搞砸了。
- character: 旁白
  text: 奥托出人意料地希望他的兄弟失败。真是个背刺的商人。至少被鼓励了一分钟的仁慈，他阵营的成员以及他们在其他阵营中的朋友——里卡多、菲鲁特、双胞胎和阿尔——决定配合，只为放松一下紧张的神经。当然，所有人都举起了手。包括爱蜜莉雅。
- character: 视频内容
  text: '菜月昴抬头看着，脸上带着梦幻般的微笑。''总之，呃……月亮真美啊。''

    爱蜜莉雅也抬头看了看，困惑地眨了眨眼。''嗯？'''
- character: 旁白
  text: 爱蜜莉雅笑了出来，女孩们咯咯笑着，男孩们——包括威尔海姆的一声轻笑和骑士们的嗤笑声——全都大笑起来。菜月昴迅速从天花板上移开目光，尽可能快地转移话题，希望自己看起来不会像个白痴。
- character: 视频内容
  text: '菜月昴说：''不是！我是说，呃，我有一个请求。你能听我说吗？从明天开始，我会努力工作，也会努力学习！''菜月昴露出了最有魅力的微笑。''跟我约会吧。''

    爱蜜莉雅困惑地问这个能透过房间天花板看到月亮的白痴。''约会是什么意思？''

    菜月昴笑着张开双手。''当一个男孩和一个女孩单独出去时，那就是约会！在那段时间里会发生什么只有爱之女神才知道……''

    爱蜜莉雅微笑着，双手合十，想到了一个甜蜜的主意。''那你今天不就是跟雷姆约会了吗？'''
- character: 旁白
  text: 到这个时候……所有人都笑得在地上打滚了。雷姆也笑了，虽然有点难过。
- character: 视频内容
  text: '菜月昴绝望地在床上打滚。''啊！我没想到会是这个回答！''菜月昴对着爱蜜莉雅不停地鞠躬。''那次不算！请不要算进去！''

    爱蜜莉雅说：''我明白你想让我们一起出去，但去哪里呢？''

    菜月昴说：''其实，附近的村子里有一只超可爱的小狗。还有一片花田。我想在花田里看到你，用我的魔法相机把那个画面永远记录下来！''

    爱蜜莉雅紧张地笑了笑，若有所思地移开了目光。''哦，呃……村子啊？''

    菜月昴说：''那只狗超可爱的！去吧！''

    爱蜜莉雅说：''但这可能会给你带来麻烦。还有村民们——''

    菜月昴说：''孩子们纯真无邪，就像天使！去吧！''

    爱蜜莉雅说：''好吧，好吧。你让我没得选了。我跟你去。''

    菜月昴说：''而且花田超级五彩缤纷美不胜收——真的吗？''

    爱蜜莉雅说：''如果那能激励你从明天开始努力工作的话，那我就去。''

    菜月昴说：''太好了！''

    爱蜜莉雅微笑着看向窗外。''我打赌明天的天气一定很好。''

    菜月昴沉默地看着身旁的窗外。''是啊……那将是我永远不会忘记的一天。''

    爱蜜莉雅注意到他眼中战斗的阴郁神情，停下了笑声。''你又来了……'''
- character: 旁白
  text: 他迅速改变表情看向她。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 他还是不知道……
- character: 旁白
  text: 爱蜜莉雅悲伤地皱起了眉头。
- character: 威尔海姆
  text: 那孩子是个战士。
- character: 旁白
  text: 许多人都对老人的话点了点头。
- character: 爱蜜莉雅
  text: 我真想跟他一起去村子一百遍。即使我们得遇到那只小狗。
- character: 旁白
  text: 令人震惊的是，爱蜜莉雅说这句话时没有结巴。雷姆只是双手合十祈祷着，尽力平复紧张的神经。
- character: 视频内容
  text: '爱蜜莉雅微笑着一笔带过。''你刚才……算了。''开始走向门口，菜月昴全程看着她。

    菜月昴说：''你知道吗，你不把话说完会让人很焦虑的。''

    爱蜜莉雅把手放在门把手上，用鼓励的微笑向菜月昴敬了个礼。''好了，菜月昴管家，记住要努力工作。只有努力的人才能得到奖励，所以这是一个奖励！''爱蜜莉雅笑了。'
- character: 视频内容
  text: 屏幕变成了黑色……片尾曲一：Styx Helix。冰柱在菜月昴和爱蜜莉雅头顶缓缓落下，他们背对背站着。镜头展示爱蜜莉雅闭着眼睛，仿佛不高兴。然后展示菜月昴抬头看着什么。慢慢地，他在第一次循环中帮助孩子的画面播放。以爱蜜莉雅的微笑结束。菜月昴愤怒地咬紧牙关。故事中的各种角色出现，包括苹果摊老板、菲鲁特和罗姆、莱茵哈鲁特和三个盗贼、碧翠丝、帕克和罗兹瓦尔，最后是雷姆和拉姆。艾尔莎周围满是鲜血，然后黑暗中睁开红色眼睛的画面出现。镜头转向爱蜜莉雅沾满鲜血的手。慢慢地，随着镜头拉远，展示了爱蜜莉雅周围的血泊，菜月昴的手进入了画面。菜月昴和爱蜜莉雅手牵着手，死亡降临。一只黑暗的手从天空中向菜月昴伸下来。片尾曲结束。屏幕变暗。
- character: 佩特拉
  text: 这比第一个奇怪一些。
- character: 旁白
  text: 佩特拉对歌曲感到困惑地说。
- character: 库珥修
  text: 我喜欢。
- character: 旁白
  text: 库珥修评论道。
- character: 普莉希拉
  text: 看来你确实有品味。
- character: 旁白
  text: 普莉希拉对库珥修点了点头。
- character: 雷姆
  text: 有人知道那只黑手是什么吗？
- character: 旁白
  text: 没有人回答雷姆，因为——屏幕再次亮起，展示了夜晚的宅邸。
- character: 蜜蜜
  text: 还没结束？
- character: 旁白
  text: 蜜蜜疲惫地问。
- character: 缇碧
  text: 我以为他在诅咒死后醒来了。
- character: 旁白
  text: 缇碧叹息道。
- character: 库珥修
  text: 不，菜月昴大人在计划着什么。
- character: 旁白
  text: 库珥修用阴沉的语气说道。菜月昴坐在房间里，灯亮着，看着手上的咬痕。他紧张地笑了笑。
- character: 视频内容
  text: 菜月昴说：'好吧，让我们做个了断，命运……今晚无论如何我都不睡。我要熬夜迎接承诺的早晨。'
- character: 由里乌斯
  text: 他的计划是……等杀死他的东西再次出现？
- character: 旁白
  text: 由里乌斯不得不扯了扯自己的头发——这个愚蠢的想法。奥托和加菲尔意识到他将在清醒状态下承受诅咒的全部冲击时，看起来比死还难受。
- character: 阿尔
  text: 老实说，这是他能做的最好的选择了。
- character: 旁白
  text: 阿尔冷淡地耸了耸肩，带着悲伤的叹息靠了回去。
- character: 缇碧
  text: 是啊，尤其是他不用担心死的时候。
- character: 旁白
  text: 缇碧评论道，也有点害怕。菲莉丝微微眯起眼睛，但保持沉默。夜晚的寂静令人窒息。
- character: 视频内容
  text: 菜月昴说：'天哪……我是什么，一个修学旅行前睡不着的小学生吗？让我想起修学旅行那天睡过头的事……我没能完全重走相同的循环，但我跟拉姆和雷姆相处得很好。事实上，我觉得比上次做得更好。'
- character: 旁白
  text: 两姐妹现在看起来截然不同了——她们在彼此之间喘息着低语。一个忧虑地从屏幕看向妹妹，来回扫视。另一个女孩只是用汗湿的手紧握着裙摆，嘴唇紧闭，牙齿紧咬。两人都没有忽视这个少年对她们与他在一起的记忆是多么善意和关心。两人都不知道该如何理解这一点。菜月昴在努力保持清醒。他的眼皮不停地往下掉。
- character: 视频内容
  text: 菜月昴说：'如果有什么我觉得遗漏的，那就是没有跟碧翠丝道晚安。每次见到她，我们做的就是互相侮辱。但也许我应该……至少……谢谢她……'
- character: 碧翠丝
  text: 他什么都没做，实际上。
- character: 旁白
  text: 心跳减缓……
- character: 碧翠丝
  emotion: 悲伤
  text: 这个白痴非得告诉贝蒂帮他！
- character: 旁白
  text: 眼皮合上……
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 他为什么不告诉任何人呢？！
- character: 旁白
  text: 黑暗……突然，他从椅子上跳了起来。周围的世界开始奇怪地移动。
- character: 碧翠丝
  text: 诅咒生效了，实际上。
- character: 旁白
  text: 碧翠丝用阴沉的语气说道。
- character: 奥托
  text: 大家坚强点。我们欠他的。
- character: 旁白
  text: 奥托鼓励地说。他们看着……他们的朋友承受着最终会杀死他的诅咒。力量被夺走，他不得不跪倒在地。
- character: 视频内容
  text: 菜月昴说：'这是什么？我好冷……'菜月昴吐了一地，疾病压倒了他。'不……难道是……'
- character: 旁白
  text: 菜月昴用墙壁支撑平衡，慢慢走出了房间。他沿着走廊走去，又吐了。
- character: 视频内容
  text: 菜月昴说：'来人啊……'
- character: 旁白
  text: 爱蜜莉雅和碧翠丝低下了头，无法继续观看——羞耻感不断累积。他在向人求救！他孤独地死去！他爬上了楼梯，又在那里吐了。
- character: 视频内容
  text: 菜月昴说：'来人啊……救命……'
- character: 旁白
  text: 菜月昴设法爬到了楼梯顶部，开始沿着走廊走去。他停下来忍住呕吐。
- character: 菲莉丝
  text: 我看不下去了。
- character: 旁白
  text: 菲莉丝喃喃道，把脸转向一边，表情茫然。
- character: 普莉希拉
  text: 如此可怜地看着一只动物慢慢死去确实总是很痛苦的。
- character: 旁白
  text: 普莉希拉评论道，她的眼中映出了少年那无法使用的破碎能力的可悲景象。由里乌斯将目光固定在地板上，嘴唇抿成一条线——他听到菜月昴临终的喘息在屏幕和剧场外的走廊中蔓延。*锁链声响起。*
- character: 视频内容
  text: 菜月昴回头看去。'那是什么？'
- character: 旁白
  text: 所有人都靠近仔细观看。有什么不对劲。由里乌斯眯起了眼睛。雷姆开始哭泣……她真的做了。大汗淋漓的菜月昴回头看去，因疾病而无法站稳。突然……他被什么东西袭击了。菜月昴在走廊的地毯上滑了过去，鲜血从他身上涌出。
- character: 视频内容
  text: 佩特拉和菲鲁特喊：'菜月昴！大哥！'
- character: 旁白
  text: 佩特拉和菲鲁特被大量的血吓坏了。爱蜜莉雅和碧翠丝目瞪口呆地看着她们心爱的人所承受的痛苦。雷姆倒吸一口气，眼睛瞪得大大的，看着她对少年施加的折磨。她的心在碎裂，她的思维在麻木，她的灵魂在撕裂。屏幕上展示了菜月昴因剧痛而扭曲的脸，口水从嘴里流出来，痛苦地喘息着。身下形成了一滩血泊。
- character: 视频内容
  text: 菜月昴抬头看向走廊的吊灯。'刚才什么……'发现自己的手臂挂在上面。
- character: 旁白
  text: 里卡多和阿尔瞪大了眼睛。他们知道被撕裂的痛苦。里卡多曾被白鲸撕成两半，阿尔失去了一只手臂，所以他们知道这少年有多痛苦。更不用说那致命的诅咒了。少年的脸因极度的痛苦而扭曲。他捂着曾经是手臂的地方，在地上翻滚着痛苦不堪。整个走廊从墙壁到地毯到天花板都变成了血腥的地狱。
- character: 弗雷德莉卡
  text: 加菲尔，呼吸，深呼吸。
- character: 旁白
  text: 他没有听姐姐的话。他无法呼吸，无法呼吸，无法呼吸。他的大将在死去。不。他在被谋杀！而他除了看着什么也做不了！菜月昴因痛苦而尖叫。他的脸沉入血泊中，只有一只眼睛还能睁开。
- character: 库珥修
  text: 到底怎么回事……
- character: 旁白
  text: 公爵夫人觉得应该说点什么，但看着眼前播放的场景，她惊得说不出话来，陷入了石化的状态。
- character: 安娜塔西亚
  emotion: 愤怒
  text: 太过分了……到底是什么东西造成了这次袭击？！
- character: 旁白
  text: 安娜塔西亚从菜月昴决定执行如此愚蠢的计划那一刻起就怒不可遏，决定在这可怕的场景中宣布她还能说话。考虑到黑发少年自己的主人看起来也处于震惊状态，这已经很了不起了。爱蜜莉雅的状态不外乎恐惧、害怕和难以置信，她看着菜月昴的死亡。他抬起头，无法阻止自己的嘴尖叫和呕吐。*锁链声。*锁链声。*突然，菜月昴抽搐的身影被展示出来，一根椅腿遮住了他的脸。一瞬间，某个黑暗的东西被扔向他，把他的头炸成了碎片。鲜血和脑浆的爆炸被展示出来，但景象本身被椅腿挡住了。只能看到菜月昴抽搐的身体，停止了。最后一个镜头是鲜血溅在地毯上，一只孤独的人类棕色眼球带着肉筋滚入画面。他终于死了。第二张标题卡片：我们约定的早晨依然遥远。无演职员表。第三集
    导演剪辑版 结束。场景的极端残忍让房间中最坚强的人都闭上了眼睛，向经历了如此可怕经历后仍在微笑的少年致敬。爱蜜莉雅和碧翠丝抱着菜月昴哭泣，仿佛他即将消失。她们无法相信他经历了那些还能保持自我。碧翠丝现在明白了菜月昴夜间习惯的原因。难怪她告诉他她想死的愿望时，他对她发火了。奥托和加菲尔实际上也开始哭了起来，绝望地看着自己的脚——那个以如此残忍的方式拯救了他们两人的男人的景象让他们反胃。佩特拉当场晕了过去。菲鲁特抱着震惊的莱茵哈鲁特哭泣。即使她是候选人，她也还是个孩子。莱茵哈鲁特也对朋友被如此残忍地杀害感到震惊。剑圣只是盯着空白的屏幕。安娜塔西亚被场景的极端残忍逼出了几滴眼泪。由里乌斯低头看着，神情阴郁。一个人怎么能继续经历这样的体验？里卡多闭着眼睛，怀着肃穆的敬意。他见过这种场面太多次了……但每次看都不容易。双胞胎因为朋友被如此残忍谋杀的场景而哭泣。拉姆瞪大了眼睛看着妹妹。罗兹瓦尔沉默地坐着……他脸上没有笑容。事实上，更接近于解读为他的面部肌肉完全死了——他的嘴和眼睛都松垮地张着，弓着背凝视着虚空。这个男人处于震惊之中。普莉希拉和她的骑士沉默地坐着，没有表现出任何情绪。至于雷姆……身体颤抖，血红的双眼各流出一道泪流。双手紧握着裙摆，用力到把裙子撕破了。嘴巴大张着，发出痛苦而含混不清的声音。雷姆没事了。抱歉。一声咔嗒响起，突然出现了装满水的瓶子、成堆的零食，以及几扇打开的门。休息一下。洗手间、食物和水已经为你们准备好了。等你们准备好了，屏幕会继续播放。第四集……第二章的延续……暂停中，直到他们恢复过来。
