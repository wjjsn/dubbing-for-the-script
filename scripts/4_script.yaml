  text: '爱蜜莉雅害怕地开始摸自己的脸。''怎么了？我脸上有什么吗？''

    菜月昴说：''嗯，有你可爱的眼睛、耳朵、鼻子和嘴巴。你没事就好。''

    爱蜜莉雅微笑着开始在花园里散步。''我没事。毕竟你保护了我。你呢？你感觉怎么样？''

    菜月昴说：''我感觉棒极了！血有点少，魔力被偷了，醒来的冲击耗尽了我的力气，感觉脑子被棍子打烂了，但我很好！'''
- character: 菲莉丝
  text: 他说得好像这只是个游戏一样。
- character: 旁白
  text: 菲莉丝低声说道，少年对自己死亡的轻描淡写让他充满了恐惧。
- character: 莱茵哈鲁特
  text: 他总得找个方式来应对吧。
- character: 旁白
  text: 莱茵哈鲁特轻声说道。
- character: 视频内容
  text: '爱蜜莉雅担忧地转向少年。''我明白了，那很——那不就是说你浑身都受伤了吗？''但有什么东西弄乱了她的头发，然后出来坐在了她的肩膀上。

    帕克大声打了个哈欠。''嗨，菜月昴。美好的早晨，对吧？昨天真是谢谢你了。我得想办法感谢你。''

    菜月昴说：''那就让我随时随地摸你的毛！''

    爱蜜莉雅荒唐地看着菜月昴。''就这样？'''
- character: 旁白
  text: 菜月昴开心地抱起睡着的猫，用脸颊蹭着他。
- character: 视频内容
  text: 菜月昴说：'好吧，出发！我们的时间有限，而我们的世界无比广阔！爱蜜莉雅碳和我的故事才刚刚开始！'
- character: 视频内容
  text: 在一个沉默的时刻，屏幕暂停了，没有人说话。需要有人开口。
