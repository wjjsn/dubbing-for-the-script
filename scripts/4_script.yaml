  text: 菜月昴绝望地看着自己的手。他死了。为什么？他的双手颤抖，呼吸加速。他震惊而困惑地向左看去。拉姆。她不认识他。他向左看。雷姆。她也不认识他。左右扫视。他的眼中满是泪水。他用手捂住了脸，隐藏那痛苦的绝望表情。他所有的努力和进展都白费了。为什么我回来了？
