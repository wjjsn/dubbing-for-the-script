- character: 旁白
  text: 菲鲁特想到这个就发抖。所有人都厌恶地颤抖着，其中一些人甚至感谢了赋予这少年这种力量的人——为这个小小的仁慈。
- character: 视频内容
  text: 碧翠丝恼怒地合上了书。'我在想你在嘟囔什么，结果听到的全是关于生与死。按人类的标准来讨论这些真是无聊又无意义，我想。最后，你只会想出谎言和侮辱性的话语。'
- character: 旁白
  text: 菜月昴抬头看着她，她用无聊的表情看着他。他笑了。
- character: 视频内容
  text: '菜月昴说：''谢谢。你帮了大忙。''他起身拍了拍身上的灰。

    碧翠丝说：''我什么都没做。''

    菜月昴说：''不知怎的，看到你那永不改变的态度让我安心了。''

    碧翠丝说：''只有终极变态才会被言语侮辱所安抚，我想。'''
