- character: 视频内容
  text: 爱蜜莉雅的脸上露出了惊讶。'嗯？就这样？'
- character: 普莉希拉
  text: 他是个简单的男人。
- character: 库珥修
  text: 一个做了伟大事情的简单男人。
- character: 旁白
  text: 库珥修回敬道，带着有趣的微笑看着菜月昴的互动。
- character: 视频内容
  text: 菜月昴说：'对于一个一流的毛皮大师如我来说，能够随时随地抚摸你心爱的宠物对象，价值堪比千万富翁的财富！哦，天哪，这耳朵！'
- character: 碧翠丝
  text: 我好希望布比在这里。
- character: 旁白
  text: 碧翠丝很高兴能再次见到她的哥哥……她很高兴有什么东西能让她暂时忘记即将到来的事。爱蜜莉雅沉默地点点头，盯着屏幕上的两人。多么残酷的玩笑。她辜负最深的两个人。
- character: 视频内容
  text: '菜月昴用脸颊蹭着帕克，帕克享受着这份关注。''我爱上你的柔软了！''

    帕克说：''我知道你的感受，因为我多少能读懂你的心，但我很惊讶你居然能说出来！没关系的，莉雅。我在菜月昴身上找不到任何恶意、敌意或邪念。''

    菜月昴说：''你叫她莉雅也好可爱。''

    帕克说：''比不上你的爱蜜莉雅碳！'''
- character: 阿尔
  text: 这家伙跟精灵混得挺快啊？
- character: 旁白
  text: 阿尔问道，对他的亲和力有点嫉妒。
- character: 佩特拉
  text: 菜月昴跟他遇到的每个人都能相处得很好。即使他们一开始讨厌他。
- character: 旁白
  text: 佩特拉笑着说。
- character: 菲莉丝
  text: 他确实会让你热络起来呢，是吧由里乌斯？
- character: 旁白
  text: 菲莉丝用胳膊肘捅了捅哼着气的紫发年轻人。爱蜜莉雅带着难以捉摸的表情看着两人。
- character: 视频内容
  text: '爱蜜莉雅说：''你真的很奇怪呢，菜月昴。''

    菜月昴看向温暖微笑的爱蜜莉雅。他脸红了。

    爱蜜莉雅说：''哦？你们两个怎么来了？''爱蜜莉雅看向两位女仆。

    雷姆和拉姆同时鞠躬说道：''爱蜜莉雅大人。我们的领主，罗兹瓦尔大人已经回来了。请进来吧。'''
- character: 视频内容
  text: 场景转换，菜月昴穿过门口进入一个中央摆着大桌子的房间。
- character: 视频内容
  text: 碧翠丝站在门旁迎接菜月昴。'我从楼上看着你呢，你知道吗？看来你相当蠢呢，我想。'
- character: 佩特拉
  text: 啊~~碧翠丝大人在吃醋呢。
- character: 旁白
  text: 佩特拉从后面逗弄道，让精灵哼了一声表示否认。
- character: 碧翠丝
  text: 我为什么要吃醋？他已经是贝蒂的菜月昴了，实际上。
- character: 旁白
  text: 碧翠丝回击了小女仆的调侃，为了正式地回应她的挑衅。实际上，她的目光在屏幕上扫描着二十种不同的角度或原因——他可能会以任何方式死去。
- character: 碧翠丝
  text: 如果他周围没有可能的危险，那他一定是找到了除了死亡之外的另一种重置时间的方式。
- character: 罗兹瓦尔
  text: 你甚至为了他走出了图书馆……
- character: 旁白
  text: 罗兹瓦尔对碧翠丝居然这么快就接纳了这少年感到震惊。她从不离开图书馆去观察别人。从来没有。
- character: 视频内容
  text: 菜月昴说：'你凭什么这么说，你这个萝莉？！'
- character: 碧翠丝
  text: 那个词是什么意思？我从来没听过，而且它让我很烦躁！
- character: 旁白
  text: 碧翠丝意识到自己有多想念和他吵架。没有人注意到小女孩握住了他沉睡的手。她继续注视着、等待着……等待一个黑暗的故事展开……等待屏幕上这个快乐的菜月昴变成她每晚假装在床上他身旁入睡时看到的那个破碎的孩子。
- character: 碧翠丝
  text: 一定有另一种触发重置能力的方式。除了死亡之外。但他仍然必须活着，看着他的朋友们死在他面前，我想。这就能解释他为什么对噩梦和创伤如此脆弱，实际上。
- character: 视频内容
  text: '爱蜜莉雅和帕克一起走了进来。帕克微笑着向碧翠丝挥手。

    帕克说：''嘿，贝蒂！我四天没见你了。你一直保持淑女风范吗？''

    碧翠丝的脸变成了兴奋可爱的笑容。''布比！我一直等你回家呢！你今天会陪我吗，你觉得呢？''

    帕克说：''当然，没问题。''帕克从爱蜜莉雅的肩上跳到碧翠丝摊开的手掌中。''今天终于可以一起放松了。'''
- character: 旁白
  text: 碧翠丝开心地抱着帕克转圈，咯咯笑着坐到了椅子上。
- character: 视频内容
  text: 碧翠丝喊：'耶！'
- character: 旁白
  text: 菜月昴困惑地看着这一幕。爱蜜莉雅对他咯咯笑着。
- character: 视频内容
  text: '爱蜜莉雅说：''很困惑吧？碧翠丝对帕克迷得不行。''

    菜月昴说：''现在还有谁会说困惑啊？'''
- character: 旁白
  text: 爱蜜莉雅的心揪了一下……她好想念他说这些话的样子。菜月昴的另一只手被一只雪白的手握住了。菜月昴和爱蜜莉雅的对话被一个突然闯入房间的男人打断了。
- character: 视频内容
  text: 罗兹瓦尔说：'哎呀哎呀！碧翠丝出现在这里可真不寻常呢！我真高兴你决定和我一起用餐。'菜月昴看着这个打扮得像小丑的奇怪男人。
- character: 罗兹瓦尔
  text: 这个故事的真~~~正英雄登场了。
- character: 旁白
  text: 罗兹瓦尔在窗户里看到自己时宣布道。
- character: 佩特拉
  emotion: 愤怒
  text: 你唯一称得上英雄的地方，就是那些觉得小丑妆很酷的变态！
- character: 旁白
  text: 佩特拉愤怒地对她的雇主喊道。她讨厌这个小丑。
- character: 罗兹瓦尔
  text: ……那真~~的好痛。
- character: 旁白
  text: 弗雷德莉卡没有勇气纠正佩特拉的行为。小丑差点杀了他们所有人……如果她在窗户上看到的那些画面有任何指示的话，很可能已经杀了他们所有人。
- character: 碧翠丝
  text: 这少年对我来说不只是一个糊涂的傻瓜呢，我想。贝蒂只是在等布比。
- character: 旁白
  text: 碧翠丝对菜月昴和小丑的怒视转为对帕克的微笑，她把帕克贴在脸颊上。菜月昴困惑地看着小丑，紧张地笑了笑。
- character: 视频内容
  text: 菜月昴拍了拍男人的背，笑了笑。'你们每次吃饭前都雇个小丑来娱乐吗？有钱人的想法我永远也搞不懂。'
- character: 菲莉丝
  text: 哦，这家伙是个白痴！
- character: 旁白
  text: 菲莉丝震惊地喊道。由里乌斯对着屏幕皱起了眉头，叹了口气。
- character: 由里乌斯
  text: 他不知道……
- character: 旁白
  text: 普莉希拉哈哈大笑，带着扭曲的微笑看着。他很有趣……但现在真正引起她兴趣的是完全不同的东西……她的目光飘向了和她坐在同一排的那个古怪小丑。爱蜜莉雅脸上写满了震惊。小丑只是僵在原地，沉默不语。
- character: 视频内容
  text: '爱蜜莉雅紧张地说：''呃，菜月昴，那个男人是……''

    罗兹瓦尔安慰她道：''哦，不，没关系的，爱蜜莉雅大人。''

    菜月昴困惑地看着两人。''怎么回事？''

    罗兹瓦尔微笑着瞥了菜月昴一眼。''只是因为我是这座宅~~邸的领主，罗兹瓦尔·L·马瑟斯，菜月昴君。'''
- character: 罗兹瓦尔
  text: 嗯~~看来这是一个失败的循环。
- character: 旁白
  text: 他的眼神变硬了，罗兹瓦尔看着沉默的两位女仆、充满愧疚的半精灵和下方心碎的精灵少女。但他的话被绯红公主听到了——她已经把他当作一个更有趣的异常现象来关注，而不是屏幕。普莉希拉用绯红的双眼怒视着，心思完全集中在她怀疑的小丑身上。
- character: 威尔海姆
  text: ……他连举止都和她一样。
- character: 视频内容
  text: 威尔海姆温柔地评论道，用充满怀旧温暖的目光注视着屏幕上的罗兹瓦尔。他注意到这一代罗兹瓦尔的穿着和口音与他最亲爱的朋友之一一模一样。菜月昴震惊地后退了一步，小丑走近了盯着他的眼睛。场景转换为宅邸的居民们在用餐，女仆们坐在罗兹瓦尔的两侧。
- character: 视频内容
  text: '菜月昴喝了一口面前的汤，脸上露出了喜悦的表情。''这比普通食物好太多了！''

    罗兹瓦尔说：''嗯，虽然外表如此，但雷姆的厨艺相当出色呢。'''
- character: 库珥修
  text: 这话什么意思？
- character: 旁白
  text: 库珥修问小丑。但看到他眯起的眼神后，她不再追问了。这家伙怎么回事？他为什么笑成那样？库珥修只是盯着屏幕，尽力不让自己发抖。
- character: 视频内容
  text: '菜月昴说：''所以这是蓝头发的那个做的……呃……雷姆酱，对吧？你做的？''

    雷姆说：''是的，先生。这家里的饭菜由我负责。我姐姐不太擅长做饭。''

    菜月昴说：''啊，双胞胎各有所长！那你姐姐擅长打扫吗？''

    雷姆说：''是的，没错。我姐姐擅长家务，尤其是打扫和洗衣。''

    菜月昴说：''那么，雷姆凛，你擅长做饭但不擅长打扫和洗衣？''

    雷姆说：''不，我一般所有家务都擅长。而且洗衣和打扫我也比姐姐强。''

    菜月昴说：''那你姐姐到底有什么用？！'''
- character: 奥托
  text: 太狠了！
- character: 旁白
  text: 奥托颤抖着看向拉姆，粉色头发的鬼族无疑会因为这样的评论而揍这个冒牌骑士一顿，所以他准备挡在中间保护他沉睡的朋友。他看到的……是一个冷静、若有所思的拉姆，毫无反应地注视着屏幕。她在等什么。奥托下了结论，用怀疑的目光看着屏幕。如果……不，有爱蜜莉雅大人和碧翠丝大人在应该不可能……罗兹瓦尔也在！奥托慢慢坐下来，平复了紧张的情绪。他不会再看到朋友死去，为此他很高兴。他的恐慌让他忘记了拉姆还在等什么。
- character: 视频内容
  text: '罗兹瓦尔说：''你真是个奇怪的年轻人呢。你来到卢克尼卡王国马瑟斯边境伯的宅邸，却说你什么都不了~~解。''

    菜月昴困惑地看着宅邸的主人。''这个国家发生了什么不好的事吗？''

    罗兹瓦尔说：''嗯，目前状况不太乐观。毕竟，卢克尼卡的国王目前不在位。'''
- character: 旁白
  text: 菜月昴停止了进食，惊讶地看着罗兹瓦尔。
- character: 视频内容
  text: '罗兹瓦尔说：''不，不需要担心……所有人都已经很清楚现实了。''

    菜月昴说：''真的吗？我还以为会有既然你知道了我的秘密我就不能让你活着离开的戏码呢。'''
- character: 由里乌斯
  text: 边境伯大人。
- character: 罗兹瓦尔
  text: 嗯？
- character: 由里乌斯
  text: 你为什么没有对菜月昴多加怀疑？他显然对王国的状况一无所知，这本身就很可疑，不仅如此，他还设法从暗杀中救下了你资助的候选人。
- character: 旁白
  text: 在陈述他怀疑魔法领主的理由时，由里乌斯没有注意到爱蜜莉雅阵营中除了雷姆和佩特拉之外的人都在剧烈地颤抖。罗兹瓦尔只是嘴角微微上扬地回应骑士，异色的双眸毫无色彩地俯视着骑士。
- character: 罗兹瓦尔
  text: 哎呀~我只是感激这位陌生人救了我的爱蜜莉雅大人的善~~意。我没有预见到这少年有任何不轨行为，也没有从他那……缺陷中感受到危险。
- character: 爱蜜莉雅
  text: 缺陷？
- character: 旁白
  text: 爱蜜莉雅无视由里乌斯的立场，带着困惑的眼神僵硬地插话道。罗兹瓦尔的表情柔和成了一个更温暖的微笑，因为爱蜜莉雅的关注。
- character: 罗兹瓦尔
  text: 我第一天晚上就已经请碧翠丝小姐通过魔力探~~查，在她为他治疗时发现了菜月昴君的所有能力了。
- character: 旁白
  text: 爱蜜莉雅的目光短暂地落在身旁的小女孩身上。小女孩保持沉默。
- character: 罗兹瓦尔
  text: 你可以说菜月昴君在魔力和体能方面的状态和条件是……在某种程度上令人放心的。
- character: 佩特拉
  text: 令……令人放心什么？
- character: 旁白
  text: 佩特拉问道，她不喜欢那个奇怪的小丑装扮的男人在周围所有人鹰隼般的注视下似乎在纠缠着什么。
- character: 罗兹瓦尔
  text: 当然是放心菜月昴如果是敌方间~~谍的话就毫无威胁啦！
- character: 旁白
  text: 这让爱蜜莉雅和雷姆瞪大了眼睛，奥托和加菲尔只是沉默地怒视着罗兹瓦尔。
- character: 由里乌斯
  text: 你已经把他当作间谍了？
- character: 旁白
  text: 由里乌斯面无表情地询问道。他得到了领主的点头。
- character: 罗兹瓦尔
  text: 确实！我是说有太多变量不能忽视，但让我们惊讶的是他对我们的世界和政治形势的了~~解极其有限，更不用说他的魔力门似乎被锁~~定了，这让他更加脆弱和无用……了解他确实很有趣，但我们的关系本该仅限于此的。
- character: 爱蜜莉雅
  emotion: 愤怒
  text: 不许那样说他！
- character: 旁白
  text: 由里乌斯刚要眯起眼睛表示怀疑，一个充满权威的少女声音划破了空气。罗兹瓦尔迎上了两道冰与火的紫色眼眸，其愤怒和威严与它们展现出的纯粹天真旗鼓相当。
- character: 视频内容
  text: 罗兹瓦尔说：'爱蜜莉雅大——'
- character: 爱蜜莉雅
  emotion: 愤怒
  text: 不许再说菜月昴无用或软弱！
- character: 旁白
  text: 出乎所有人意料，怯懦的半精灵竟然直接命令着王国最强的法师，表情坚定而愤怒，仿佛在对一个辜负了她的仆人说话。罗兹瓦尔只是带着爱蜜莉雅不喜欢的那种微笑低下了头。
- character: 罗兹瓦尔
  text: 遵命，爱蜜莉雅大~~人~我深表歉意。我并非有意侮辱我们的菜月昴君，绝~~对不是。我只是在陈述我们在与他建立友~~谊之前是如何分析这少年的。
- character: 加菲尔
  text: 友谊个屁……
- character: 旁白
  text: 加菲尔双臂交叉，鼻子气得冒烟，嗤之以鼻。姐姐的一个警告眼神让他收敛了。由里乌斯这边注意到了爱蜜莉雅阵营对小丑的异常关注——与其他人不同，爱蜜莉雅阵营中少数几个人对小丑表现出的不是其他人通常的怀疑，而是赤裸裸的仇恨和不信任。这里面有更多内情。
- character: 奥托
  text: 由里乌斯先生……请坐下。
- character: 由里乌斯
  text: 什么？
- character: 奥托
  text: 我们不想再拖延观看的时间了。我相信你在寻找的东西终会得到解答。
- character: 由里乌斯
  text: 会吗？
- character: 旁白
  text: 由里乌斯坚定地质问下方的商人。奥托的手坚定地放在身侧，眼神黯淡——因为他不得不为后排那个古怪人物挡下压力，但他不能让这个阵营就此崩塌。尤其是在菜月昴托付他保持阵营完整的时候。奥托口袋里揣着解释罗兹瓦尔每一个奇怪习惯和事件的原因，他知道现在就可以揭穿这个小丑法师的所有答案，告诉最伟大的骑士和他的盟友。但商人从不在没有代价的情况下亮出自己的底牌。而他没有看到让自己的队伍失去这场角逐中唯一赞助人的合适代价。当奥托和由里乌斯互相凝视时，骑士惊讶地发现那个胆怯恐惧的少年突然变得稍微更加坚定和沉稳了。那是某种决心。当骑士正要更流畅地谈论此事时，一只毛皮大手拦住了他。
- character: 安娜塔西亚
  text: 由里乌斯君~你在这里让人看笑话了呢。
- character: 由里乌斯
  text: 安娜塔西亚大人？
- character: 安娜塔西亚
  text: 安静吧，我相信需要知道的事情总会展现出来的。
- character: 旁白
  text: 星之商会的女王只是抓住骑士的手臂，把他拉回座位上，脸上挂着天真无邪的笑容。安娜塔西亚短暂地咯咯笑着，维持着天真的外表，目光在奥托和罗兹瓦尔之间短暂扫过——从最后一排到最前排，两人都独自坐着。她忍不住流露出一丝愉悦。
- character: 安娜塔西亚
  text: 你们看起来那么不同，但行动却像一个人。真了不起。到处都是小丑~
- character: 旁白
  text: 奥托显然被安娜塔西亚的话触动了，但仍然有先见之明阻止朋友说出或做出任何侮辱这位傲慢王选候选人的事。罗兹瓦尔似乎对此很感兴趣，目光在奥托身上短暂停留。普莉希拉自己的眼睛也眯了起来，盯着那个男人。爱蜜莉雅不关心这一切，转过身等待放映继续，想看看菜月昴在这里发生了什么，以及他是否设法控制了这个能力。雷姆一脸困惑地看着这一切，几乎跟不上这个本应是短暂时刻的节奏。
- character: 雷姆
  text: 为什么姐姐没有为罗兹瓦尔大人辩护？
- character: 旁白
  text: 碧翠丝面带微笑地喂着布比，而罗兹瓦尔在说话。
- character: 视频内容
  text: 罗兹瓦尔继续用餐时解释道：'大约在同一时期，国王隐匿不出。一场瘟疫开始在城堡中蔓延。国王和他的子嗣是王室最后的血脉。国家目前由贤人会议管理，他们正在进行新国王的选拔。'
- character: 旁白
  text: 菜月昴似乎在思考。
- character: 视频内容
  text: 菜月昴说：'我明白了。我开始明白了。除了国王不在位之外，王选还在王国中引起了混乱。然后突然间，我从另一个世界出现了——等等，我完全是嫌疑人啊！'菜月昴的脸扭曲成了纯粹的恐慌。
- character: 安娜塔西亚
  text: 确实有点可疑呢，他在这样的时机出现，并且一到达就与一位王选候选人有了接触。
- character: 菲鲁特
  text: 是啊，但我们看到他是怎么来的。他没有选择来到我们的世界，他也不知道大姐是候选人。
- character: 旁白
  text: 菲鲁特回答道，对之前展示的一切漠不关心，因为她对所有人都不怎么在意。对她来说，在座的各位都是小丑。
- character: 安娜塔西亚
  text: 是的，我们知道菜月昴君在这个关键时刻来到这里并非他的意愿。但我们不知道是谁安排了这些事件的发生。
- character: 旁白
  text: 安娜塔西亚若有所思地向后瞥了一眼，某个小丑就潜伏在那里。
- character: 库珥修
  text: 我觉得不是魔女教。
- character: 旁白
  text: 库珥修突然开口，她一直沉默地观察着整个过程。
- character: 普莉希拉
  text: 为什么？
- character: 旁白
  text: 普莉希拉问道，显然很有兴趣将目光从身旁的废物身上移开。
- character: 库珥修
  text: 菜月昴一直是他们非常棘手的眼中钉。我不认为他们会把他放在这里，并赋予他如此强大的能力，只是为了给自己制造挑战。
- character: 普莉希拉
  text: 如果这少年的能力不是魔女教的那些恶魔赋予的呢？
- character: 菲莉丝
  text: 现在叫他少年了？平民怎么了？
- character: 旁白
  text: 普莉希拉沉默着，若有所思地品味着库珥修的推理。
- character: 普莉希拉
  text: 我只是注意到了更多围绕这个凡人发生的事情，引起了我的兴趣。
- character: 旁白
  text: 阿尔震惊地缩了缩，他从没听过她说话这么轻柔过。
- character: 莱茵哈鲁特
  text: 请恕我冒昧发言，库珥修大人、安娜塔西亚大人、菲鲁特大人、普莉希拉大人。
- character: 旁白
  text: 正在交谈的候选人看向了那位拥有剑圣头衔的骑士，他正若有所思地注视着菜月昴。
- character: 菲鲁特
  text: 说。
- character: 旁白
  text: 菲鲁特命令道。他鞠了一躬。
- character: 莱茵哈鲁特
  text: 菜月昴是通过某种邪恶手段获得了这个能力。我在根源中找不到这样神圣的祝福，事实上，我也无法创造它，所以这不是祝福或可用的魔法。一定是某个精通古老黑魔法的强大存在对他做了这件事。
- character: 旁白
  text: 莱茵哈鲁特坐下，看着屏幕，让房间里的人思考他的话。
- character: 普莉希拉
  text: 真是令人作呕。
- character: 旁白
  text: 普莉希拉轻声说道，心思在思考着窗户上的事件。
- character: 视频内容
  text: '罗兹瓦尔继续说道：''而~~且在那之上，你还和爱蜜莉雅大人有了接触，从而与我的家族产生了联系。''

    菜月昴困惑地问道：''等等，为什么宅邸的主人叫她爱蜜莉雅大人？''

    罗兹瓦尔随意地解释道：''对地位更高的人使用应有的敬称是很自然的。'''
- character: 旁白
  text: 菜月昴紧张地转向身旁的女孩。
- character: 视频内容
  text: '菜月昴说：''呃，那爱蜜莉雅碳就是……''

    爱蜜莉雅同情地笑了笑。''我目前的头衔是卢克尼卡王国第四十二代国王的候选人之一，由边境伯罗兹瓦尔资助。''

    菜月昴往后一缩。''什么？！''

    爱蜜莉雅说：''抱歉吓到你了。我不是有意隐瞒的。''爱蜜莉雅慢慢地将她的徽章放在桌上。

    菜月昴说：''嘿，就是那个徽章。''

    爱蜜莉雅说：''这个徽章是成为国王候选人的资格证明。它是鉴别一个人是否有资格登上王位的试金石。''

    菜月昴说：''等等，爱蜜莉雅碳，你弄丢了证明你有资格统治王国的徽章？！''菜月昴荒唐地看着半精灵。

    爱蜜莉雅说：''别那么说！我没有弄丢！是被小偷偷走的！'''
- character: 菲鲁特
  text: 再次抱歉。
- character: 旁白
  text: 菲鲁特轻轻揉了揉头，努力不去回想她给菜月昴造成了那么多痛苦。当半精灵少女对她温暖地微笑时，她感觉好多了。
- character: 视频内容
  text: 爱蜜莉雅说：'已经过去了。'
- character: 旁白
  text: 菲鲁特对她的反应皱起了眉头。爱蜜莉雅不太对劲，她看起来很疏远。
- character: 视频内容
  text: '菜月昴说：''那是一码事！那如果你丢了那东西会怎样？政府机关会再发一个吗？''菜月昴差点从椅子上摔下来。

    罗兹瓦尔解释道：''哦，天哪！如果你丢了，那就毫无疑问了。如果人们认为一个连小小徽章都保护不了的人无法被托付治国重任，那一切就结束了。'''
- character: 旁白
  text: 菜月昴看起来很满意。
- character: 视频内容
  text: 菜月昴说：'现在想想，我干得真不错。这完全提高了我对奖励的期待！'菜月昴诡异地摆弄着手指。
- character: 由里乌斯
  text: 真是个孩子。
- character: 旁白
  text: 由里乌斯对菜月昴脸上表现出的兴奋嗤之以鼻。
- character: 库珥修
  text: 我其实觉得这是公平交易。菜月昴帮助爱蜜莉雅大人和她的赞助人可不是小事。
- character: 旁白
  text: 库珥修挑着眉毛沉吟道。
- character: 菲莉丝
  text: 只要有逆转时间的能力，任何人都能做到……
- character: 旁白
  text: 菲莉丝心里想着，咬住了舌头，不想给他的主君惹麻烦。然而，猫耳骑士感觉自己快要因愤怒而爆发了。
- character: 视频内容
  text: '爱蜜莉雅说：''是啊，你说得对。你对我来说是真正的救星。所以尽管提要求。''爱蜜莉雅对他微笑，完全没有被他摆弄手指的样子带偏。

    罗兹瓦尔大大地张开双手。''你可以提出任何奖赏。说出你的愿望。'''
- character: 库珥修
  text: 第三次赌局，菜月昴会要求一些小而愚蠢的东西。宅邸居民不得参与。
- character: 旁白
  text: 库珥修得意地转身面向众人。所有人都举起了手，笑声此起彼伏。除了安娜塔西亚。
- character: 安娜塔西亚
  text: 我相信菜月昴君会要求一个丰厚的奖赏，并且足够聪明地谨慎使用它。
- character: 旁白
  text: 她没有注意到宅邸居民们脸上的温暖笑容。菜月昴暗自笑了笑。他站了起来。
- character: 视频内容
  text: 菜月昴微笑着吊足了大家的胃口。'那么，我只有一个请求。'房间里所有人都在等待。'雇我在这座宅邸工作！'沉默。
- character: 拉姆
  text: 阿嚏。
- character: 旁白
  text: 拉姆打了个喷嚏。沉默。
- character: 由里乌斯
  text: 等他醒了……我需要跟他谈谈。
- character: 旁白
  text: 由里乌斯老实说有点害怕了。安娜塔西亚用一种凶狠的目光抚着她的毛皮大衣。他注意到毛皮大衣在她抚摸的手下非常流畅地移动着……仿佛在安娜塔西亚手下自行移动。由里乌斯摇了摇头，将注意力集中到面前的重要事情上。他的主君对菜月昴很生气！作为骑士，他有责任揍他一顿！可惜，他还睡着。
- character: 视频内容
  text: 爱蜜莉雅说：'你现在是安全的，菜月。'
- character: 菲鲁特
  text: 我开始觉得他是个白痴了。
- character: 旁白
  text: 菲鲁特对这个愚蠢的请求震惊地说道。库珥修只是轻声笑了笑。普莉希拉在扇子后面嗤之以鼻，对少年缺乏野心感到不屑。
- character: 佩特拉
  text: 菜月昴就是这样为爱蜜莉雅大人工作的？
- character: 旁白
  text: 佩特拉目瞪口呆地自言自语道。
- character: 弗雷德莉卡
  text: 这是一种非正式的入职方式……不过话说回来，罗兹瓦尔大人从来就不是循规蹈矩的人。
- character: 罗兹瓦尔
  text: 哎呀，你说得我好像多不堪似的，弗雷德莉~~卡酱~
- character: 旁白
  text: 佩特拉和弗雷德莉卡并不是唯一对菜月昴在宅邸中工作的方式着迷的人，前排坐着的两个年轻人也同样如此。
- character: 加菲尔
  emotion: 愤怒
  text: 你开玩笑的吧！大将选择为小丑服务？！
- character: 旁白
  text: 加菲尔愤怒地哼着鼻子，怒吼道。
- character: 奥托
  text: 你不应该那么生气，加菲，正因为菜月君为边境伯大人工作，我们才都相遇了。
- character: 视频内容
  text: 奥托回忆着微笑道。加菲尔只是哼了一声，双臂交叉。场景转换为爱蜜莉雅和菜月昴在更衣室里。
- character: 视频内容
  text: '爱蜜莉雅看着穿着不合身衣服的菜月昴。''不太对……没有别的合身的了吗，菜月昴？''

    菜月昴说：''奇怪的是，有些女孩的衣服倒是合身，但是……''

    雷姆面无表情地说：''非常抱歉，先生……我是说，菜月昴君。''

    拉姆说：''你看起来很可笑，先生……我是说，巴鲁斯。''

    雷姆说：''呃，姐姐，你刚才把我的名字变成了一个炫目的诅咒。'''
- character: 奥托
  text: 哈！你都没等他安顿好就开始欺负他了！
- character: 旁白
  text: 奥托忍不住开心地指出来。
- character: 阿尔
  text: 太搞笑了！
- character: 旁白
  text: 阿尔和里卡多对双胞胎与少年的互动哈哈大笑。连爱蜜莉雅和候选人们都被三人组逗乐了。
- character: 拉姆
  text: 所以我在这个版本里还是叫他巴鲁斯啊。
- character: 旁白
  text: 拉姆一边用指关节撑着下巴仔细观察屏幕上过去的自己，一边心想。雷姆用悲伤而充满愧疚的眼神注视着。她不知道未来会发生什么，她只希望如果她做了什么……错事的话，她的英雄会原谅她。罗兹瓦尔用锐利的目光看着她们俩。然而，他眼中那一丝愧疚并没有逃过一位红之公主的注意。
- character: 普莉希拉
  text: 你在做什么呢……？
- character: 旁白
  text: 普莉希拉在扇子后面沉吟道，心思完全不关心屏幕上展示的内容，而是专注于让她来到这个剧场后困扰她的少数事物之一。那个小丑为什么看起来那么空洞？拉姆无视了他，看向妹妹。
- character: 视频内容
  text: '拉姆说：''雷姆，你注意到巴鲁斯那可笑的样子有什么问题吗？''

    雷姆说：''他的肩膀形状很奇怪，腿很短，眼睛很吓人？''

    菜月昴怒视着雷姆，指着她。''其中两样我根本无能为力！''

    拉姆说：''我们不能让你穿着这种可疑的衣服在这里工作。人们会质疑罗兹瓦尔大人的体面。至少让我们改一下外套。雷姆，拜托了。''

    爱蜜莉雅开始离开房间，向菜月昴挥手。''好了，我得去为王选学习了。祝你工作顺利，菜月昴。''

    菜月昴说：''嗯，交给我吧，爱蜜莉雅碳！''

    雷姆走近他，递出一根量尺。''我来量你的尺寸。站直了，背挺直。'''
- character: 旁白
  text: 菜月昴站着，雷姆从身后量着他。当她的手臂环绕着他时，他叫了一声。
- character: 视频内容
  text: '雷姆说：''请不要发出奇怪的声音。很不舒服。''

    菜月昴说：''那不受我控制！这对男人来说在各种意义上都很尴尬！'''
- character: 旁白
  text: 雷姆微微嘟起嘴，恨不得冲进去给自己另一个版本一巴掌——居然浪费了和英雄在一起的这么好的机会。加菲尔、阿尔和里卡多觉得嘲笑他很合适，库珥修和安娜塔西亚则对少年的窘迫咯咯直笑。连由里乌斯和莱茵哈鲁特似乎也被逗笑了。威尔海姆只是嘴角微微上扬，觉得这些恶作剧很有趣。菜月昴现在和拉姆一起走着，她带他参观宅邸。
- character: 视频内容
  text: 菜月昴说：'在这样的宅邸里，洗手间一定很大。'
- character: 旁白
  text: 菜月昴停下来打开门偷看了一眼，但他发现的只是一个在玩耍的小女孩和一只小猫在床上。绝对不是浴室。
- character: 弗雷德莉卡
  text: 又来了？！他是怎么做到的？！
- character: 旁白
  text: 弗雷德莉卡嫉妒地惊讶喊道，菜月昴再次让她震惊了。那些不在碧翠丝圈子里的人只是困惑地看着年长女仆的爆发。
- character: 奥托
  text: 我想菜月君一直都和碧翠丝小姐有联系吧？
- character: 旁白
  text: 碧翠丝没有微笑或反应，她只是带着难以捉摸的表情看着屏幕。他们在等什么？奥托问。他的思维在否认现实。他的灵魂迫使他停止倾听真相。他的心在尽最大努力让他意识到……他的朋友要死了。
- character: 视频内容
  text: 碧翠丝喊：'布比你太棒了！你的毛是最棒的！'
- character: 旁白
  text: 碧翠丝停止了拥抱帕克，警觉地看向菜月昴。
- character: 视频内容
  text: 菜月昴说：'放心。我不会告诉任何人。那毛的手感会让任何人——'
- character: 旁白
  text: 碧翠丝咆哮着把他扔出了房间，在他摔在走廊地毯上后关上了门。菜月昴咆哮着起身去开门。
- character: 视频内容
  text: '菜月昴说：''喂！让我说完！''打开门后，菜月昴面对的是一个小浴室，而不是他预期的图书馆和卧室。

    拉姆说：''那是碧翠丝大人的门之穿越。''

    菜月昴说：''所以这是一个能把宅邸里任何一扇门连接到她房间的法术？''

    拉姆解释道：''一旦碧翠丝消除了自己的存在，不尝试宅邸里每一扇门就没办法找到她。'''
- character: 旁白
  text: 菜月昴对拉姆笑了笑，环顾四周。
- character: 菲鲁特
  text: 第四次赌局，他惨败！
- character: 旁白
  text: 菲鲁特从座位上喊道。没有人举手。连莱茵哈鲁特也没有。菲鲁特嘟起了嘴。他的目光迅速锁定了走廊尽头一扇关着的门，跑了过去。
- character: 视频内容
  text: '菜月昴说：''她在这里！''

    碧翠丝惊恐地尖叫起来，菜月昴一脸得意地猛地推开了门。

    帕克惊讶地向少年挥了挥手。''真厉害，菜月昴！''

    碧翠丝对他咆哮道：''你又选对了门？！'''
- character: 由里乌斯
  text: 确实厉害。但他是怎么做到的？
- character: 旁白
  text: 由里乌斯带着钦佩的表情问道。
- character: 莱茵哈鲁特
  text: 真的不是他的精灵亲和力让他能够破解这么迷人的法术吗？
- character: 旁白
  text: 莱茵哈鲁特忍不住贪婪地求知问道。
- character: 碧翠丝
  text: 你们两个似乎没听到我的话。亲和力和吸引力对破解贝蒂的魔法毫无用处。
- character: 里卡多
  text: 所以，这孩子是自己找到你的？
- character: 旁白
  text: 里卡多惊讶地吹了声口哨。罗兹瓦尔沮丧地凝视着虚空。他主人的魔法真的在当时就无法对抗像菜月昴这样简单的人吗？看来他主人创造的任何东西都会被菜月昴的单纯存在所打破。书籍、图书馆、典籍、法术，全部都是。
- character: 视频内容
  text: '菜月昴得意地指着自己。''我说什么来着？我是一个让游戏管理员哭泣的破旗者。''

    碧翠丝说：''我不懂你在说什么，我想。''

    菜月昴说：''我也不认识你，罗兹酱的妹妹？''

    碧翠丝厌恶地缩了缩。''我才不想当他的妹妹，我想！哼！''

    罗兹瓦尔说：''啊呀，我以为我们的关系比那~~个更亲密呢。''

    碧翠丝说：''哼！''

    帕克解释道：''贝蒂是管理罗兹瓦尔宅邸禁书图书馆的管理员。''

    拉姆从他身后解释道：''罗兹瓦尔大人是王国最伟大的魔法使用者。他有许多不能被他人看到的书籍。碧翠丝小姐被契约来保护它们。'''
- character: 菲莉丝
  text: 而菜月昴把那些知识全部烧掉了！
- character: 旁白
  text: 菲莉丝惊恐地喊道，其他人则对是否应该愤怒还是无动于衷而矛盾着。
- character: 奥托
  text: 那也是没办法的事，嘿嘿。
- character: 旁白
  text: 奥托紧张地揉了揉脸颊，看到骑士和候选人们愤怒的表情。尤其是安娜塔西亚和库珥修。菲鲁特和普莉希拉看起来毫不在意。
- character: 视频内容
  text: 碧翠丝当着他的面关上了门。'如果你明白了的话，那就走吧。'
- character: 旁白
  text: 菜月昴和拉姆现在站在宅邸外面。
- character: 视频内容
  text: '拉姆说：''宅邸参观到此结束。有什么问题吗？''

    菜月昴说：''我知道事后说这些没用，但爱蜜莉雅碳不应该才是陪我参观的人吗？'''
- character: 佩特拉
  text: 他好像只想着她……
- character: 旁白
  text: 佩特拉醋意大发。爱蜜莉雅微微皱了皱眉，但脸红了。他为什么这么爱她？这让她感到好~~温暖，但她无法理解为什么。
- character: 视频内容
  text: '拉姆走着，无视了他。''如果你没有问题，那就开始你的正式工作吧。你来帮我干活，巴鲁斯。''

    菜月昴说：''这一定是我隐藏的管家技能展现的时刻！'''
- character: 碧翠丝
  text: 他还沉浸在这是游戏的妄想中，我想。
- character: 旁白
  text: 碧翠丝叹了口气，失望地摇摇头。
- character: 拉姆
  text: 果然是个没有生活的蠢货。巴鲁斯的完美写照。
- character: 旁白
  text: 拉姆毫不费力地滚着舌头的虐待，靠回座位上专注地看着。普莉希拉对此嗤之以鼻。
- character: 视频内容
  text: 菜月昴的眼睛不停地抽搐。'我今天的工作是打理前院和花园，帮忙准备午餐，擦银器，晒被褥，洗衣物，打扫浴室，还有宅邸每月的清灰工作。'
- character: 菲鲁特
  text: 你们两个做所有这些？！就你们两个？！
- character: 视频内容
  text: 菲鲁特喊道，她见过阿斯特雷亚宅邸里有数百名仆人。罗兹瓦尔的宅邸比他们的更大，所以两个女仆独自打理是不可能的。女仆们只是保持沉默。佩特拉和弗雷德莉卡担忧地看着她们。场景展示了一片橙色的天空，太阳开始落山。一个看起来筋疲力尽的菜月昴穿着运动服而不是管家制服，倒在床上沉重地呼吸着。
- character: 视频内容
  text: '菜月昴说：''累死了。''

    有人敲了敲他的门。雷姆说：''我是雷姆。你有空吗，菜月昴君？'''
- character: 旁白
  text: 雷姆的血液凝固了……她的眼睛瞪大，汗水从额头滑落。这立刻被她后排的双胞胎和领主注意到了。普莉希拉看都没看她一眼。而拉姆和罗兹瓦尔则怀疑地眯起眼睛盯着女孩。男人从一英里外就能读懂鬼族，而粉发女仆通过与双胞胎的联系感受到了不安。
- character: 拉姆
  text: 你做了什么，姐姐/雷姆？
- character: 旁白
  text: 她的另一个版本可能正计划在他的房间里杀了他。蓝发少女快要崩溃了——想到自己杀了心爱之人，这太沉重了。唯一支撑她的是菜月昴用微笑向她展示了这个世界。他不会对杀了他的人那样微笑的，对吧？所以这意味着她一定没有对少年做出那件可怕的事。对吧？
- character: 视频内容
  text: '菜月昴缓慢而疲惫地从床上坐起来。''当然，没问题。我不会做什么奇怪的事，请进吧。''

    雷姆说：''你的许可反而让你听起来更不可信了。那我失礼了。''雷姆拿着一些衣服走了进来。'
- character: 弗雷德莉卡
  text: 确实如此。
- character: 旁白
  text: 弗雷德莉卡和佩特拉、安娜塔西亚一起咯咯笑了起来。没有人注意到雷姆惊慌失措的样子，她双手颤抖地看着。
- character: 视频内容
  text: '雷姆说：''你已经做好了？''

    雷姆说：''既然是罗兹瓦尔大人的衣服，我优先考虑的是小心谨慎，但既然这是你的……''

    菜月昴说：''你刚才是不是暗示你偷工减料了？'''
- character: 旁白
  text: 菜月昴迅速穿上西装，看着自己。
- character: 视频内容
  text: '菜月昴说：''我不想承认，但它很完美。怎么样？我帅吗？''

    雷姆说：''结合灰色衣服的稀有性，没有人穿任何奇怪的衣服能与你匹敌。''

    菜月昴说：''好吧！完全不是在夸我！''

    雷姆看着一块布问道：''那我们该怎么办？''

    菜月昴说：''这个简单。有针线吗？''

    雷姆说：''我带来了。要我现在缝补吗？''

    菜月昴说：''不，我来。别小看我的缝纫技术。'''
- character: 旁白
  text: 菜月昴一边哼着歌一边用针穿过裤子。
- character: 佩特拉
  text: 菜月昴缝纫真的很厉害；他做一些奇怪但看起来很棒的玩具。
- character: 菲鲁特
  text: 玩具……
- character: 旁白
  text: 菲鲁特感兴趣地看着佩特拉。金发少女意识到了她一直缺失的东西。菲鲁特要在莱茵哈鲁特睡觉时狠狠揍他一顿，他可能会掉几个祝福。菜月昴本可以在那个无聊的大宅邸里给她做玩具。他本可以跟她一起玩！如果不是这个愚蠢的骑士如此高尚地拒绝了爱蜜莉雅带菜月昴一起走的请求，菲鲁特就是那个收留并让他为自己服务的人。该死的，莱茵哈鲁特！
- character: 视频内容
  text: 雷姆用神秘的目光看着少年。'我很惊讶，我给你的缝纫技术打满分。但和你一样，似乎并不是很有用。'
- character: 里卡多
  text: 你们对他有点太狠了……
- character: 视频内容
  text: 里卡多被双胞胎对新管家施加的所有虐待吓了一跳。双胞胎注视着，心思天差地别。一个在大口喘气，低声感谢上帝。另一个则用冰冷失望的目光看着姐姐。为什么拉姆对雷姆感到失望？里卡多耸了耸肩。场景转换为菜月昴在厨房里切土豆。实际上……他在失败，他切到了手指，开始流血并痛苦地尖叫。
- character: 视频内容
  text: '拉姆像个专业人士一样削着土豆，而菜月昴正捂着流血的手指。拉姆说：''你缝纫可以打满分，但你用刀还是废物，巴鲁斯。''

    雷姆在品尝食物时转过身，对姐姐笑了笑。''一如既往，你削蔬菜的样子好美啊，姐姐。''

    菜月昴怒视着雷姆。''你的偏心太明显了，简直让人安心！我也想听听对我工作的评价！''

    雷姆看着他那盘切得糟糕的土豆。她面无表情地眨了眨眼。''我同情种这些蔬菜的农夫。'''
- character: 由里乌斯
  text: 我也是。
- character: 旁白
  text: 由里乌斯微笑着说，喜欢他们对待菜月昴的方式。
- character: 爱蜜莉雅
  text: 你们对他太坏了。
- character: 旁白
  text: 爱蜜莉雅担忧地说道，但情绪黯淡。看到妹妹不打算回应沉默的半精灵，拉姆决定顺着两个女孩刺耳的不专注态度。
- character: 拉姆
  text: 巴鲁斯好色得很，反正他把这当作幻想呢，爱蜜莉雅大人。
- character: 蜜蜜
  text: 该死，她为什么这么狠？
- character: 旁白
  text: 蜜蜜畏缩着问她的双胞胎弟弟。缇碧只是耸了耸肩。
- character: 视频内容
  text: '菜月昴说：''别说了！你们在伤我的心！''

    拉姆说：''你不会用刀，巴鲁斯。你应该把刀握稳，转动蔬菜。''拉姆完美地削好了一个土豆，骄傲地微笑着举起来。''坦白说，我最拿手的菜是蒸土豆。''

    菜月昴说：''你怎么能用那么得意的表情说这种话？！该死！看着吧！我的爱刀——流星，会让你们见识见识的！''菜月昴咆哮着拿起一个土豆，开始像个狠角色一样削皮。他割到了自己，开始尖叫……也像个狠角色。'
- character: 旁白
  text: 兄弟情的力量真的不容小觑。加菲尔和奥托和菜月昴有如此深厚的羁绊，甚至在他惨败之前就开始嘲笑他了。真正的朋友。
- character: 视频内容
  text: 菜月昴尖叫：'它直接切穿了我！'
- character: 旁白
  text: 一段蒙太奇播放着，菜月昴试图被解雇——他把他碰过的一切都变成了灾难现场。洗碗？他把碗叠在一起，打破了水槽里的每一个盘子。打扫浴室？他滑倒了，开始用他刚穿上的制服擦地板，在上面滑行。洗女装衣物？他在水里弄伤了手。他到底是怎么做到的？女士们先生们，这个孩子……是特殊的。修剪灌木丛？他用剪刀割到了手指。人们忍不住大笑，有些人捂着肚子从座位上笑得摔了下来。连爱蜜莉雅阵营也在咯咯笑着，很高兴有什么东西占据了他们的思绪，而不是那些想法。爱蜜莉雅轻声咯咯笑着。他总是那么努力。也许在这个现实里她也会给他膝枕——
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 所以你才哭得那么厉害，对吧？
- character: 旁白
  text: 爱蜜莉雅在其他人笑的时候轻声问她沉睡的骑士。他因为无法诉说他的死亡而哭泣。当她第一次给他膝枕，那晚温柔地安慰他时。她不是在帮助一个工作一天后疲惫的朋友。不……她是在接收一个在异国他乡、经历过死亡恐怖的困惑少年的挫败感。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 你为什么不告诉我？你为什么不跟我说？
- character: 视频内容
  text: 爱蜜莉雅看着他疲惫而可怜的睡脸。场景展示了夜幕降临时被黑暗包围的宅邸。我们进入罗兹瓦尔的办公室，小丑坐在椅子上，一个粉发女仆坐在他腿上。拉姆恨恨地怒视着，看到这个私密场景脸红得像甜菜根。所有人都沉默地看着这个诡异的场景。
- character: 视频内容
  text: '罗兹瓦尔说：''菜月昴君从那以后怎么样了？他来了已经五天了。现在应该能看到些什么了。''

    拉姆回答，声音有点慌乱。''做饭、洗衣、打扫……他样样都不行。''

    罗兹瓦尔沉吟道，揉了揉拉姆的头。''你真严格啊……''

    罗兹瓦尔眯起了眼睛。''那他作为间谍的潜力呢？'''
- character: 安娜塔西亚
  text: 预防措施很重要。
- character: 旁白
  text: 安娜塔西亚指出，她和其他候选人早就看穿了。
- character: 爱蜜莉雅
  text: 即使他救了我的命，你仍然不信任他？
- character: 旁白
  text: 爱蜜莉雅问道，心里其实早就知道双胞胎和罗兹瓦尔一开始并没有完全信任菜月昴，主要是帕克当时告诉过她的，她不喜欢他们看起来真的那么偏执。他们不是在开玩笑吗？菜月昴是在罗兹瓦尔的命令下被女仆们虐待的吗？当爱蜜莉雅在多种思绪中沉溺时，一个严肃而沉重的声音响起。
- character: 罗兹瓦尔
  text: 我必须确认，爱蜜莉雅大人。我向你保证，我只是让我的员工确保菜月昴君不受伤害。只是调查他是否有可疑的联系。
- character: 旁白
  text: 碧翠丝和爱蜜莉雅都惊讶地抬头看向了表情真挚的罗兹瓦尔。
- character: 莱茵哈鲁特
  text: 他似乎说的是实话，爱蜜莉雅大人。
- character: 旁白
  text: 剑圣从座位上为半精灵声援道。公爵夫人点头附和，她拥有和年轻骑士相同的能力来判断是否有人在撒谎。
- character: 碧翠丝
  text: 他似乎说的是实话，我想。
- character: 安娜塔西亚
  text: 你为什么对自己的赞助人这么怀疑呢？
- character: 旁白
  text: 安娜塔西亚轻松地靠在扶手上微笑着，抛出诱饵获取信息。这场大戏真正在满足她获取对手情报的巨大渴望。
- character: 奥托
  text: 我觉得这不关你的事，安娜塔西亚大人。
- character: 旁白
  text: 奥托迅速掌控了局面，同时紧紧握着口袋，厌恶感再次淹没了他——他又一次保护了那个试图杀害奥托和他的朋友们的伟大法师。
- character: 奥托
  text: 爱蜜莉雅大人，请。让我们继续看吧。
- character: 旁白
  text: 半精灵盯着恳求的商人少年看了一会儿，透过她善良的外表隐藏着的怒火注视着他榛色的眼眸，然后转过身继续看屏幕，双手放在膝上。拉姆抬起头，将头埋进他的颈窝。
- character: 视频内容
  text: '罗兹瓦尔说：''我不能否认它的存在，但我认为可能性很小。无论好坏。尤其是坏的方面，他太显眼了。''拉姆闭上眼睛，靠在小丑身上。

    罗兹瓦尔看向窗外，审视着坐在花园里看着发光精灵和爱蜜莉雅玩耍的菜月昴。''如果他太显眼的话……尽管有那种可能性，他确实很无忧无虑。就我个人来看，进行干预是明智的。''

    拉姆对主人说，从窗户里看着两人。''他们两个都只是孩子。即使放任他们，也不会发生什么。'''
- character: 视频内容
  text: 场景指向爱蜜莉雅，展示了她周围许多美丽的发光灯点，而菜月昴从旁边敬畏地注视着。
- character: 视频内容
  text: '爱蜜莉雅说：''看着没那么有趣吧？''

    菜月昴说：''跟你在一起的时候，什么都不无聊，爱蜜莉雅碳。''

    爱蜜莉雅说：''这让我很高兴，即使你只是在哄我开心。'''
- character: 雷姆
  text: 你没有经历过这些。
- character: 旁白
  text: 雷姆同情地低语，看到那美好的氛围。
- character: 菲鲁特
  text: 嗯，大哥吃得不错嘛~
- character: 旁白
  text: 菲鲁特得意地笑着，对菜月昴和半精灵的设定表示认可。爱蜜莉雅只是带着不满的皱眉从屏幕上移开了目光。肺部的一阵灼痛暂时掩盖了她的愧疚，取而代之的是对夺走她这一刻的某物的绝对愤怒。爱蜜莉雅不再和精灵们说话，让它们离开，使周围暗了下来，只有头顶的月光照明。
- character: 视频内容
  text: '菜月昴紧张地挠了挠头。''而且，这几天我们一直没有机会好好聊聊。''

    爱蜜莉雅说：''是啊。你在这里学习工作一定很辛苦吧。''

    菜月昴说：''是啊，很辛苦！我真希望能被你的手臂、你的胸口、还有你的大腿轮流安慰。''菜月昴搓着手，脸上挂着傻笑。

    爱蜜莉雅用手指戳了戳他的额头推了他一下。''行了行了。如果你还能这样开玩笑，说明你没事。'''
- character: 旁白
  text: 菜月昴仰面倒在草地上，望着月亮。爱蜜莉雅在他身旁坐下，看着月亮。
- character: 视频内容
  text: '爱蜜莉雅说：''今晚的月亮真美。''

    菜月昴说：''是啊，远远超出了我们的触及范围。''

    爱蜜莉雅说：''我都不用努力就得到了一个超感人的回应！'''
- character: 弗雷德莉卡
  text: 他好努力啊。
- character: 旁白
