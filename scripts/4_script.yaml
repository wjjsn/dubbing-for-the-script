  text: '罗兹瓦尔说：''请~~说出你的愿~~望！''

    菜月昴说：''那么，我有一个请求！雇我在这座宅邸工作！'''
- character: 旁白
  text: 安娜塔西亚气坏了。
- character: 安娜塔西亚
  emotion: 愤怒
  text: 又来了！这孩子是白痴吗？！
