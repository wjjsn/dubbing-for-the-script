title: Re:Zero 第四章
author: Reactionist
script:
- character: 视频内容
  text: 屏幕上飞速闪过一幕幕未知事件的画面，其余的观众则在思索着爱蜜莉雅刚才喃喃自语的那个问题。
- character: 库珥修
  text: 你觉得你的骑士是不是还藏着更多事情没告诉你呢，爱蜜莉雅大人？
- character: 旁白
  text: 坐在沉睡少年身旁的半精灵听到库珥修这番带有审视意味的话，不由得干巴巴地颤了一下。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 他……他从没跟我说过那些事。我确实试过追问他在赃物库时似乎知道的一切……但他为了救我伤得太重了……
- character: 旁白
  text: 半精灵低头看着自己紧握的双拳，困惑的眉头拧得很深。一想到菜月昴不够信任自己、不愿把这些可怕的回忆告诉她，她的心就越发沉重。
- character: 安娜塔西亚
  text: 哦？所以你也意识到了，既然菜月君什么都没跟你说，那他可能不只是隐藏了那个能力而已吧？
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 我……我不知道——他不够信任我，不愿意告诉我这件事，所以我确信还有更多他不想让我看到的东西。
- character: 旁白
  text: 安娜塔西亚摇了摇头，从半精灵身边退开。显然这女孩正处于自己的情绪危机之中，这位商界女王没必要再多插手。但她并不是唯一一个有反应的人。坐在半精灵另一侧的沉默金发精灵同样深深地皱起了眉头。
- character: 碧翠丝
  text: 实际上，贝蒂也没有听他提起过这件事。
- character: 旁白
  text: 爱蜜莉雅看了一眼坐在她沉睡骑士身边的螺旋双马尾小女孩，神情近乎崩溃——因为碧翠丝之前对她说的那些话，至今仍让她深陷在痛苦的情绪之中。
- character: 爱蜜莉雅
  emotion: 悲伤
  text: 贝……贝蒂小姐，你确定吗？
- character: 碧翠丝
  text: 是的，我想是的。
- character: 里卡多
  text: 我是说……这孩子不跟任何人提起这些事，其实挺说得通的。我怀疑没人会相信他。
- character: 旁白
  text: 爱蜜莉雅阵营中有几个人愤怒地瞪向耸着肩的犬人。
- character: 佩特拉
  emotion: 悲伤
  text: 不……不可能。他至少应该跟奥托君和加菲尔君说过吧！他们是他最信任的朋友啊！
- character: 旁白
  text: 佩特拉一边反驳着犬人的话，一边用充满恳求的蓝色双眼望向前排坐着的两个男生。然而她只看到奥托和加菲尔脸上凝重的神情和黯淡的目光。
- character: 佩特拉
  emotion: 悲伤
  text: 你……你们？
- character: 加菲尔
  text: 大将没跟我说过这些。
- character: 旁白
  text: 加菲尔抛开心中积压的烦躁和疑问，语气僵硬地低声说道，脸上浮现出矛盾的表情。身旁的商人觉得不适合再次爆发，只是皱着眉头整了整帽子。
- character: 奥托
  text: 佩特拉酱，我也完全不知道这件事。
- character: 旁白
  text: 佩特拉的目光在爱蜜莉雅、碧翠丝和雷姆之间来回扫视，眼中满是绝望。
- character: 弗雷德莉卡
  text: 我们谁都不知道，佩特拉酱。坐下吧。
- character: 旁白
  text: 弗雷德莉卡从女孩身后轻声说道，一只手搭上了她的肩膀。
- character: 佩特拉
  emotion: 悲伤
  text: 可……可是……他不能把这些都藏在心里……不能一个人扛着啊！
- character: 旁白
  text: 小女孩坐了下来，泪水在眼眶里打转，却还没有滑落脸颊。听到小女仆这声尖叫，雷姆和爱蜜莉雅的表情更加心碎了。两个人都因为没有察觉到菜月昴持续不断的精神创伤而充满了愧疚。但坐在沉睡少年右侧的金发精灵的反应比单纯的愧疚更加剧烈。她紧紧咬着嘴唇，握着契约者的手。泪水虽然还没有落下，但碧翠丝脸上痛苦的表情说明，在看到她唯一的依靠有过如此惨痛的开端之后，这个小女孩的内心已经碎成了什么样。
- character: 库珥修
  text: 看来菜月昴拥有穿越时间的能力。这一点对我们来说基本已经确认了。
- character: 旁白
  text: 库珥修大声沉吟道，终于引起了众人的注意——她觉得现在是时候展开一场讨论了。
- character: 菲鲁特
  text: 那么……
- character: 旁白
  text: 菲鲁特眯起眼睛看向公爵夫人，一种不祥的预感在房间里蔓延开来。
- character: 菲莉丝
  text: 他肯定用这个能力对付了白鲸和怠惰主教喵~看来我们被耍了呢。
- character: 旁白
  text: 菲莉丝半真半假地低吼着，脑子里盘算着菜月昴利用穿越时间的能力来获得库珥修阵营忠诚的各种方式。怪不得他在谈判桌上那么厉害！这小子是个威胁。
- character: 加菲尔
  emotion: 愤怒
  text: 喂！你以为我会坐视不管吗，混蛋！？大将做事总是先为别人着想，比对我自己还好！别没事就说他是什么骗子，听到了没有！
- character: 里卡多
  text: 加菲尔，冷静！
- character: 弗雷德莉卡
  text: 冷静点，小伙子。这样处理事情可不好。
- character: 旁白
  text: 里卡多和弗雷德莉卡试图安抚怒不可遏的加菲尔——他正准备扑向菲莉丝，因为对方提到了菜月昴却对大将的痛苦毫无同情。猫耳骑士忍住了话头，但向下方座位上的粗鲁金发投去了一个刻薄的怒视。加菲尔用尖利的牙齿咬紧牙关回瞪过去。
- character: 威尔海姆
  text: 菲莉丝阁下，请注意你的措辞。
- character: 旁白
  text: 威尔海姆严厉地告诫道，让坐在他身旁的那位大吃一惊。
- character: 菲莉丝
  text: 但是威尔老爷子，这对我们来说太危险了，不能忽视啊！
- character: 威尔海姆
  text: 现在无关紧要。在我们有实际证据之前，请把这些想法收起来，不要这样议论昴阁下。
- character: 旁白
  text: 老人强硬地评判道，赢得了绿发公爵夫人的注视。
- character: 库珥修
  text: 威尔海姆阁下，你仍然认为菜月昴值得信任吗？即便在看到了这少年的能力之后？
- character: 威尔海姆
  text: 我们只是看着一个少年不断死去，才意识到他在这个世界上的运气是多么匮乏，库珥修大人。我看不出这怎么能说明他是我们的敌人。
- character: 旁白
  text: 老剑士向她低头致意，库珥修的琥珀色双眸微微眯起。
- character: 安娜塔西亚
  text: 嗯，看来你忘了这小子效忠的并不是你的主君呢，老爷子。他可能会用这个能力为他侍奉的候选人争取声望呢~
- character: 旁白
  text: 库珥修和安娜塔西亚各自用玩味的目光和坚定的琥珀色眼眸注视着老人。
- character: 威尔海姆
  text: 与他并肩作战的经历，已经给了我所有需要的答案，我的大人。
- character: 旁白
  text: 剑鬼用怜悯和自信的目光回应了主君和她的一位对手。两位候选人似乎被这番话触动了，公爵夫人陷入了沉思，商界女王也退后一步，盯着前方的座椅。
- character: 菲莉丝
  text: 威尔老爷子，你可能是错的。
- character: 旁白
  text: 菲莉丝圆滑地嘟囔道，换来老人摇了摇头。
- character: 阿尔
  text: 该死，老爷子真是帅呆了啊。
- character: 旁白
  text: 阿尔摸着自己的断臂残肢，冷淡地咕哝了一句。看着下方的场面，他觉得有点高兴。
- character: 普莉希拉
  emotion: 愤怒
  text: 阿尔德巴兰，我对你脚底下那群狗的聒噪毫无兴趣。把你那条舌头用在对我有用的事情上，别浪费在那些废话上。
- character: 旁白
  text: 身旁的红之公主残酷地打断了他，一只手简单地抓住他的头盔，就将他的身体按倒在剧场她脚边的地板上。
- character: 阿尔
  text: 殿下，我知道你也在想同样的事。
- character: 旁白
  text: 断臂骑士语气中带着几分戏谑，将脸凑近了女士抬起的脚。
- character: 普莉希拉
  emotion: 愤怒
  text: 闭嘴，没用的废物！
- character: 旁白
  text: 普莉希拉一如既往地将他的头踩在鞋底。普莉希拉不再理会他，绯红的双眸紧盯黑色的屏幕，挫败感淹没了她——她在试图弄清楚，像她这样神圣的存在，为什么会出现在这种地方？侍奉她的世界为何要将她召唤到这里？肯定不只是为了那个可怜无聊的少年和他无用的旅程吧。一想到自己的时间被浪费在如此无用之人身上，这位佛拉基亚的女族长就怒火中烧。
- character: 阿尔
  text: 殿下，求您了……地毯的味道真的不太好……
- character: 旁白
  text: 无视后方戴头盔的骑士，由里乌斯将锐利的目光转向了沉默的红发骑士。他投去了一个询问的眼神。
- character: 由里乌斯
  text: 我很好奇……既然菜月昴甚至还没有和爱蜜莉雅大人见面，你为什么没有察觉到他提到爱蜜莉雅大人时的信息有矛盾呢？既然她是一位候选人，你是不是应该考虑到这一点，莱茵哈鲁特？
- character: 莱茵哈鲁特
  text: 我确实……觉得让爱蜜莉雅大人自己处理会更好。她希望由她来照顾他，而我从昴身上完全感受不到任何恶意。我相信爱蜜莉雅大人伟大的精灵也能告诉她这一点。
- character: 由里乌斯
  text: 所以你觉得把一个卷入了王选候选人危险处境、还掌握了他不应该知道的情报的普通平民……就这样丢在一边，是合适的？
- character: 旁白
  text: 由里乌斯的目光像要穿透莱茵哈鲁特的后脑勺一样，后者尴尬而羞愧地移开了视线。菲鲁特只是对那个男人哼了一声。
- character: 菲鲁特
  text: 我想你当时忙着应付第五位候选人吧，但那确实是一个非常严重的失误，莱茵哈鲁特。
- character: 旁白
  text: 菲鲁特发现自己忍不住翻了个白眼——由里乌斯不停地训斥她的骑士。
- character: 菲鲁特
  text: 天哪，他就不能闭嘴管好自己的事吗？
- character: 旁白
  text: 莱茵哈鲁特只是给了她一个淡淡的微笑。紫发骑士将担忧的目光转向自己的主君。
- character: 安娜塔西亚
  text: 由里乌斯君，一直盯着人家看可是很失礼的呢~
- character: 由里乌斯
  text: 我的大人……你真的认为菜月昴是个威胁吗？
- character: 旁白
  text: 年轻人的声音听起来充满了维护之意，仿佛问出这个问题本身就在伤害自己，但他仍然试图将这一切隐藏在他天生擅长的优雅外表之下。安娜塔西亚此刻一眼就看穿了他。
- character: 安娜塔西亚
  text: 你知道吗，你和他的友谊可是非常珍贵的东西呢，由里乌斯君。
- character: 由里乌斯
  text: 我的大人……
- character: 安娜塔西亚
  text: 不，我并不认为菜月君是个威胁。至少在他失去活下去的意志之前不是。
- character: 旁白
  text: 这个回答让骑士大为惊讶。
- character: 由里乌斯
  text: 那你为什么要赞同库珥修大人的话？
- character: 安娜塔西亚
  text: 只是跟竞争对手们玩个小游戏而已嘛，亲爱的由里乌斯君~女人总得找点乐子嘛。
- character: 旁白
  text: 由里乌斯恍然大悟，瞪大了双眼。
- character: 由里乌斯
  text: 你是在……耍卡尔斯腾阵营？
- character: 旁白
  text: 商界女王一边优雅地抚着围巾，一边露出了十足的得意笑容。
- character: 安娜塔西亚
  text: 他们太执着于往坏处想了。他们宁愿互相争斗也不愿换一种思路。但我们所看到的这个少年，浑身上下都充满了潜力。他可以成为一笔巨大的财富，由里乌斯君。
- character: 旁白
  text: 安娜塔西亚的眼中充满了愉悦和洞察力，让身旁的骑士意识到了什么。这是一场全新的游戏，规则超出了他或其他任何骑士的理解范围。这些放映向他们展示了一些他原本不愿相信任何人——尤其是他称之为朋友的那个少年——会经历过的黑暗。而现在，所有候选人终于开始注意到，从一开始他们就应该密切关注的那些东西。
- character: 罗兹瓦尔
  text: 这不会有好结果的……
- character: 旁白
  text: 罗兹瓦尔用没有口音的声音低声呢喃，因为没人能听见他。拉姆正全神贯注地盯着妹妹的后脑勺，脸上写满了愧疚。小丑装扮的男人独自坐在后排，双手捂着脸，掩饰不住烦躁的神情。这非常糟糕。非常非常糟糕。
- character: 罗兹瓦尔
  text: 我的福音书不仅没有提到那个残酷的细节……现在他们也都知道了，迟早，可能会暴露关于我的事——
- character: 雷姆
  text: 那……那个，打扰了！
- character: 旁白
  text: 罗兹瓦尔的思绪和担忧被打断了——他和房间里所有人的目光都立刻集中到了举起手臂的蓝发女仆身上。
- character: 雷姆
  text: 打扰了，屏幕大人！我……我们还要继续看吗？菜月昴……还有更多隐藏着的事吗？
- character: 旁白
  text: 雷姆的脸色不知为何显得有些苍白。她害怕开口，但拳头仍然紧贴胸口，强迫自己说了出来。
- character: 拉姆
  text: 雷姆……
- character: 旁白
  text: 拉姆的双眼微微眯起，她察觉到妹妹声音中那一丝恐惧和不安。她在隐瞒什么。
- character: 视频内容
  text: 屏幕回应：当然还有更多关于这孩子的事情要看。只是觉得在进入他故事的真正开端之前，你们需要休息一下。
- character: 旁白
  text: 听到这话，许多人都瞪大了眼睛，尤其是雷姆那双充满恐惧的眼睛。
- character: 奥托
  emotion: 愤怒
  text: 等等等等！你是说菜月君经历了更多事情？！而且他拒绝透露任何关于他死亡的事？！
- character: 旁白
  text: 奥托愤怒地问道，说出了他这一阵营所有人的心声。其他候选人和阵营都带着浓厚的兴趣和同情关注着，与爱蜜莉雅阵营不同。在爱蜜莉雅这边，每一个与菜月昴亲近的人都在得知他一直在独自经历着自己的故事而他们甚至毫不知情的每一秒钟里，感到被背叛和毫无价值。
- character: 视频内容
  text: 屏幕回应：操。他们跟上我的思路了。这样吧，你们看这个就知道了。这会解释我的意思和你们需要知道的东西。
- character: 加菲尔
  emotion: 愤怒
  text: 又来了！
- character: 旁白
  text: 加菲尔一边捶着拳头一边大喊，与此同时屏幕的闪烁突然停止，光线变暗——大家都意识到又一次放映已经开始了。
- character: 弗雷德莉卡
  text: 看来我们能做的就只有看了。
- character: 旁白
  text: 弗雷德莉卡低声说道，胃里有一种极其不舒服的感觉。
- character: 雷姆
  emotion: 悲伤
  text: 是啊……看……
- character: 旁白
  text: 雷姆的声音轻轻颤抖，双手紧攥着裙摆，内心的恐惧将各种各样的思绪塞进了她的脑海。如果菜月昴真的能从痛苦的死亡中活过来并回到过去的话……这意味着……她可能做了一件追悔莫及的事。啊，光是想到这个，她的心就痛得不行。
- character: 拉姆
  text: 姐姐……
- character: 旁白
  text: 拉姆用比耳语稍高的声音呼唤道。她的座位在后排，蓝发少女听不见她。拉姆不喜欢妹妹如此轻描淡写地对待心中的悲伤，就好像蓝发的双子更关注别人的痛苦而非自己的。拉姆能看到、感受到这股冰冷的消极情绪从剧场的另一侧流过她亲爱的家人。然而她不禁觉得……雷姆之所以有这样的感受，是她自己的错。
- character: 拉姆
  text: 你做了什么，雷姆？
- character: 视频内容
  text: 粉发女仆再一次低声自语，心脏因恐惧而剧烈跳动。姐姐并不傻。通过与妹妹的联系，她能感觉到，她能看到愧疚。意识到这一点，拉姆成了最后一个抬头看向屏幕的人。她需要一个答案。谁最适合给她答案？随后，屏幕亮了起来。黑暗的屏幕亮起，映出菜月昴熟睡的面容——他穿着袍子躺在一张巨大的床上。
- character: 视频内容
  text: 菜月昴缓缓睁开双眼，对看到的第一样东西发表了评论：'我不认识那个天花板。'
- character: 安娜塔西亚
  text: 对他来说一定感觉很不真实吧。
- character: 旁白
  text: 安娜塔西亚略带感慨地评论道，引来了库珥修和她自己阵营的注意。
- character: 里卡多
  text: 怎么说呢，老板？
- character: 安娜塔西亚
  text: 嗯，你们看不出来吗？这是他第一次在苹果摊以外的地方睁开眼睛。
- character: 旁白
  text: 她指出了一个简单的事实，震惊了在场的人。
- character: 弗雷德莉卡
  text: 那是……
- character: 旁白
  text: 奇怪的是，弗雷德莉卡是第一个试图做出回应的人，但她说不出话来。和这位震惊的金发女仆一样，她身旁的小学徒也同样被这个想法惊呆了。佩特拉已经足够成熟，能够感受到那种终于能在宅邸房间里而非让世界围绕你的死亡重启的地方醒来的堕落感。佩特拉慢慢开始感受到超越死亡本身的恐惧。一种她深爱的英雄被迫独自承受和探索的恐惧。这个小女孩已经足够坚强，可以继续观看菜月昴的旅程，但至少他目前在爱蜜莉雅大人和拉姆大人的保护之下，这给了她些许安慰。
- character: 佩特拉
  emotion: 高兴
  text: 他能挺过去的。菜月昴大人现在有了一切需要的帮助！
- character: 旁白
  text: 小女仆坚定地说道，语气中带着令人惊讶的自信和果断，连她自己的老师都吃了一惊。爱蜜莉雅、拉姆、弗雷德莉卡，甚至碧翠丝都惊讶而难以置信地看向这个小女孩。
- character: 视频内容
  text: 菜月昴坐直身子，拨开袍子看了看自己赤裸的腹部。'伤口消失了。综合这些来看，一定是她……爱蜜莉雅的治愈能力吧。'
- character: 爱蜜莉雅
  text: 他以为是我帮他治好的？
- character: 旁白
  text: 爱蜜莉雅脸上浮现出一丝有趣的温柔微笑，而碧翠丝只是对着屏幕挑了挑眉。毫无表情。
- character: 视频内容
  text: 菜月昴起身走出房间，他注意到门旁边墙上挂着一幅奇怪的森林画。'总之，看来这次我是在没有使用死亡回归的情况下醒来的……不过，醒来的时候看到一个女孩守在床边，不是很正常吗？她照顾了你一整晚，然后问你醒了吗？对于一个被召唤到异世界的故事来说，这个开头也太差了吧。'
- character: 碧翠丝
  text: 在他的世界里，故事通常是面向男性读者的，所以他们会让主角成为吸引女孩的磁铁。我想是这样。
- character: 旁白
  text: 碧翠丝立刻解释道，同时暗自欣赏着他们困惑的表情。
- character: 由里乌斯
  text: 所以他觉得既然被从异世界召唤来了，女孩子就应该对他投怀送抱？
- character: 缇碧
  text: 真是个白痴。
- character: 碧翠丝
  text: 我是说……他是看着那样的故事长大的，所以自然倾向于相信那些套路。
- character: 库珥修
  text: 没错，菜月的世界有关于从另一个现实被召唤的英雄的故事。和我们一样，他们也觉得那是不可能的。
- character: 安娜塔西亚
  text: 所以当菜月昴被传送到这里时，他立刻开始套用他自己世界奇幻故事中的那些老套桥段。
- character: 旁白
  text: 安娜塔西亚继续盯着屏幕，轻而易举地总结了库珥修的想法。爱蜜莉雅在整个关于她骑士因为自身处境而产生的想法和期望的讨论中保持了沉默。她被困在了无法打断这些候选人谈论她骑士的状态中。仿佛他们像她一样了解他。仿佛他们像她一样因为他在旅途初期持有的这种心态而与他并肩战斗过。她被困住只有一个原因。是她的愧疚击碎了她将自己与菜月昴的关系展示给其他人的所有信心。击碎了为他挺身而出的勇气。爱蜜莉雅感到羞愧——这些女孩们所说的关于她骑士将她视为洋娃娃的不光彩想法，确实非常正确。
- character: 爱蜜莉雅
  text: 但我对他来说远不止如此。他自己说过的。
- character: 旁白
  text: 爱蜜莉雅的思绪慢慢冷却了她内心愧疚与愤怒的冲突风暴。
- character: 爱蜜莉雅
  text: 他说过他爱我。他那样想我是不对的。
- character: 旁白
  text: 她平静地自言自语，再次让自己冷静了下来。但另一个念头袭来，她的心又无法平静了。
- character: 爱蜜莉雅
  emotion: 愤怒
  text: 那你为什么不把死亡回归的事告诉我呢，菜月昴？
- character: 旁白
  text: 爱蜜莉雅的想法冰冷、算计、愤怒，对那个诅咒的名字毫不在意。银发少女对少年自以为是的习惯怒不可遏。
- character: 视频内容
  text: 菜月昴继续往前走，注意到另一扇门上也有同样的画时停了下来。'循环走廊？这是那种不找到正确的房间就出不去的设定吗？'菜月昴迅速走向旁边的门。'通常的套路是第一扇门就是目标！'
- character: 普莉希拉
  text: 哼！
- character: 旁白
  text: 普莉希拉傲慢地对这个逻辑嗤之以鼻。说实话，即使他是个小丑，也让她觉得很好笑。
- character: 视频内容
  text: 打开门，菜月昴看到一个小女孩坐在凳子上。
- character: 碧翠丝
  text: 你真是个令人极其恼火的男人呢，我想。
- character: 旁白
  text: 爱蜜莉雅阵营中几乎所有人都对这一幕表现出了极度的震惊，引得周围几个人询问为什么爱蜜莉雅、罗兹瓦尔宅邸的女仆们，甚至罗兹瓦尔本人全都目瞪口呆。
- character: 加菲尔
  text: 怎么了？大将跟小家伙的相遇不是基本操作吗？
- character: 旁白
  text: 加菲尔问道，惊讶于自己姐姐看起来如此震惊，很难理解他们在惊讶什么。
- character: 奥托
  text: 我想我大概知道原因，加菲。
- character: 加菲尔
  text: 嗯？
- character: 奥托
  text: 这一定和我第一次被菜月君和爱蜜莉雅大人迎入罗兹瓦尔大人府邸时被告知的那件事有关。碧翠丝大人从未离开过她伟大的图书馆，宅邸里没人能找到它，因为它被施了魔法隐藏起来了之类的。
- character: 旁白
  text: 奥托没有注意到自己同时吸引了加菲尔和房间内其他人的注意力，他若有所思地低声说道。
- character: 安娜塔西亚
  text: 那这小子第一次就找到她了是怎么回事？
- character: 旁白
  text: 安娜塔西亚从上方轻快地问道，眼中充满了兴趣。她自己的骑士将目光投向他们，眼中闪烁着兴奋的光芒。
- character: 弗雷德莉卡
  text: 我……不知道菜月昴大人在府邸的第一天就找到了大图书馆。真是太不可思议了！
- character: 拉姆
  text: 看来巴鲁斯总是一不小心就嗅到了自己喜欢的东西呢。
- character: 里卡多
  text: 我们该怎么理解这句话？
- character: 旁白
  text: 里卡多对粉发少女的冷硬发言冒了冷汗。
- character: 爱蜜莉雅
  emotion: 高兴
  text: 看来你们两个从一开始就注定相连了呢，碧翠丝小姐。真是太神奇了！
- character: 旁白
  text: 爱蜜莉雅表达了自己的惊叹和对小女孩的喜悦，觉得整个情况都预示了碧翠丝与菜月昴的联系。奇怪的是，金发小精灵在整个过程中保持沉默。爱蜜莉雅差点以为这女孩还在生她的气，又在无视她了。
- character: 雷姆
  emotion: 悲伤
  text: 菜月昴和碧翠丝大人真的很亲近呢。
- character: 旁白
  text: 雷姆感到自己被排斥在外，心中酸楚，不禁用悲伤的声音说道。被排除在外的感觉并不好——看到大家都在谈论这一刻对那个精灵（雷姆在同住宅邸的岁月里几乎没怎么见过她）和她全心全意爱着的少年来说是多么有预示意义。
- character: 碧翠丝
  text: 贝蒂和她的契约者一直都是相连的，实际上。
- character: 旁白
  text: 大精灵本人用肯定而自信的语气说道。然而，碧翠丝的声音和眼神中都没有任何欢快。
- character: 视频内容
  text: 菜月昴说：'第一个NPC找到了！你那冰冷的态度会毁了你可爱的小脸蛋哦。来嘛！笑一个！笑一个！'
- character: 碧翠丝
  text: 我唯一值得给你的笑就是嘲讽的冷笑。
- character: 视频内容
  text: 菜月昴说：'你生气是因为我第一次就猜对了吗？我一直都是个猜东西很准的人。我能理解为什么游戏管理员想让我参加所有活动，但是抱歉啦！话说回来，这里到底是什么地方？'
- character: 旁白
  text: 碧翠丝在他继续说话的时候握紧了手中的书。
- character: 罗兹瓦尔
  text: 嗯，你在那么早的时候就感觉到了吗，碧翠丝？
- character: 旁白
  text: 精通魔法的领主低声呢喃道。罗兹瓦尔的双眼微微眯起，盯着小女孩握紧书本的方式。
- character: 碧翠丝
  text: 哼！这是贝蒂的多功能房间，兼作图书馆和卧室，我想。
- character: 视频内容
  text: 菜月昴说：'真是典型的回答呢。你是那种现在大家都喜欢的说明书女孩吗？'
- character: 由里乌斯
  text: 他没意识到他在一位大精灵的领地里，面对着她本人。
- character: 旁白
  text: 由里乌斯失望地摇摇头，看到菜月昴对一位任何骑士都会鞠躬的伟大存在如此无礼，不禁在脸上流露出沮丧。
- character: 阿尔
  text: 他对这些东西不熟悉嘛，伙计。我觉得这次可以原谅他。这家伙真是死板……
- character: 旁白
  text: 阿尔摇着头，回想起上次菜月昴在这位威严骑士面前犯错的事。
- character: 由里乌斯
  text: 这一点我已经评估过了。菜月昴来自一个与我们不同的世界……
- character: 旁白
  text: 由里乌斯垂下眼帘沉思道。
- character: 阿尔
  text: 还是觉得不真实吧？
- character: 旁白
  text: 阿尔从上方笑着说道，注意到骑士困惑的状态。由里乌斯点了点头，然后视线转回屏幕上。
- character: 由里乌斯
  text: 不过……即便他态度如此，却能与一位大精灵相遇并与她缔结契约……他的精灵亲和力一定比我那些小伙伴告诉我的要高。
- character: 碧翠丝
  text: 停止你那毫无意义的推测。贝蒂的菜月昴不需要那么微不足道的东西来赢得贝蒂的忠诚，实际上。
- character: 旁白
  text: 碧翠丝的声音冰冷而坚定，训斥着坐在她后排那些愚蠢的精灵骑士们。她的目光紧盯屏幕，小手不自觉地落在了身旁沉睡的菜月昴的手上。
- character: 碧翠丝
  emotion: 悲伤
  text: 这次相遇简直就是命运，实际上。即使贝蒂表现得那么无礼，我想。
- character: 旁白
  text: 碧翠丝苦涩地自嘲了一下。对自己和身旁少年的初次见面感到羞愧。
- character: 视频内容
  text: '碧翠丝合上书，从凳子上跳了下来。''贝蒂受够了。''女孩走近菜月昴，直到他被逼到了门边。''是时候给你上一课了，我想。''

    菜月昴说：''嘿，你要干什么？''

    碧翠丝说：''你敢动一下试试！有什么遗言吗？''

    菜月昴说：''别……别伤害我。''

    观众们喊：''胆小鬼！胆小鬼！拿出男子气概来！'''
- character: 旁白
  text: 加菲尔怒视着里卡多、蜜蜜和缇碧三人组。
- character: 莱茵哈鲁特
  text: 他没事吧？
- character: 旁白
  text: 莱茵哈鲁特不禁担忧地问道，想知道大精灵会对少年做出什么。
- character: 罗兹瓦尔
  text: 不管怎样，她都不会真的伤~~害他的，莱茵哈鲁特大人~请放~心。
- character: 旁白
  text: 他从上方小丑领主拖长的口音中得到了答案。罗兹瓦尔专注地盯着屏幕，试图弄清楚碧翠丝为什么会对这少年另眼相看——不同于过去十年里来找她的数百个人。她会把任何不满足她高贵标准的人赶出去。然而她却毫无障碍地与这个普通人互动着，自如地表达自己。
- character: 罗兹瓦尔
  text: 耐人寻味……
- character: 视频内容
  text: '碧翠丝看起来毫无表情，抬起手对准了他的腹部。菜月昴一开始一脸困惑。然后他尖叫起来——碧翠丝吸干了他的魔力。菜月昴瘫倒在地，浑身麻痹，痛苦不堪。

    菜月昴说：''你对我做了什么，你这个钻头萝莉？''

    碧翠丝说：''我只是收集了你体内的魔力，我想。这确认了你不是敌人。''

    菜月昴缓缓抬起头，疲惫地露出了一个得意的笑容。''你不是人类吧？我不是说你的性格。''

    碧翠丝从上方得意地笑着。''你花了好长时间才注意到呢，我想。'''
- character: 碧翠丝
  emotion: 悲伤
  text: 贝蒂会补偿你的，我想。
- character: 旁白
  text: 剧场里的女孩并没有像屏幕里的自己那样微笑，她目睹了自己与契约者之间糟糕的开端。她不禁为当年施加在他身上的那个小法术低声道歉。碧翠丝紧握着菜月昴的手臂，低声呢喃道。
- character: 碧翠丝
  emotion: 悲伤
  text: 只要你回来，贝蒂会给你所有你需要的拥抱，你这个愚蠢的契约者，实际上。
- character: 旁白
  text: 碧翠丝面对身旁沉睡不动的菜月昴，眼中流露出一丝在绝望中浮现的微笑。她发誓要给他这些。
- character: 佩特拉
  emotion: 愤怒
  text: 碧翠丝大人以前好过分！
- character: 雷姆
  text: 是啊，我在为罗兹瓦尔大人工作的这些年里，好像从没见过碧翠丝大人笑过。
- character: 弗雷德莉卡
  text: 碧翠丝大人以前总是一个人待在图书馆里。自从她开始更多地外出以后，态度就变了。
- character: 旁白
  text: 弗雷德莉卡向两位女仆解释道。佩特拉是新来的女仆，所以什么都不知道。但雷姆已经对这位精灵非常熟悉了，毕竟她们在同一座宅邸里生活了好几年。
- character: 雷姆
  text: 碧翠丝大人……开始走出图书馆了？
- character: 拉姆
  text: 是因为巴鲁斯那些愚蠢的计划。
- character: 旁白
  text: 雷姆更感兴趣地看向姐姐。
- character: 雷姆
  text: 菜月昴对碧翠丝大人做了什么？
- character: 旁白
  text: 奥托和加菲尔突然笑了起来。雷姆惊讶地看着他们，当爱蜜莉雅和佩特拉也开始咯咯笑时，她更加困惑了。
- character: 雷姆
  text: 怎么了？
- character: 爱蜜莉雅
  emotion: 高兴
  text: 嘿嘿嘿，菜月昴算是强迫碧翠丝跟他缔结了契约。
- character: 旁白
  text: 爱蜜莉雅想起和他聊起这件事时的对话，咯咯笑了起来。她很高兴能借此转移对他的秘密能力的注意力，所以笑声从焦虑中自然而然地涌了出来。
- character: 由里乌斯
  text: 菜月昴怎么强迫一位大精灵跟他缔结契约的？
- character: 旁白
  text: 由里乌斯带着极大的兴趣和微笑问道，因为他知道这少年做了一件既天才又同样鲁莽的事。他喜欢菜月昴身上的这种特质。
- character: 奥托
  text: 很简单！菜月昴知道碧翠丝不会离开图书馆。所以他决定把它毁掉。
- character: 旁白
  text: 奥托带着疲惫的微笑解释着这段回忆。
- character: 库珥修
  text: 毁掉是什么意思？
- character: 拉姆
  text: 巴鲁斯当时要处理很多威胁，其中之一是有人悬赏要灭掉宅邸，肠蚀女要杀光里面所有人。
- character: 旁白
  text: 拉姆解释道，省略了是谁悬赏以及菜月昴要面对哪些危险的细节。她不想让大家开始思考这少年是怎么应对那些威胁的。他们不想再想他死去的事了。
- character: 莱茵哈鲁特
  text: 那他是怎么对付艾尔莎的？
- character: 旁白
  text: 莱茵哈鲁特带着愧疚的皱眉问道。他不应该让她逃掉的。
- character: 加菲尔
  text: 大将让我这了不起的家伙拖住那女人，然后他自己去做他该做的事。
- character: 旁白
  text: 加菲尔回忆起来得意地笑了笑，他姐姐则在一旁恼怒地摇着头。
- character: 雷姆
  text: 你居然离开了圣域，加菲？
- character: 旁白
  text: 雷姆惊讶地问道。这个少年对平时冷漠的雷姆居然对他表现出的相对温暖感到震惊。
- character: 拉姆
