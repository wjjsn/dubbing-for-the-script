  text: 菲莉丝皱着眉头插话道。
- character: 奥托
  text: 好吧……大家，请听我说。
- character: 旁白
  text: 悲伤而冰冷，含泪而愤怒，无聊而漠不关心。这些就是看着奥托从椅子上站起来的目光，他用充满信念的眼神看着他们。
- character: 奥托
  text: 我们不能继续这样下去了。我们不能每次菜月昴死的时候都害怕。
- character: 加菲尔
  text: 你他妈什么意思？
- character: 奥托
  text: 我是说菜月昴在我们的世界里的生活是一场噩梦。一个他妈的恐怖故事，我们需要接受这一点，锁住心灵来观看。
- character: 雷姆
  emotion: 愤怒
  text: 你是说我们不应该关心菜月昴君吗？！
- character: 奥托
  text: 我是说我们不应该对出了问题菜月昴会死感到惊讶。这不是我们来这里的目的。如果我们在他每次遭遇死亡时都绝望和揪心，我们可能比他还麻木。
- character: 由里乌斯
  text: 但……如果我们不能哀悼他的痛苦和牺牲，我们在这里还能做什么？
