  text: 由里乌斯问道，黄色的眼眸疲惫而阴郁。
- character: 奥托
  text: 我们需要愤怒。我们需要在他死的时候感到愤怒。我们需要确保记住每一个现实或他所说的循环中发生的一切。我们必须用心和头脑完整地观看这一切，以他最后一次见到我们的样子去迎接菜月昴。如果我们变得麻木并害怕他，那他还不如死了，因为那不是他一直在为之战斗的东西。
- character: 旁白
  text: 奥托环顾四周，露出了一个坚定而严肃的表情。
- character: 奥托
  text: 菜月昴的理智已经破碎了。自从他来到我们的世界，他经历了太多。我们是支撑他在一起的东西。我们需要确保当他醒来时我们能微笑。那是他对我们唯一的要求。所以我们需要观看这一切，不要沉溺于或为每一次重置哭泣。我们需要保持自我。
- character: 旁白
  text: 所有人都被这番演讲震惊了。奥托坐了下来，疲惫地看着屏幕。
- character: 爱蜜莉雅
  text: 说得好，奥托君。
- character: 旁白
  text: 爱蜜莉雅带着疲惫的微笑轻声对他说。少年脸红了，看向屏幕。在那之后，大家似乎都开始振作起来了。加菲尔本要经历第二次恐慌发作，此刻疲惫而温柔地瞪着身旁兄弟的屏幕。他会观看并从队长的痛苦中学习……这样队长就永远……永远不会再死了。
- character: 视频内容
  text: '菜月昴说：''确实……等等，你刚才说什么？碳是从哪来的？''

    屏幕回应：我不知道这是谁开的玩笑，但我会让你们为这一切后悔的。他第一次宅邸循环的记忆在他脑海中反复播放，他宣战了。别低估我有多记仇。在那晚迷住我的微笑之后！我要遵守对爱蜜莉雅的承诺！我会度过那个夜晚！'''
- character: 旁白
  text: 出于某种奇怪的原因。也许是在奥托的演讲之后已经很晚了，或者菜月昴那记仇的自我展现出的坚定决心。又或者两者兼而有之。但出于某种原因。他们都开始欢呼起来。他们甚至没有说任何连贯的话；他们只是在大喊。从里卡多到他旁边的双胞胎，到加菲尔，甚至阿尔！由里乌斯和莱茵哈鲁特坚定自己，瞪着屏幕。爱蜜莉雅和碧翠丝握着少年的双手，盯着屏幕。菲鲁特和佩特拉以及弗雷德莉卡对空气中弥漫的决心微笑着。库珥修和安娜塔西亚面带微笑地看着。普莉希拉、罗兹瓦尔和拉姆面无表情地看着。而雷姆……她很害怕。她太害怕了——当他们看到她打破他们的决心时会怎么做。她知道。碧翠丝说他会再死一次的那一刻，恐惧更加折磨了她的心。她害怕自己可能会杀了她爱的男人。
