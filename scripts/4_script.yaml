  text: 碧翠丝惊讶地抬起头，菜月昴打开了图书馆的门。
- character: 视频内容
  text: '碧翠丝说：''你要走了，我想？''

    菜月昴说：''嗯。有件事我想确认一下。等之后再沮丧吧。'''
- character: 碧翠丝
  emotion: 悲伤
  text: 你这个终极变态。
- character: 旁白
  text: 碧翠丝看着身旁沉睡的少年，脸上露出了淡淡的微笑。也许她那种态度确实帮到了他。毕竟他从没要求她改变。她低声说着，轻抚着契约者的脸颊。嘴角浮现出一丝悲伤的微笑。菜月昴走出宅邸，一看到一个熟悉的半精灵少女在巨大的花园里找他时就笑了。
- character: 视频内容
  text: '菜月昴心想：是啊，我就知道。

    爱蜜莉雅一看到他就喊道。''菜月昴！''

    菜月昴说：''你简直在发光。''

    爱蜜莉雅跑到他面前，对着他大喊。''我很担心你！雷姆和拉姆正疯了一样到处找你，说你醒来后就消失了！''

    菜月昴说：''抱歉……我被碧翠丝缠了一会儿。''

    爱蜜莉雅开始担忧地检查他的状况。''又来了？我听说你醒来之前她也捉弄了你……'''
- character: 旁白
  text: 菜月昴只是对她靠得这么近而微笑。
